// Fusionne les banks sauvées avec les banks initiales (ajoute les nouvelles sans écraser les modifs utilisateur)
function mergeBanks(saved, init){
  if(!saved) return init;
  const merged={...saved};
  for(const [k,v] of Object.entries(init)){
    if(!(k in merged)) merged[k]=v;
  }
  return merged;
}

function applySecrets(profiles){
  const secrets=loadSecrets();
  const result={...profiles};
  for(const [id,p] of Object.entries(result)){
    const s=secrets[id]||{};
    // Local secrets override Firestore only if they exist (non-empty)
    result[id]={...p,
      aiKeys:(s.aiKeys&&(s.aiKeys.gemini||s.aiKeys.anthropic))?s.aiKeys:(p.aiKeys||{anthropic:"",gemini:""}),
      password:s.password?s.password:(p.password||"")
    };
  }
  return result;
}

function App() {
  const saved = loadState();
  const [firestoreLoaded, setFirestoreLoaded] = useState(false);
  const initDefault = saved || {
    version:2,
    activeProfileId:"sebastien",
    shared:{songDb:INIT_SONG_DB_META, theme:"dark", setlists:[{id:"sl_main",name:"Ma Setlist",songIds:INIT_SONG_DB_META.map(s=>s.id),profileIds:["sebastien"]}]},
    profiles:{sebastien:makeDefaultProfile("sebastien","Sébastien",true)}
  };

  // Shared state
  const [songDb,  setSongDb]  = useState(initDefault.shared.songDb);
  const [theme,   setTheme]   = useState(initDefault.shared.theme);
  const [setlists, setSetlists] = useState(initDefault.shared?.setlists || [{id:"sl_main",name:"Ma Setlist",songIds:INIT_SONG_DB_META.map(s=>s.id),profileIds:[initDefault.activeProfileId]}]);
  // Migrate custom guitars from profiles to shared (one-time)
  const [customGuitars, setCustomGuitars] = useState(()=>{
    const shared=initDefault.shared?.customGuitars||[];
    const migrated=[...shared];
    const existingIds=new Set(migrated.map(g=>g.id));
    for(const [,p] of Object.entries(initDefault.profiles||{})){
      (p.customGuitars||[]).forEach(g=>{if(!existingIds.has(g.id)){migrated.push(g);existingIds.add(g.id);}});
    }
    return migrated;
  });

  // Profiles state — merge banks + apply local secrets (aiKeys, passwords)
  const mergedProfiles = useMemo(()=>{
    const p={...initDefault.profiles};
    for(const [id,prof] of Object.entries(p)){
      p[id]={...prof, banksAnn:mergeBanks(prof.banksAnn,INIT_BANKS_ANN), banksPlug:mergeBanks(prof.banksPlug,INIT_BANKS_PLUG)};
    }
    return applySecrets(p);
  },[]);
  const [profiles, setProfiles] = useState(mergedProfiles);
  const [activeProfileId, setActiveProfileId] = useState(initDefault.activeProfileId);

  // Current profile (derived)
  const profile = profiles[activeProfileId] || Object.values(profiles)[0];

  // Per-profile convenience setters
  const setProfileField = (field, value) => {
    setProfiles(p => ({...p, [activeProfileId]: {...p[activeProfileId], [field]: typeof value==="function"?value(p[activeProfileId][field]):value}}));
  };
  const setBanksAnn  = v => setProfileField("banksAnn", v);
  const setBanksPlug = v => setProfileField("banksPlug", v);
  const setAiProvider= v => setProfileField("aiProvider", v);
  const setAiKeys    = v => setProfileField("aiKeys", v);

  // Guitars for current profile (with edits merged)
  const allGuitars = useMemo(()=>{
    const edits=profile.editedGuitars||{};
    const base = GUITARS.filter(g=>profile.myGuitars.includes(g.id)).map(g=>({...g,...(edits[g.id]||{})}));
    const customs=(customGuitars||[]).filter(g=>profile.myGuitars.includes(g.id));
    return [...base, ...customs];
  },[profile.myGuitars, customGuitars, profile.editedGuitars]);

  // Non-persisted
  const [screen,  setScreen]  = useState("loading");
  const [checked, setChecked] = useState([]);
  const [synth,   setSynth]   = useState(null);
  const [syncStatus, setSyncStatus] = useState("idle");
  const lastSaveTime = useRef(0);
  const [viewProfileId, setViewProfileId] = useState(null);

  // Destructure profile fields for convenience
  const {banksAnn, banksPlug, aiProvider, aiKeys, availableSources} = profile;
  // Filter setlists for current profile
  const mySetlists = setlists.filter(sl => !sl.profileIds || sl.profileIds.length === 0 || sl.profileIds.includes(activeProfileId));

  // Save secrets (aiKeys, passwords) to separate localStorage key — never synced
  useEffect(()=>{
    const secrets={};
    for(const [id,p] of Object.entries(profiles)){
      secrets[id]={aiKeys:p.aiKeys||{anthropic:"",gemini:""},password:p.password||""};
    }
    saveSecrets(secrets);
  },[profiles]);

  // Merge songDb: union by id (never lose songs)
  const mergeSongDb=(local,remote)=>{
    if(!remote)return local;
    if(!local)return remote;
    const map=new Map(local.map(s=>[s.id,s]));
    remote.forEach(s=>{
      const existing=map.get(s.id);
      if(!existing){map.set(s.id,s);}
      else{
        // Keep the one with the most recent/complete aiCache
        if(s.aiCache&&(!existing.aiCache||s.aiCache.sv>(existing.aiCache.sv||0))){map.set(s.id,s);}
      }
    });
    return [...map.values()];
  };
  // Merge setlists: keep all, merge songIds (union)
  const mergeSetlists=(local,remote)=>{
    if(!remote)return local;
    if(!local)return remote;
    const map=new Map(local.map(sl=>[sl.id,sl]));
    remote.forEach(sl=>{
      const existing=map.get(sl.id);
      if(!existing){map.set(sl.id,sl);}
      else{map.set(sl.id,{...existing,...sl,songIds:[...new Set([...existing.songIds,...sl.songIds])]});}
    });
    return [...map.values()];
  };

  // Persist to localStorage (immediate) + Firestore (debounced 3s)
  const hasMounted = useRef(false);
  const firestoreDebounceRef = useRef(null);
  useEffect(()=>{
    const state={version:2, activeProfileId, shared:{songDb,theme,setlists,customGuitars}, profiles, lastModified:Date.now()};
    autoBackup();
    try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e){}
    if(!hasMounted.current){hasMounted.current=true;return;}
    if(!firestoreLoaded) return;
    // Debounce Firestore saves: wait 3s of inactivity before writing
    if(firestoreDebounceRef.current) clearTimeout(firestoreDebounceRef.current);
    setSyncStatus("syncing");
    firestoreDebounceRef.current = setTimeout(()=>{
      lastSaveTime.current = Date.now();
      saveToFirestore(state).then(()=>setSyncStatus("synced")).catch(()=>setSyncStatus("error"));
    }, 3000);
    return ()=>{if(firestoreDebounceRef.current)clearTimeout(firestoreDebounceRef.current);};
  },[songDb,theme,setlists,customGuitars,profiles,activeProfileId,firestoreLoaded]);

  // Load from Firestore on first mount — use remote if newer than local
  const [firestoreProfiles,setFirestoreProfiles]=useState(null);
  useEffect(()=>{
    loadFromFirestore().then(data=>{
      if(data&&data.shared){
        // Merge songDb and setlists (never lose data), replace the rest
        var remoteSongs=data.shared.songDb||[];
        var remoteSl=data.shared.setlists||[];
        var mergedSongs=mergeSongDb(songDb||[],remoteSongs);
        var mergedSl=mergeSetlists(setlists||[],remoteSl);

        setSongDb(mergedSongs);
        if(data.shared.theme) setTheme(data.shared.theme);
        setSetlists(mergedSl);
        if(data.shared.customGuitars) setCustomGuitars(data.shared.customGuitars);
        if(data.profiles){setProfiles(applySecrets(data.profiles));setFirestoreProfiles(data.profiles);}
        if(data.activeProfileId) setActiveProfileId(data.activeProfileId);

        // If local had more songs/setlists, push merged result back
        if(mergedSongs.length>remoteSongs.length||mergedSl.length>remoteSl.length){
          var ps={version:2,activeProfileId:data.activeProfileId||activeProfileId,shared:{songDb:mergedSongs,theme:data.shared.theme||theme,setlists:mergedSl,customGuitars:data.shared.customGuitars||customGuitars},profiles:data.profiles||profiles,lastModified:Date.now()};
          saveToFirestore(ps).catch(function(){});
        }
      }
      setFirestoreLoaded(true);
    }).catch(()=>setFirestoreLoaded(true));
  },[]);

  // Listen for remote changes from other devices
  useEffect(()=>{
    let unsub=()=>{};
    let firstSnapshot=true;
    // Use onDbReady (not dbReadyPromise) so the listener is always set up,
    // even if Firebase loads after the 10s initial timeout.
    onDbReady(()=>{
      if(!db) return;
      unsub = db.collection("sync").doc("state").onSnapshot(function(d){
        if(!d.exists) return;
        const data=d.data();
        // Skip the very first snapshot (reflects current/local state, not a remote change)
        if(firstSnapshot){firstSnapshot=false;return;}
        // Skip echoes of our own saves (identified by syncId, not a time window)
        if(data.syncId&&data.syncId===_lastSavedSyncId) return;
        if(!data||!data.shared) return;
        // Apply each field only if the merged result is actually different from current state
        // (prevents unnecessary re-renders and save feedback loops)
        if(data.shared.songDb) setSongDb(prev=>{
          const m=mergeSongDb(prev,data.shared.songDb);
          // Same object refs → mergeSongDb kept local objects → no actual change
          if(m.length===prev.length&&m.every((s,i)=>s===prev[i]))return prev;
          return m;
        });
        if(data.shared.theme) setTheme(data.shared.theme);
        if(data.shared.setlists) setSetlists(prev=>{
          const m=mergeSetlists(prev,data.shared.setlists);
          // mergeSetlists always creates new objects, so compare by content not reference
          if(m.length===prev.length&&m.every((sl,i)=>prev[i]&&sl.id===prev[i].id&&
            sl.songIds.length===prev[i].songIds.length&&
            sl.songIds.every((id,j)=>id===prev[i].songIds[j])))return prev;
          return m;
        });
        if(data.shared.customGuitars) setCustomGuitars(prev=>{
          if(JSON.stringify(data.shared.customGuitars)===JSON.stringify(prev))return prev;
          return data.shared.customGuitars;
        });
        if(data.profiles) setProfiles(prev=>{
          const next=applySecrets(data.profiles);
          if(JSON.stringify(next)===JSON.stringify(prev))return prev;
          return next;
        });
        setSyncStatus("synced");
      },function(){});
    });
    return ()=>unsub();
  },[]);

  const recordLogin = id => {
    setProfiles(p=>{if(!p[id])return p;const h=(p[id].loginHistory||[]).slice();h.unshift(Date.now());if(h.length>5)h.length=5;return{...p,[id]:{...p[id],loginHistory:h}};});
  };

  // Once Firestore loaded, decide initial screen
  const loginRecorded=useRef(false);
  useEffect(()=>{
    if(!firestoreLoaded||screen!=="loading") return;
    const allProfiles=firestoreProfiles||profiles;
    const profileCount=Object.keys(allProfiles).length;
    // Check if a session was active before reload
    const sessionProfile=sessionStorage.getItem("tonex_active_profile");
    if(sessionProfile&&allProfiles[sessionProfile]){
      setActiveProfileId(sessionProfile);recordLogin(sessionProfile);loginRecorded.current=true;setScreen("list");
    } else if(profileCount>1){setScreen("pick");}
    else{recordLogin(activeProfileId);loginRecorded.current=true;setScreen("list");}
  },[firestoreLoaded,firestoreProfiles]);

  // Reset on profile switch
  useEffect(()=>{if(screen!=="loading"){setChecked([]);setScreen("list");}},[activeProfileId]);

  // Apply theme to document
  useEffect(()=>{
    document.documentElement.setAttribute("data-theme",theme);
    const meta=document.querySelector('meta[name="theme-color"]');
    if(meta) meta.content=theme==="dark"?"#0f172a":"#f1f5f9";
  },[theme]);
  const switchProfile = id => { if(profiles[id]){recordLogin(id);setActiveProfileId(id);sessionStorage.setItem("tonex_active_profile",id);} };
  const isAdmin = profile.isAdmin === true;
  const pickProfile = id => { recordLogin(id);setActiveProfileId(id);sessionStorage.setItem("tonex_active_profile",id); setScreen("list"); };
  const createAndPick = name => {
    const id=name.toLowerCase().replace(/[^a-z0-9]/g,"_")+`_${Date.now()}`;
    const np=makeDefaultProfile(id,name);
    setProfiles(p=>({...p,[id]:np}));
    setActiveProfileId(id);
    setScreen("list");
  };

  const songs=useMemo(()=>checked.map(id=>{
    const d=songDb.find(x=>x.id===id);
    return d?{...d}:{id,title:id,artist:"",isCustom:true,ig:[]};
  }),[checked,songDb]);

  const fullState={songDb,setlists,banksAnn,banksPlug};
  const onImportState=data=>{
    if(data.songDb)    setSongDb(data.songDb);
    if(data.setlists)  setSetlists(data.setlists);
    if(data.banksAnn)  setBanksAnn(data.banksAnn);
    if(data.banksPlug) setBanksPlug(data.banksPlug);
    setChecked([]);
    setScreen("list");
  };

  const [profileInitTab,setProfileInitTab]=useState(null);

  if(screen==="loading") return <div className="page-root"><div style={{textAlign:"center",padding:"60px 20px"}}><div style={{fontSize:48,marginBottom:16}}>🎸</div><div style={{fontSize:20,fontWeight:800,color:"var(--text)"}}>ToneX Poweruser</div><div style={{fontSize:13,color:"var(--text-muted)",marginTop:8}}>Chargement...</div></div></div>;
  if(screen==="pick") return <div className="page-root"><ProfilePickerScreen profiles={profiles} onPick={pickProfile}/></div>;
  if(screen==="viewprofile"&&viewProfileId&&profiles[viewProfileId]) return <div className="page-root"><ViewProfileScreen profile={profiles[viewProfileId]} onBack={()=>setScreen("list")} onNavigate={setScreen}/><AppFooter syncStatus={syncStatus}/></div>;
  if(screen==="exportimport") return <div className="page-root"><ExportImportScreen banksAnn={banksAnn} onBanksAnn={setBanksAnn} banksPlug={banksPlug} onBanksPlug={setBanksPlug} onBack={()=>setScreen("settings")} onNavigate={setScreen} fullState={fullState} onImportState={onImportState}/><AppFooter syncStatus={syncStatus}/></div>;
  if(screen==="profile")      return <div className="page-root"><MonProfilScreen songDb={songDb} onSongDb={setSongDb} setlists={mySetlists} allSetlists={setlists} onSetlists={setSetlists} banksAnn={banksAnn} onBanksAnn={setBanksAnn} banksPlug={banksPlug} onBanksPlug={setBanksPlug} onBack={()=>setScreen("list")} onNavigate={setScreen} aiProvider={aiProvider} onAiProvider={setAiProvider} aiKeys={aiKeys} onAiKeys={setAiKeys} theme={theme} onTheme={setTheme} profile={profile} profiles={profiles} onProfiles={setProfiles} activeProfileId={activeProfileId} allGuitars={allGuitars} initTab={profileInitTab} customGuitars={customGuitars} onCustomGuitars={setCustomGuitars} fullState={fullState} onImportState={onImportState} onLogout={()=>{sessionStorage.removeItem("tonex_active_profile");setScreen("pick");}}/><AppFooter syncStatus={syncStatus}/></div>;
  if(screen==="settings")     return <div className="page-root"><ParametresScreen onBack={()=>setScreen("list")} onNavigate={setScreen} aiProvider={aiProvider} onAiProvider={setAiProvider} aiKeys={aiKeys} onAiKeys={setAiKeys} profile={profile} profiles={profiles} onProfiles={setProfiles} activeProfileId={activeProfileId} fullState={fullState} onImportState={onImportState} banksAnn={banksAnn} onBanksAnn={setBanksAnn} banksPlug={banksPlug} onBanksPlug={setBanksPlug} songDb={songDb} onSongDb={setSongDb}/><AppFooter syncStatus={syncStatus}/></div>;
  if(screen==="setlists")     return <div className="page-root">
    <AppHeader profiles={profiles} activeProfileId={activeProfileId} onSwitch={switchProfile} onProfile={()=>{setProfileInitTab(null);setScreen("profile");}} onViewProfile={(id)=>{setViewProfileId(id);setScreen("viewprofile");}}/>
    <SetlistsScreen songDb={songDb} onSongDb={setSongDb} setlists={mySetlists} allSetlists={setlists} onSetlists={setSetlists} checked={checked} onChecked={setChecked} onNext={()=>setScreen("recap")} onSettings={()=>setScreen("profile")} onNavigate={setScreen} banksAnn={banksAnn} onBanksAnn={setBanksAnn} banksPlug={banksPlug} onBanksPlug={setBanksPlug} aiProvider={aiProvider} aiKeys={aiKeys} allGuitars={allGuitars} availableSources={availableSources} activeProfileId={activeProfileId}/>
    <AppFooter syncStatus={syncStatus}/>
  </div>;
  if(screen==="jam") return <div className="page-root">
    <AppHeader profiles={profiles} activeProfileId={activeProfileId} onSwitch={switchProfile} onProfile={()=>{setProfileInitTab(null);setScreen("profile");}} onViewProfile={(id)=>{setViewProfileId(id);setScreen("viewprofile");}}/>
    <Breadcrumb crumbs={[{label:"Accueil",screen:"list"},{label:"Jammer"}]} onNavigate={setScreen}/>
    <div style={{fontSize:20,fontWeight:800,color:"var(--text)",marginBottom:16}}>🎲 Jammer</div>
    <JamScreen banksAnn={banksAnn} banksPlug={banksPlug} allGuitars={allGuitars} availableSources={availableSources}/>
    <AppFooter syncStatus={syncStatus}/>
  </div>;
  if(screen==="explore") return <div className="page-root">
    <AppHeader profiles={profiles} activeProfileId={activeProfileId} onSwitch={switchProfile} onProfile={()=>{setProfileInitTab(null);setScreen("profile");}} onViewProfile={(id)=>{setViewProfileId(id);setScreen("viewprofile");}}/>
    <Breadcrumb crumbs={[{label:"Accueil",screen:"list"},{label:"Explorer"}]} onNavigate={setScreen}/>
    <div style={{fontSize:20,fontWeight:800,color:"var(--text)",marginBottom:16}}>🎛️ Explorer les presets</div>
    <PresetBrowser banksAnn={banksAnn} banksPlug={banksPlug} availableSources={availableSources} customPacks={profile.customPacks} guitars={allGuitars}/>
    <AppFooter syncStatus={syncStatus}/>
  </div>;
  if(screen==="synthesis"&&synth) return <div className="page-root"><AppHeader profiles={profiles} activeProfileId={activeProfileId} onSwitch={switchProfile} onProfile={()=>{setProfileInitTab(null);setScreen("profile");}} onViewProfile={(id)=>{setViewProfileId(id);setScreen("viewprofile");}}/><SynthesisScreen songs={songs} gps={synth.gps} aiR={synth.aiR} onBack={()=>setScreen("recap")} onNavigate={setScreen} songDb={songDb} banksAnn={banksAnn} banksPlug={banksPlug} allGuitars={allGuitars} availableSources={availableSources}/><AppFooter syncStatus={syncStatus}/></div>;
  if(screen==="recap")        return <div className="page-root"><AppHeader profiles={profiles} activeProfileId={activeProfileId} onSwitch={switchProfile} onProfile={()=>{setProfileInitTab(null);setScreen("profile");}} onViewProfile={(id)=>{setViewProfileId(id);setScreen("viewprofile");}}/><RecapScreen songs={songs} onBack={()=>setScreen("list")} onNavigate={setScreen} onValidate={(gps,aiR)=>{setSynth({gps,aiR});setScreen("synthesis");}} songDb={songDb} onSongDb={setSongDb} banksAnn={banksAnn} banksPlug={banksPlug} aiProvider={aiProvider} aiKeys={aiKeys} allGuitars={allGuitars} availableSources={availableSources}/><AppFooter syncStatus={syncStatus}/></div>;
  return <div className="page-root"><HomeScreen songDb={songDb} onSongDb={setSongDb} setlists={mySetlists} allSetlists={setlists} onSetlists={setSetlists} checked={checked} onChecked={setChecked} onNext={()=>setScreen("recap")} onSettings={()=>setScreen("settings")} onProfile={(tab)=>{setProfileInitTab(tab||null);setScreen("profile");}} onSetlistScreen={()=>setScreen("setlists")} onJam={()=>setScreen("jam")} onExplore={()=>setScreen("explore")} banksAnn={banksAnn} banksPlug={banksPlug} aiProvider={aiProvider} aiKeys={aiKeys} allGuitars={allGuitars} availableSources={availableSources} profiles={profiles} activeProfileId={activeProfileId} onSwitchProfile={switchProfile} onProfiles={setProfiles} customPacks={profile.customPacks} syncStatus={syncStatus} onViewProfile={(id)=>{setViewProfileId(id);setScreen("viewprofile");}} onLogout={()=>{sessionStorage.removeItem("tonex_active_profile");setScreen("pick");}}/></div>;
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
