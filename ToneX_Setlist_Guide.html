              <div style={{flex:1,fontSize:12,color:on?"var(--text)":"var(--text-muted)",fontWeight:on?600:400}}>{label}</div>
              {locked&&<span style={{fontSize:9,color:"var(--text-dim)"}}>auto</span>}
            </button>;
          })}
        </div>
      </div>}

    </div>
  );
}

// ─── Packs Tab ────────────────────────────────────────────────────────────────
function PacksTab({profile,onProfiles,activeProfileId,aiProvider,aiKeys}){
  const [packName,setPackName]=useState("");
  const [file,setFile]=useState(null);
  const [filePreview,setFilePreview]=useState(null);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState(null);
  const fileRef=useRef(null);

  const updateProfile=(field,value)=>onProfiles(p=>({...p,[activeProfileId]:{...p[activeProfileId],[field]:typeof value==="function"?value(p[activeProfileId][field]):value}}));

  const handleFile=e=>{
    const f=e.target.files?.[0];
    if(!f)return;
    setFile(f);setErr(null);
    const reader=new FileReader();
    reader.onload=ev=>{setFilePreview(ev.target.result);};
    reader.readAsDataURL(f);
  };

  const extractPresets=()=>{
    if(!packName.trim()||!filePreview)return;
    const key=aiKeys?.gemini||aiKeys?.anthropic||DEFAULT_GEMINI_KEY;
    const provider=(aiKeys?.gemini||DEFAULT_GEMINI_KEY)?"gemini":"anthropic";
    if(!key){setErr("Clé API manquante — configure-la dans ⚙️ Paramètres.");return;}
    setLoading(true);setErr(null);
    const prompt=`Analyse cette image/document d'un pack de presets pour guitare ToneX appelé "${packName.trim()}".
Extrais TOUS les noms de presets visibles et pour chacun déduis :
- amp : le modèle d'ampli simulé (nom générique, ex: "Marshall JCM800", "Fender Twin Reverb")
- gain : "low", "mid" ou "high"
- style : "blues", "rock", "hard_rock", "jazz", "pop" ou "metal"
- scores : compatibilité par type de micro {HB: 50-97, SC: 50-97, P90: 50-97}

Pour chaque ampli UNIQUE trouvé, génère aussi une fiche descriptive :
- emoji : un emoji représentatif
- refs : artistes et morceaux associés [{a:"Artiste",t:["Morceau 1","Morceau 2"]}]
- desc : description courte en français de l'ampli (2-3 phrases)

Réponds UNIQUEMENT en JSON (sans markdown) :
{"presets":[{"name":"...","amp":"...","gain":"...","style":"...","scores":{"HB":85,"SC":70,"P90":78}},...],
"ampContext":{"Nom Ampli":{"emoji":"🎸","refs":[{"a":"Artiste","t":["Morceau"]}],"desc":"Description..."},...}}`;
    const base64=filePreview.split(",")[1];
    const mimeType=filePreview.split(";")[0].split(":")[1];
    if(provider==="gemini"){
      fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${key}`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({contents:[{parts:[{inlineData:{mimeType,data:base64}},{text:prompt}]}]})
      }).then(r=>r.json()).then(d=>{
        if(d.error)throw new Error(d.error.message);
        const txt=d.candidates?.[0]?.content?.parts?.[0]?.text||"";
        const parsed=safeParseJSON(txt);
        savePack(parsed.presets||[],parsed.ampContext||{});
      }).catch(e=>setErr(e.message)).finally(()=>setLoading(false));
    } else {
      fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:4096,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:mimeType,data:base64}},{type:"text",text:prompt}]}]})
      }).then(r=>r.json()).then(d=>{
        if(d.error)throw new Error(d.error.message);
        const txt=d.content?.map(i=>i.text||"").join("")||"";
        const parsed=safeParseJSON(txt);
        savePack(parsed.presets||[],parsed.ampContext||{});
      }).catch(e=>setErr(e.message)).finally(()=>setLoading(false));
    }
  };

  const savePack=(presets,ampContext)=>{
    const pack={id:`pack_${Date.now()}`,name:packName.trim(),presetCount:presets.length,presets:presets.map(p=>({...p,src:packName.trim()})),ampContext:ampContext||{}};
    updateProfile("customPacks",prev=>[...(prev||[]),pack]);
    setPackName("");setFile(null);setFilePreview(null);
    if(fileRef.current)fileRef.current.value="";
  };

  const deletePack=id=>{
    updateProfile("customPacks",prev=>(prev||[]).filter(p=>p.id!==id));
  };

  const packs=profile.customPacks||[];
  const inp={background:"var(--bg-card)",color:"var(--text)",border:"1px solid var(--a15)",borderRadius:7,padding:"6px 10px",fontSize:12,boxSizing:"border-box"};

  return(
    <div>
      <div style={{fontSize:13,color:"var(--text-sec)",marginBottom:16}}>Ajoute des packs de presets en joignant une photo ou un document. L'IA en extraira les presets.</div>

      {/* Packs existants */}
      {packs.length>0&&<div style={{marginBottom:16}}>
        {packs.map(p=>(
          <div key={p.id} style={{background:"var(--a4)",border:"1px solid var(--a8)",borderRadius:10,padding:12,marginBottom:8}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <div style={{flex:1,fontSize:13,fontWeight:700,color:"var(--text)"}}>{p.name}</div>
              <span style={{fontSize:11,color:"var(--text-muted)"}}>{p.presetCount||p.presets?.length||0} presets</span>
              <button onClick={()=>deletePack(p.id)} style={{background:"rgba(239,68,68,0.15)",border:"1px solid var(--red-border)",color:"var(--red)",borderRadius:6,padding:"3px 8px",fontSize:11,cursor:"pointer"}}>Supprimer</button>
            </div>
            {p.presets?.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {p.presets.slice(0,8).map((pr,i)=><span key={i} style={{fontSize:10,background:"var(--a5)",border:"1px solid var(--a8)",borderRadius:4,padding:"2px 6px",color:"var(--text-sec)"}}>{pr.name}</span>)}
              {p.presets.length>8&&<span style={{fontSize:10,color:"var(--text-muted)"}}>+{p.presets.length-8} autres</span>}
            </div>}
          </div>
        ))}
      </div>}

      {/* Ajouter un pack */}
      <div style={{background:"var(--accent-bg)",border:"1px solid rgba(99,102,241,0.2)",borderRadius:12,padding:16}}>
        <div style={{fontSize:13,fontWeight:700,color:"var(--accent)",marginBottom:12}}>+ Nouveau pack</div>
        <input placeholder="Nom du pack (ex: TSR Blues Pack)" value={packName} onChange={e=>setPackName(e.target.value)} style={{...inp,width:"100%",marginBottom:10}}/>
        <div style={{marginBottom:10}}>
          <input ref={fileRef} type="file" accept="image/*,.pdf" onChange={handleFile} style={{fontSize:12,color:"var(--text-sec)"}}/>
        </div>
        {filePreview&&filePreview.startsWith("data:image")&&<div style={{marginBottom:10,borderRadius:8,overflow:"hidden",border:"1px solid var(--a8)"}}>
          <img src={filePreview} style={{width:"100%",maxHeight:200,objectFit:"contain",background:"var(--a3)"}}/>
        </div>}
        {filePreview&&!filePreview.startsWith("data:image")&&<div style={{fontSize:11,color:"var(--text-muted)",marginBottom:10}}>Document joint ({file?.name})</div>}
        {err&&<div style={{fontSize:12,color:"var(--red)",marginBottom:10}}>{err}</div>}
        <button onClick={extractPresets} disabled={!packName.trim()||!filePreview||loading}
          style={{width:"100%",background:packName.trim()&&filePreview&&!loading?"var(--accent)":"var(--bg-disabled)",border:"none",color:"#fff",borderRadius:10,padding:"12px",fontSize:13,fontWeight:700,cursor:packName.trim()&&filePreview&&!loading?"pointer":"not-allowed"}}>
          {loading?"Extraction IA en cours...":"Extraire les presets avec l'IA"}
        </button>
      </div>
    </div>
  );
}

// ─── Settings ─────────────────────────────────────────────────────────────────
// ─── Mon Profil Screen ────────────────────────────────────────────────────────
function MonProfilScreen({songDb,onSongDb,setlists,allSetlists,onSetlists,banksAnn,onBanksAnn,banksPlug,onBanksPlug,onBack,onNavigate,aiProvider,onAiProvider,aiKeys,onAiKeys,theme,onTheme,profile,profiles,onProfiles,activeProfileId,allGuitars,initTab,customGuitars,onCustomGuitars,fullState,onImportState,onLogout}) {
  const [tab,setTab]=useState(initTab||"profile");
  const [newSlName,setNewSlName]=useState("");
  const [editSlId,setEditSlId]=useState(null);
  const [editSlName,setEditSlName]=useState("");
  const [newSongTitle,setNewSongTitle]=useState("");
  const [newSongArtist,setNewSongArtist]=useState("");
  const [newSongSlIds,setNewSongSlIds]=useState([]);
  const toggleNewSongSl=id=>setNewSongSlIds(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const [expandedSongId,setExpandedSongId]=useState(null);
  const toggleSongInSetlist=(songId,slId)=>onSetlists(p=>p.map(sl=>sl.id!==slId?sl:{...sl,songIds:sl.songIds.includes(songId)?sl.songIds.filter(x=>x!==songId):[...sl.songIds,songId]}));
  const inp={background:"var(--bg-card)",color:"var(--text)",border:"1px solid var(--a15)",borderRadius:7,padding:"6px 10px",fontSize:12,boxSizing:"border-box"};
  const tabBtn=(id,label)=>(
    <button onClick={()=>setTab(id)} style={{background:tab===id?"var(--accent-bg)":"var(--a5)",border:tab===id?"1px solid rgba(99,102,241,0.5)":"1px solid var(--a8)",color:tab===id?"var(--accent)":"var(--text-sec)",borderRadius:8,padding:"7px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>{label}</button>
  );
  const createSetlist=()=>{if(!newSlName.trim())return;onSetlists(p=>[...p,{id:`sl_${Date.now()}`,name:newSlName.trim(),songIds:[],profileIds:[activeProfileId]}]);setNewSlName("");};
  const deleteSetlist=id=>onSetlists(p=>p.filter(s=>s.id!==id));
  const renameSetlist=(id,name)=>onSetlists(p=>p.map(s=>s.id===id?{...s,name}:s));
  const removeSongFromSetlist=(slId,songId)=>onSetlists(p=>p.map(sl=>sl.id===slId?{...sl,songIds:sl.songIds.filter(x=>x!==songId)}:sl));
  const addSongToDb=()=>{
    if(!newSongTitle.trim())return;
    const ns={id:`c_${Date.now()}`,title:newSongTitle.trim(),artist:newSongArtist.trim()||"Artiste inconnu",isCustom:true,ig:[],aiCache:null};
    onSongDb(p=>[...p,ns]);
    if(newSongSlIds.length>0)onSetlists(p=>p.map(sl=>newSongSlIds.includes(sl.id)?{...sl,songIds:[...sl.songIds,ns.id]}:sl));
    fetchAI(ns,"",banksAnn,banksPlug,aiProvider,aiKeys,allGuitars)
      .then(r=>onSongDb(p=>p.map(x=>x.id===ns.id?{...x,aiCache:updateAiCache(x.aiCache,"",r)}:x)))
      .catch(()=>{});
    setNewSongTitle("");setNewSongArtist("");setNewSongSlIds([]);
  };
  const deleteSongFromDb=id=>{onSongDb(p=>p.filter(s=>s.id!==id));onSetlists(p=>p.map(sl=>({...sl,songIds:sl.songIds.filter(x=>x!==id)})));};
  return (
    <div>
      <Breadcrumb crumbs={[{label:"Accueil",screen:"list"},{label:"Mon profil"}]} onNavigate={onNavigate}/>
      <div style={{fontSize:20,fontWeight:800,color:"var(--text)",marginBottom:16}}>👤 Mon profil</div>
      <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
        {tabBtn("profile","🎸 Guitares")}
        {tabBtn("devices","📱 Materiel")}
        {tabBtn("sources","📦 Sources")}
        {profile.devices?.pedale&&tabBtn("pedale","🎛 Pedale ToneX")}
        {profile.devices?.anniversary&&tabBtn("ann","🎛 ToneX Ann.")}
        {profile.devices?.plug&&tabBtn("plug","🔌 ToneX Plug")}
        {tabBtn("display","🎨 Affichage")}
        {profile.isAdmin&&tabBtn("ia","🔑 Cle API")}
        {profile.isAdmin&&tabBtn("maintenance","🔧 Maintenance")}
        {profile.isAdmin&&tabBtn("export","📋 Export / Import")}
        {profile.isAdmin&&tabBtn("admin_profiles","👥 Profils")}
      </div>
      {tab==="profile"&&<ProfileTab profile={profile} profiles={profiles} onProfiles={onProfiles} activeProfileId={activeProfileId} inp={inp} section="guitars" aiKeys={aiKeys} customGuitars={customGuitars} onCustomGuitars={onCustomGuitars}/>}
      {tab==="devices"&&<ProfileTab profile={profile} profiles={profiles} onProfiles={onProfiles} activeProfileId={activeProfileId} inp={inp} section="devices"/>}
      {tab==="sources"&&<ProfileTab profile={profile} profiles={profiles} onProfiles={onProfiles} activeProfileId={activeProfileId} inp={inp} section="sources"/>}
      {tab==="setlists"&&<div>
        <div style={{fontSize:13,color:"var(--text-sec)",marginBottom:12}}>{setlists.length} setlist{setlists.length>1?"s":""}</div>
        {setlists.map(sl=>(
          <div key={sl.id} style={{background:"var(--a4)",border:"1px solid var(--a8)",borderRadius:12,padding:14,marginBottom:12}}>
            {editSlId===sl.id?(
              <div style={{display:"flex",gap:8,marginBottom:10}}>
                <InlineRenameInput initialName={sl.name} onSave={name=>{renameSetlist(sl.id,name);setEditSlId(null);}} onCancel={()=>setEditSlId(null)} inp={inp}/>
              </div>
            ):(
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{flex:1,fontSize:14,fontWeight:700,color:"var(--text)"}}>{sl.name}</div>
                <span style={{fontSize:11,color:"var(--text-muted)"}}>{sl.songIds.length} morceaux</span>
                <button onClick={()=>{setEditSlId(sl.id);setEditSlName(sl.name);}} style={{background:"var(--a7)",border:"none",color:"var(--text-sec)",borderRadius:6,padding:"4px 8px",fontSize:11,cursor:"pointer"}}>✏️</button>
                {setlists.length>1&&<button onClick={()=>deleteSetlist(sl.id)} style={{background:"rgba(239,68,68,0.15)",border:"1px solid var(--red-border)",color:"var(--red)",borderRadius:6,padding:"4px 8px",fontSize:11,cursor:"pointer"}}>🗑</button>}
              </div>
            )}
          </div>
        ))}
        <div style={{background:"var(--accent-bg)",border:"1px solid rgba(99,102,241,0.2)",borderRadius:10,padding:14,marginTop:8}}>
          <div style={{fontSize:12,color:"var(--accent)",fontWeight:600,marginBottom:8}}>+ Nouvelle setlist</div>
          <div style={{display:"flex",gap:8}}>
            <input placeholder="Nom de la setlist" value={newSlName} onChange={e=>setNewSlName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&createSetlist()} style={{...inp,flex:1}}/>
            <button onClick={createSetlist} disabled={!newSlName.trim()} style={{background:newSlName.trim()?"#4f46e5":"#374151",border:"none",color:"var(--text)",borderRadius:7,padding:"6px 14px",fontSize:12,fontWeight:700,cursor:newSlName.trim()?"pointer":"not-allowed"}}>Créer</button>
          </div>
        </div>
      </div>}
      {tab==="songs"&&<div>
        <div style={{fontSize:13,color:"var(--text-sec)",marginBottom:12}}>{songDb.length} morceaux dans la base</div>
        {songDb.map(s=>{
          const expanded=expandedSongId===s.id;
          return (
          <div key={s.id} style={{background:"var(--a3)",border:"1px solid var(--a6)",borderRadius:9,marginBottom:6,overflow:"hidden"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"9px 12px"}}>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>{s.title}</div><div style={{fontSize:11,color:"var(--text-muted)"}}>{s.artist}{s.isCustom?" · ✨IA":""}</div></div>
              <button onClick={()=>setExpandedSongId(expanded?null:s.id)} style={{background:expanded?"rgba(99,102,241,0.25)":"var(--a7)",border:expanded?"1px solid var(--accent-border)":"1px solid var(--a10)",color:expanded?"var(--accent)":"var(--text-sec)",borderRadius:6,padding:"4px 8px",fontSize:11,cursor:"pointer"}}>Setlists</button>
              <button onClick={()=>deleteSongFromDb(s.id)} style={{background:"rgba(239,68,68,0.15)",border:"1px solid var(--red-border)",color:"var(--red)",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer"}}>Supprimer</button>
            </div>
            {expanded&&<div style={{padding:"8px 12px 10px",borderTop:"1px solid var(--a5)",display:"flex",gap:6,flexWrap:"wrap"}}>
              {setlists.map(sl=>{const inSl=sl.songIds.includes(s.id);return(
                <button key={sl.id} onClick={()=>toggleSongInSetlist(s.id,sl.id)} style={{background:inSl?"rgba(74,222,128,0.2)":"var(--a5)",border:inSl?"1px solid rgba(74,222,128,0.4)":"1px solid var(--a10)",color:inSl?"var(--green)":"var(--text-sec)",borderRadius:7,padding:"4px 12px",fontSize:11,fontWeight:600,cursor:"pointer"}}>{inSl?"✓ ":""}{sl.name}</button>
              );})}
            </div>}
          </div>
        );})}

        <div style={{background:"var(--accent-bg)",border:"1px solid rgba(99,102,241,0.2)",borderRadius:10,padding:14,marginTop:10}}>
          <div style={{fontSize:12,color:"var(--accent)",fontWeight:600,marginBottom:10}}>+ Ajouter un morceau</div>
          <input placeholder="Titre *" value={newSongTitle} onChange={e=>setNewSongTitle(e.target.value)} style={{...inp,width:"100%",marginBottom:7}}/>
          <input placeholder="Artiste" value={newSongArtist} onChange={e=>setNewSongArtist(e.target.value)} style={{...inp,width:"100%",marginBottom:10}}/>
          <div style={{fontSize:11,color:"var(--text-muted)",marginBottom:6}}>Ajouter aussi à :</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
            {setlists.map(sl=>{const sel=newSongSlIds.includes(sl.id);return(
              <button key={sl.id} onClick={()=>toggleNewSongSl(sl.id)} style={{background:sel?"var(--accent-bg)":"var(--a5)",border:sel?"1px solid rgba(99,102,241,0.6)":"1px solid var(--a10)",color:sel?"var(--accent)":"var(--text-sec)",borderRadius:7,padding:"4px 10px",fontSize:11,fontWeight:600,cursor:"pointer"}}>{sl.name}</button>
            );})}
          </div>
          <button onClick={addSongToDb} disabled={!newSongTitle.trim()} style={{width:"100%",background:newSongTitle.trim()?"#4f46e5":"#374151",color:"var(--text)",border:"none",borderRadius:8,padding:"9px",fontSize:13,fontWeight:600,cursor:newSongTitle.trim()?"pointer":"not-allowed"}}>Ajouter à la base</button>
        </div>
      </div>}
      {tab==="display"&&<div>
        <div style={{fontSize:13,color:"var(--text-sec)",marginBottom:16}}>Apparence de l'application.</div>
        <div style={{background:"var(--a4)",border:"1px solid var(--a8)",borderRadius:12,padding:16}}>
          <div style={{fontSize:13,fontWeight:700,color:"var(--text)",marginBottom:12}}>Thème</div>
          <div style={{display:"flex",gap:8}}>
            {[{v:"dark",l:"🌙 Sombre",desc:"Fond sombre"},{v:"light",l:"☀️ Clair",desc:"Fond clair"}].map(({v,l,desc})=>(
              <button key={v} onClick={()=>onTheme(v)} style={{flex:1,background:theme===v?"var(--accent-bg)":"var(--a5)",border:theme===v?"1px solid rgba(99,102,241,0.6)":"1px solid var(--a10)",color:theme===v?"var(--accent)":"var(--text-sec)",borderRadius:10,padding:"14px 8px",fontSize:13,fontWeight:600,cursor:"pointer",textAlign:"center"}}>
                <div style={{fontSize:22,marginBottom:4}}>{v==="dark"?"🌙":"☀️"}</div>
                <div>{l.split(" ")[1]}</div>
                <div style={{fontSize:10,color:"var(--text-muted)",marginTop:2}}>{desc}</div>
              </button>
            ))}
          </div>
        </div>
      </div>}
      {tab==="pedale"&&<BankEditor banks={banksAnn} onBanks={onBanksAnn} color="var(--accent)" maxBanks={50} factoryBanks={FACTORY_BANKS_PEDALE}/>}
      {tab==="ann"&&<BankEditor banks={banksAnn} onBanks={onBanksAnn} color="var(--accent)" maxBanks={50} factoryBanks={FACTORY_BANKS_PEDALE}/>}
      {tab==="plug"&&<BankEditor banks={banksPlug} onBanks={onBanksPlug} color="var(--accent)" maxBanks={10} startBank={1} factoryBanks={FACTORY_BANKS_PLUG}/>}
      {profile.isAdmin&&tab==="ia"&&<div>
        <div style={{fontSize:13,color:"var(--text-sec)",marginBottom:12}}>Configuration de la cle API pour l'IA.</div>
        <div style={{fontSize:11,color:"var(--text-muted)",background:"var(--a4)",border:"1px solid var(--a8)",borderRadius:8,padding:"8px 12px",marginBottom:12,display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontWeight:700}}>Modele actif :</span>
          <span style={{color:"var(--green)",fontWeight:600}}>{aiProvider==="gemini"?"gemini-3-flash-preview":"claude-haiku-4-5"}</span>
        </div>
        <div style={{fontSize:12,fontWeight:600,color:"var(--text)",marginBottom:6}}>Cle Gemini</div>
        <input type="password" placeholder="AIza..." value={aiKeys.gemini} onChange={e=>onAiKeys(p=>({...p,gemini:e.target.value}))} style={{...inp,width:"100%",marginBottom:8,fontFamily:"monospace"}}/>
        <div style={{fontSize:12,fontWeight:600,color:"var(--text)",marginBottom:6}}>Cle Anthropic (fallback)</div>
        <input type="password" placeholder="sk-ant-..." value={aiKeys.anthropic} onChange={e=>onAiKeys(p=>({...p,anthropic:e.target.value}))} style={{...inp,width:"100%",fontFamily:"monospace"}}/>
      </div>}
      {profile.isAdmin&&tab==="maintenance"&&<MaintenanceTab songDb={songDb} onSongDb={onSongDb} banksAnn={banksAnn} banksPlug={banksPlug} aiProvider={aiProvider} aiKeys={aiKeys}/>}
      {profile.isAdmin&&tab==="export"&&<ExportImportScreen banksAnn={banksAnn} onBanksAnn={onBanksAnn} banksPlug={banksPlug} onBanksPlug={onBanksPlug} onBack={()=>setTab("profile")} onNavigate={onNavigate} fullState={fullState} onImportState={onImportState} inline={true}/>}
      {profile.isAdmin&&tab==="admin_profiles"&&<ProfilesAdmin profiles={profiles} onProfiles={onProfiles}/>}
      {/* Déconnexion */}
      <div style={{marginTop:24,paddingTop:16,borderTop:"1px solid var(--a8)"}}>
        {onLogout&&<button onClick={onLogout} style={{background:"var(--a5)",border:"1px solid var(--a10)",color:"var(--text-muted)",borderRadius:8,padding:"8px 16px",fontSize:12,cursor:"pointer"}}>Se deconnecter</button>}
      </div>
    </div>
  );
}

// ─── Paramètres Screen (admin PIN) ────────────────────────────────────────────
function ParametresScreen({onBack,onNavigate,aiProvider,onAiProvider,aiKeys,onAiKeys,profile,profiles,onProfiles,activeProfileId,fullState,onImportState,banksAnn,onBanksAnn,banksPlug,onBanksPlug,songDb,onSongDb}) {
  const [unlocked,setUnlocked]=useState(false);
  const [pin,setPin]=useState("");
  const [pinErr,setPinErr]=useState(false);
  const pinRef=useRef(null);
  useEffect(()=>{if(!unlocked)setTimeout(()=>pinRef.current?.focus(),100);},[]);
  const [tab,setTab]=useState("presets");
  const tryUnlock=()=>{if(pin===ADMIN_PIN){setUnlocked(true);setPinErr(false);}else{setPinErr(true);}};
  const inp={background:"var(--bg-card)",color:"var(--text)",border:"1px solid var(--a15)",borderRadius:7,padding:"6px 10px",fontSize:12,boxSizing:"border-box"};

    <button onClick={()=>setTab(id)} style={{background:tab===id?"var(--accent-bg)":"var(--a5)",border:tab===id?"1px solid rgba(99,102,241,0.5)":"1px solid var(--a8)",color:tab===id?"var(--accent)":"var(--text-sec)",borderRadius:8,padding:"7px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>{label}</button>
  );
  return(
    <div>
      <Breadcrumb crumbs={[{label:"Accueil",screen:"list"},{label:"Paramètres"}]} onNavigate={onNavigate}/>
      <div style={{fontSize:20,fontWeight:800,color:"var(--text)",marginBottom:16}}>⚙️ Paramètres</div>
      {!unlocked?(
        <div>
          <div style={{fontSize:13,color:"var(--text-sec)",marginBottom:12}}>Entrez le code administrateur.</div>
          <div style={{display:"flex",gap:8}}>
            <input ref={pinRef} type="password" inputMode="numeric" autoFocus placeholder="Code admin" value={pin} onChange={e=>{setPin(e.target.value);setPinErr(false);}} onKeyDown={e=>e.key==="Enter"&&tryUnlock()} style={{...inp,flex:1}}/>
            <button onClick={tryUnlock} style={{background:"var(--accent)",border:"none",color:"#fff",borderRadius:7,padding:"6px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>OK</button>
          </div>
          {pinErr&&<div style={{fontSize:11,color:"var(--red)",marginTop:6}}>Code incorrect</div>}
        </div>
      ):(
        <div>
          <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
            {tabBtn("presets","📦 Sources")}
            {tabBtn("ia","🔑 Clé API")}
            {tabBtn("profiles","👤 Profils")}
            {tabBtn("maintenance","🔧 Maintenance")}
            {tabBtn("export","📋 Export / Import")}
          </div>
          {tab==="presets"&&<PacksTab profile={profile} onProfiles={onProfiles} activeProfileId={activeProfileId} aiProvider={aiProvider} aiKeys={aiKeys}/>}
          {tab==="ia"&&<div>
            <div style={{fontSize:11,color:"var(--text-muted)",background:"var(--a4)",border:"1px solid var(--a8)",borderRadius:8,padding:"8px 12px",marginBottom:12,display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontWeight:700}}>Modèle actif :</span>
              <span style={{color:"var(--green)",fontWeight:600}}>{aiProvider==="gemini"?"gemini-3-flash-preview":"claude-haiku-4-5"}</span>
            </div>
            <div style={{fontSize:13,color:"var(--text-sec)",marginBottom:12}}>Fournisseur IA pour l'analyse des morceaux.</div>
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              {[{v:"gemini",l:"Google (Gemini)"}].map(({v,l})=>(
                <button key={v} onClick={()=>onAiProvider(v)} style={{flex:1,background:aiProvider===v?"rgba(74,222,128,0.3)":"var(--a5)",border:aiProvider===v?"1px solid rgba(74,222,128,0.6)":"1px solid var(--a10)",color:aiProvider===v?"var(--green)":"var(--text-sec)",borderRadius:8,padding:"8px",fontSize:12,fontWeight:600,cursor:"pointer"}}>{l}</button>
              ))}
            </div>
            <div style={{background:"rgba(74,222,128,0.06)",border:"1px solid rgba(74,222,128,0.2)",borderRadius:12,padding:16}}>
              <div style={{fontSize:12,fontWeight:700,color:"var(--green)",marginBottom:10}}>🔑 Clé API Google AI Studio</div>
              <input type="password" placeholder="AIza..." value={aiKeys.gemini} onChange={e=>{onAiKeys(p=>({...p,gemini:e.target.value}));}} style={{...inp,width:"100%",marginBottom:8,fontFamily:"monospace"}}/>
              <button onClick={()=>{if(aiKeys.gemini){saveSharedKey(aiKeys.gemini);DEFAULT_GEMINI_KEY=aiKeys.gemini;}}} disabled={!aiKeys.gemini} style={{background:aiKeys.gemini?"var(--green)":"var(--bg-disabled)",border:"none",color:"#fff",borderRadius:7,padding:"6px 14px",fontSize:11,fontWeight:700,cursor:aiKeys.gemini?"pointer":"not-allowed",marginBottom:8}}>Partager la clé (tous les utilisateurs)</button>
              <div style={{fontSize:11,color:"var(--text-muted)"}}>aistudio.google.com → Get API key</div>
              {aiKeys.gemini&&<div style={{fontSize:11,color:"var(--green)",marginTop:8}}>✓ Clé configurée ({aiKeys.gemini.slice(0,8)}...)</div>}
            </div>
          </div>}
          {tab==="profiles"&&<ProfilesAdmin profiles={profiles} onProfiles={onProfiles}/>}
          {tab==="maintenance"&&<MaintenanceTab songDb={songDb} onSongDb={onSongDb} banksAnn={banksAnn} banksPlug={banksPlug} aiProvider={aiProvider} aiKeys={aiKeys}/>}
          {tab==="export"&&<div>
            <button onClick={()=>onNavigate("exportimport")} style={{width:"100%",background:"var(--yellow-bg)",border:"1px solid var(--yellow-border)",color:"var(--yellow)",borderRadius:10,padding:"12px 16px",fontSize:13,fontWeight:700,cursor:"pointer",textAlign:"left"}}>
              📋 Export / Import →
            </button>
          </div>}
        </div>
      )}
    </div>
  );
}

function MaintenanceTab({songDb,onSongDb,banksAnn,banksPlug,aiProvider,aiKeys,onFullReset}){
  const [recalculating,setRecalculating]=useState(false);
  const [progress,setProgress]=useState({done:0,total:0,current:""});
  const [done,setDone]=useState(false);
  const [confirmReset,setConfirmReset]=useState(false);
  const cachedCount=songDb.filter(s=>s.aiCache).length;

  const recalcAll=async()=>{
    setRecalculating(true);setDone(false);
    const total=songDb.length;
    setProgress({done:0,total,current:""});
    for(let i=0;i<songDb.length;i++){
      const s=songDb[i];
      setProgress({done:i,total,current:s.title});
      try{
        const r=await fetchAI(s,"",banksAnn,banksPlug,aiProvider,aiKeys,GUITARS);
        onSongDb(p=>p.map(x=>x.id===s.id?{...x,aiCache:updateAiCache(x.aiCache,"",r)}:x));
      }catch(e){console.warn("Recalc failed for",s.title,e);}
      // Pause between requests to avoid rate limit
      if(i<songDb.length-1) await new Promise(r=>setTimeout(r,2000));
    }
    setProgress({done:total,total,current:""});
    setRecalculating(false);setDone(true);
    setTimeout(()=>setDone(false),5000);
  };

  const clearCache=()=>{
    onSongDb(p=>p.map(s=>({...s,aiCache:null})));
    setDone(true);setTimeout(()=>setDone(false),3000);
  };

  return(
    <div>
      <div style={{fontSize:13,color:"var(--text-sec)",marginBottom:16}}>Outils de maintenance de l'application.</div>

      {/* Recalculer tout */}
      <div style={{background:"var(--a4)",border:"1px solid var(--a8)",borderRadius:12,padding:16,marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:700,color:"var(--text)",marginBottom:4}}>Recalculer toutes les recommandations</div>
        <div style={{fontSize:11,color:"var(--text-muted)",marginBottom:10}}>Relance l'IA pour les {songDb.length} morceaux avec les presets actuels de tes pédales. ({cachedCount} en cache)</div>
        {recalculating?<div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
            <div style={{fontSize:20,animation:"spin 1.5s linear infinite",display:"inline-block"}}>&#9203;</div>
            <div>
              <div style={{fontSize:12,fontWeight:600,color:"var(--text)"}}>{progress.done}/{progress.total}</div>
              <div style={{fontSize:11,color:"var(--text-muted)"}}>{progress.current}</div>
            </div>
          </div>
          <div style={{background:"var(--a8)",borderRadius:4,height:6,overflow:"hidden"}}>
            <div style={{width:`${progress.total?progress.done/progress.total*100:0}%`,height:"100%",background:"var(--accent)",borderRadius:4,transition:"width 0.3s"}}/>
          </div>
        </div>
        :done?<div style={{fontSize:12,color:"var(--green)",fontWeight:600}}>Terminé !</div>
        :<div style={{display:"flex",gap:8}}>
          <button onClick={recalcAll} style={{background:"var(--accent)",border:"none",color:"#fff",borderRadius:8,padding:"8px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>Recalculer tout ({songDb.length} morceaux)</button>
          <button onClick={clearCache} style={{background:"var(--a7)",border:"none",color:"var(--text-sec)",borderRadius:8,padding:"8px 14px",fontSize:12,cursor:"pointer"}}>Vider le cache uniquement</button>
        </div>}
      </div>

      {/* Backups automatiques */}
      <div style={{background:"var(--a4)",border:"1px solid var(--a8)",borderRadius:12,padding:16,marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:700,color:"var(--text)",marginBottom:4}}>Sauvegardes automatiques</div>
        <div style={{fontSize:11,color:"var(--text-muted)",marginBottom:10}}>L'app sauvegarde automatiquement tes données toutes les 5 minutes. Tu peux restaurer un état précédent en cas de problème.</div>
        {(()=>{
          const backups=listBackups();
          if(!backups.length) return <div style={{fontSize:11,color:"var(--text-dim)"}}>Aucune sauvegarde disponible.</div>;
          return <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {backups.map((b,i)=>{
              const d=new Date(b.time);
              const ago=Math.round((Date.now()-b.time)/60000);
              const label=ago<60?`il y a ${ago} min`:ago<1440?`il y a ${Math.round(ago/60)}h`:`${d.toLocaleDateString("fr")} ${d.toLocaleTimeString("fr",{hour:"2-digit",minute:"2-digit"})}`;
              return <div key={i} style={{display:"flex",alignItems:"center",gap:8,background:"var(--a3)",borderRadius:8,padding:"8px 10px"}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,fontWeight:600,color:"var(--text)"}}>{label}</div>
                  <div style={{fontSize:10,color:"var(--text-dim)"}}>{b.songs} morceaux · {b.profiles} profil{b.profiles>1?"s":""}</div>
                </div>
                <button onClick={()=>{if(confirm("Restaurer cette sauvegarde ? Les données actuelles seront remplacées.")){restoreBackup(i);location.reload();}}} style={{background:"var(--accent)",border:"none",color:"#fff",borderRadius:6,padding:"4px 12px",fontSize:11,fontWeight:700,cursor:"pointer"}}>Restaurer</button>
              </div>;
            })}
          </div>;
        })()}
      </div>

      {/* Réinitialiser */}
      <div style={{background:"rgba(239,68,68,0.06)",border:"1px solid var(--red-border)",borderRadius:12,padding:16,marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:700,color:"var(--red)",marginBottom:4}}>Réinitialiser toutes les données</div>
        <div style={{fontSize:11,color:"var(--text-muted)",marginBottom:10}}>Remet l'app à zéro : profils, banks, morceaux. Les presets par défaut et le profil initial seront restaurés.</div>
        {!confirmReset
          ?<button onClick={()=>setConfirmReset(true)} style={{background:"rgba(239,68,68,0.15)",border:"1px solid var(--red-border)",color:"var(--red)",borderRadius:8,padding:"8px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>Réinitialiser...</button>
          :<div style={{background:"rgba(239,68,68,0.1)",borderRadius:8,padding:12}}>
            <div style={{fontSize:12,color:"var(--red)",fontWeight:700,marginBottom:8}}>Toutes les données seront supprimées. Cette action est irréversible.</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{localStorage.removeItem("tonex_guide_v2");localStorage.removeItem("tonex_guide_v1");location.reload();}} style={{background:"#ef4444",border:"none",color:"#fff",borderRadius:8,padding:"8px 16px",fontSize:12,fontWeight:700,cursor:"pointer"}}>Confirmer la réinitialisation</button>
              <button onClick={()=>setConfirmReset(false)} style={{background:"var(--a7)",border:"none",color:"var(--text-sec)",borderRadius:8,padding:"8px 14px",fontSize:12,cursor:"pointer"}}>Annuler</button>
            </div>
          </div>
        }
      </div>
    </div>
  );
}

function ProfilesAdmin({profiles,onProfiles}){
  const [name,setName]=useState("");
  const [newPwd,setNewPwd]=useState("");
  const [editPwdId,setEditPwdId]=useState(null);
  const [editPwdVal,setEditPwdVal]=useState("");
  const [editNameId,setEditNameId]=useState(null);
  const [editNameVal,setEditNameVal]=useState("");
  const create=()=>{
    if(!name.trim())return;
    const id=name.trim().toLowerCase().replace(/[^a-z0-9]/g,"_")+`_${Date.now()}`;
    onProfiles(p=>({...p,[id]:makeDefaultProfile(id,name.trim(),false,newPwd)}));
    setName("");setNewPwd("");
  };
  const deleteProfile=id=>{
    if(Object.keys(profiles).length<=1)return;
    onProfiles(p=>{const n={...p};delete n[id];return n;});
  };
  const savePwd=(id)=>{
    onProfiles(p=>({...p,[id]:{...p[id],password:editPwdVal}}));
    setEditPwdId(null);setEditPwdVal("");
  };
  const saveName=(id)=>{
    if(!editNameVal.trim())return;
    onProfiles(p=>({...p,[id]:{...p[id],name:editNameVal.trim()}}));
    setEditNameId(null);setEditNameVal("");
  };
  const inp={background:"var(--bg-card)",color:"var(--text)",border:"1px solid var(--a15)",borderRadius:7,padding:"6px 10px",fontSize:12,boxSizing:"border-box"};
  return(
    <div>
      <div style={{fontSize:13,color:"var(--text-sec)",marginBottom:12}}>Gestion des utilisateurs.</div>
      {Object.values(profiles).map(p=>(
        <div key={p.id} style={{background:"var(--a4)",border:"1px solid var(--a8)",borderRadius:9,padding:"10px 14px",marginBottom:6}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {editNameId===p.id?(
              <>
                <input value={editNameVal} onChange={e=>setEditNameVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveName(p.id)} style={{...inp,flex:1}} autoFocus/>
                <button onClick={()=>saveName(p.id)} style={{background:"var(--accent)",border:"none",color:"#fff",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>OK</button>
                <button onClick={()=>setEditNameId(null)} style={{background:"none",border:"none",color:"var(--text-muted)",fontSize:12,cursor:"pointer"}}>✕</button>
              </>
            ):(
              <>
                <div style={{flex:1,fontSize:13,fontWeight:600,color:"var(--text)"}}>{p.name}{p.isAdmin&&<span style={{fontSize:9,color:"var(--text-dim)",marginLeft:6}}>admin</span>}</div>
                <button onClick={()=>{setEditNameId(p.id);setEditNameVal(p.name);}} style={{background:"none",border:"none",color:"var(--text-muted)",fontSize:12,cursor:"pointer",padding:"2px 4px"}}>✏️</button>
                <span style={{fontSize:10,color:"var(--text-muted)"}}>{p.password?"🔒":"🔓"}</span>
                <button onClick={()=>{setEditPwdId(editPwdId===p.id?null:p.id);setEditPwdVal(p.password||"");}} style={{background:"var(--a7)",border:"none",color:"var(--text-sec)",borderRadius:5,padding:"3px 7px",fontSize:10,cursor:"pointer"}}>Mot de passe</button>
                {Object.keys(profiles).length>1&&!p.isAdmin&&<button onClick={()=>deleteProfile(p.id)} style={{background:"rgba(239,68,68,0.15)",border:"1px solid var(--red-border)",color:"var(--red)",borderRadius:6,padding:"3px 8px",fontSize:11,cursor:"pointer"}}>Supprimer</button>}
              </>
            )}
          </div>
          {editPwdId===p.id&&editNameId!==p.id&&<div style={{display:"flex",gap:6,marginTop:8}}>
            <input type="text" placeholder="Nouveau mot de passe (vide = sans)" value={editPwdVal} onChange={e=>setEditPwdVal(e.target.value)} style={{...inp,flex:1}}/>
            <button onClick={()=>savePwd(p.id)} style={{background:"var(--accent)",border:"none",color:"#fff",borderRadius:6,padding:"4px 12px",fontSize:11,fontWeight:700,cursor:"pointer"}}>OK</button>
          </div>}
          {(p.loginHistory||[]).length>0&&<div style={{marginTop:8,borderTop:"1px solid var(--a8)",paddingTop:6}}>
            <div style={{fontSize:10,color:"var(--text-muted)",marginBottom:4}}>Dernières connexions</div>
            {(p.loginHistory||[]).slice(0,5).map((ts,i)=><div key={i} style={{fontSize:11,color:"var(--text-sec)",lineHeight:1.6}}>{new Date(ts).toLocaleString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"})}</div>)}
          </div>}
        </div>
      ))}
      <div style={{background:"var(--accent-bg)",border:"1px solid rgba(99,102,241,0.2)",borderRadius:10,padding:14,marginTop:10}}>
        <div style={{fontSize:12,color:"var(--accent)",fontWeight:600,marginBottom:8}}>+ Nouvel utilisateur</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <div style={{display:"flex",gap:8}}>
            <input placeholder="Nom" value={name} onChange={e=>setName(e.target.value)} style={{...inp,flex:1}}/>
            <input type="text" placeholder="Mot de passe" value={newPwd} onChange={e=>setNewPwd(e.target.value)} style={{...inp,flex:1}}/>
          </div>
          <button onClick={create} disabled={!name.trim()} style={{background:name.trim()?"#4f46e5":"var(--bg-disabled)",border:"none",color:"#fff",borderRadius:7,padding:"6px 14px",fontSize:12,fontWeight:700,cursor:name.trim()?"pointer":"not-allowed"}}>Créer</button>
        </div>
      </div>
    </div>
  );
}

// ─── Modal Ajout Morceau ──────────────────────────────────────────────────────
function AddSongModal({songDb,onSongDb,setlists,onSetlists,activeSlId,onClose,banksAnn,banksPlug,aiProvider,aiKeys,guitars}) {
  const [mode,setMode]=useState("existing");
  const [search,setSearch]=useState("");
  const [selectedSongs,setSelectedSongs]=useState([]);
  const [targetSlIds,setTargetSlIds]=useState([activeSlId]);
  const [newTitle,setNewTitle]=useState("");
  const [newArtist,setNewArtist]=useState("");
  const activeSl=setlists.find(s=>s.id===activeSlId);
  const existingIds=new Set(activeSl?.songIds||[]);
  const filtered=songDb.filter(s=>(!existingIds.has(s.id))&&(s.title.toLowerCase().includes(search.toLowerCase())||s.artist.toLowerCase().includes(search.toLowerCase())));
  const toggleSong=id=>setSelectedSongs(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const toggleSl=id=>setTargetSlIds(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const handleAdd=()=>{
    if(mode==="existing"){
      if(selectedSongs.length===0||targetSlIds.length===0)return;
      onSetlists(p=>p.map(sl=>targetSlIds.includes(sl.id)?{...sl,songIds:[...new Set([...sl.songIds,...selectedSongs])]}:sl));
    } else {
      if(!newTitle.trim()||targetSlIds.length===0)return;
      const ns={id:`c_${Date.now()}`,title:newTitle.trim(),artist:newArtist.trim()||"Artiste inconnu",isCustom:true,ig:[],aiCache:null};
      onSongDb(p=>[...p,ns]);
      onSetlists(p=>p.map(sl=>targetSlIds.includes(sl.id)?{...sl,songIds:[...sl.songIds,ns.id]}:sl));
      fetchAI(ns,"",banksAnn,banksPlug,aiProvider,aiKeys,guitars)
        .then(r=>onSongDb(p=>p.map(x=>x.id===ns.id?{...x,aiCache:updateAiCache(x.aiCache,"",r)}:x)))
        .catch(()=>{});
    }
    onClose();
  };
  return (
    <div style={{position:"fixed",inset:0,background:"var(--overlay)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:100}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:"var(--bg-card)",borderRadius:"16px 16px 0 0",padding:20,width:"100%",maxWidth:700,maxHeight:"85vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div style={{fontSize:16,fontWeight:700,color:"var(--text)"}}>Ajouter un morceau</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"var(--text-sec)",fontSize:20,cursor:"pointer"}}>✕</button>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          {[{v:"existing",l:"Depuis la base"},{v:"new",l:"Nouveau morceau"}].map(({v,l})=>(
            <button key={v} onClick={()=>setMode(v)} style={{flex:1,background:mode===v?"var(--accent-bg)":"var(--a5)",border:mode===v?"1px solid rgba(99,102,241,0.6)":"1px solid var(--a10)",color:mode===v?"var(--accent)":"var(--text-sec)",borderRadius:8,padding:"8px",fontSize:12,fontWeight:600,cursor:"pointer"}}>{l}</button>
          ))}
        </div>
        {mode==="existing"&&<>
          <input placeholder="Rechercher..." value={search} onChange={e=>setSearch(e.target.value)} style={{width:"100%",background:"var(--bg-body)",color:"var(--text)",border:"1px solid var(--a15)",borderRadius:8,padding:"9px 12px",fontSize:13,marginBottom:10,boxSizing:"border-box"}}/>
          <div style={{maxHeight:200,overflowY:"auto",marginBottom:14}}>
            {filtered.length===0&&<div style={{fontSize:12,color:"var(--text-muted)",textAlign:"center",padding:"20px 0"}}>Aucun morceau disponible</div>}
            {filtered.map(s=>{const sel=selectedSongs.includes(s.id);return(
              <div key={s.id} onClick={()=>toggleSong(s.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:8,cursor:"pointer",background:sel?"rgba(74,222,128,0.08)":"transparent",border:sel?"1px solid rgba(74,222,128,0.2)":"1px solid transparent",marginBottom:4}}>
                <div style={{width:16,height:16,borderRadius:4,border:sel?"2px solid #4ade80":"2px solid var(--text-muted)",background:sel?"var(--green)":"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>{sel&&<span style={{color:"#0f172a",fontSize:9,fontWeight:900}}>✓</span>}</div>
                <div><div style={{fontSize:13,color:"var(--text)",fontWeight:600}}>{s.title}</div><div style={{fontSize:11,color:"var(--text-muted)"}}>{s.artist}</div></div>
              </div>
            );})}
          </div>
        </>}
        {mode==="new"&&<div style={{marginBottom:14}}>
          <input placeholder="Titre *" value={newTitle} onChange={e=>setNewTitle(e.target.value)} style={{width:"100%",background:"var(--bg-body)",color:"var(--text)",border:"1px solid var(--a15)",borderRadius:8,padding:"9px 12px",fontSize:13,marginBottom:8,boxSizing:"border-box"}}/>
          <input placeholder="Artiste" value={newArtist} onChange={e=>setNewArtist(e.target.value)} style={{width:"100%",background:"var(--bg-body)",color:"var(--text)",border:"1px solid var(--a15)",borderRadius:8,padding:"9px 12px",fontSize:13,boxSizing:"border-box"}}/>
          <div style={{fontSize:11,color:"var(--text-muted)",marginTop:6}}>Analysé par l'IA dans le récap.</div>
        </div>}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12,color:"var(--text-sec)",fontWeight:600,marginBottom:8}}>Ajouter à :</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {setlists.map(sl=>{const sel=targetSlIds.includes(sl.id);return(
              <button key={sl.id} onClick={()=>toggleSl(sl.id)} style={{background:sel?"var(--accent-bg)":"var(--a5)",border:sel?"1px solid rgba(99,102,241,0.6)":"1px solid var(--a10)",color:sel?"var(--accent)":"var(--text-sec)",borderRadius:7,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>{sl.name}</button>
            );})}
          </div>
        </div>
        <button onClick={handleAdd} disabled={targetSlIds.length===0||(mode==="existing"&&selectedSongs.length===0)||(mode==="new"&&!newTitle.trim())}
          style={{width:"100%",background:targetSlIds.length>0?"#4f46e5":"#374151",border:"none",color:"var(--text)",borderRadius:10,padding:"13px",fontSize:14,fontWeight:700,cursor:"pointer"}}>
          ✅ Ajouter{selectedSongs.length>1?` (${selectedSongs.length})`:""}
        </button>
      </div>
    </div>
  );
}

function getJamRecs(guitarId, style, banksAnn, banksPlug, guitars, availableSources){
  const guitar=(guitars||GUITARS).find(g=>g.id===guitarId);
  const gType=guitar?.type||"HB";
  const compat=COMPAT_STYLES[style]||[style];
  const allEntries=Object.entries(PRESET_CATALOG_MERGED);
  const seen=new Set();
  const unique=allEntries.filter(([n])=>{if(seen.has(n))return false;seen.add(n);return true;});
  const scored=unique
    .filter(([,info])=>!style||compat.includes(info.style))
    .filter(([,info])=>!availableSources||availableSources[info.src]!==false)
    .map(([name,info])=>{
      const score=guitarId?computeFinalScore(info,guitarId,style,null,null):(info.scores?.[gType]??60);
      return{name,score,sortScore:score,amp:info.amp,gain:info.gain,style:info.style,src:info.src};
    })
    .sort((a,b)=>b.sortScore-a.sortScore);
  // Installed top 3 — diversify amps
  const pickTop3=(list)=>{const out=[];const amps=new Set();for(const p of list){if(!amps.has(p.amp)){out.push(p);amps.add(p.amp);}if(out.length>=3)break;}return out;};
  const annInstalled=scored.map(p=>{const loc=findInBanks(p.name,banksAnn);return loc?{...p,...loc}:null;}).filter(Boolean);
  const plugInstalled=scored.map(p=>{const loc=findInBanks(p.name,banksPlug);return loc?{...p,...loc}:null;}).filter(Boolean);
  // Full catalog top 3 — diversify amps, exclude already in installed tops
  const annNames=new Set(pickTop3(annInstalled).map(p=>p.name));
  const plugNames=new Set(pickTop3(plugInstalled).map(p=>p.name));
  const fullTop3=[];const fullAmps=new Set();
  for(const p of scored){
    if(fullAmps.has(p.amp)) continue;
    // Marquer si installé quelque part
    const annLoc=findInBanks(p.name,banksAnn);
    const plugLoc=findInBanks(p.name,banksPlug);
    fullTop3.push({...p,annLoc,plugLoc,installed:!!(annLoc||plugLoc)});
    fullAmps.add(p.amp);
    if(fullTop3.length>=3) break;
  }
  return{annTop3:pickTop3(annInstalled),plugBest:pickTop3(plugInstalled),fullTop3,gType};
}

// ─── SongDetailCard ──────────────────────────────────────────────────────────
function SongDetailCard({song,banksAnn,banksPlug,onBanksAnn,onBanksPlug,onClose,guitars,availableSources,savedGuitarId,onGuitarChange,aiProvider,aiKeys,onSongDb}){
  const ig=getIg(song,guitars);
  const [gId,setGId]=useState(savedGuitarId||ig[0]||"");
  const [reloading,setReloading]=useState(false);
  const [localAiResult,setLocalAiResult]=useState(null);
  const [showFeedback,setShowFeedback]=useState(false);
  const [showCot,setShowCot]=useState(false);
  const [installTarget,setInstallTarget]=useState(null); // {preset}
  const [installBank,setInstallBank]=useState({ann:"",plug:""});
  const [installSlot,setInstallSlot]=useState({ann:"A",plug:"A"});
  // Auto-trigger AI analysis if no cache for current guitar
  useEffect(()=>{
    if(localAiResult) return;
    if(song.aiCache&&song.aiCache.gId===gId&&song.aiCache.result?.cot_step1) return;
    // Cache avec CoT mais guitare différente → rescore local seulement, pas de re-fetch IA
    if(song.aiCache?.result?.cot_step1&&gId){
      const gType=(guitars||GUITARS).find(x=>x.id===gId)?.type||"HB";
      const recalc=enrichAIResult({...song.aiCache.result},gType,gId,banksAnn,banksPlug);
      setLocalAiResult(recalc);
      // Defer cache update to avoid blocking render
      setTimeout(()=>onSongDb(p=>p.map(x=>x.id===song.id?{...x,aiCache:updateAiCache(x.aiCache,gId,recalc)}:x)),0);
      return;
    }
    if(!gId||!onSongDb) return;
    setReloading(true);
    fetchAI(song,gId,banksAnn,banksPlug,aiProvider,aiKeys,guitars)
      .then(r=>{
        setLocalAiResult(r);
        onSongDb(p=>p.map(x=>x.id===song.id?{...x,aiCache:updateAiCache(x.aiCache,gId,r)}:x));
      })
      .catch(()=>{})
      .finally(()=>setReloading(false));
  },[song.id,gId]);
  const handleGuitarChange=(v)=>{
    setGId(v);
    if(onGuitarChange)onGuitarChange(song.id,v);
    if(onSongDb){
      // Si on a déjà du CoT, rescore local sans rappeler l'IA
      const base=localAiResult||song.aiCache?.result;
      if(base?.cot_step1){
        const gType=(guitars||GUITARS).find(x=>x.id===v)?.type||"HB";
        const recalc=enrichAIResult({...base},gType,v,banksAnn,banksPlug);
        setLocalAiResult(recalc);
        setTimeout(()=>onSongDb(p=>p.map(x=>x.id===song.id?{...x,aiCache:updateAiCache(x.aiCache,v,recalc)}:x)),0);
        return;
      }
      setReloading(true);setLocalAiResult(null);
      fetchAI(song,v,banksAnn,banksPlug,aiProvider,aiKeys,guitars)
        .then(r=>{
          setLocalAiResult(r);
          onSongDb(p=>p.map(x=>x.id===song.id?{...x,aiCache:updateAiCache(x.aiCache,v,r)}:x));
        })
        .catch(()=>{})
        .finally(()=>setReloading(false));
    }
  };
  const g=(guitars||GUITARS).find(x=>x.id===gId);
  const type=g?.type||"HB";
  const hist=getSongHist(song);
  const aiCraw=getBestResult(song,gId,localAiResult||song.aiCache?.result)||null;
  const needRescore=aiCraw&&gId&&song.aiCache?.gId!==gId&&!localAiResult;
  const aiC=needRescore?enrichAIResult({...aiCraw},type,gId,banksAnn,banksPlug):aiCraw;
  const songInfo=getSongInfo(song);
  // Compute ideal guitar score from CoT step 2
  const idealGuitarObj=aiC?.cot_step2_guitars?.[0];
  const idealGuitarScore=idealGuitarObj?.score||null;
  // Compute chosen guitar score from CoT step 2
  const chosenGuitarCot=aiC?.cot_step2_guitars?.find(gt=>g&&(gt.name===g.name||gt.name===g.short));
  const chosenGuitarScore=chosenGuitarCot?.score||idealGuitarScore;
  // Section styling helper
  const sectionStyle={background:"var(--a3)",border:"1px solid var(--a7)",borderRadius:10,padding:"10px 12px",marginBottom:8};
  const customSectionStyle={background:"var(--a5)",border:"1px solid var(--a10)",borderRadius:10,padding:"10px 12px",marginBottom:8};
  const sectionTitle=(icon,label)=><div style={{fontSize:10,fontWeight:700,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:0.5,marginBottom:8,display:"flex",alignItems:"center",gap:5}}>{icon} {label}</div>;
  return(
    <div className="song-row-detail" style={{background:"var(--a2)",borderRadius:"0 0 12px 12px",padding:"10px 12px",marginBottom:8,marginTop:-2,display:"flex",flexDirection:"column",gap:6}}>

      {/* ── SECTION 1 : Infos morceau ── */}
      <div style={sectionStyle}>
        {sectionTitle("📖","Infos morceau")}
        {(songInfo.year||songInfo.album||songInfo.key||songInfo.bpm)&&<div style={{fontSize:10,color:"var(--text-muted)",marginBottom:4}}>{songInfo.year}{songInfo.album?" · "+songInfo.album:""}{songInfo.key?" · "+songInfo.key:""}{songInfo.bpm?" · "+songInfo.bpm+" BPM":""}</div>}
        {songInfo.desc&&<div style={{fontSize:11,color:"var(--text-sec)",lineHeight:1.5,marginBottom:6}}>{songInfo.desc}</div>}
        {aiC&&(aiC.ref_guitarist||aiC.ref_guitar||aiC.ref_amp)&&<div style={{fontSize:11,color:"var(--text-sec)",lineHeight:1.6}}>
          <span style={{fontWeight:700,color:"var(--text-muted)",fontSize:10}}>{aiC.ref_guitarist||"Référence"}</span><br/>
          {aiC.ref_guitar&&<>🎸 {aiC.ref_guitar} · </>}
          {aiC.ref_amp&&<>🔊 {aiC.ref_amp}</>}
          {aiC.ref_effects&&aiC.ref_effects!=="Aucun effet"&&<> · 🎚 {aiC.ref_effects}</>}
        </div>}
        {hist&&!aiC&&<div style={{fontSize:11,color:"var(--text-sec)",lineHeight:1.6}}>
          <span style={{fontWeight:700,color:"var(--text-muted)",fontSize:10}}>{hist.guitarist}</span><br/>
          🎸 {hist.guitar} · 🔊 {hist.amp}{hist.effects?" · 🎚 "+hist.effects:""}
        </div>}
      </div>

      {/* ── Loading ── */}
      {reloading&&<div style={{textAlign:"center",padding:"16px 0"}}>
        <div style={{fontSize:28,marginBottom:6,animation:"spin 1.5s linear infinite",display:"inline-block"}}>&#9203;</div>
        <div style={{fontSize:12,color:"var(--text-muted)"}}>Analyse en cours pour {g?.short||"cette guitare"}...</div>
      </div>}

      {!reloading&&aiC&&<>

      {/* ── SECTION 2 : Raisonnement IA ── */}
      {(aiC.cot_step1||aiC.cot_step2_guitars||aiC.cot_step3_amp)&&<div style={sectionStyle}>
        <div onClick={()=>setShowCot(p=>!p)} style={{cursor:"pointer",fontSize:10,fontWeight:700,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:0.5,display:"flex",alignItems:"center",gap:5,userSelect:"none"}}>
          🧠 Raisonnement IA <span style={{fontSize:10,marginLeft:"auto",fontWeight:400}}>{showCot?"▲":"▼"}</span>
        </div>
        {showCot&&<div style={{marginTop:8,display:"flex",flexDirection:"column",gap:8}}>
          {aiC.cot_step1&&<div style={{background:"var(--a3)",border:"1px solid var(--a8)",borderRadius:7,padding:"8px 10px"}}>
            <div style={{fontSize:10,fontWeight:700,color:"var(--text-muted)",marginBottom:4,textTransform:"uppercase",letterSpacing:0.3}}>Profil tonal</div>
            <div style={{fontSize:11,color:"var(--text-sec)",lineHeight:1.4}}>{aiC.cot_step1}</div>
          </div>}
          {aiC.cot_step2_guitars?.length>0&&<div style={{background:"var(--a3)",border:"1px solid var(--a8)",borderRadius:7,padding:"8px 10px"}}>
            <div style={{fontSize:10,fontWeight:700,color:"var(--text-muted)",marginBottom:4,textTransform:"uppercase",letterSpacing:0.3}}>Scoring guitares</div>
            {aiC.cot_step2_guitars.map((gt,i)=><div key={i} style={{fontSize:11,color:"var(--text-sec)",marginBottom:i<aiC.cot_step2_guitars.length-1?4:0,display:"flex",gap:6,alignItems:"baseline",flexWrap:"wrap"}}>
              <span style={{fontWeight:600,color:"var(--text-bright)",flexShrink:0}}>{gt.name}</span>
              <span style={{fontWeight:800,color:scoreColor(gt.score),flexShrink:0}}>{gt.score}%</span>
              <span style={{color:"var(--text-dim)"}}>{gt.reason}</span>
            </div>)}
          </div>}
          {aiC.cot_step3_amp&&<div style={{background:"var(--a3)",border:"1px solid var(--a8)",borderRadius:7,padding:"8px 10px"}}>
            <div style={{fontSize:10,fontWeight:700,color:"var(--text-muted)",marginBottom:4,textTransform:"uppercase",letterSpacing:0.3}}>Profil ampli</div>
            <div style={{fontSize:11,color:"var(--text-sec)",lineHeight:1.4}}>{aiC.cot_step3_amp}</div>
          </div>}
        </div>}
      </div>}

      {/* ── SECTION 3 : Recommandations idéales ── */}
      <div style={sectionStyle}>
        {sectionTitle(<StatusDot score={100} ideal={true} size={10}/>,"Recommandation ideale")}
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {/* Guitare idéale */}
          {aiC.ideal_guitar&&<div style={{display:"flex",alignItems:"center",gap:6,fontSize:11}}>
            <StatusDot score={idealGuitarScore} ideal={true}/>
            <div style={{flex:1}}>Guitare <span style={{fontWeight:600,color:"var(--text-bright)"}}>{aiC.ideal_guitar}</span></div>
            {idealGuitarScore&&<b style={{color:scoreColor(idealGuitarScore),flexShrink:0}}>{idealGuitarScore}%</b>}
          </div>}
          {aiC.guitar_reason&&<div style={{fontSize:10,color:"var(--text-dim)",marginTop:-2,marginBottom:2}}>{aiC.guitar_reason}</div>}
          {/* Preset idéal + installation */}
          {aiC.ideal_preset&&(()=>{
            const idealScore=aiC.ideal_preset_score||0;
            const locAnn=findInBanks(aiC.ideal_preset,banksAnn);
            const locPlug=findInBanks(aiC.ideal_preset,banksPlug);
            const loc=locAnn||locPlug;
            const entry=findCatalogEntry(aiC.ideal_preset);
            const canInstallAnn=!locAnn&&onBanksAnn;
            const canInstallPlug=!locPlug&&onBanksPlug;
            const doInstall=(device)=>{
              const bk=Number(installBank[device]);
              const sl=installSlot[device];
              const onBanks=device==="ann"?onBanksAnn:onBanksPlug;
              if(isNaN(bk)||!sl||!onBanks) return;
              onBanks(p=>({...p,[bk]:{...(p[bk]||{cat:"",A:"",B:"",C:""}),[sl]:aiC.ideal_preset}}));
              setInstallTarget(null);
            };
            const bankInput=(device,maxBanks)=>{
              const banks=device==="ann"?banksAnn:banksPlug;
              const bk=installBank[device];
              const sl=installSlot[device];
              const currentPreset=bk!==""&&banks[Number(bk)]?banks[Number(bk)][sl]||"(vide)":"";
              return <div style={{marginBottom:6}}>
                <div style={{fontSize:10,color:"var(--text-sec)",marginBottom:4,fontWeight:600}}>{device==="ann"?"📦 Pedale":"🔌 Plug"}</div>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <span style={{fontSize:10,color:"var(--text-muted)"}}>Banque</span>
                  <input type="number" inputMode="numeric" min={device==="ann"?0:1} max={maxBanks} value={bk} onChange={e=>setInstallBank(p=>({...p,[device]:e.target.value}))} style={{width:50,fontSize:11,background:"var(--bg-card)",color:"var(--text)",border:"1px solid var(--a15)",borderRadius:6,padding:"4px 6px",textAlign:"center"}} placeholder={device==="ann"?"0-49":"1-10"}/>
                  <span style={{fontSize:10,color:"var(--text-muted)"}}>Slot</span>
                  <select value={sl} onChange={e=>setInstallSlot(p=>({...p,[device]:e.target.value}))} style={{fontSize:11,background:"var(--bg-card)",color:"var(--text)",border:"1px solid var(--a15)",borderRadius:6,padding:"4px 6px"}}>
                    <option value="A">A (Clean)</option><option value="B">B (Drive)</option><option value="C">C (Lead)</option>
                  </select>
                  <button onClick={()=>doInstall(device)} disabled={bk===""} style={{fontSize:10,background:bk!==""?"var(--accent)":"var(--bg-disabled)",border:"none",color:"#fff",borderRadius:6,padding:"4px 10px",cursor:bk!==""?"pointer":"not-allowed",fontWeight:700}}>OK</button>
                </div>
                {bk!==""&&currentPreset&&<div style={{fontSize:9,color:"var(--text-dim)",marginTop:2}}>Remplace : {currentPreset}</div>}
              </div>;
            };
            return <div>
              <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11}}>
                <StatusDot score={idealScore} ideal={true}/>
                <div style={{flex:1}}>Preset <span style={{fontWeight:600,color:"var(--text-bright)"}}>{aiC.ideal_preset}</span></div>
                {idealScore>0&&<b style={{color:scoreColor(idealScore),flexShrink:0}}>{idealScore}%</b>}
              </div>
              <div style={{fontSize:9,marginTop:2,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                {loc?<span style={{color:"var(--green)"}}>✓ Installe — Banque {loc.bank}{loc.slot}</span>
                :<>
                  <span style={{color:"var(--text-dim)"}}>Non installe</span>
                  {entry?.src==="TSR"&&entry.pack&&<span style={{color:"var(--yellow)"}}>📦 {entry.pack}.zip</span>}
                  {!installTarget&&(canInstallAnn||canInstallPlug)&&<button onClick={()=>setInstallTarget({preset:aiC.ideal_preset})} style={{fontSize:9,background:"var(--accent-bg)",border:"1px solid var(--accent-border)",color:"var(--accent)",borderRadius:5,padding:"2px 8px",cursor:"pointer",fontWeight:600}}>Installer</button>}
                </>}
              </div>
              {installTarget?.preset===aiC.ideal_preset&&<div style={{marginTop:6,background:"var(--a4)",border:"1px solid var(--a10)",borderRadius:8,padding:10}}>
                <div style={{fontSize:10,color:"var(--text-sec)",marginBottom:8,fontWeight:600}}>Installer "{aiC.ideal_preset}" sur :</div>
                {canInstallAnn&&bankInput("ann",49)}
                {canInstallPlug&&bankInput("plug",10)}
                <button onClick={()=>setInstallTarget(null)} style={{fontSize:9,background:"none",border:"none",color:"var(--text-dim)",cursor:"pointer"}}>Annuler</button>
              </div>}
            </div>;
          })()}
          {/* Réglages idéaux */}
          {(aiC.settings_preset||aiC.settings_guitar)&&<div style={{marginTop:4,display:"flex",flexDirection:"column",gap:3}}>
            {aiC.settings_preset&&<div style={{fontSize:10,background:"var(--a4)",border:"1px solid var(--a10)",borderRadius:6,padding:"5px 8px",color:"var(--text-sec)"}}><b style={{color:"var(--text-muted)"}}>Preset :</b> {aiC.settings_preset}</div>}
            {aiC.settings_guitar&&<div style={{fontSize:10,background:"var(--a4)",border:"1px solid var(--a10)",borderRadius:6,padding:"5px 8px",color:"var(--text-sec)"}}><b style={{color:"var(--text-muted)"}}>Guitare :</b> {aiC.settings_guitar}</div>}
          </div>}
        </div>
      </div>

      {/* ── SECTION 4 : Paramétrage (guitare choisie + presets installés) ── */}
      <div style={customSectionStyle}>
        {sectionTitle("🎛","Parametrage — mon choix")}
        <div style={{marginBottom:8}}>
          <div style={{fontSize:10,color:"var(--text-muted)",marginBottom:4}}>Guitare choisie</div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <StatusDot score={chosenGuitarScore} ideal={g&&ig.includes(gId)} size={10}/>
            <div style={{flex:1}}><GuitarSelect value={gId} onChange={handleGuitarChange} ig={ig} guitars={guitars}/></div>
          </div>
          {g&&chosenGuitarScore&&<div style={{fontSize:10,color:"var(--text-dim)",marginTop:3,marginLeft:24}}>Compatibilite : <b style={{color:scoreColor(chosenGuitarScore)}}>{chosenGuitarScore}%</b></div>}
        </div>
        <div style={{fontSize:10,color:"var(--text-muted)",marginBottom:4}}>Meilleurs presets installes pour {g?.short||"cette guitare"}</div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          <div style={{display:"flex",alignItems:"center",gap:4}}><StatusDot score={aiC.preset_ann?.score} ideal={aiC.preset_ann?.label===aiC.ideal_preset} size={10}/><div style={{flex:1}}><PBlock device="Pedale" emoji="📦" presetName={aiC.preset_ann?.label} gType={gId?type:null} banks={banksAnn} availableSources={availableSources} guitarId={gId} noUpgrade finalScore={aiC.preset_ann?.score} breakdown={aiC.preset_ann?.breakdown}/></div></div>
          <div style={{display:"flex",alignItems:"center",gap:4}}><StatusDot score={aiC.preset_plug?.score} ideal={aiC.preset_plug?.label===aiC.ideal_preset} size={10}/><div style={{flex:1}}><PBlock device="ToneX Plug" emoji="🔌" presetName={aiC.preset_plug?.label} gType={gId?type:null} banks={banksPlug} availableSources={availableSources} guitarId={gId} noUpgrade finalScore={aiC.preset_plug?.score} breakdown={aiC.preset_plug?.breakdown}/></div></div>
        </div>
      </div>

      </>}
      {!reloading&&!aiC&&<div style={{fontSize:12,color:"var(--text-dim)",padding:"10px 0"}}>Aucune analyse IA en cache. Selectionne une guitare pour lancer l'analyse.</div>}

      {/* ── SECTION 6 : Améliorer ── */}
      {!reloading&&aiC&&<div>
        {!showFeedback
          ?<button onClick={()=>setShowFeedback(true)} style={{fontSize:10,background:"none",border:"1px solid var(--a10)",color:"var(--text-dim)",borderRadius:6,padding:"3px 8px",cursor:"pointer"}}>🔄 Affiner l'analyse</button>
          :<FeedbackPanel onSubmit={fb=>{
            setShowFeedback(false);setReloading(true);
            const prev=aiC;
            fetchAI(song,gId,banksAnn,banksPlug,aiProvider,aiKeys,guitars,fb||null)
              .then(r=>{
                const pick=mergeBestResults(prev,r);
                setLocalAiResult(pick);
                if(onSongDb)onSongDb(p=>p.map(x=>x.id===song.id?{...x,aiCache:updateAiCache(x.aiCache,gId,pick)}:x));
              })
              .catch(()=>{})
              .finally(()=>setReloading(false));
          }} onCancel={()=>setShowFeedback(false)}/>
        }
      </div>}
      <button onClick={onClose} style={{fontSize:11,color:"var(--text-muted)",background:"none",border:"none",cursor:"pointer",textDecoration:"underline",padding:0,marginTop:4}}>Fermer ↑</button>
    </div>
  );
}

// ─── ListScreen ───────────────────────────────────────────────────────────────
function InlineRenameInput({initialName,onSave,onCancel,inp,placeholder,buttonLabel}){
  const [val,setVal]=useState(initialName||"");
  const submit=()=>{if(val.trim()){onSave(val.trim());setVal("");}};
  return <div style={{display:"flex",gap:6}}>
    <input value={val} onChange={e=>setVal(e.target.value)} placeholder={placeholder||""} style={{...inp,flex:1}} autoFocus={!!initialName} onKeyDown={e=>e.key==="Enter"&&submit()}/>
    <button onClick={submit} disabled={!val.trim()} style={{background:val.trim()?"var(--accent)":"var(--a7)",border:"none",color:val.trim()?"#fff":"var(--text-dim)",borderRadius:6,padding:"4px 12px",fontSize:11,fontWeight:700,cursor:val.trim()?"pointer":"not-allowed"}}>{buttonLabel||"OK"}</button>
    {initialName&&<button onClick={onCancel} style={{background:"none",border:"none",color:"var(--text-muted)",fontSize:12,cursor:"pointer"}}>✕</button>}
  </div>;
}

function ListScreen({songDb,onSongDb,setlists,allSetlists,onSetlists,checked,onChecked,onNext,onSettings,banksAnn,onBanksAnn,banksPlug,onBanksPlug,aiProvider,aiKeys,hideHeader=false,allGuitars,availableSources,activeProfileId}) {
  const [activeSlId,setActiveSlId]=useState(setlists[0]?.id||null);
  const activeSl=activeSlId?setlists.find(s=>s.id===activeSlId):null;
  const [showAdd,setShowAdd]=useState(false);
  const [sort,setSort]=useState((activeSl?.sort&&activeSl.sort!=="default")?activeSl.sort:"artist");
  const saveSort=(v)=>{setSort(v);if(activeSlId)onSetlists(p=>p.map(sl=>sl.id===activeSlId?{...sl,sort:v}:sl));};
  const activeSongs=useMemo(()=>{
    const sl=activeSl;
    const arr=sl?(sl.songIds||[]).map(id=>songDb.find(s=>s.id===id)).filter(Boolean):[...songDb];
    if(sort==="alpha") arr.sort((a,b)=>a.title.localeCompare(b.title,"fr"));
    else if(sort==="artist") arr.sort((a,b)=>a.artist.localeCompare(b.artist,"fr")||a.title.localeCompare(b.title,"fr"));
    return arr;
  },[songDb,activeSlId,sort,setlists]);
  const [expandedId,setExpandedId]=useState(null);
  const [showTopGuitars,setShowTopGuitars]=useState(false);
  const [editingSetlists,setEditingSetlists]=useState(false);
  const [newSlName,setNewSlName]=useState("");
  const [editSlId,setEditSlId]=useState(null);
  const [editSlName,setEditSlName]=useState("");
  const createSetlist=()=>{if(!newSlName.trim())return;onSetlists(p=>[...p,{id:`sl_${Date.now()}`,name:newSlName.trim(),songIds:[],profileIds:[activeProfileId]}]);setNewSlName("");};
  const deleteSetlist=id=>{onSetlists(p=>p.filter(s=>s.id!==id));if(activeSlId===id){setActiveSlId(null);onChecked([]);}};
  const renameSetlist=(id,name)=>{onSetlists(p=>p.map(s=>s.id===id?{...s,name}:s));setEditSlId(null);};
  const toggle=id=>onChecked(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const toggleAll=()=>onChecked(checked.length===activeSongs.length?[]:activeSongs.map(s=>s.id));
  const inp={background:"var(--bg-card)",color:"var(--text)",border:"1px solid var(--a15)",borderRadius:7,padding:"6px 10px",fontSize:12,boxSizing:"border-box"};

  // ─── Tout améliorer ───
  const IMPROVE_THRESHOLD=90;
  const IMPROVE_MAX_ROUNDS=3;
  const [improving,setImproving]=useState(false);
  const [improveStatus,setImproveStatus]=useState(null); // {current,total,round,songTitle}
  const improveCancelRef=useRef(false);
  const songDbRef=useRef(songDb);
  songDbRef.current=songDb;
  const getSongsToImprove=()=>{
    const guitars=allGuitars||GUITARS;
    const sl=activeSl;
    const arr=sl?(sl.songIds||[]).map(id=>songDbRef.current.find(s=>s.id===id)).filter(Boolean):[...songDbRef.current];
    return arr.filter(s=>{
      if(!s.aiCache) return false;
      const ig=getIg(s,guitars);const savedGId=sl?.guitars?.[s.id];const gId=savedGId||ig?.[0]||"";
      const gType=(guitars.find(x=>x.id===gId))?.type||"HB";
      const best=getBestResult(s,gId,s.aiCache?.result);
      // Only enrich if guitar differs from cache
      const enriched=(best&&gId&&s.aiCache?.gId!==gId)?enrichAIResult({...best},gType,gId,banksAnn,banksPlug):best;
      return enriched?bestScoreOf(enriched)<IMPROVE_THRESHOLD:false;
    });
  };
  const improveBadgeCount=useMemo(()=>getSongsToImprove().length,[songDb,activeSl,banksAnn,banksPlug,allGuitars]);
  const improveAll=async()=>{
    improveCancelRef.current=false;
    setImproving(true);
    const guitars=allGuitars||GUITARS;
    for(let round=1;round<=IMPROVE_MAX_ROUNDS;round++){
      const toImprove=getSongsToImprove();
      if(toImprove.length===0) break;
      for(let i=0;i<toImprove.length;i++){
        if(improveCancelRef.current) break;
        const s=toImprove[i];
        const ig=getIg(s,guitars);
        const savedGId=activeSl?.guitars?.[s.id];
        const gId=savedGId||ig?.[0]||"";
        setImproveStatus({current:i+1,total:toImprove.length,round,songTitle:s.title});
        try{
          const r=await fetchAI(s,gId,banksAnn,banksPlug,aiProvider,aiKeys,guitars);
          onSongDb(p=>p.map(x=>x.id===s.id?{...x,aiCache:updateAiCache(x.aiCache,gId,r)}:x));
        }catch(e){/* skip */}
      }
      if(improveCancelRef.current) break;
    }
    setImproving(false);setImproveStatus(null);
  };
  return (
    <div>
      {!hideHeader&&<div style={{marginBottom:20,textAlign:"center"}}>
        <div style={{fontSize:26,fontWeight:800,color:"var(--text)",marginBottom:3}}>🎸 ToneX Poweruser</div>
      </div>}
      <div style={{marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
          <span style={{fontSize:11,color:"var(--text-muted)",fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>Setlist active</span>
          <button onClick={()=>setEditingSetlists(!editingSetlists)} style={{background:editingSetlists?"var(--accent-bg)":"none",border:editingSetlists?"1px solid var(--accent-border)":"none",color:editingSetlists?"var(--accent)":"var(--text-muted)",borderRadius:5,padding:"2px 6px",fontSize:11,cursor:"pointer"}}>{editingSetlists?"✕ Fermer":"✏️ Gérer"}</button>
        </div>
        {editingSetlists&&<div style={{background:"var(--a3)",border:"1px solid var(--a7)",borderRadius:10,padding:12,marginBottom:10}}>
          {setlists.map(sl=>(

            const ig=getIg(s,guitars);

          const ampName=entry?.amp||null;
          const scColor=sc!=null?scoreColor(sc):null;

          const isIdeal=label&&aiC?.ideal_preset&&label===aiC.ideal_preset;
          const isWeak=sc!=null&&sc<65;
          return(
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <StatusDot score={sc} ideal={isIdeal}/>
              {loc

                const newId=isExpanded?null:s.id;

                {hist&&!isExpanded&&<div style={{fontSize:10,color:"var(--text-dim)",marginTop:2,display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>
                  <span style={{color:"#4a5568",fontWeight:600}}>{hist.guitarist}</span>
                  <span style={{color:"#2d3748"}}>·</span>
                  <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1,minWidth:0}}>{hist.amp}</span>

                {!isExpanded&&(g||aiC?.ideal_guitar)&&(()=>{
                  const gScore=Math.max(aiPA?.score||0,aiPP?.score||0);
                  const isIdealGuitar=g?ig.includes(gId):true;
                  return <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap",marginTop:4}}>
                  <StatusDot score={gScore||null} ideal={isIdealGuitar}/>
                  {g
                    ?<span style={{fontSize:10,color:"var(--text-sec)",background:"var(--a6)",borderRadius:4,padding:"1px 7px",fontWeight:600}}>{g.name} ({g.type}){savedGId&&!ig.includes(savedGId)?" (choix perso)":""}</span>

          </div>

// ─── Recap Screen ─────────────────────────────────────────────────────────────
function RecapScreen({songs,onBack,onNavigate,onValidate,songDb,onSongDb,banksAnn,banksPlug,aiProvider,aiKeys,allGuitars,availableSources}) {
  const guitars=allGuitars||GUITARS;
  const [mode,setMode]=useState("single"); // "single" | "multi"

  // Compute top guitars ranked by song affinity
  const rankedGuitars=useMemo(()=>{
    const songsByGuitar={};
    songs.forEach(s=>{
      const ig=getIg(s,guitars);
      let matched=false;
      ig.forEach(gId=>{
        if(!songsByGuitar[gId]) songsByGuitar[gId]=new Set();
        songsByGuitar[gId].add(s.id);matched=true;
      });
      const aiG=s.aiCache?.result?.ideal_guitar;
      if(aiG){
        const m=guitars.find(g=>g.name===aiG||g.short===aiG);
        if(m){if(!songsByGuitar[m.id]) songsByGuitar[m.id]=new Set();songsByGuitar[m.id].add(s.id);matched=true;}
      }
      if(!matched){
        const typeScores={HB:0,SC:0,P90:0};
        ["HB","SC","P90"].forEach(t=>{const pA=getPA(s,t);const pP=getPP(s,t);const name=pA?.l||pP?.l;if(name){const e=findCatalogEntry(name);if(e?.scores?.[t]) typeScores[t]=e.scores[t];}});
        const bestType=Object.entries(typeScores).sort((a,b)=>b[1]-a[1])[0]?.[0]||"HB";
        const matching=guitars.filter(g=>g.type===bestType);
        if(matching.length){if(!songsByGuitar[matching[0].id]) songsByGuitar[matching[0].id]=new Set();songsByGuitar[matching[0].id].add(s.id);}
      }
    });
    return Object.entries(songsByGuitar).map(([gId,sIds])=>({gId,count:sIds.size,songIds:[...sIds]})).sort((a,b)=>b.count-a.count);
  },[songs,guitars]);

  const topGuitar=rankedGuitars[0]?guitars.find(g=>g.id===rankedGuitars[0].gId):null;
  const top3=rankedGuitars.slice(0,3).map(r=>({...r,guitar:guitars.find(g=>g.id===r.gId)})).filter(r=>r.guitar);

  // Assign guitar per song based on mode
  const songGuitarMap=useMemo(()=>{
    const map={};
    if(mode==="single"&&topGuitar){
      songs.forEach(s=>{map[s.id]=topGuitar;});
    } else {
      // Multi: assign best guitar per song from top 3
      const top3Ids=new Set(top3.map(r=>r.gId));
      songs.forEach(s=>{
        // Try ideal guitar from AI/ig
        const ig=getIg(s,guitars);
        const aiG=s.aiCache?.result?.ideal_guitar;
        let best=null;
        // Prefer a guitar that's in top 3
        if(aiG){const m=guitars.find(g=>g.name===aiG||g.short===aiG);if(m&&top3Ids.has(m.id)) best=m;}
        if(!best&&ig.length){const m=guitars.find(g=>g.id===ig[0]);if(m&&top3Ids.has(m.id)) best=m;}
        // Fallback: best type match from top 3
        if(!best){
          const ai=s.aiCache?.result;
          const style=ai?.song_style||"rock";
          let bestScore=0;
          top3.forEach(r=>{
            const gType=r.guitar.type;
            const b=computeBestPresets(gType,style,banksAnn,banksPlug,r.gId,ai?.ref_amp);
            const sc=Math.max(b.annTop?.score||0,b.plugTop?.score||0);
            if(sc>bestScore){bestScore=sc;best=r.guitar;}
          });
        }
        if(!best&&top3.length) best=top3[0].guitar;
        if(!best&&guitars.length) best=guitars[0];
        map[s.id]=best;
      });
    }
    return map;
  },[mode,songs,guitars,topGuitar,top3,banksAnn,banksPlug]);

  // Compute preset for each song based on assigned guitar
  const songRows=useMemo(()=>{
    return songs.map(s=>{
      const g=songGuitarMap[s.id];
      const gType=g?.type||"HB";
      const gId=g?.id||"";
      const aiCraw=getBestResult(s,gId,s.aiCache?.result)||null;
      let presetAnn=null,presetPlug=null;
      if(aiCraw){
        const enriched=enrichAIResult({...aiCraw},gType,gId,banksAnn,banksPlug);
        presetAnn=enriched.preset_ann||null;
        presetPlug=enriched.preset_plug||null;
      }
      return {song:s,guitar:g,presetAnn,presetPlug};
    });
  },[songs,songGuitarMap,banksAnn,banksPlug]);

  // Compute missing presets to install (bottom section)
  const missingPresets=useMemo(()=>{
    const map=new Map();
    songRows.forEach(({song,presetAnn,presetPlug})=>{
      const check=(p,device)=>{
        if(!p?.label) return;
        const banks=device==="ann"?banksAnn:banksPlug;
        const loc=findInBanks(p.label,banks);
        if(!loc){
          const key=p.label+"|"+device;
          const existing=map.get(key);
          const entry=findCatalogEntry(p.label);
          if(!existing) map.set(key,{preset:p.label,device,score:p.score||0,songs:[song.title],pack:entry?.src==="TSR"?entry.pack:null,amp:entry?.amp||""});
          else if(!existing.songs.includes(song.title)) existing.songs.push(song.title);
        }
      };
      check(presetAnn,"ann");
      check(presetPlug,"plug");
    });
    return [...map.values()].sort((a,b)=>b.songs.length-a.songs.length||b.score-a.score);
  },[songRows,banksAnn,banksPlug]);

  // Build gps and aiR for onValidate
  const gps=useMemo(()=>{const o={};songs.forEach(s=>{o[s.id]=songGuitarMap[s.id]?.id||"";});return o;},[songs,songGuitarMap]);
  const aiR=useMemo(()=>{const o={};songRows.forEach(({song,presetAnn,presetPlug})=>{const ai=song.aiCache?.result;if(ai) o[song.id]={...ai,preset_ann:presetAnn,preset_plug:presetPlug};});return o;},[songRows]);

  return (
    <div>
      <Breadcrumb crumbs={[{label:"Accueil",screen:"list"},{label:"Récap"}]} onNavigate={onNavigate}/>
