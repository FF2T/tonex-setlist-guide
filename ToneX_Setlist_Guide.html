          <div style={{fontSize:12,color:"var(--text-muted)",fontWeight:700,fontFamily:"var(--font-mono)",textTransform:"uppercase",letterSpacing:"var(--tracking-wider)",marginBottom:8}}>🔌 Top 3 — ToneX Plug <span style={{fontSize:10,color:"var(--text-dim)",fontWeight:400,textTransform:"none"}}>(presets installés)</span></div>
          {recs.plugBest.length>0
            ?recs.plugBest.map((p,i)=><JamPresetItem key={p.name} p={p} rank={i} isSelected={selectedJam===p.name} onSelect={()=>setSelectedJam(selectedJam===p.name?null:p.name)} banksAnn={banksAnn} banksPlug={banksPlug} guitars={guitars}/>)
            :<div style={{fontSize:12,color:"var(--text-dim)",padding:"12px",background:"var(--a3)",borderRadius:"var(--r-md)",textAlign:"center"}}>Aucun preset {styleInfo?.label} installé sur le Plug pour ce type de guitare.</div>
          }
        </div>

        {/* Top 3 Full Catalog */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12,color:"var(--text-muted)",fontWeight:700,fontFamily:"var(--font-mono)",textTransform:"uppercase",letterSpacing:"var(--tracking-wider)",marginBottom:8}}>🌐 Top 3 — Catalogue complet <span style={{fontSize:10,color:"var(--text-dim)",fontWeight:400,textTransform:"none"}}>(tous presets, installés ou non)</span></div>
          {recs.fullTop3.map((p,i)=><JamPresetItem key={p.name} p={p} rank={i} isSelected={selectedJam===p.name} onSelect={()=>setSelectedJam(selectedJam===p.name?null:p.name)} banksAnn={banksAnn} banksPlug={banksPlug} guitars={guitars}/>)}
        </div>
      </div>
    );
  }

  if(step==="style"){
    return(
      <div>
        <button onClick={()=>setStep("guitar")} style={{background:"var(--a8)",border:"1px solid var(--a12)",color:"var(--text-sec)",borderRadius:"var(--r-md)",padding:"6px 12px",fontSize:12,cursor:"pointer",marginBottom:16}}>← Changer de guitare</button>
        <div style={{fontSize:14,color:"var(--text)",fontWeight:700,marginBottom:4}}>Guitare : <span style={{color:"var(--green)"}}>{guitar?.name}</span></div>
        <div style={{fontSize:12,color:"var(--text-muted)",marginBottom:16}}>Quel style joues-tu ?</div>
        <div className="style-grid">
          {JAM_STYLES.map(s=>(
            <button key={s.id} onClick={()=>{setStyle(s.id);setStep("results");}}
              style={{background:`rgba(${s.color},0.1)`,border:`1px solid rgba(${s.color},0.3)`,borderRadius:"var(--r-lg)",padding:"14px 8px",cursor:"pointer",textAlign:"center",transition:"all .15s"}}>
              <div style={{fontSize:22,marginBottom:4}}>{s.emoji}</div>
              <div style={{fontSize:12,fontWeight:700,color:`rgb(${s.color})`}}>{s.label}</div>
            </button>
          ))}
        </div>
      </div>
    );
  }

  // step === "guitar"
  const typeGroups={HB:[],SC:[],P90:[]};
  guitars.forEach(g=>typeGroups[g.type]?.push(g));
  return(
    <div>
      <div style={{fontSize:12,color:"var(--text-muted)",marginBottom:16}}>Sélectionne ta guitare pour ce jam :</div>
      {Object.entries(typeGroups).filter(([,arr])=>arr.length>0).map(([type,arr])=>(
        <div key={type} style={{marginBottom:16}}>
          <div style={{fontSize:11,color:`rgb(${TYPE_COLORS[type]||"99,102,241"})`,fontWeight:700,fontFamily:"var(--font-mono)",textTransform:"uppercase",letterSpacing:"var(--tracking-wider)",marginBottom:8}}>{type} — {TYPE_LABELS[type]}</div>
          <div className="guitar-grid">
            {arr.map(g=>(
              <button key={g.id} className={`guitar-card${guitarId===g.id?" selected":""}`} onClick={()=>{setGuitarId(g.id);setStep("style");}}>
                <GuitarSilhouette id={g.id} size={36}/>
                <div style={{fontSize:11,fontWeight:700,color:"var(--text-bright)",lineHeight:1.3,marginTop:4}}>{g.short||g.name}</div>
              </button>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── SetlistsScreen (onglets Setlists + Morceaux) ────────────────────────────
function SetlistsScreen({songDb,onSongDb,setlists,allSetlists,onSetlists,checked,onChecked,onNext,onSettings,onNavigate,banksAnn,onBanksAnn,banksPlug,onBanksPlug,aiProvider,aiKeys,allGuitars,availableSources,activeProfileId}){
  const [tab,setTab]=useState("setlists");
  const tabBtn=(id,label)=>(
    <button onClick={()=>setTab(id)} style={{background:tab===id?"var(--accent-bg)":"var(--a5)",border:tab===id?"1px solid var(--accent-border)":"1px solid var(--a8)",color:tab===id?"var(--accent)":"var(--text-sec)",borderRadius:"var(--r-md)",padding:"7px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>{label}</button>
  );
  // Songs tab state
  const [songSort,setSongSort]=useState("artist");
  const [newSongTitle,setNewSongTitle]=useState("");
  const [newSongArtist,setNewSongArtist]=useState("");
  const [newSongSlIds,setNewSongSlIds]=useState([]);
  const [expandedSongId,setExpandedSongId]=useState(null);
  const toggleNewSongSl=id=>setNewSongSlIds(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const toggleSongInSetlist=(songId,slId)=>onSetlists(p=>p.map(sl=>sl.id!==slId?sl:{...sl,songIds:sl.songIds.includes(songId)?sl.songIds.filter(x=>x!==songId):[...sl.songIds,songId]}));
  const addSongToDb=()=>{
    if(!newSongTitle.trim())return;
    const title=newSongTitle.trim();
    const artist=newSongArtist.trim()||"Artiste inconnu";
    const dup=findDuplicateSong(songDb,title,artist);
    if(dup){
      const slCount=newSongSlIds.length;
      const msg=`"${dup.title}" (${dup.artist}) est déjà dans la base.${slCount>0?"\n\nVoulez-vous l'ajouter "+(slCount>1?"aux setlists sélectionnées":"à la setlist sélectionnée")+" ?":""}`;
      if(slCount>0){
        if(window.confirm(msg)){
          onSetlists(p=>p.map(sl=>newSongSlIds.includes(sl.id)&&!sl.songIds.includes(dup.id)?{...sl,songIds:[...sl.songIds,dup.id]}:sl));
        }
      }else{
        window.alert(msg);
      }
      setNewSongTitle("");setNewSongArtist("");setNewSongSlIds([]);
      return;
    }
    const ns={id:`c_${Date.now()}`,title,artist,isCustom:true,ig:[],aiCache:null};
    onSongDb(p=>[...p,ns]);
    if(newSongSlIds.length>0)onSetlists(p=>p.map(sl=>newSongSlIds.includes(sl.id)?{...sl,songIds:[...sl.songIds,ns.id]}:sl));
    fetchAI(ns,"",banksAnn,banksPlug,aiProvider,aiKeys,allGuitars)
      .then(r=>onSongDb(p=>p.map(x=>x.id===ns.id?{...x,aiCache:updateAiCache(x.aiCache,"",r)}:x)))
      .catch(()=>{});
    setNewSongTitle("");setNewSongArtist("");setNewSongSlIds([]);
  };
  const deleteSongFromDb=id=>{
    const s=songDb.find(x=>x.id===id);
    if(!s) return;
    if(!window.confirm(`Supprimer "${s.title}" (${s.artist}) de la base ?\nLe morceau sera retiré de toutes les setlists.`)) return;
    onSongDb(p=>p.filter(x=>x.id!==id));onSetlists(p=>p.map(sl=>({...sl,songIds:sl.songIds.filter(x=>x!==id)})));
  };
  const inp={background:"var(--bg-card)",color:"var(--text)",border:"1px solid var(--a15)",borderRadius:"var(--r-md)",padding:"6px 10px",fontSize:12,boxSizing:"border-box"};
  return(
    <div>
      <Breadcrumb crumbs={[{label:"Accueil",screen:"list"},{label:"Setlists & Morceaux"}]} onNavigate={onNavigate}/>
      <div style={{fontFamily:"var(--font-display)",fontSize:"var(--fs-lg)",fontWeight:800,color:"var(--text-primary)",marginBottom:8}}>Setlists</div>
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        {tabBtn("setlists","Setlists")}
        {tabBtn("songs","Morceaux")}
      </div>
      {tab==="setlists"&&<ListScreen songDb={songDb} onSongDb={onSongDb} allSetlists={allSetlists} setlists={setlists} onSetlists={onSetlists} checked={checked} onChecked={onChecked} onNext={onNext} onSettings={onSettings} banksAnn={banksAnn} onBanksAnn={onBanksAnn} banksPlug={banksPlug} onBanksPlug={onBanksPlug} aiProvider={aiProvider} aiKeys={aiKeys} hideHeader={true} allGuitars={allGuitars} availableSources={availableSources} activeProfileId={activeProfileId}/>}
      {tab==="songs"&&<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontSize:13,color:"var(--text-sec)"}}>{songDb.length} morceaux</div>
          <select value={songSort} onChange={e=>setSongSort(e.target.value)} style={{background:"var(--bg-card)",color:"var(--text-sec)",border:"1px solid var(--a12)",borderRadius:"var(--r-md)",padding:"3px 8px",fontSize:11,cursor:"pointer"}}>
            <option value="alpha">A → Z (titre)</option>
            <option value="artist">Par artiste</option>
            <option value="recent">Récents</option>
          </select>
        </div>
        {(()=>{
          const sorted=[...songDb];
          if(songSort==="alpha") sorted.sort((a,b)=>a.title.localeCompare(b.title,"fr"));
          else if(songSort==="artist") sorted.sort((a,b)=>a.artist.localeCompare(b.artist,"fr")||a.title.localeCompare(b.title,"fr"));
          else sorted.reverse();
          // Group by artist if sorted by artist
          let lastArtist="";
          return sorted.map(s=>{
          const expanded=expandedSongId===s.id;
          const showArtistHeader=songSort==="artist"&&s.artist!==lastArtist;
          if(showArtistHeader) lastArtist=s.artist;
          return <div key={s.id}>
          {showArtistHeader&&<div style={{fontSize:12,fontWeight:700,color:"var(--text-sec)",marginTop:10,marginBottom:4,paddingLeft:2}}>{s.artist}</div>}
          <div style={{background:"var(--a3)",border:"1px solid var(--a6)",borderRadius:"var(--r-lg)",marginBottom:4,overflow:"hidden"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"9px 12px"}}>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>{s.title}</div>{songSort!=="artist"&&<div style={{fontSize:11,color:"var(--text-muted)"}}>{s.artist}{s.isCustom?" · ✨IA":""}</div>}</div>
              <button onClick={()=>setExpandedSongId(expanded?null:s.id)} style={{background:expanded?"var(--accent-bg)":"var(--a7)",border:expanded?"1px solid var(--accent-border)":"1px solid var(--a10)",color:expanded?"var(--accent)":"var(--text-sec)",borderRadius:"var(--r-md)",padding:"4px 8px",fontSize:11,cursor:"pointer"}}>Setlists</button>
              <button onClick={()=>deleteSongFromDb(s.id)} style={{background:"var(--red-bg)",border:"1px solid var(--red-border)",color:"var(--red)",borderRadius:"var(--r-md)",padding:"4px 10px",fontSize:11,cursor:"pointer"}}>Supprimer</button>
            </div>
            {expanded&&<div style={{padding:"8px 12px 10px",borderTop:"1px solid var(--a5)",display:"flex",gap:6,flexWrap:"wrap"}}>
              {setlists.map(sl=>{const inSl=sl.songIds.includes(s.id);return(
                <button key={sl.id} onClick={()=>toggleSongInSetlist(s.id,sl.id)} style={{background:inSl?"var(--green-border)":"var(--a5)",border:inSl?"1px solid rgba(74,222,128,0.4)":"1px solid var(--a10)",color:inSl?"var(--green)":"var(--text-sec)",borderRadius:"var(--r-md)",padding:"4px 12px",fontSize:11,fontWeight:600,cursor:"pointer"}}>{inSl?"✓ ":""}{sl.name}</button>
              );})}
            </div>}
          </div>
        </div>;})})()}
        <div style={{background:"var(--accent-bg)",border:"1px solid var(--accent-soft)",borderRadius:"var(--r-lg)",padding:14,marginTop:10}}>
          <div style={{fontSize:12,color:"var(--accent)",fontWeight:600,marginBottom:10}}>+ Ajouter un morceau</div>
          <input placeholder="Titre *" value={newSongTitle} onChange={e=>setNewSongTitle(e.target.value)} style={{...inp,width:"100%",marginBottom:7}}/>
          <input placeholder="Artiste" value={newSongArtist} onChange={e=>setNewSongArtist(e.target.value)} style={{...inp,width:"100%",marginBottom:10}}/>
          <div style={{fontSize:11,color:"var(--text-muted)",marginBottom:6}}>Ajouter aussi à :</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
            {setlists.map(sl=>{const sel=newSongSlIds.includes(sl.id);return(
              <button key={sl.id} onClick={()=>toggleNewSongSl(sl.id)} style={{background:sel?"var(--accent-bg)":"var(--a5)",border:sel?"1px solid var(--border-accent)":"1px solid var(--a10)",color:sel?"var(--accent)":"var(--text-sec)",borderRadius:"var(--r-md)",padding:"4px 10px",fontSize:11,fontWeight:600,cursor:"pointer"}}>{sl.name}</button>
            );})}
          </div>
          <button onClick={addSongToDb} disabled={!newSongTitle.trim()} style={{width:"100%",background:newSongTitle.trim()?"var(--accent)":"var(--bg-elev-3)",color:"var(--text)",border:"none",borderRadius:"var(--r-md)",padding:"9px",fontSize:13,fontWeight:600,cursor:newSongTitle.trim()?"pointer":"not-allowed"}}>Ajouter à la base</button>
        </div>
      </div>}
    </div>
  );
}

// ─── SongSearchBar — free text → AI correction → validate ────────────────────
function SongSearchBar({onConfirm,aiProvider,aiKeys,songDb}){
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [suggestion,setSuggestion]=useState(null);
  const [err,setErr]=useState(null);
  const [showSuggest,setShowSuggest]=useState(false);
  const [highlight,setHighlight]=useState(0);

  // Bug 10 — autocomplete : filtre la base locale en direct
  const localSuggestions=useMemo(()=>{
    const q=normalizeSongTitle(input);
    const qa=normalizeArtist(input);
    if(!q&&!qa) return [];
    if(!songDb||!songDb.length) return [];
    return songDb
      .map(s=>{
        const nt=normalizeSongTitle(s.title);
        const na=normalizeArtist(s.artist);
        let rank=0;
        if(nt.startsWith(q)) rank=3;
        else if(nt.includes(q)) rank=2;
        else if(na.includes(qa)) rank=1;
        return rank>0?{s,rank}:null;
      })
      .filter(Boolean)
      .sort((a,b)=>b.rank-a.rank||a.s.title.localeCompare(b.s.title,"fr"))
      .slice(0,6)
      .map(x=>x.s);
  },[input,songDb]);

  // Bug 9 — détecte les réponses non identifiées (titre/artiste "Inconnu" ou confiance basse)
  const isUnknown=suggestion&&((suggestion.confidence||"").toLowerCase()==="low"
    ||/^inconnu/i.test(suggestion.title||"")
    ||/^inconnu/i.test(suggestion.artist||""));

  const search=()=>{
    if(!input.trim())return;
    const key=aiKeys?.gemini||aiKeys?.anthropic||DEFAULT_GEMINI_KEY;
    const provider=(aiKeys?.gemini||DEFAULT_GEMINI_KEY)?"gemini":"anthropic";
    if(!key){setErr("Clé API manquante — configure-la dans les paramètres.");return;}
    setShowSuggest(false);
    setLoading(true);setErr(null);setSuggestion(null);
    const prompt=`L'utilisateur veut jouer un morceau de guitare. Il a tapé : "${input.trim()}"
Corrige l'orthographe et identifie le titre exact et l'artiste/groupe.
Si tu n'es pas sûr du tout, mets confidence="low" et title/artist="Inconnu".
Réponds UNIQUEMENT en JSON (sans markdown) : {"title":"Titre exact","artist":"Artiste/Groupe","confidence":"high|medium|low"}`;
    const parse=safeParseJSON;
    const req=provider==="gemini"
      ?fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${key}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})})
        .then(r=>r.json()).then(d=>{if(d.error)throw new Error(d.error.message);return parse(d.candidates?.[0]?.content?.parts?.[0]?.text||"");})
      :fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:200,messages:[{role:"user",content:prompt}]})})
        .then(r=>r.json()).then(d=>{if(d.error)throw new Error(d.error.message);return parse(d.content?.map(i=>i.text||"").join("")||"");});
    req.then(s=>setSuggestion(s)).catch(e=>setErr(e.message)).finally(()=>setLoading(false));
  };

  const pickLocal=(s)=>{onConfirm(s.title,s.artist);setShowSuggest(false);setInput("");setSuggestion(null);};

  const inp={background:"var(--bg-elev-1)",color:"var(--text-primary)",border:"2px solid var(--border-strong)",borderRadius:"var(--r-lg)",padding:"16px 18px",fontSize:17,width:"100%",boxSizing:"border-box",fontFamily:"var(--font-ui)"};
  return(
    <div style={{position:"relative"}}>
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        <input
          placeholder="Titre, artiste..."
          value={input}
          onChange={e=>{setInput(e.target.value);setSuggestion(null);setShowSuggest(true);setHighlight(0);}}
          onFocus={()=>setShowSuggest(true)}
          onBlur={()=>setTimeout(()=>setShowSuggest(false),150)}
          onKeyDown={e=>{
            if(showSuggest&&localSuggestions.length>0){
              if(e.key==="ArrowDown"){e.preventDefault();setHighlight(h=>Math.min(h+1,localSuggestions.length-1));return;}
              if(e.key==="ArrowUp"){e.preventDefault();setHighlight(h=>Math.max(h-1,0));return;}
              if(e.key==="Tab"){e.preventDefault();pickLocal(localSuggestions[highlight]);return;}
              if(e.key==="Escape"){setShowSuggest(false);return;}
            }
            if(e.key==="Enter") search();
          }}
          style={{...inp,flex:1}}
        />
        <button onClick={search} disabled={!input.trim()||loading} style={{background:!input.trim()||loading?"var(--bg-elev-3)":"linear-gradient(180deg,var(--brass-200),var(--brass-400))",border:"none",color:"var(--tolex-900)",borderRadius:"var(--r-lg)",padding:"0 22px",fontSize:17,fontWeight:700,cursor:!input.trim()||loading?"not-allowed":"pointer",flexShrink:0,boxShadow:"var(--shadow-sm)",fontFamily:"var(--font-ui)"}}>{loading?"...":"OK"}</button>
      </div>
      {showSuggest&&localSuggestions.length>0&&!suggestion&&!loading&&<div style={{position:"absolute",top:"54px",left:0,right:0,background:"var(--bg-elev-1)",border:"1px solid var(--border-strong)",borderRadius:"var(--r-lg)",boxShadow:"var(--shadow-md)",zIndex:50,maxHeight:240,overflowY:"auto"}}>
        {localSuggestions.map((s,i)=>(
          <div key={s.id}
               onMouseDown={e=>{e.preventDefault();pickLocal(s);}}
               onMouseEnter={()=>setHighlight(i)}
               style={{padding:"8px 14px",cursor:"pointer",background:i===highlight?"var(--accent-bg)":"transparent",borderBottom:i<localSuggestions.length-1?"1px solid var(--a6)":"none"}}>
            <div style={{fontSize:13,fontWeight:600,color:"var(--text-primary)"}}>{s.title}</div>
            <div style={{fontSize:11,color:"var(--text-sec)"}}>{s.artist}</div>
          </div>
        ))}
      </div>}
      {err&&<div style={{fontSize:12,color:"var(--red)",marginBottom:8}}>{err}</div>}
      {suggestion&&isUnknown&&<div style={{background:"var(--yellow-bg,rgba(251,191,36,0.12))",border:"1px solid var(--yellow-border,rgba(251,191,36,0.4))",borderRadius:"var(--r-lg)",padding:14,marginBottom:8}}>
        <div style={{fontSize:13,fontWeight:700,color:"var(--yellow,#f59e0b)",marginBottom:4}}>⚠️ Morceau non reconnu</div>
        <div style={{fontSize:12,color:"var(--text-sec)",marginBottom:10}}>Vérifie l'orthographe ou ajoute des précisions (artiste, album).</div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>{setSuggestion(null);}} style={{background:"var(--accent)",border:"none",color:"var(--text-inverse,var(--bg))",borderRadius:"var(--r-md)",padding:"8px 16px",fontSize:13,fontWeight:700,cursor:"pointer"}}>Corriger</button>
          <button onClick={()=>{onConfirm(suggestion.title,suggestion.artist);setSuggestion(null);setInput("");}} style={{background:"var(--a7)",border:"none",color:"var(--text-sec)",borderRadius:"var(--r-md)",padding:"8px 14px",fontSize:13,cursor:"pointer"}}>Forcer quand même</button>
        </div>
      </div>}
      {suggestion&&!isUnknown&&<div style={{background:"var(--green-bg)",border:"1px solid var(--green-border)",borderRadius:"var(--r-lg)",padding:14,marginBottom:8}}>
        <div style={{fontSize:14,fontWeight:700,color:"var(--text)",marginBottom:2}}>{suggestion.title}</div>
        <div style={{fontSize:12,color:"var(--text-sec)",marginBottom:10}}>{suggestion.artist}</div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>{onConfirm(suggestion.title,suggestion.artist);setSuggestion(null);setInput("");}} style={{background:"var(--green)",border:"none",color:"var(--bg)",borderRadius:"var(--r-md)",padding:"8px 16px",fontSize:13,fontWeight:700,cursor:"pointer"}}>C'est bon !</button>
          <button onClick={()=>setSuggestion(null)} style={{background:"var(--a7)",border:"none",color:"var(--text-sec)",borderRadius:"var(--r-md)",padding:"8px 14px",fontSize:13,cursor:"pointer"}}>Non, corriger</button>
        </div>
      </div>}
    </div>
  );
}

            {n:"2",emoji:"🧠",text:"L'IA raisonne : guitare ideale, ampli cible, preset recommande"},
            {n:"3",emoji:"🎸",text:"Choisis ta guitare — les presets s'adaptent automatiquement"},

              <span style={{fontSize:20,flexShrink:0}}>{emoji}</span>
              <div><span style={{fontWeight:700,color:"var(--accent)",marginRight:4}}>{n}.</span><span style={{fontSize:12,color:"var(--text-sec)"}}>{text}</span></div>

        <button onClick={onClose} style={{background:"linear-gradient(180deg,var(--brass-200),var(--brass-400))",border:"none",color:"var(--tolex-900)",borderRadius:"var(--r-lg)",padding:"12px 32px",fontSize:15,fontWeight:700,cursor:"pointer",width:"100%",boxShadow:"var(--shadow-sm)",fontFamily:"var(--font-ui)"}}>C'est parti !</button>
      </div>
    </div>
  );
}

  const steps=[
    // 0: Bienvenue
    ()=><div style={{textAlign:"center"}}>
      <div style={{fontSize:56,marginBottom:16}}>🎸</div>

        <div>🧠 Voir le raisonnement IA (profil tonal, guitare, ampli)</div>

      </div>
    </div>,
    // 1: Fonctionnalités
    ()=><div style={{textAlign:"center"}}>
      <div style={{fontSize:48,marginBottom:12}}>🎵</div>
      <div style={{fontFamily:"var(--font-display)",fontSize:"var(--fs-xl)",fontWeight:800,color:"var(--text-primary)",marginBottom:8}}>Fonctionnalites</div>
      <div style={{display:"flex",flexDirection:"column",gap:10,textAlign:"left",padding:"4px 0"}}>
        {[
          {emoji:"🔍",title:"Recherche intelligente",desc:"Tape un morceau — l'IA analyse le profil tonal, identifie l'ampli et la guitare d'origine, et recommande le meilleur couple guitare + preset."},
          {emoji:"🧠",title:"Raisonnement IA",desc:"L'IA explique son raisonnement en 3 etapes : profil tonal du morceau, scoring des guitares, profil ampli ideal."},
          {emoji:"🎵",title:"Setlists de session",desc:"Cree des setlists par contexte (cours, repetition, scene). Chaque morceau a sa fiche avec recommandation ideale et parametrage."},
          {emoji:"🎲",title:"Jammer",desc:"Choisis une guitare et un style — top 3 des presets installes et meilleurs du catalogue, avec fiches depliables."},
          {emoji:"🎛️",title:"Explorateur de presets",desc:"Explore par profil sonore (Clean cristallin, Blues vintage, Crunch 70s, Metal...). Chaque preset a sa fiche avec description, morceaux mythiques et guitares adaptees."},
          {emoji:"📦",title:"Installation directe",desc:"Installe le preset recommande directement sur ta pedale ou ton plug en choisissant la banque et le slot."},
          {emoji:"👥",title:"Multi-profils & Sync",desc:"Chaque guitariste a son profil. Sync temps reel telephone - PC via Firestore."},
        ].map(({emoji,title,desc})=><div key={title} style={{display:"flex",gap:10,padding:"10px 12px",background:"var(--a3)",borderRadius:"var(--r-lg)"}}>
          <span style={{fontSize:18,flexShrink:0}}>{emoji}</span>
          <div><div style={{fontSize:12,fontWeight:700,color:"var(--text)",marginBottom:2}}>{title}</div><div style={{fontSize:11,color:"var(--text-muted)",lineHeight:1.5}}>{desc}</div></div>
        </div>)}
      </div>
    </div>,
    // 2: Configuration
    ()=><div style={{textAlign:"center"}}>
      <div style={{fontSize:48,marginBottom:12}}>⚙️</div>
      <div style={{fontFamily:"var(--font-display)",fontSize:"var(--fs-xl)",fontWeight:800,color:"var(--text-primary)",marginBottom:8}}>Configure ton profil</div>
      <div style={{fontSize:13,color:"var(--text-sec)",lineHeight:1.6,marginBottom:20}}>
        Pour des recommandations precises, l'app a besoin de connaitre :
      </div>
      <div style={{fontSize:13,color:"var(--text-muted)",lineHeight:2.2,textAlign:"left",padding:"18px 20px",background:"var(--a3)",borderRadius:"var(--r-xl)"}}>
        <div><b style={{color:"var(--text-sec)"}}>🎸 Tes guitares</b> — pour adapter les recommandations par modele et type de micro</div>
        <div><b style={{color:"var(--text-sec)"}}>📱 Ton materiel</b> — pedale ToneX Anniversary et/ou ToneX Plug</div>
        <div><b style={{color:"var(--text-sec)"}}>📦 Tes sources</b> — quels packs de presets tu possedes (TSR, ML, Factory...)</div>
      </div>
    </div>,
  ];

  const total=steps.length;
  const isLast=step===total-1;
  const isFirst=step===0;

  return(
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={onClose}>
      <div style={{background:"var(--bg-card)",borderRadius:"var(--r-xl)",padding:"32px 24px",maxWidth:480,width:"100%",maxHeight:"90vh",overflowY:"auto",position:"relative",boxShadow:"var(--shadow-lg)"}} onClick={e=>e.stopPropagation()}>

        <div style={{display:"flex",gap:4,marginBottom:24}}>

        {/* Content */}
        {steps[step]()}

        {/* Navigation */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:24,gap:8}}>
          {isFirst
            ?<button onClick={onClose} style={{background:"none",border:"none",color:"var(--text-dim)",fontSize:12,cursor:"pointer"}}>Fermer</button>
            :<button onClick={()=>setStep(s=>s-1)} style={{background:"var(--a7)",border:"none",color:"var(--text-sec)",borderRadius:"var(--r-md)",padding:"8px 16px",fontSize:12,fontWeight:600,cursor:"pointer"}}>← Retour</button>
          }
          {isLast
            ?<div style={{display:"flex",gap:8}}>
              <button onClick={onClose} style={{background:"var(--a7)",border:"none",color:"var(--text-sec)",borderRadius:"var(--r-lg)",padding:"12px 20px",fontSize:13,fontWeight:600,cursor:"pointer"}}>Fermer</button>
              <button onClick={()=>{onClose();onProfile();}} style={{background:"var(--accent)",border:"none",color:"var(--text-inverse)",borderRadius:"var(--r-lg)",padding:"12px 24px",fontSize:14,fontWeight:700,cursor:"pointer"}}>Configurer mon profil →</button>
            </div>
            :<button onClick={()=>setStep(s=>s+1)} style={{background:"var(--accent)",border:"none",color:"var(--text-inverse)",borderRadius:"var(--r-md)",padding:"8px 20px",fontSize:13,fontWeight:700,cursor:"pointer"}}>Suivant →</button>
          }
        </div>
      </div>
    </div>
  );
}

// ─── HomeScreen (style Google) ────────────────────────────────────────────────
function HomeScreen({songDb,onSongDb,setlists,allSetlists,onSetlists,checked,onChecked,onNext,onSettings,onProfile,onSetlistScreen,onJam,onExplore,onOptimizer,banksAnn,banksPlug,aiProvider,aiKeys,allGuitars,availableSources,profiles,activeProfileId,onSwitchProfile,onProfiles,customPacks,syncStatus,onViewProfile,onLogout}) {
  const profileName=(profiles[activeProfileId]||{}).name||"Profil";
  const profile=profiles[activeProfileId]||{};
  const [splashOpen,setSplashOpen]=useState(()=>{if(sessionStorage.getItem("tonex_splash"))return false;sessionStorage.setItem("tonex_splash","1");return true;});
  const [showOnboarding,setShowOnboarding]=useState(false);
  const [songResult,setSongResult]=useState(null);
  const [songBaseAI,setSongBaseAI]=useState(null); // résultat AI brut (sans scores guitare)
  const [songLoading,setSongLoading]=useState(false);
  const [songErr,setSongErr]=useState(null);
  const [confirmedSong,setConfirmedSong]=useState(null);
  const [showGuitarPick,setShowGuitarPick]=useState(false);
  const [selectedGuitar,setSelectedGuitar]=useState(null);
  const [showFeedback,setShowFeedback]=useState(false);
  const [showCotSearch,setShowCotSearch]=useState(false);
  const [feedback,setFeedback]=useState("");
  const rerunWithFeedback=()=>{
    if(!confirmedSong||!feedback.trim())return;
    setSongLoading(true);setShowFeedback(false);
    const prev=songResult;
    const gId=selectedGuitar?.id||"";
    const song={id:`tmp_${Date.now()}`,title:confirmedSong.title,artist:confirmedSong.artist};
    fetchAI(song,gId,banksAnn,banksPlug,aiProvider,aiKeys,allGuitars,feedback.trim())
      .then(r=>{
        const pick=mergeBestResults(prev,r);
        setSongResult(pick);setSongBaseAI(pick);setFeedback("");
      })
      .catch(e=>setSongErr(e.message))
      .finally(()=>setSongLoading(false));
  };

  return (
    <div style={{display:"flex",flexDirection:"column"}}>
      {splashOpen&&<SplashPopup onClose={()=>setSplashOpen(false)}/>}
      {showOnboarding&&<OnboardingWizard onClose={()=>setShowOnboarding(false)} onProfile={onProfile}/>}

      {/* Zone centrale style Google */}
      <div style={{padding:"8px 0 4px",minHeight:(!songResult&&!songLoading)?"calc(100vh - 140px)":"auto",display:"flex",flexDirection:"column",justifyContent:(!songResult&&!songLoading)?"center":"flex-start"}}>
        {songLoading?(
          <div style={{textAlign:"center",padding:"40px 0"}}>
            <div style={{fontSize:48,marginBottom:16,animation:"spin 1.5s linear infinite"}}>&#9203;</div>
            <div style={{fontSize:22,fontWeight:700,color:"var(--text)"}}>Analyse en cours...</div>
            {confirmedSong&&<div style={{fontSize:14,color:"var(--text-sec)",marginTop:8}}>{confirmedSong.title} — {confirmedSong.artist}</div>}
            <style>{"@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}"}</style>
          </div>
        ):<div>
        <div style={{fontFamily:"var(--font-display)",fontSize:"var(--fs-2xl)",fontWeight:800,color:"var(--text-primary)",marginBottom:6,textAlign:"center"}}>ToneX Poweruser</div>
        <div style={{fontSize:14,color:"var(--text-muted)",marginBottom:16,textAlign:"center"}}>Quel morceau veux-tu jouer ?</div>
        <div style={{width:"100%"}}>
          <SongSearchBar songDb={songDb} aiProvider={aiProvider} aiKeys={aiKeys} onConfirm={(title,artist)=>{
            // Détection de doublon stricte (T.N.T. === TNT, & === and)
            const existing=findDuplicateSong(songDb,title,artist)||songDb.find(s=>normalizePresetName(s.title)===normalizePresetName(title));
            // On adopte le titre/artiste canoniques du doublon trouvé pour éviter d'afficher des variantes
            const canonTitle=existing?existing.title:title;
            const canonArtist=existing?existing.artist:artist;
            setConfirmedSong({title:canonTitle,artist:canonArtist});
            setSongResult(null);setSongBaseAI(null);setSongErr(null);setSelectedGuitar(null);
            if(existing?.aiCache?.result?.cot_step1){
              const cachedGId=existing.aiCache.gId||"";
              const cachedG=allGuitars.find(x=>x.id===cachedGId);
              const gType=cachedG?.type||"HB";
              const r=enrichAIResult({...existing.aiCache.result},gType,cachedGId,banksAnn,banksPlug);
              setSongResult(r);setSongBaseAI(r);
              if(cachedG) setSelectedGuitar(cachedG);
              else if(r.ideal_guitar){
                const m=findGuitarByAIName(r.ideal_guitar,allGuitars);
                if(m) setSelectedGuitar(m);
              }
              return;
            }
            setSongLoading(true);
            const song={id:`tmp_${Date.now()}`,title:canonTitle,artist:canonArtist};
            fetchAI(song,"",banksAnn,banksPlug,aiProvider,aiKeys,allGuitars)
              .then(r=>{
                setSongResult(r);setSongBaseAI(r);
                // Auto-sélectionne la guitare idéale (Bug 4 : "Guitare choisie" reflète un vrai choix)
                if(r.ideal_guitar){
                  const m=findGuitarByAIName(r.ideal_guitar,allGuitars);
                  if(m) setSelectedGuitar(m);
                }
                if(!existing){
                  const ns={id:`c_${Date.now()}`,title:canonTitle,artist:canonArtist,isCustom:true,ig:[],aiCache:updateAiCache(null,"",r)};
                  onSongDb(p=>[...p,ns]);
                }
              })
              .catch(e=>setSongErr(e.message))
              .finally(()=>setSongLoading(false));
          }}/>
        </div>

        {/* Erreur */}
        {songErr&&<div style={{fontSize:12,color:"var(--red)",textAlign:"center",padding:10}}>{songErr}</div>}

        {/* Résultat — structure identique à SongDetailCard */}
        {songResult&&confirmedSong&&(()=>{
          const existing=songDb.find(s=>normalizePresetName(s.title)===normalizePresetName(confirmedSong.title));
          const info=existing?getSongInfo(existing):{year:songResult.song_year,album:songResult.song_album,desc:songResult.song_desc,key:songResult.song_key,bpm:songResult.song_bpm};
          // "Recommandation idéale" : on score la guitare RÉELLEMENT affichée (ideal_guitar texte),
          // pas blindly cot[0] qui peut référer à une autre guitare. Garantit la cohérence avec
          // "Mon choix" quand l'utilisateur a sélectionné la même guitare que l'idéale.
          const idealGuitarFromCollection=songResult.ideal_guitar?findGuitarByAIName(songResult.ideal_guitar,allGuitars):null;
          const idealGuitarCot=idealGuitarFromCollection?findCotEntryForGuitar(songResult.cot_step2_guitars,idealGuitarFromCollection):null;
          const idealGuitarObj=idealGuitarCot||songResult.cot_step2_guitars?.[0];
          const idealGuitarScore=idealGuitarCot?.score
            ||(idealGuitarFromCollection?localGuitarSongScore(idealGuitarFromCollection,songResult):null)
            ||idealGuitarObj?.score||null;
          const chosenGuitarCot=selectedGuitar?findCotEntryForGuitar(songResult.cot_step2_guitars,selectedGuitar):null;
          const chosenGuitarScore=chosenGuitarCot?.score||(selectedGuitar?localGuitarSongScore(selectedGuitar,songResult):idealGuitarScore);
          const chosenGuitarScoreEstimated=!!selectedGuitar&&!chosenGuitarCot&&chosenGuitarScore!=null;
          const sectionStyle={background:"var(--a3)",border:"1px solid var(--a7)",borderRadius:"var(--r-lg)",padding:"10px 12px",marginBottom:8};
          const customSectionStyle={background:"var(--a5)",border:"1px solid var(--a10)",borderRadius:"var(--r-lg)",padding:"10px 12px",marginBottom:8};
          const sectionTitle=(icon,label)=><div style={{fontSize:10,fontWeight:700,color:"var(--text-muted)",fontFamily:"var(--font-mono)",textTransform:"uppercase",letterSpacing:"var(--tracking-wider)",marginBottom:8,display:"flex",alignItems:"center",gap:5}}>{icon} {label}</div>;
          return <div style={{width:"100%",maxWidth:500,animation:"slideDown .2s ease-out"}}>
          <div style={{background:"var(--bg-elev-1)",border:"1px solid var(--a7)",borderRadius:"var(--r-xl)",padding:14,marginTop:8,display:"flex",flexDirection:"column",gap:6}}>

            {/* Titre */}
            <div style={{marginBottom:4}}>
              <div style={{fontFamily:"var(--font-display)",fontSize:"var(--fs-xl)",fontWeight:800,color:"var(--text-primary)",marginBottom:2}}>{confirmedSong.title}</div>
              <div style={{fontSize:12,color:"var(--text-sec)",fontFamily:"var(--font-mono)"}}>{confirmedSong.artist}{info.year?" · "+info.year:""}{info.album?" · "+info.album:""}{info.key?" · "+info.key:""}{info.bpm?" · "+info.bpm+" BPM":""}</div>
            </div>

            {/* SECTION 1 : Infos morceau */}
            <div style={sectionStyle}>
              {sectionTitle("📖","Infos morceau")}
              {info.desc&&<div style={{fontSize:11,color:"var(--text-sec)",lineHeight:1.5,marginBottom:6}}>{info.desc}</div>}
              {(songResult.ref_guitarist||songResult.ref_guitar||songResult.ref_amp)&&<div style={{fontSize:11,color:"var(--text-sec)",lineHeight:1.6}}>
                <span style={{fontWeight:700,color:"var(--text-muted)",fontSize:10}}>{songResult.ref_guitarist||"Référence"}</span><br/>
                {songResult.ref_guitar&&<>🎸 {songResult.ref_guitar} · </>}
                {songResult.ref_amp&&<>🔊 {songResult.ref_amp}</>}
                {songResult.ref_effects&&songResult.ref_effects!=="Aucun effet"&&<> · 🎚 {songResult.ref_effects}</>}
              </div>}
            </div>

            {/* SECTION 2 : Raisonnement IA */}
            {(songResult.cot_step1||songResult.cot_step2_guitars||songResult.cot_step3_amp)&&<div style={sectionStyle}>
              <div onClick={()=>setShowCotSearch(p=>!p)} style={{cursor:"pointer",fontSize:10,fontWeight:700,color:"var(--text-muted)",fontFamily:"var(--font-mono)",textTransform:"uppercase",letterSpacing:"var(--tracking-wider)",display:"flex",alignItems:"center",gap:5,userSelect:"none"}}>
                🧠 Raisonnement IA <span style={{fontSize:10,marginLeft:"auto",fontWeight:400}}>{showCotSearch?"▲":"▼"}</span>
              </div>
              {showCotSearch&&<div style={{marginTop:8,display:"flex",flexDirection:"column",gap:8}}>
                {songResult.cot_step1&&<div style={{background:"var(--a3)",border:"1px solid var(--a8)",borderRadius:"var(--r-md)",padding:"8px 10px"}}>
                  <div style={{fontSize:10,fontWeight:700,color:"var(--text-muted)",marginBottom:4,fontFamily:"var(--font-mono)",textTransform:"uppercase",letterSpacing:"var(--tracking-wider)"}}>Profil tonal</div>
                  <div style={{fontSize:11,color:"var(--text-sec)",lineHeight:1.4}}>{songResult.cot_step1}</div>
                </div>}
                {songResult.cot_step2_guitars?.length>0&&<div style={{background:"var(--a3)",border:"1px solid var(--a8)",borderRadius:"var(--r-md)",padding:"8px 10px"}}>
                  <div style={{fontSize:10,fontWeight:700,color:"var(--text-muted)",marginBottom:4,fontFamily:"var(--font-mono)",textTransform:"uppercase",letterSpacing:"var(--tracking-wider)"}}>Scoring guitares</div>
                  {songResult.cot_step2_guitars.map((gt,i)=><div key={i} style={{fontSize:11,color:"var(--text-sec)",marginBottom:i<songResult.cot_step2_guitars.length-1?4:0,display:"flex",gap:6,alignItems:"baseline",flexWrap:"wrap"}}>
                    <span style={{fontWeight:600,color:"var(--text-bright)",flexShrink:0}}>{gt.name}</span>
                    <span style={{fontFamily:"var(--font-mono)",fontWeight:800,color:scoreColor(gt.score),flexShrink:0}}>{gt.score}%</span>
                    <span style={{color:"var(--text-dim)"}}>{gt.reason}</span>
                  </div>)}
                </div>}
                {songResult.cot_step3_amp&&<div style={{background:"var(--a3)",border:"1px solid var(--a8)",borderRadius:"var(--r-md)",padding:"8px 10px"}}>
                  <div style={{fontSize:10,fontWeight:700,color:"var(--text-muted)",marginBottom:4,fontFamily:"var(--font-mono)",textTransform:"uppercase",letterSpacing:"var(--tracking-wider)"}}>Profil ampli</div>
                  <div style={{fontSize:11,color:"var(--text-sec)",lineHeight:1.4}}>{songResult.cot_step3_amp}</div>
                </div>}
              </div>}
            </div>}

            {/* SECTION 3 : Recommandation idéale */}
            <div style={sectionStyle}>
              {sectionTitle(<StatusDot score={100} ideal={true} size={10}/>,"Recommandation ideale")}
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {songResult.ideal_guitar&&<div style={{display:"flex",alignItems:"center",gap:6,fontSize:11}}>
                  <StatusDot score={idealGuitarScore} ideal={true}/>
                  <div style={{flex:1}}>Guitare <span style={{fontWeight:600,color:"var(--text-bright)"}}>{songResult.ideal_guitar}</span></div>
                  {idealGuitarScore&&<b style={{color:scoreColor(idealGuitarScore),flexShrink:0}}>{idealGuitarScore}%</b>}
                </div>}
                {songResult.guitar_reason&&<div style={{fontSize:10,color:"var(--text-dim)",marginTop:-2,marginBottom:2}}>{songResult.guitar_reason}</div>}
                {songResult.ideal_preset&&(()=>{
                  const idealScore=songResult.ideal_preset_score||0;
                  const loc=findInBanks(songResult.ideal_preset,banksAnn)||findInBanks(songResult.ideal_preset,banksPlug);
                  const entry=findCatalogEntry(songResult.ideal_preset);
                  // Garde-fou : ne pas afficher si la source est décochée
                  if(availableSources&&entry?.src&&availableSources[entry.src]===false) return null;
                  const srcInfo=presetSourceInfo(entry);
                  return <div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",fontSize:11}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}><StatusDot score={idealScore} ideal={true}/><span style={{color:"var(--text-muted)",fontSize:10}}>Preset</span> <span style={{fontWeight:600,color:"var(--text-bright)"}}>{songResult.ideal_preset}</span></div>
                      {idealScore>0&&<b style={{color:scoreColor(idealScore),flexShrink:0}}>{idealScore}%</b>}
                    </div>
                    <div style={{fontSize:9,marginTop:2,display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                      {loc
                        ?<span style={{color:"var(--green)"}}>✓ Installé · Banque {loc.bank}{loc.slot}</span>
                        :<span style={{color:"var(--yellow)"}}>⬇ Non installé</span>
                      }
                      {srcInfo&&<span style={{color:loc?"var(--text-tertiary)":"var(--text-sec)"}}>· {srcInfo.icon} {srcInfo.label}</span>}
                    </div>
                  </div>;
                })()}
                {(songResult.settings_preset||songResult.settings_guitar)&&<div style={{marginTop:4,display:"flex",flexDirection:"column",gap:3}}>
                  {songResult.settings_preset&&<div style={{fontSize:10,background:"var(--a4)",border:"1px solid var(--a10)",borderRadius:"var(--r-md)",padding:"5px 8px",color:"var(--text-sec)"}}><b style={{color:"var(--text-muted)"}}>Preset :</b> {songResult.settings_preset}</div>}
                  {songResult.settings_guitar&&<div style={{fontSize:10,background:"var(--a4)",border:"1px solid var(--a10)",borderRadius:"var(--r-md)",padding:"5px 8px",color:"var(--text-sec)"}}><b style={{color:"var(--text-muted)"}}>Guitare :</b> {songResult.settings_guitar}</div>}
                </div>}
              </div>
            </div>

            {/* SECTION 4 : Paramétrage */}
            <div style={customSectionStyle}>

// Fusionne les banks sauvées avec les banks initiales (ajoute les nouvelles sans écraser les modifs utilisateur)
function mergeBanks(saved, init){
  if(!saved) return init;
  const merged={...saved};
  for(const [k,v] of Object.entries(init)){
    if(!(k in merged)) merged[k]=v;
  }
  return merged;
}

function applySecrets(profiles){
  const secrets=loadSecrets();
  const result={...profiles};
  for(const [id,p] of Object.entries(result)){
    const s=secrets[id]||{};
    // Local secrets override Firestore only if they exist (non-empty)
    result[id]={...p,
      aiKeys:(s.aiKeys&&(s.aiKeys.gemini||s.aiKeys.anthropic))?s.aiKeys:(p.aiKeys||{anthropic:"",gemini:""}),
      password:s.password?s.password:(p.password||"")
    };
  }
  return result;
}

  // Tombstones : IDs de setlists explicitement supprimées par l'utilisateur.
  // Synchronisés via Firestore pour que le poll/merge ne les re-ressuscite pas.
  const [deletedSetlistIds, setDeletedSetlistIds] = useState(initDefault.shared?.deletedSetlistIds || []);
  // Wrapper qui détecte les suppressions (IDs présents avant et plus après) et les
  // ajoute aux tombstones. Tous les écrans utilisent setSetlists comme avant.
  const setSetlists = (updater) => {
    setSetlistsRaw(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      const prevIds = new Set(prev.map(s=>s.id));
      const nextIds = new Set(next.map(s=>s.id));
      const removed = [...prevIds].filter(id=>!nextIds.has(id));

    for(const [,p] of Object.entries(initDefault.profiles||{})){

        ["Come Together","The Beatles"],["Day Tripper","The Beatles"],
        ["Hells Bells","AC/DC"],["I Got All You Need","Joe Bonamassa"],
        ["Johnny B. Goode","Chuck Berry"],["Knockin' on Heaven's Door","Guns N' Roses"],
        ["La Grange","ZZ Top"],["Paranoid","Black Sabbath"],
        ["Sunshine of Your Love","Cream"],["Ticket to Ride","The Beatles"],
        ["Under Pressure","Queen"],["Walk of Life","Dire Straits"]
      ],
      "Nouvelle setlist":[
        ["Black Magic Woman","Peter Green"],["Sunshine of Your Love","Cream"],
        ["Calling Elvis","Dire Straits"],["La Grange","ZZ Top"],
        ["Smoke on the Water","Deep Purple"],["Space Oddity","David Bowie"],
        ["Paranoid","Black Sabbath"],["TNT","AC/DC"],
        ["Your Song","Elton John"],["Stairway to Heaven","Led Zeppelin"],
        ["Flipper","Téléphone"],["Walk of Life","Dire Straits"],
        ["Autumn Leaves","Standard Jazz"],["Hoochie Coochie Man","Muddy Waters"],
        ["Heroes","David Bowie"],["Under Pressure","Queen"],
        ["Money for Nothing","Dire Straits"],["No Surprises","Radiohead"],
        ["Highway to Hell","AC/DC"],["White Room","Cream"],
        ["Still Loving You","Scorpions"],["Thunderstruck","AC/DC"],
        ["I Got All You Need","Joe Bonamassa"],["Play That Funky Music","Wild Cherry"],
        ["Johnny B. Goode","Chuck Berry"],["Ticket to Ride","The Beatles"],
        ["What's Up","4 Non Blondes"],["Should I Stay or Should I Go","The Clash"],
        ["I've All I Need","Liam Gallagher"],["Bohemian Rhapsody","Queen"],
        ["Devil Inside","INXS"],["Tush","ZZ Top"],
        ["I Can't Dance","Genesis"],["Fly Me to the Moon","Frank Sinatra"],
        ["Sultans of Swing","Dire Straits"],["Self Esteem","The Offspring"],
        ["Change the World","The Offspring"],["Come Out and Play","The Offspring"],
        ["Don't Look Back in Anger","Oasis"],["Godfather Theme","Guns N' Roses"],
        ["La Javanaise","Serge Gainsbourg"],["Cocaine","Eric Clapton"],
        ["Paradise City","Guns N' Roses"],["Change the World","Eric Clapton"],
        ["Get Back","The Beatles"],["Let It Be","The Beatles"],
        ["Good Times","Chic"],["Wonderful Tonight","Eric Clapton"],
        ["Wicked Game","Chris Isaak"],["Wild World","Cat Stevens"],
        ["Viva la Vida","Coldplay"],["Wake Me Up","Avicii"],
        ["Tears in Heaven","Eric Clapton"],["While My Guitar Gently Weeps","The Beatles"],
        ["Sweet Child O' Mine","Guns N' Roses"],["Talking About a Revolution","Tracy Chapman"],
        ["Sweet Home Chicago","Robert Johnson"],["Sweet Home Alabama","Lynyrd Skynyrd"],
        ["Sunday Bloody Sunday","U2"],["Surf Rider","The Lively Ones"],
        ["Strong Enough","Sheryl Crow"],["Save Tonight","Eagle Eye Cherry"],
        ["Shape of My Heart","Sting"],["Something","The Beatles"],
        ["Jumping Jack Flash","The Rolling Stones"],["Message in a Bottle","The Police"],
        ["Every Breath You Take","The Police"],["Wish You Were Here","Pink Floyd"],
        ["Nothing Else Matters","Metallica"],["Motherless Child","Eric Clapton"],
        ["Minor Swing","Django Reinhardt"],["Knockin' on Heaven's Door","Guns N' Roses"],
        ["Master Blaster","Stevie Wonder"],["Is This Love","Bob Marley"],
        ["Hotel California","Eagles"],["Hallelujah","Leonard Cohen"],
        ["The Girl from Ipanema","Astrud Gilberto"],["Get Back","The Beatles"],
        ["Englishman in New York","Sting"],["Boom Boom","John Lee Hooker"],
        ["Dust in the Wind","Kansas"],["Get Lucky","Daft Punk"],
        ["Come Together","The Beatles"],["Layla","Eric Clapton"],
        ["C'est vraiment toi","Téléphone"],["Californication","Red Hot Chili Peppers"],
        ["Hallelujah","Jeff Buckley"],["Billie Jean","Michael Jackson"],
        ["Berimbau","Baden Powell"],["Here Comes the Sun","The Beatles"],
        ["Blackbird","The Beatles"],["Immortels","Alain Bashung"],
        ["Another One Bites the Dust","Queen"],["Angie","The Rolling Stones"],
        ["Alter Ego","Jean-Louis Aubert"],["A Horse with No Name","America"],
        ["Under the Bridge","Red Hot Chili Peppers"],["All Apologies","Nirvana"],
        ["California Dreamin'","The Mamas and the Papas"],["The Wind","Cat Stevens"],
        ["The Sound of Silence","Simon & Garfunkel"],["O Holy Night","Sufjan Stevens"],
        ["Sweet Virginia","The Rolling Stones"],["Father and Son","Cat Stevens"],
        ["Take Me Home Country Roads","John Denver"],["Ring of Fire","Johnny Cash"],
        ["Wish You Were Here","Pink Floyd"],["Simple Man","Lynyrd Skynyrd"]
      ]
    };
    var missing=Object.keys(LISTS).filter(function(n){return !setlists.some(function(sl){return sl.name===n;});});
    if(!missing.length) return;
    var newSongs=[];var songIdMap={};
    var allItems=[].concat(...missing.map(function(n){return LISTS[n];}));
    allItems.forEach(function([title,artist]){
      var key=title.toLowerCase()+"|||"+artist.toLowerCase();
      if(songIdMap[key]) return;
      var dup=findDuplicateSong(songDb,title,artist)||findDuplicateSong(newSongs,title,artist);
      if(dup){songIdMap[key]=dup.id;return;}
      var ns={id:"c_"+Date.now()+"_"+Math.random().toString(36).slice(2,6),title:title,artist:artist,isCustom:true,ig:[],aiCache:null};
      newSongs.push(ns);songIdMap[key]=ns.id;
    });
    if(newSongs.length) setSongDb(function(p){return p.concat(newSongs);});
    var newSetlists=[];
    missing.forEach(function(slName){
      var ids=LISTS[slName].map(function([t,a]){return songIdMap[t.toLowerCase()+"|||"+a.toLowerCase()];}).filter(Boolean);
      newSetlists.push({id:"sl_"+Date.now()+"_"+Math.random().toString(36).slice(2,8),name:slName,songIds:ids,profileIds:[activeProfileId]});
    });
    if(newSetlists.length) setSetlists(function(p){return p.concat(newSetlists);});
    console.log("[migration] Imported "+newSongs.length+" new songs, "+newSetlists.length+" new setlists ("+missing.join(", ")+")");
  },[]);

  // Save secrets (aiKeys, passwords) to separate localStorage key — never synced
  useEffect(()=>{
    const secrets={};
    for(const [id,p] of Object.entries(profiles)){
      secrets[id]={aiKeys:p.aiKeys||{anthropic:"",gemini:""},password:p.password||""};
    }
    saveSecrets(secrets);
  },[profiles]);

  // Merge songDb: union by id (never lose songs)
  const mergeSongDb=(local,remote)=>{
    if(!remote)return local;
    if(!local)return remote;
    var map=new Map(local.map(s=>[s.id,s]));
    remote.forEach(function(s){
      var existing=map.get(s.id);
      if(!existing){map.set(s.id,s);}
      else{
        if(s.aiCache&&(!existing.aiCache||s.aiCache.sv>(existing.aiCache.sv||0))){map.set(s.id,s);}
      }
    });
    // Dedup by title+artist (same song added on different devices with different IDs)
    var byKey=new Map();
    var idRemap={};
    map.forEach(function(s){
      var normStr=function(x){return (x||"").toLowerCase().replace(/&/g," and ").replace(/[^a-z0-9\s]/g,"").replace(/\s+/g," ").trim();};
      var key=normStr(s.title)+"|||"+normStr(s.artist);
      var prev=byKey.get(key);
      if(!prev){byKey.set(key,s);}
      else{
        if(s.aiCache&&(!prev.aiCache||(s.aiCache.sv||0)>(prev.aiCache.sv||0))){
          idRemap[prev.id]=s.id;
          byKey.set(key,s);
        } else {
          idRemap[s.id]=prev.id;
        }
      }
    });
    var result=[...byKey.values()];
    result._idRemap=idRemap;
    return result;
  };
  // Merge setlists: keep all, merge songIds (union), mais exclut les IDs supprimés
  // explicitement (tombstones) pour éviter qu'une setlist supprimée localement ne
  // soit ressuscitée par le poll Firestore.
  const mergeSetlists=(local,remote,deletedIds)=>{
    if(!remote)return local;
    if(!local)return remote;
    const dead=new Set(deletedIds||[]);
    const map=new Map();
    for(const sl of local){if(!dead.has(sl.id)) map.set(sl.id,sl);}
    remote.forEach(sl=>{
      if(dead.has(sl.id)) return;
      const existing=map.get(sl.id);
      if(!existing){map.set(sl.id,sl);}
      else{map.set(sl.id,{...existing,...sl,songIds:[...new Set([...existing.songIds,...sl.songIds])]});}
    });
    return [...map.values()];
  };

  // Persist to localStorage (immediate) + Firestore (debounced 2s)
  const hasMounted = useRef(false);
  const firestoreDebounceRef = useRef(null);
  useEffect(()=>{
    const state={version:2, activeProfileId, shared:{songDb,theme,setlists,customGuitars,toneNetPresets,deletedSetlistIds}, profiles, lastModified:Date.now()};
    autoBackup();
    try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e){}
    if(!hasMounted.current){hasMounted.current=true;return;}
    if(!firestoreLoaded) return;
    // Debounce Firestore saves: wait 2s of inactivity before writing
    if(firestoreDebounceRef.current) clearTimeout(firestoreDebounceRef.current);
    setSyncStatus("syncing");
    firestoreDebounceRef.current = setTimeout(()=>{
      saveToFirestore(state).then(()=>setSyncStatus("synced")).catch(()=>setSyncStatus("error"));
    }, 2000);
    return ()=>{if(firestoreDebounceRef.current)clearTimeout(firestoreDebounceRef.current);};
  },[songDb,theme,setlists,customGuitars,toneNetPresets,deletedSetlistIds,profiles,activeProfileId,firestoreLoaded]);

  // Apply remote data into local state (merge, never lose data)
  const applyRemoteData = (data) => {
    if(!data||!data.shared) return;
    var pollRemap={};
    if(data.shared.songDb) setSongDb(prev=>{
      const m=mergeSongDb(prev,data.shared.songDb);
      pollRemap=m._idRemap||{};
      if(m.length===prev.length&&m.every((s,i)=>s===prev[i]))return prev;
      return m;
    });
    if(data.shared.theme) setTheme(data.shared.theme);
    // Fusion des tombstones (union locale ∪ remote) AVANT le merge des setlists,
    // pour qu'une suppression effectuée sur un autre appareil soit appliquée ici.
    const remoteDel=data.shared.deletedSetlistIds||[];
    const allDel=[...new Set([...(deletedSetlistIds||[]),...remoteDel])];
    if(remoteDel.length){
      setDeletedSetlistIds(prev=>{
        const m=[...new Set([...(prev||[]),...remoteDel])];
        return m.length===(prev||[]).length?prev:m;
      });
    }
    if(data.shared.setlists) setSetlistsRaw(prev=>{
      var m=mergeSetlists(prev,data.shared.setlists,allDel);
      if(Object.keys(pollRemap).length>0){
        m=m.map(function(sl){var ids=sl.songIds.map(function(id){return pollRemap[id]||id;});return{...sl,songIds:[...new Set(ids)]};});
      }
      if(JSON.stringify(m)===JSON.stringify(prev))return prev;
      return m;
    });
    if(data.shared.customGuitars) setCustomGuitars(prev=>{
      if(JSON.stringify(data.shared.customGuitars)===JSON.stringify(prev))return prev;
      return data.shared.customGuitars;
    });
    if(data.shared.toneNetPresets) setToneNetPresets(prev=>{
      if(JSON.stringify(data.shared.toneNetPresets)===JSON.stringify(prev))return prev;
      return data.shared.toneNetPresets;
    });
    if(data.profiles) setProfiles(prev=>{
      const next=applySecrets(data.profiles);
      if(JSON.stringify(next)===JSON.stringify(prev))return prev;
      return next;
    });
    if(data.activeProfileId) setActiveProfileId(data.activeProfileId);
  };

  // Load from Firestore on first mount — merge with local
  const [firestoreProfiles,setFirestoreProfiles]=useState(null);
  useEffect(()=>{
    loadSharedKey().then(()=>console.log("Shared key loaded")).catch(()=>{});
    loadFromFirestore().then(data=>{
      if(data&&data.shared){
        applyRemoteData(data);
        if(data.profiles) setFirestoreProfiles(data.profiles);
        // If local had more data, push merged result back
        var remoteSongs=data.shared.songDb||[];
        var remoteSl=data.shared.setlists||[];
        var remoteDel=data.shared.deletedSetlistIds||[];
        var mergedDel=[...new Set([...(deletedSetlistIds||[]),...remoteDel])];
        var mergedSongs=mergeSongDb(songDb||[],remoteSongs);
        var mergedSl=mergeSetlists(setlists||[],remoteSl,mergedDel);
        // Remap duplicated song IDs in setlists
        var remap=mergedSongs._idRemap||{};
        if(Object.keys(remap).length>0){
          mergedSl=mergedSl.map(function(sl){
            var ids=sl.songIds.map(function(id){return remap[id]||id;});
            return {...sl,songIds:[...new Set(ids)]};
          });
        }
        if(mergedSongs.length>remoteSongs.length||mergedSl.length>remoteSl.length||mergedDel.length>remoteDel.length){
          var ps={version:2,activeProfileId:data.activeProfileId||activeProfileId,shared:{songDb:mergedSongs,theme:data.shared.theme||theme,setlists:mergedSl,customGuitars:data.shared.customGuitars||customGuitars,deletedSetlistIds:mergedDel},profiles:data.profiles||profiles,lastModified:Date.now()};
          saveToFirestore(ps).catch(function(){});
        }
      }
      setFirestoreLoaded(true);
    }).catch(()=>setFirestoreLoaded(true));
  },[]);

  // Poll for remote changes every 5s (replaces onSnapshot — no SDK needed)
  useEffect(()=>{
    if(!firestoreLoaded) return;
    const iv=setInterval(()=>{
      pollRemoteSyncId().then(remoteSid=>{
        if(!remoteSid) return;
        // Skip our own saves
        if(remoteSid===_lastSavedSyncId) return;
        // Skip if nothing changed since last poll
        if(remoteSid===_lastRemoteSyncId) return;
        // New remote change detected — fetch full data
        loadFromFirestore().then(data=>{
          if(!data) return;
          applyRemoteData(data);
          setSyncStatus("synced");
        });
      });
    },5000);
    return ()=>clearInterval(iv);
  },[firestoreLoaded]);

  const recordLogin = id => {
    setProfiles(p=>{if(!p[id])return p;const h=(p[id].loginHistory||[]).slice();h.unshift(Date.now());if(h.length>5)h.length=5;return{...p,[id]:{...p[id],loginHistory:h}};});
  };

  // Once Firestore loaded, decide initial screen
  const loginRecorded=useRef(false);
  useEffect(()=>{
    if(!firestoreLoaded||screen!=="loading") return;
    const allProfiles=firestoreProfiles||profiles;
    const profileCount=Object.keys(allProfiles).length;
    // Check if a session was active before reload
    const sessionProfile=sessionStorage.getItem("tonex_active_profile");
    if(sessionProfile&&allProfiles[sessionProfile]){
      setActiveProfileId(sessionProfile);recordLogin(sessionProfile);loginRecorded.current=true;setScreen("list");
    } else {
      // Check trusted devices — auto-login to remembered profile
      var trustedIds=Object.keys(allProfiles).filter(function(id){return isTrusted(id);});
      if(trustedIds.length===1&&allProfiles[trustedIds[0]]){
        var tid=trustedIds[0];
        setActiveProfileId(tid);sessionStorage.setItem("tonex_active_profile",tid);recordLogin(tid);loginRecorded.current=true;setScreen("list");
      } else if(profileCount>1){setScreen("pick");}
    else{recordLogin(activeProfileId);loginRecorded.current=true;setScreen("list");}
    }
  },[firestoreLoaded,firestoreProfiles]);

  // Reset on profile switch
  useEffect(()=>{if(screen!=="loading"){setChecked([]);setScreen("list");}},[activeProfileId]);

  // Apply theme to document
  useEffect(()=>{
    document.documentElement.setAttribute("data-theme",theme);
    const meta=document.querySelector('meta[name="theme-color"]');
    if(meta) meta.content=theme==="dark"?"var(--bg)":"var(--cream-50)";
  },[theme]);
  const switchProfile = id => { if(profiles[id]){recordLogin(id);setActiveProfileId(id);sessionStorage.setItem("tonex_active_profile",id);} };
  const isAdmin = profile.isAdmin === true;
  const pickProfile = id => { recordLogin(id);setActiveProfileId(id);sessionStorage.setItem("tonex_active_profile",id); setScreen("list"); };
  const createAndPick = name => {
    const id=name.toLowerCase().replace(/[^a-z0-9]/g,"_")+`_${Date.now()}`;
    const np=makeDefaultProfile(id,name);
    setProfiles(p=>({...p,[id]:np}));
    setActiveProfileId(id);
    setScreen("list");
  };

  const songs=useMemo(()=>checked.map(id=>{
    const d=songDb.find(x=>x.id===id);
    return d?{...d}:{id,title:id,artist:"",isCustom:true,ig:[]};
  }),[checked,songDb]);

  const fullState={songDb,setlists,banksAnn,banksPlug};
  const onImportState=data=>{
    if(data.songDb)    setSongDb(data.songDb);
    if(data.setlists)  setSetlists(data.setlists);
    if(data.banksAnn)  setBanksAnn(data.banksAnn);
    if(data.banksPlug) setBanksPlug(data.banksPlug);
    setChecked([]);
    setScreen("list");
  };

  const [profileInitTab,setProfileInitTab]=useState(null);
  var headerProps={profiles:profiles,activeProfileId:activeProfileId,onProfile:function(){setProfileInitTab(null);setScreen("profile");},screen:screen,onNavigate:setScreen,isAdmin:isAdmin,syncStatus:syncStatus};
  var mainScreens=["list","setlists","explore","jam","optimizer","recap","synthesis","profile","settings","viewprofile","exportimport"];
  var showNav=mainScreens.includes(screen);

  if(screen==="loading") return <div className="page-root"><div style={{textAlign:"center",padding:"60px 20px"}}><div style={{fontSize:48,marginBottom:16}}>🎸</div><div style={{fontFamily:"var(--font-display)",fontSize:"var(--fs-lg)",fontWeight:800,color:"var(--text-primary)"}}>ToneX Poweruser</div><div style={{fontSize:13,color:"var(--text-muted)",marginTop:8}}>Chargement...</div></div></div>;
  if(screen==="pick") return <div className="page-root"><ProfilePickerScreen profiles={profiles} onPick={pickProfile}/></div>;

  var screenContent=null;
  if(screen==="viewprofile"&&viewProfileId&&profiles[viewProfileId]) screenContent=<ViewProfileScreen profile={profiles[viewProfileId]} onBack={()=>setScreen("list")} onNavigate={setScreen}/>;
  else if(screen==="exportimport") screenContent=<ExportImportScreen banksAnn={banksAnn} onBanksAnn={setBanksAnn} banksPlug={banksPlug} onBanksPlug={setBanksPlug} onBack={()=>setScreen("settings")} onNavigate={setScreen} fullState={fullState} onImportState={onImportState}/>;
  else if(screen==="profile") screenContent=<MonProfilScreen songDb={songDb} onSongDb={setSongDb} setlists={mySetlists} allSetlists={setlists} onSetlists={setSetlists} banksAnn={banksAnn} onBanksAnn={setBanksAnn} banksPlug={banksPlug} onBanksPlug={setBanksPlug} onBack={()=>setScreen("list")} onNavigate={setScreen} aiProvider={aiProvider} onAiProvider={setAiProvider} aiKeys={aiKeys} onAiKeys={setAiKeys} theme={theme} onTheme={setTheme} profile={profile} profiles={profiles} onProfiles={setProfiles} activeProfileId={activeProfileId} allGuitars={allGuitars} initTab={profileInitTab} customGuitars={customGuitars} onCustomGuitars={setCustomGuitars} toneNetPresets={toneNetPresets} onToneNetPresets={setToneNetPresets} fullState={fullState} onImportState={onImportState} onLogout={()=>{sessionStorage.removeItem("tonex_active_profile");setScreen("pick");}}/>;
  else if(screen==="settings") screenContent=<ParametresScreen onBack={()=>setScreen("list")} onNavigate={setScreen} aiProvider={aiProvider} onAiProvider={setAiProvider} aiKeys={aiKeys} onAiKeys={setAiKeys} profile={profile} profiles={profiles} onProfiles={setProfiles} activeProfileId={activeProfileId} fullState={fullState} onImportState={onImportState} banksAnn={banksAnn} onBanksAnn={setBanksAnn} banksPlug={banksPlug} onBanksPlug={setBanksPlug} songDb={songDb} onSongDb={setSongDb} setlists={setlists} onSetlists={setSetlists}/>;
  else if(screen==="setlists") screenContent=<SetlistsScreen songDb={songDb} onSongDb={setSongDb} setlists={mySetlists} allSetlists={setlists} onSetlists={setSetlists} checked={checked} onChecked={setChecked} onNext={()=>setScreen("recap")} onSettings={()=>setScreen("profile")} onNavigate={setScreen} banksAnn={banksAnn} onBanksAnn={setBanksAnn} banksPlug={banksPlug} onBanksPlug={setBanksPlug} aiProvider={aiProvider} aiKeys={aiKeys} allGuitars={allGuitars} availableSources={availableSources} activeProfileId={activeProfileId}/>;
  else if(screen==="jam") screenContent=<div><Breadcrumb crumbs={[{label:"Accueil",screen:"list"},{label:"Jammer"}]} onNavigate={setScreen}/><div style={{fontFamily:"var(--font-display)",fontSize:"var(--fs-lg)",fontWeight:800,color:"var(--text-primary)",marginBottom:16}}>🎲 Jammer</div><JamScreen banksAnn={banksAnn} banksPlug={banksPlug} allGuitars={allGuitars} availableSources={availableSources}/></div>;
  else if(screen==="explore") screenContent=<div><Breadcrumb crumbs={[{label:"Accueil",screen:"list"},{label:"Explorer"}]} onNavigate={setScreen}/><div style={{fontFamily:"var(--font-display)",fontSize:"var(--fs-lg)",fontWeight:800,color:"var(--text-primary)",marginBottom:16}}>🎛️ Explorer les presets</div><PresetBrowser banksAnn={banksAnn} banksPlug={banksPlug} availableSources={availableSources} customPacks={profile.customPacks} guitars={allGuitars} toneNetPresets={toneNetPresets}/></div>;
  else if(screen==="optimizer") screenContent=<BankOptimizerScreen songDb={songDb} setlists={mySetlists} banksAnn={banksAnn} onBanksAnn={setBanksAnn} banksPlug={banksPlug} onBanksPlug={setBanksPlug} allGuitars={allGuitars} availableSources={availableSources} onNavigate={setScreen}/>;
  else if(screen==="synthesis"&&synth) screenContent=<SynthesisScreen songs={songs} gps={synth.gps} aiR={synth.aiR} onBack={()=>setScreen("recap")} onNavigate={setScreen} songDb={songDb} banksAnn={banksAnn} banksPlug={banksPlug} allGuitars={allGuitars} availableSources={availableSources}/>;
  else if(screen==="recap") screenContent=<RecapScreen songs={songs} onBack={()=>setScreen("list")} onNavigate={setScreen} onValidate={(gps,aiR)=>{setSynth({gps,aiR});setScreen("synthesis");}} songDb={songDb} onSongDb={setSongDb} banksAnn={banksAnn} banksPlug={banksPlug} aiProvider={aiProvider} aiKeys={aiKeys} allGuitars={allGuitars} availableSources={availableSources}/>;
  else screenContent=<HomeScreen songDb={songDb} onSongDb={setSongDb} setlists={mySetlists} allSetlists={setlists} onSetlists={setSetlists} checked={checked} onChecked={setChecked} onNext={()=>setScreen("recap")} onSettings={()=>setScreen("settings")} onProfile={(tab)=>{setProfileInitTab(tab||null);setScreen("profile");}} onSetlistScreen={()=>setScreen("setlists")} onJam={()=>setScreen("jam")} onExplore={()=>setScreen("explore")} onOptimizer={()=>setScreen("optimizer")} banksAnn={banksAnn} banksPlug={banksPlug} aiProvider={aiProvider} aiKeys={aiKeys} allGuitars={allGuitars} availableSources={availableSources} profiles={profiles} activeProfileId={activeProfileId} onSwitchProfile={switchProfile} onProfiles={setProfiles} customPacks={profile.customPacks} syncStatus={syncStatus} onViewProfile={(id)=>{setViewProfileId(id);setScreen("viewprofile");}} onLogout={()=>{sessionStorage.removeItem("tonex_active_profile");setScreen("pick");}}/>;

  return <div className="page-root">
    <AppHeader {...headerProps}/>
    {screenContent}
    {showNav&&<AppNavBottom screen={screen} onNavigate={setScreen}/>}
  </div>;
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
<!-- Firebase SDK removed — using Firestore REST API directly -->
</body>
