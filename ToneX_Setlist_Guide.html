// ─── Synthesis Screen ─────────────────────────────────────────────────────────
function SynthesisScreen({songs,gps,aiR,onBack,onNavigate,songDb,banksAnn,banksPlug,allGuitars,availableSources}) {
  const rows=songs.map(s=>{
    const g=(allGuitars||GUITARS).find(x=>x.id===gps[s.id]);
    const type=g?.type||"HB";
    const gId=g?.id||"";
    let ann=null,plug=null;
    const aiCraw=getBestResult(s,gId,aiR[s.id]||s.aiCache?.result)||null;
    const ai=aiCraw?enrichAIResult({...aiCraw},type,gId,banksAnn,banksPlug):null;
    if(ai){
      if(ai.preset_ann)ann={name:ai.preset_ann.label,rec:getInstallRec(ai.preset_ann.label,type,banksAnn,gId)};
      if(ai.preset_plug)plug={name:ai.preset_plug.label,rec:getInstallRec(ai.preset_plug.label,type,banksPlug,gId)};
    }
    return {s,g,type,ann,plug};
  });
  const th={fontSize:11,color:"var(--text-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,padding:"8px 10px",borderBottom:"1px solid var(--a10)",textAlign:"left"};
  const td={fontSize:12,padding:"10px",borderBottom:"1px solid var(--a5)",verticalAlign:"top"};
  const cellPreset=(item,accentColor)=>{
    if(!item) return <span style={{color:"var(--text-muted)"}}>—</span>;
    const {name,rec}=item;
    const sc=rec?.score;
    const scC=sc!=null?scoreColor(sc):"#888";
    const scB=sc!=null?scoreBg(sc):"transparent";
    return (
      <div>
        {rec?.installed
          ?<span style={{fontWeight:700,color:accentColor,fontSize:13,marginRight:4}}>Banque {rec.bank}{rec.slot}</span>
          :<span style={{fontSize:10,background:"var(--yellow-bg)",color:"var(--yellow)",borderRadius:4,padding:"1px 6px",fontWeight:700,marginRight:4}}>⬇ À installer</span>
        }
        {sc!=null&&<span style={{fontSize:10,fontWeight:800,color:scC,background:scB,borderRadius:4,padding:"1px 6px"}}>{sc}%</span>}
        <div style={{fontSize:11,color:"var(--text-sec)",lineHeight:1.5,marginTop:2}}>{name}</div>
        {!rec?.installed&&rec?.replaceBank!=null&&<div style={{fontSize:10,color:"var(--text-dim)",marginTop:1}}>→ Remplace Banque {rec.replaceBank}{rec.replaceSlot}</div>}
      </div>
    );
  };
  return (
    <div>
      <Breadcrumb crumbs={[{label:"Accueil",screen:"list"},{label:"Récap",screen:"recap"},{label:"Synthèse"}]} onNavigate={onNavigate}/>
      <div style={{marginBottom:20}}><div style={{fontSize:22,fontWeight:800,color:"var(--text)"}}>Tableau de synthèse</div><div style={{fontSize:12,color:"var(--text-muted)",marginTop:3}}>{songs.length} morceau{songs.length>1?"x":""}</div></div>
      <div style={{overflowX:"auto",borderRadius:12,border:"1px solid var(--a8)"}}>
        <table>
          <thead><tr style={{background:"var(--a4)"}}><th style={th}>Morceau</th><th style={th}>Guitare</th><th style={{...th,color:"var(--text-sec)"}}>📦 Pedale</th><th style={{...th,color:"var(--accent)"}}>🔌 Plug</th></tr></thead>
          <tbody>
            {rows.map(({s,g,ann,plug},i)=>(
              <tr key={s.id} style={{background:i%2===0?"transparent":"var(--a3)"}}>
                <td style={td}><div style={{fontWeight:600,color:"var(--text)",fontSize:13}}>{s.title}</div><div style={{fontSize:11,color:"var(--text-muted)"}}>{s.artist}</div></td>
                <td style={td}>{g?<span style={{fontSize:12,color:"var(--green)",background:"var(--green-bg)",borderRadius:5,padding:"2px 8px",fontWeight:600,whiteSpace:"nowrap"}}>{g.short}</span>:<span style={{color:"var(--text-muted)"}}>—</span>}</td>
                <td style={td}>{cellPreset(ann,"var(--text-sec)")}</td>
                <td style={td}>{cellPreset(plug,"var(--accent)")}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── NewSongExplorer ─────────────────────────────────────────────────────────
function NewSongExplorer({songDb,onSongDb,setlists,onSetlists,banksAnn,banksPlug,aiProvider,aiKeys,allGuitars}) {
  const [title,setTitle]=useState("");
  const [artist,setArtist]=useState("");
  const [gId,setGId]=useState("");
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);
  const [err,setErr]=useState(null);
  const [addToDb,setAddToDb]=useState(true);
  const [addToSlIds,setAddToSlIds]=useState([]);
  const [saved,setSaved]=useState(false);
  const inp={background:"var(--bg-card)",color:"var(--text)",border:"1px solid var(--a15)",borderRadius:8,padding:"9px 12px",fontSize:13,width:"100%",boxSizing:"border-box"};

  const analyze=()=>{
    if(!title.trim())return;
    setLoading(true);setErr(null);setResult(null);setSaved(false);
    const fakeSong={id:`tmp_${Date.now()}`,title:title.trim(),artist:artist.trim()||"Artiste inconnu"};
    fetchAI(fakeSong,gId,banksAnn,banksPlug,aiProvider,aiKeys,allGuitars)
      .then(r=>setResult(r))
      .catch(e=>setErr(e.message||"Erreur IA"))
      .finally(()=>setLoading(false));
  };

  const doSave=()=>{
    if(saved)return;
    const ns={id:`c_${Date.now()}`,title:title.trim(),artist:artist.trim()||"Artiste inconnu",isCustom:true,ig:gId?[gId]:[],aiCache:result?{gId,result}:null};
    onSongDb(p=>[...p,ns]);
    if(addToSlIds.length>0)onSetlists(p=>p.map(sl=>addToSlIds.includes(sl.id)?{...sl,songIds:[...sl.songIds,ns.id]}:sl));
    setSaved(true);
  };

  const gType=gId?(allGuitars||GUITARS).find(x=>x.id===gId)?.type||"HB":null;
  return (
    <div>
      <div style={{fontSize:13,color:"var(--text-muted)",marginBottom:16}}>Explore un nouveau morceau avec l'IA et ajoute-le éventuellement à ta base.</div>

        <input placeholder="Titre du morceau *" value={title} onChange={e=>setTitle(e.target.value)} style={inp} onKeyDown={e=>e.key==="Enter"&&analyze()}/>
        <input placeholder="Artiste" value={artist} onChange={e=>setArtist(e.target.value)} style={inp}/>
      </div>
      <button onClick={analyze} disabled={!title.trim()||loading}
        style={{width:"100%",background:!title.trim()||loading?"#374151":"var(--accent)",border:"none",color:"var(--text)",borderRadius:10,padding:"12px",fontSize:14,fontWeight:700,cursor:!title.trim()||loading?"not-allowed":"pointer",marginBottom:16}}>
        {loading?"✨ Analyse en cours…":"✨ Analyser avec l'IA"}
      </button>
      {err&&<div style={{fontSize:12,color:"var(--red)",background:"rgba(239,68,68,0.1)",borderRadius:8,padding:"10px 12px",marginBottom:12}}>{err}</div>}
      {result&&<div>
        <div style={{background:"var(--accent-bg)",border:"1px solid var(--accent-border)",borderRadius:14,padding:16,marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:700,color:"var(--accent)",marginBottom:12}}>{title}{artist?" — "+artist:""}</div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <Row icon="🎯"><div><div style={{fontSize:12,color:"var(--text-bright)",fontWeight:700,marginBottom:2}}>Guitare idéale : {result.ideal_guitar}</div><div style={{fontSize:11,color:"var(--text-sec)"}}>{result.guitar_reason}</div></div></Row>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              <PBlock device="Pédale" emoji="📦" presetName={result.preset_ann?.label} gType={gType} banks={banksAnn}/>
              <PBlock device="ToneX Plug" emoji="🔌" presetName={result.preset_plug?.label} gType={gType} banks={banksPlug} bg2="var(--a4)"/>
            </div>
            <Row icon="🎛️"><div style={{display:"flex",flexDirection:"column",gap:4}}>
              {result.settings_preset&&<div style={{fontSize:11,background:"var(--a4)",border:"1px solid var(--a10)",borderRadius:7,padding:"6px 10px",color:"var(--text-sec)"}}><b style={{color:"var(--text-muted)"}}>Preset · </b>{result.settings_preset}</div>}
              {result.settings_guitar&&<div style={{fontSize:11,background:"var(--a4)",border:"1px solid var(--a10)",borderRadius:7,padding:"6px 10px",color:"var(--text-sec)"}}><b style={{color:"var(--text-muted)"}}>Guitare · </b>{result.settings_guitar}</div>}
            </div></Row>
            {result.ref_guitarist&&<Row icon="📖"><div style={{background:"var(--a3)",border:"1px solid var(--a7)",borderRadius:9,padding:"9px 12px",flex:1}}>
              <div style={{fontSize:10,color:"var(--text-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Référence originale — {result.ref_guitarist}</div>
              <div style={{display:"flex",flexDirection:"column",gap:3}}>

                {result.ref_effects&&<div style={{display:"flex",gap:5,alignItems:"baseline",flexWrap:"wrap"}}><span style={{fontSize:10,color:"var(--text-muted)",flexShrink:0}}>🎚 Effets</span><span style={{fontSize:11,color:"var(--text-sec)"}}>{result.ref_effects}</span></div>}

        </div>

              <div style={{width:18,height:18,borderRadius:5,border:addToDb?"2px solid #4ade80":"2px solid var(--text-muted)",background:addToDb?"var(--green)":"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>{addToDb&&<span style={{color:"#0f172a",fontSize:10,fontWeight:900}}>✓</span>}</div>
              <div style={{fontSize:13,color:"var(--text)",fontWeight:600}}>Ajouter à ma base de morceaux</div>
            </div>
            {addToDb&&setlists.length>0&&<div style={{marginBottom:10}}>
              <div style={{fontSize:11,color:"var(--text-muted)",marginBottom:6}}>Ajouter aussi à :</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {setlists.map(sl=>{const sel=addToSlIds.includes(sl.id);return(
                  <button key={sl.id} onClick={()=>setAddToSlIds(p=>p.includes(sl.id)?p.filter(x=>x!==sl.id):[...p,sl.id])} style={{background:sel?"var(--accent-bg)":"var(--a5)",border:sel?"1px solid rgba(99,102,241,0.6)":"1px solid var(--a10)",color:sel?"var(--accent)":"var(--text-sec)",borderRadius:7,padding:"4px 12px",fontSize:11,fontWeight:600,cursor:"pointer"}}>{sl.name}</button>
                );})}
              </div>
            </div>}
            {addToDb&&<button onClick={doSave} style={{width:"100%",background:"var(--green)",border:"none",color:"var(--text)",borderRadius:10,padding:"11px",fontSize:13,fontWeight:700,cursor:"pointer"}}>✅ Sauvegarder dans la base</button>}
          </div>
        ):(
          <div style={{background:"var(--green-bg)",border:"1px solid rgba(74,222,128,0.4)",borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"center",gap:8}}>
            <span style={{color:"var(--green)",fontSize:16}}>✓</span>
            <div style={{fontSize:13,color:"var(--green)",fontWeight:600}}>"{title}" ajouté à ta base !</div>
          </div>
        )}
      </div>}
    </div>
  );
}

// ─── PresetBrowser ────────────────────────────────────────────────────────────
const PRESET_PAGE_SIZE=30;
function findAmpContext(ampName,ctxMap){
  if(!ampName)return null;
  const ctx=ctxMap||PRESET_CONTEXT;
  if(ctx[ampName])return ctx[ampName];
  // Alias table pour les noms volontairement déformés (trademark avoidance)
  const ALIASES={
    "Cornfield Harle":"Cornford Harlequin",
    "Reinguard T-36":"Reinhardt RT-36",
    "Diesel Humbert":"Diezel Herbert",
    "Electro Dime":"Electro-Harmonix",
    "Chandler GAV19T":"Benson Chimera",
    "Chandler 19T":"Benson Chimera",
    "Bumble Deluxe":"Dumble Deluxe",
    "Rouge Plate D50":"Dr. Z",
    "Sons Amplification":"Sons Amp",
    "Mega Barba":"Mesa Boogie",
    "Ample Betty":"Supro",
    "Amplified Nation Overdrive Reverb":"Dumble ODS",
    "Amplified Nation Wonderland Overdrive":"Dumble ODS",
    "Bogner Goldfinger":"Bogner G-Finger",
    "Dumble Overdrive Deluxe":"Dumble Deluxe",
    "Mega Amp":"Mesa Boogie",
    "Synergy SYN-30":"Fender Champ",
    "Suhr PT-100 / 2864-S":"Marshall Plexi",
    "Divers British":"Marshall Plexi",
    "Divers basse":"Ampeg SVT",
    "Divided by 13":"Divided by 13",
    "Pédales de drive":"Drive Pedals",
  };
  if(ALIASES[ampName]&&ctx[ALIASES[ampName]])return ctx[ALIASES[ampName]];
  // Combo "ampli + pédale" → chercher l'ampli de base (avant le " + ")
  if(ampName.includes(" + ")){
    const baseAmp=ampName.split(" + ")[0].trim();
    const baseCtx=findAmpContext(baseAmp,ctx);
    if(baseCtx)return baseCtx;
  }
  // Fuzzy: essayer variations de marque
  const norm=ampName.replace(/\s+/g," ").trim();
  const variations=[
    norm.replace("Mesa Boogie ","Mesa "),
    norm.replace("Mesa ","Mesa Boogie "),
    norm.replace("Marshall ","Mars "),
    norm.replace("Mars ","Marshall "),
    norm.replace("Fender ","FNDR "),
    norm.replace("FNDR ","Fender "),
  ];
  for(const v of variations){if(ctx[v])return ctx[v];}
  // Substring match: chercher une clé qui contient le nom ou vice-versa
  const lower=norm.toLowerCase();
  for(const [k,v] of Object.entries(ctx)){
    if(k.toLowerCase().includes(lower)||lower.includes(k.toLowerCase())) return v;
  }
  return null;
}

function PresetDetailInline({name,info,banksAnn,banksPlug,presetContext,guitars}){
  const ctx=findAmpContext(info.amp,presetContext||PRESET_CONTEXT);
  const annLoc=findInBanks(name,banksAnn);
  const plugLoc=findInBanks(name,banksPlug);
  const allGuitars=guitars||GUITARS;
  const sectionStyle={background:"var(--a3)",border:"1px solid var(--a7)",borderRadius:10,padding:"10px 12px",marginBottom:8};
  const sectionTitle=(icon,label)=><div style={{fontSize:10,fontWeight:700,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:0.5,marginBottom:8,display:"flex",alignItems:"center",gap:5}}>{icon} {label}</div>;
  const STYLE_LABELS={blues:"Blues",rock:"Rock",hard_rock:"Hard Rock",jazz:"Jazz",metal:"Metal",pop:"Pop"};
  const GAIN_LABELS={low:"Low gain — Clean / Edge of breakup",mid:"Mid gain — Crunch / Drive",high:"High gain — Lead / Saturé"};
  const GAIN_SHORT={low:"Clean",mid:"Crunch / Drive",high:"Lead / High gain"};
  // Styles compatibles selon le gain
  const GAIN_STYLES={
    low:{primary:["blues","jazz","pop","rock"],desc:"Son clean : ideal pour blues, jazz, pop, rock rythmique"},
    mid:{primary:["rock","blues","hard_rock"],desc:"Son crunch/drive : ideal pour rock, blues-rock, hard rock"},
    high:{primary:["hard_rock","metal","rock"],desc:"Son sature : ideal pour hard rock, metal, rock lead"}
  };
  const gainStyles=GAIN_STYLES[info.gain]||GAIN_STYLES.mid;
  // Artistes connus par registre (heuristique par genre)
  const CLEAN_ARTISTS=["b.b. king","john mayer","mark knopfler","eric johnson","nile rodgers","chet atkins","jerry garcia","joe pass","wes montgomery","pat metheny","george benson","robert cray","larry carlton"];
  const DRIVE_ARTISTS=["eric clapton","jimi hendrix","stevie ray vaughan","gary moore","peter green","keith richards","angus young","joe bonamassa","jimmy page","brian may","pete townshend","neil young","billy gibbons"];
  const HEAVY_ARTISTS=["metallica","james hetfield","kirk hammett","john petrucci","eddie van halen","dimebag darrell","tony iommi","zakk wylde","dave mustaine","tom morello","tool","system of a down","slayer","pantera"];
  const sortRefs=(refs)=>{
    if(!refs||refs.length<=1)return refs;
    const priority=info.gain==="low"?CLEAN_ARTISTS:info.gain==="high"?HEAVY_ARTISTS:DRIVE_ARTISTS;
    return [...refs].sort((a,b)=>{
      const aP=priority.some(p=>a.a.toLowerCase().includes(p))?0:1;
      const bP=priority.some(p=>b.a.toLowerCase().includes(p))?0:1;
      return aP-bP;
    });
  };
  // Parse preset character from name
  const nameLower=name.toLowerCase();
  const presetChar=
    (/\bclean\b|\bclr\b|\bcln\b/i.test(nameLower))?"Clean — Son clair, dynamique, expressif":
    (/\bedge\b|\beob\b|\bbreakup\b/i.test(nameLower))?"Edge of breakup — A la limite de la saturation, très dynamique":
    (/\bcrunch\b|\bgrit\b/i.test(nameLower))?"Crunch — Saturation légère, réactif au toucher":
    (/\bdrive\b|\bod\b|\boverdrive\b/i.test(nameLower))?"Drive — Saturation moyenne, sustain musical":
    (/\blead\b|\bsolo\b/i.test(nameLower))?"Lead — Saturation prononcée, sustain long pour solos":
    (/\bhigh.?gain\b|\bfull.?beans\b|\bdimed\b|\bmax\b/i.test(nameLower))?"High gain — Saturation maximale, mur de son":
    (/\bboost\b|\bklon\b|\bts\b|\btube.?screamer\b|\brodent\b|\bmuff\b|\bfuzz\b/i.test(nameLower))?"Boost / Pedale — Son avec pedale de drive en amont":
    null;
  const sortedRefs=sortRefs(ctx?.refs);
  // Compute per-guitar scores
  const guitarScores=allGuitars.map(g=>{
    const sc=computePickupScore(info.style,getGainRange(gainToNumeric(info.gain)),g.type);
    const gs=computeGuitarScoreV2(g.id,info.style,getGainRange(gainToNumeric(info.gain)),info.voicing);
    const combined=Math.round(sc*0.6+gs*0.4);
    return {id:g.id,name:g.short||g.name,type:g.type,score:combined};
  }).sort((a,b)=>b.score-a.score);
  return(
    <div style={{background:"var(--a2)",border:"1px solid var(--a7)",borderRadius:"0 0 9px 9px",padding:12,marginTop:-1,animation:"slideDown .2s ease-out",display:"flex",flexDirection:"column",gap:6}}>

      {/* SECTION 1 : Infos ampli / preset */}
      <div style={sectionStyle}>
        {sectionTitle("🔊","Infos ampli / preset")}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:700,color:"var(--text-bright)",marginBottom:2}}>{ctx?.emoji&&<span style={{marginRight:4}}>{ctx.emoji}</span>}{info.amp}</div>
            <div style={{fontSize:10,color:"var(--text-muted)",marginBottom:4}}>{name}</div>
          </div>
        </div>
        {presetChar&&<div style={{fontSize:11,color:"var(--text-sec)",background:"var(--a4)",border:"1px solid var(--a8)",borderRadius:7,padding:"6px 10px",marginBottom:6,fontWeight:500}}>{presetChar}</div>}
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:6}}>
          {info.src&&<span style={{fontSize:9,color:"var(--text-muted)",background:"var(--a6)",borderRadius:4,padding:"2px 6px",fontWeight:600}}>{SOURCE_LABELS[info.src]||info.src}</span>}
          {info.pack&&<span style={{fontSize:9,color:"var(--text-muted)",background:"var(--a6)",borderRadius:4,padding:"2px 6px"}}>{info.pack}</span>}
          {info.pack&&TSR_PACK_ZIPS[info.pack]&&<span style={{fontSize:9,color:"var(--text-dim)"}}>📁 {TSR_PACK_ZIPS[info.pack]}.zip</span>}
        </div>
        {ctx?.desc&&<div style={{fontSize:11,color:"var(--text-sec)",lineHeight:1.5}}>{ctx.desc}</div>}
        {!ctx?.desc&&<div style={{fontSize:11,color:"var(--text-dim)",fontStyle:"italic"}}>Pas de description disponible pour cet ampli.</div>}
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:6}}>
          {annLoc
            ?<span style={{fontSize:10,color:"var(--green)",background:"var(--green-bg)",border:"1px solid var(--green-border)",borderRadius:6,padding:"3px 8px",fontWeight:600}}>📦 Banque {annLoc.bank}{annLoc.slot}</span>
            :<span style={{fontSize:10,color:"var(--text-dim)",background:"var(--a4)",border:"1px solid var(--a8)",borderRadius:6,padding:"3px 8px"}}>📦 Non installe</span>}
          {plugLoc
            ?<span style={{fontSize:10,color:"var(--green)",background:"var(--green-bg)",border:"1px solid var(--green-border)",borderRadius:6,padding:"3px 8px",fontWeight:600}}>🔌 Banque {plugLoc.bank}{plugLoc.slot}</span>
            :<span style={{fontSize:10,color:"var(--text-dim)",background:"var(--a4)",border:"1px solid var(--a8)",borderRadius:6,padding:"3px 8px"}}>🔌 Non installe</span>}
        </div>
      </div>

      {/* SECTION 2 : Style & gain */}
      <div style={sectionStyle}>
        {sectionTitle("🎛","Style & gain")}
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          <div style={{fontSize:11,color:"var(--text-sec)"}}><span style={{color:"var(--text-muted)",fontSize:10}}>Gain</span> <span style={{fontWeight:600}}>{GAIN_LABELS[info.gain]||info.gain}</span></div>
          <div style={{fontSize:11,color:"var(--text-sec)"}}><span style={{color:"var(--text-muted)",fontSize:10}}>Style catalogue</span> <span style={{fontWeight:600}}>{STYLE_LABELS[info.style]||info.style}</span></div>
          <div style={{fontSize:10,color:"var(--text-dim)",marginTop:2}}>{gainStyles.desc}</div>
        </div>
      </div>

      {/* SECTION 3 : Morceaux mythiques */}
      {sortedRefs&&sortedRefs.length>0&&<div style={sectionStyle}>
        {sectionTitle("🎵","Morceaux mythiques — registre "+GAIN_SHORT[info.gain])}
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          {sortedRefs.map(r=><div key={r.a} style={{fontSize:11,color:"var(--text-sec)"}}>
            <span style={{fontWeight:600,color:"var(--text-bright)"}}>{r.a}</span>
            {r.t.length>0&&<span style={{color:"var(--text-dim)"}}> — {r.t.join(", ")}</span>}
          </div>)}
        </div>
      </div>}

      {/* SECTION 4 : Guitares adaptées */}
      <div style={sectionStyle}>
        {sectionTitle("🎸","Guitares adaptees")}
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          {guitarScores.map(g=><div key={g.id} style={{display:"flex",alignItems:"center",gap:8,fontSize:11}}>
            <span style={{fontWeight:600,color:"var(--text-bright)",flex:1}}>{g.name} <span style={{fontSize:9,color:"var(--text-dim)"}}>({g.type})</span></span>
            <div style={{width:60,height:4,background:"var(--a8)",borderRadius:2,overflow:"hidden",flexShrink:0}}><div style={{width:`${g.score}%`,height:"100%",background:scoreColor(g.score),borderRadius:2}}/></div>
            <span style={{fontSize:10,fontWeight:700,color:scoreColor(g.score),width:32,textAlign:"right",flexShrink:0}}>{g.score}%</span>
          </div>)}
        </div>
      </div>

    </div>
  );
}

function PresetList({filtered,selected,setSelected,banksAnn,banksPlug,fullCatalog,filterSrcs,filterPacks,togglePack,setFilterPacks,mergedContext,guitars}){
  const [shown,setShown]=useState(PRESET_PAGE_SIZE);
  useEffect(()=>setShown(PRESET_PAGE_SIZE),[filtered,filterPacks]);

  // Sub-grouping: par pack (TSR) ou par ampli (autres sources)
  const subPacks=useMemo(()=>{
    const groups={};
    filtered.forEach(([name,info])=>{
      const key=info.pack||info.amp||"Autre";
      groups[key]=(groups[key]||0)+1;
    });
    return Object.entries(groups).sort((a,b)=>a[0].localeCompare(b[0]));
  },[filtered]);
  const isTSROnly=filterSrcs.length===1&&filterSrcs[0]==="TSR";

  const displayFiltered=useMemo(()=>{
    if(filterPacks.length===0) return filtered;
    return filtered.filter(([,info])=>filterPacks.includes(info.pack||info.amp||"Autre"));
  },[filtered,filterPacks]);

  const visible=displayFiltered.slice(0,shown);
  const remaining=displayFiltered.length-shown;
  return(
    <div>
      {/* Sub-filters: par pack (TSR groupé par marque) ou par ampli (autres sources) */}
      {subPacks&&subPacks.length>1&&(()=>{
        const chipStyle=(on)=>({fontSize:10,fontWeight:on?700:500,color:on?"var(--accent)":"var(--text-sec)",background:on?"var(--accent-bg)":"var(--a3)",border:on?"1px solid var(--accent-border)":"1px solid var(--a6)",borderRadius:6,padding:"4px 8px",cursor:"pointer"});
        // TSR: groupement par marque d'ampli
        if(isTSROnly){
          const packCountMap=Object.fromEntries(subPacks);
          const grouped=[];
          const assigned=new Set();
          Object.entries(TSR_PACK_GROUPS||{}).forEach(([group,packs])=>{
            const members=packs.filter(p=>packCountMap[p]!=null);
            if(members.length>0){
              const total=members.reduce((s,p)=>s+(packCountMap[p]||0),0);
              grouped.push({group,packs:members,total});
              members.forEach(p=>assigned.add(p));
            }
          });
          const others=subPacks.filter(([p])=>!assigned.has(p));
          if(others.length>0) grouped.push({group:"Autres",packs:others.map(([p])=>p),total:others.reduce((s,[,c])=>s+c,0)});
          return <div style={{marginBottom:12}}>
            <div style={{fontSize:10,color:"var(--text-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Filtrer par famille</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:6}}>
              <button onClick={()=>setFilterPacks([])} style={chipStyle(filterPacks.length===0)}>Tous ({filtered.length})</button>
              {grouped.map(g=>{
                const groupPacks=g.packs;
                const allSelected=groupPacks.every(p=>filterPacks.includes(p));
                const someSelected=groupPacks.some(p=>filterPacks.includes(p));
                return <button key={g.group} onClick={()=>{
                  if(allSelected) setFilterPacks(prev=>prev.filter(p=>!groupPacks.includes(p)));
                  else setFilterPacks(prev=>[...prev.filter(p=>!groupPacks.includes(p)),...groupPacks]);
                }} style={{...chipStyle(someSelected),fontWeight:700}}>{g.group} ({g.total})</button>;
              })}
            </div>
            {filterPacks.length>0&&<div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {subPacks.filter(([p])=>filterPacks.some(fp=>{
                const grp=grouped.find(g=>g.packs.includes(fp));
                return grp&&grp.packs.includes(p);
              })||filterPacks.includes(p)).map(([pack,count])=>{const on=filterPacks.includes(pack);return(
                <button key={pack} onClick={()=>togglePack(pack)} style={chipStyle(on)}>{pack} ({count})</button>);})}
            </div>}
          </div>;
        }
        // Autres sources: filtrer par ampli
        return <div style={{marginBottom:12}}>
          <div style={{fontSize:10,color:"var(--text-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Filtrer par ampli</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            <button onClick={()=>setFilterPacks([])} style={chipStyle(filterPacks.length===0)}>Tous ({filtered.length})</button>
            {subPacks.map(([amp,count])=>{const on=filterPacks.includes(amp);return(
              <button key={amp} onClick={()=>togglePack(amp)} style={chipStyle(on)}>{amp} ({count})</button>);})}
          </div>
        </div>;
      })()}
      <div style={{fontSize:10,color:"var(--text-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>
        {displayFiltered.length} preset{displayFiltered.length>1?"s":""} — clique pour voir la fiche
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:3}}>
        {visible.map(([name,info])=>{
          const annLoc=findInBanks(name,banksAnn);
          const plugLoc=findInBanks(name,banksPlug);
          const isSel=selected===name;
          return(
            <div key={name}>
              <div onClick={()=>setSelected(isSel?null:name)}
                style={{display:"flex",alignItems:"center",gap:8,background:isSel?"var(--accent-bg)":"var(--a3)",border:isSel?"1px solid var(--accent-border)":"1px solid var(--a6)",borderRadius:isSel?"9px 9px 0 0":9,padding:"8px 11px",cursor:"pointer"}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,color:isSel?"var(--accent)":"var(--text-bright)",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name}</div>
                  <div style={{display:"flex",gap:5,alignItems:"center",marginTop:2,flexWrap:"wrap"}}>
                    <span style={{fontSize:10,color:"var(--text-muted)"}}>{info.amp}</span>
                    {(info.pack||info.amp)&&<span style={{fontSize:9,color:"var(--text-muted)",background:"var(--a6)",borderRadius:3,padding:"1px 5px"}}>{info.pack||info.amp}</span>}
                    {annLoc&&<span style={{fontSize:9,color:"var(--accent)",background:"var(--accent-bg)",borderRadius:3,padding:"1px 5px",fontWeight:700}}>📦{annLoc.bank}{annLoc.slot}</span>}
                    {plugLoc&&<span style={{fontSize:9,color:"var(--accent)",background:"rgba(165,180,252,0.1)",borderRadius:3,padding:"1px 5px",fontWeight:700}}>🔌{plugLoc.bank}{plugLoc.slot}</span>}
                  </div>
                </div>
                <div style={{display:"flex",gap:3,alignItems:"center",flexShrink:0}}>
                  {["HB","SC","P90"].map(gt=>{const sc=computePickupScore(info.style,getGainRange(gainToNumeric(info.gain)),gt);return <span key={gt} style={{fontSize:9,color:scoreColor(sc),fontWeight:700,background:scoreBg(sc),borderRadius:3,padding:"1px 4px"}}>{sc}</span>;})}
                </div>
              </div>
              {isSel&&<PresetDetailInline name={name} info={info} banksAnn={banksAnn} banksPlug={banksPlug} presetContext={mergedContext} guitars={guitars}/>}
            </div>
          );
        })}
      </div>
      {remaining>0&&(
        <button onClick={()=>setShown(s=>s+PRESET_PAGE_SIZE)}
          style={{width:"100%",marginTop:10,background:"var(--a5)",border:"1px solid var(--a10)",color:"var(--text-sec)",borderRadius:9,padding:"10px",fontSize:12,cursor:"pointer",fontWeight:600}}>
          Voir {Math.min(remaining,PRESET_PAGE_SIZE)} de plus ({remaining} restants)
        </button>
      )}
    </div>
  );
}

function PresetBrowser({banksAnn,banksPlug,availableSources,customPacks,guitars}) {
  const [soundProfile,setSoundProfile]=useState("all");
  const [filterSrcs,setFilterSrcs]=useState([]); // empty = all
  const [search,setSearch]=useState("");
  const [selected,setSelected]=useState(null);
  const [filterPacks,setFilterPacks]=useState([]); // empty = all
  const toggleSrc=key=>setFilterSrcs(p=>p.includes(key)?p.filter(x=>x!==key):[...p,key]);
  const togglePack=key=>setFilterPacks(p=>p.includes(key)?p.filter(x=>x!==key):[...p,key]);

  // Merge PRESET_CONTEXT with custom pack ampContext
  const mergedContext=useMemo(()=>{
    const ctx={...PRESET_CONTEXT};
    (customPacks||[]).forEach(pack=>{
      if(pack.ampContext){
        for(const [amp,info] of Object.entries(pack.ampContext)){
          if(!ctx[amp]) ctx[amp]=info;
        }
      }
    });
    return ctx;
  },[customPacks]);

  // Merge custom packs into catalog — TSR_PACK_CATALOG is authoritative for TSR presets
  const fullCatalog=useMemo(()=>{
    // Dedup PRESET_CATALOG_FULL: remove entries that are normalized duplicates of TSR_PACK_CATALOG
    const tsrNorms=new Set(Object.keys(TSR_PACK_CATALOG).map(normalizePresetName));
    const fullDeduped={};
    for(const [k,v] of Object.entries(PRESET_CATALOG_FULL)){
      if(!tsrNorms.has(normalizePresetName(k))) fullDeduped[k]=v;
    }
    const cat={...fullDeduped,...TSR_PACK_CATALOG,...ANNIVERSARY_CATALOG,...FACTORY_CATALOG,...PLUG_FACTORY_CATALOG,...PRESET_CATALOG};
    (customPacks||[]).forEach(pack=>{
      (pack.presets||[]).forEach(p=>{
        if(p.name&&!cat[p.name]) cat[p.name]={src:pack.name,amp:p.amp||"Custom",gain:p.gain||"mid",style:p.style||"rock",scores:p.scores||{HB:78,SC:78,P90:78}};
      });
    });
    // Filter to only sources the user has
    if(availableSources){
      for(const k of Object.keys(cat)){
        if(availableSources[cat[k].src]===false) delete cat[k];
      }
    }
    return cat;
  },[customPacks,availableSources]);

  // Profils sonores : combinaison style + gain orientée finalité
  const SOUND_PROFILES={
    all:{label:"Tous les presets",filter:()=>true},
    clean_cristallin:{label:"Clean cristallin",desc:"Fender, jazz, pop",filter:i=>i.gain==="low"&&["jazz","pop","blues","rock"].includes(i.style)},
    blues_vintage:{label:"Blues vintage",desc:"B.B. King, Clapton, edge of breakup",filter:i=>(i.style==="blues")||(i.gain==="low"&&i.style==="rock")},
    jazz_warm:{label:"Jazz warm",desc:"Son rond, chaleureux",filter:i=>i.style==="jazz"||(i.gain==="low"&&i.style==="pop")},
    crunch_70s:{label:"Crunch rock 70s",desc:"Led Zep, Stones, Hendrix",filter:i=>i.gain==="mid"&&["rock","blues"].includes(i.style)},
    british:{label:"British invasion",desc:"Marshall, Vox, AC/DC",filter:i=>i.gain==="mid"&&["rock","hard_rock"].includes(i.style)},
    blues_rock:{label:"Blues-rock texan",desc:"SRV, Mayer, Bonamassa",filter:i=>i.style==="blues"&&["mid","low"].includes(i.gain)},
    funk_soul:{label:"Funk / Soul",desc:"Clean dynamique, Nile Rodgers",filter:i=>i.gain==="low"&&["pop","rock"].includes(i.style)},
    hard_rock:{label:"Hard rock classique",desc:"AC/DC, GN'R, Van Halen",filter:i=>i.style==="hard_rock"&&["mid","high"].includes(i.gain)},
    metal:{label:"Metal moderne",desc:"Metallica, Tool, Petrucci",filter:i=>i.style==="metal"||(i.gain==="high"&&i.style==="hard_rock")},
    high_gain_lead:{label:"High gain lead",desc:"Solos, shred, sustain",filter:i=>i.gain==="high"},
    pedales:{label:"Pedales de drive",desc:"Captures pedales seules",filter:i=>(i.amp||"").includes("drive")||(i.amp||"").includes("Pedal")||(i.amp||"").toLowerCase().includes("pédale")},
  };

  const filtered=useMemo(()=>
    Object.entries(fullCatalog).filter(([name,info])=>{
      const profile=SOUND_PROFILES[soundProfile];
      if(profile&&!profile.filter(info))return false;
      if(filterSrcs.length>0&&!filterSrcs.includes(info.src))return false;
      if(search.trim()){
        const q=search.toLowerCase();
        const ctx=mergedContext[info.amp];
        const artistsStr=(ctx?.refs||[]).map(r=>r.a).join(" ").toLowerCase();
        const tracksStr=(ctx?.refs||[]).flatMap(r=>r.t).join(" ").toLowerCase();
        if(!name.toLowerCase().includes(q)&&!info.amp.toLowerCase().includes(q)&&!artistsStr.includes(q)&&!tracksStr.includes(q))return false;
      }
      return true;
    })
  ,[soundProfile,filterSrcs,search]);

  const [randomPick,setRandomPick]=useState(null);
  const pickRandom=()=>{
    const pool=Object.entries(fullCatalog);
    if(!pool.length)return;
    const [name,info]=pool[Math.floor(Math.random()*pool.length)];
    setRandomPick({name,info});
    setSelected(null);
  };

  const ALL_SRC_OPTS={TSR:"64 Studio Rats",ML:"ML Sound Lab Essentials",Anniversary:"ToneX Anniversary Factory",Factory:"ToneX Factory",PlugFactory:"ToneX Plug Factory",custom:"Custom"};
  const SRC_OPTS={all:"Toutes sources",...Object.fromEntries(Object.entries(ALL_SRC_OPTS).filter(([k])=>!availableSources||availableSources[k]!==false))};

  const hasFilter=soundProfile!=="all"||filterSrcs.length>0||search.trim();
  return (
    <div>
      <div style={{fontSize:13,color:"var(--text-muted)",marginBottom:10}}>Explore ta bibliothèque de presets et découvre leur contexte musical.</div>

      {/* Recherche — en haut, bien visible */}
      <input placeholder="🔍 Rechercher artiste, morceau, ampli..." value={search} onChange={e=>setSearch(e.target.value)}
        style={{width:"100%",background:"var(--bg-card)",color:"var(--text)",border:"2px solid var(--a15)",borderRadius:12,padding:"14px 16px",fontSize:15,boxSizing:"border-box",marginBottom:14}}/>

        🎲 Preset aléatoire
      </button>

      {/* Fiche du preset aléatoire */}

        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
          <span style={{fontSize:13,fontWeight:800,color:"var(--text)"}}>{randomPick.name}</span>
          <button onClick={()=>setRandomPick(null)} style={{background:"none",border:"none",color:"var(--text-muted)",cursor:"pointer",fontSize:14}}>✕</button>
        </div>
        <PresetDetailInline name={randomPick.name} info={randomPick.info} banksAnn={banksAnn} banksPlug={banksPlug} presetContext={mergedContext} guitars={guitars}/>
      </div>}

      {/* Filtres */}
      {(()=>{
        const tile=(active)=>({fontSize:11,fontWeight:active?700:500,color:active?"var(--accent)":"var(--text-muted)",background:active?"var(--accent-bg)":"var(--a3)",border:active?"1px solid var(--accent-border)":"1px solid var(--a7)",borderRadius:8,padding:"6px 12px",cursor:"pointer",textAlign:"left"});
        const PROFILE_GROUPS=[
          {title:"Sons cleans",profiles:["clean_cristallin","blues_vintage","jazz_warm","funk_soul"]},
          {title:"Sons crunch / drive",profiles:["crunch_70s","british","blues_rock"]},
          {title:"Sons satures",profiles:["hard_rock","metal","high_gain_lead"]},
          {title:"Autre",profiles:["pedales"]},
        ];
        return <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
        {/* Profils sonores */}
        <div>
          <div style={{fontSize:10,color:"var(--text-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Quel son cherches-tu ?</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:8}}>
            <button onClick={()=>setSoundProfile("all")} style={tile(soundProfile==="all")}>Tous</button>
          </div>
          {PROFILE_GROUPS.map(g=><div key={g.title} style={{marginBottom:6}}>
            <div style={{fontSize:9,color:"var(--text-dim)",fontWeight:600,textTransform:"uppercase",letterSpacing:0.3,marginBottom:4}}>{g.title}</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {g.profiles.map(id=>{const p=SOUND_PROFILES[id];if(!p)return null;const active=soundProfile===id;return(
                <button key={id} onClick={()=>setSoundProfile(active?"all":id)} style={tile(active)}>
                  <div>{p.label}</div>
                  {p.desc&&<div style={{fontSize:9,fontWeight:400,color:active?"var(--accent)":"var(--text-dim)",marginTop:1}}>{p.desc}</div>}
                </button>
              );})}
            </div>
          </div>)}
        </div>
        {/* Sources */}
        <div>
          <div style={{fontSize:10,color:"var(--text-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:5}}>Sources</div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            <button onClick={()=>setFilterSrcs([])} style={tile(filterSrcs.length===0)}>Toutes</button>
            {Object.entries(SRC_OPTS).filter(([k])=>k!=="all").map(([k,l])=>{
              const on=filterSrcs.includes(k);
              return <button key={k} onClick={()=>toggleSrc(k)} style={tile(on)}>{l}</button>;
            })}
          </div>
        </div>
        {/* Recherche */}
        {hasFilter&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:11,color:"var(--text-muted)"}}>{filtered.length} preset{filtered.length>1?"s":""} trouve{filtered.length>1?"s":""}</span>
          <button onClick={()=>{setSoundProfile("all");setFilterSrcs([]);setFilterPacks([]);setSearch("");}} style={{fontSize:11,color:"var(--text-muted)",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>Reinitialiser</button>
        </div>}
      </div>;})()}

      {/* Packs browsing / Liste des presets */}
      {!hasFilter&&(()=>{
        const srcCounts={};
        Object.values(fullCatalog).forEach(info=>{
          srcCounts[info.src]=(srcCounts[info.src]||0)+1;
        });
        const packCards=[
          {id:"TSR",label:"64 Studio Rats",emoji:"🎸"},
          {id:"ML",label:"ML Sound Lab Essentials",emoji:"🎛"},
          {id:"Anniversary",label:"ToneX Anniversary Factory",emoji:"📦"},
          {id:"Factory",label:"ToneX Factory",emoji:"🎹"},
          {id:"PlugFactory",label:"ToneX Plug Factory",emoji:"🔌"},
        ];
        // Add custom packs
        (customPacks||[]).forEach(p=>{
          if(srcCounts[p.name]) packCards.push({id:p.name,label:p.name,emoji:"📂",desc:`${srcCounts[p.name]} presets`});
        });
        return <div>
          <div style={{fontSize:10,color:"var(--text-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>Parcourir par pack — {Object.keys(fullCatalog).length} presets au total</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8}}>
            {packCards.filter(p=>srcCounts[p.id]).map(p=>(
              <button key={p.id} onClick={()=>{setFilterSrcs([p.id]);setFilterPacks([]);}}
                style={{background:"var(--a4)",border:"1px solid var(--a8)",borderRadius:12,padding:"14px 10px",cursor:"pointer",textAlign:"center",transition:"all .15s"}}
                onMouseOver={e=>{e.currentTarget.style.borderColor="var(--a15)";e.currentTarget.style.background="var(--a7)";}}
                onMouseOut={e=>{e.currentTarget.style.borderColor="var(--a8)";e.currentTarget.style.background="var(--a4)";}}>
                <div style={{fontSize:22,marginBottom:4}}>{p.emoji}</div>
                <div style={{fontSize:12,fontWeight:700,color:"var(--text)",marginBottom:2}}>{p.label}</div>
                <div style={{fontSize:11,color:"var(--text-sec)",fontWeight:600}}>{srcCounts[p.id]} presets</div>
                {p.desc&&<div style={{fontSize:10,color:"var(--text-dim)",marginTop:2}}>{p.desc}</div>}
              </button>
            ))}
          </div>
        </div>;
      })()}
      {hasFilter&&filtered.length===0&&<div style={{textAlign:"center",padding:"24px",color:"var(--text-dim)",fontSize:13}}>Aucun preset ne correspond à ces critères.</div>}
      {hasFilter&&filtered.length>0&&<PresetList filtered={filtered} selected={selected} setSelected={setSelected} banksAnn={banksAnn} banksPlug={banksPlug} fullCatalog={fullCatalog} filterSrcs={filterSrcs} filterPacks={filterPacks} togglePack={togglePack} setFilterPacks={setFilterPacks} mergedContext={mergedContext} guitars={guitars}/>}
    </div>
  );
}

// ─── JamScreen ────────────────────────────────────────────────────────────────
const JAM_STYLES=[
  {id:"jazz",   label:"Jazz",       emoji:"🎹", color:"148,163,184"},
  {id:"blues",  label:"Blues",      emoji:"🎷", color:"148,163,184"},
  {id:"rock",   label:"Rock",       emoji:"🎸", color:"148,163,184"},
  {id:"hard_rock",label:"Hard Rock",emoji:"🔥", color:"148,163,184"},
  {id:"metal",  label:"Metal",      emoji:"💀", color:"148,163,184"},
];
const TYPE_LABELS={HB:"Humbucker",SC:"Single Coil",P90:"P-90"};
const TYPE_COLORS={HB:"148,163,184",SC:"148,163,184",P90:"148,163,184"};

function JamPresetItem({p,rank,isSelected,onSelect,banksAnn,banksPlug,guitars}){
  const rankColors=["var(--accent)","var(--text-sec)","var(--text-muted)"];
  const sc=scoreColor(p.score);
  const sb=scoreBg(p.score);
  const info=findCatalogEntry(p.name);
  return(
    <div>
      <div className="preset-result-card" onClick={onSelect} style={{cursor:"pointer",borderRadius:isSelected?"10px 10px 0 0":10}}>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <span style={{fontSize:18,fontWeight:900,color:rankColors[rank]||"var(--text-muted)",minWidth:22}}>#{rank+1}</span>
          {"bank" in p&&<span style={{background:"var(--accent-bg)",color:"var(--accent)",border:"1px solid var(--accent-border)",borderRadius:5,padding:"2px 8px",fontSize:11,fontWeight:700}}>Banque {p.bank}{p.slot}</span>}
          <span style={{fontSize:11,fontWeight:800,color:sc,background:sb,borderRadius:4,padding:"1px 7px",border:`1px solid ${sc}40`}}>{p.score}%</span>
          {gainBadge(p.gain)}
          <span style={{fontSize:9,color:"var(--text-muted)",background:"var(--a6)",borderRadius:4,padding:"1px 5px",fontWeight:600}}>{p.src}</span>
          <span style={{fontSize:10,color:"var(--text-dim)",marginLeft:"auto"}}>{isSelected?"▲":"▼"}</span>
        </div>
        <div style={{fontSize:12,color:"var(--text-bright)",fontWeight:600,marginTop:5,lineHeight:1.3}}>{p.name}</div>
        <div style={{fontSize:11,color:"var(--text-muted)",marginTop:2}}>{p.amp}</div>
      </div>
      {isSelected&&info&&<PresetDetailInline name={p.name} info={info} banksAnn={banksAnn} banksPlug={banksPlug} guitars={guitars}/>}
    </div>
  );
}

function JamScreen({banksAnn,banksPlug,allGuitars,availableSources}){
  const guitars=allGuitars||GUITARS;
  const [step,setStep]=useState("guitar"); // "guitar" | "style" | "results"
  const [guitarId,setGuitarId]=useState(null);
  const [style,setStyle]=useState(null);
  const [selectedJam,setSelectedJam]=useState(null);

  const guitar=guitars.find(g=>g.id===guitarId);
  const recs=useMemo(()=>{
    if(!guitarId||!style) return null;
    return getJamRecs(guitarId,style,banksAnn,banksPlug,guitars,availableSources);
  },[guitarId,style,banksAnn,banksPlug,guitars,availableSources]);

  const reset=()=>{setStep("guitar");setGuitarId(null);setStyle(null);};

  if(step==="results"&&recs){
    const styleInfo=JAM_STYLES.find(s=>s.id===style);
    const typeRgb=TYPE_COLORS[recs.gType]||"99,102,241";
    return(
      <div>
        {/* Header */}
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap"}}>
          <button onClick={reset} style={{background:"var(--a8)",border:"1px solid var(--a12)",color:"var(--text-sec)",borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer",flexShrink:0}}>← Nouveau Jam</button>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            <span style={{fontSize:12,background:`rgba(${typeRgb},0.15)`,color:`rgb(${typeRgb})`,border:`1px solid rgba(${typeRgb},0.4)`,borderRadius:6,padding:"3px 10px",fontWeight:700}}>{guitar?.name} · {TYPE_LABELS[recs.gType]}</span>
            <span style={{fontSize:12,background:`rgba(${styleInfo?.color||"99,102,241"},0.15)`,color:`rgb(${styleInfo?.color||"99,102,241"})`,border:`1px solid rgba(${styleInfo?.color||"99,102,241"},0.4)`,borderRadius:6,padding:"3px 10px",fontWeight:700}}>{styleInfo?.emoji} {styleInfo?.label}</span>
          </div>
        </div>

        {/* Top 3 Pédale */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12,color:"var(--text-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>📦 Top 3 — Pedale <span style={{fontSize:10,color:"var(--text-dim)",fontWeight:400,textTransform:"none"}}>(presets installés)</span></div>
          {recs.annTop3.length>0
            ?recs.annTop3.map((p,i)=><JamPresetItem key={p.name} p={p} rank={i} isSelected={selectedJam===p.name} onSelect={()=>setSelectedJam(selectedJam===p.name?null:p.name)} banksAnn={banksAnn} banksPlug={banksPlug} guitars={guitars}/>)
            :<div style={{fontSize:12,color:"var(--text-dim)",padding:"12px",background:"var(--a3)",borderRadius:8,textAlign:"center"}}>Aucun preset {styleInfo?.label} installé sur la Pédale pour ce type de guitare.</div>
          }
        </div>

        {/* Best Plug */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12,color:"var(--text-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>🔌 Top 3 — ToneX Plug <span style={{fontSize:10,color:"var(--text-dim)",fontWeight:400,textTransform:"none"}}>(presets installés)</span></div>
          {recs.plugBest.length>0
            ?recs.plugBest.map((p,i)=><JamPresetItem key={p.name} p={p} rank={i} isSelected={selectedJam===p.name} onSelect={()=>setSelectedJam(selectedJam===p.name?null:p.name)} banksAnn={banksAnn} banksPlug={banksPlug} guitars={guitars}/>)
            :<div style={{fontSize:12,color:"var(--text-dim)",padding:"12px",background:"var(--a3)",borderRadius:8,textAlign:"center"}}>Aucun preset {styleInfo?.label} installé sur le Plug pour ce type de guitare.</div>
          }
        </div>

        {/* Top 3 Full Catalog */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12,color:"var(--text-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>🌐 Top 3 — Catalogue complet <span style={{fontSize:10,color:"var(--text-dim)",fontWeight:400,textTransform:"none"}}>(tous presets, installés ou non)</span></div>
          {recs.fullTop3.map((p,i)=><JamPresetItem key={p.name} p={p} rank={i} isSelected={selectedJam===p.name} onSelect={()=>setSelectedJam(selectedJam===p.name?null:p.name)} banksAnn={banksAnn} banksPlug={banksPlug} guitars={guitars}/>)}
        </div>
      </div>
    );
  }

  if(step==="style"){
    return(
      <div>
        <button onClick={()=>setStep("guitar")} style={{background:"var(--a8)",border:"1px solid var(--a12)",color:"var(--text-sec)",borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer",marginBottom:16}}>← Changer de guitare</button>
        <div style={{fontSize:14,color:"var(--text)",fontWeight:700,marginBottom:4}}>Guitare : <span style={{color:"var(--green)"}}>{guitar?.name}</span></div>
        <div style={{fontSize:12,color:"var(--text-muted)",marginBottom:16}}>Quel style joues-tu ?</div>
        <div className="style-grid">
          {JAM_STYLES.map(s=>(
            <button key={s.id} onClick={()=>{setStyle(s.id);setStep("results");}}
              style={{background:`rgba(${s.color},0.1)`,border:`1px solid rgba(${s.color},0.3)`,borderRadius:12,padding:"14px 8px",cursor:"pointer",textAlign:"center",transition:"all .15s"}}>
              <div style={{fontSize:22,marginBottom:4}}>{s.emoji}</div>
              <div style={{fontSize:12,fontWeight:700,color:`rgb(${s.color})`}}>{s.label}</div>
            </button>
          ))}
        </div>
      </div>
    );
  }

  // step === "guitar"
  const typeGroups={HB:[],SC:[],P90:[]};
  guitars.forEach(g=>typeGroups[g.type]?.push(g));
  return(
    <div>
      <div style={{fontSize:12,color:"var(--text-muted)",marginBottom:16}}>Sélectionne ta guitare pour ce jam :</div>
      {Object.entries(typeGroups).filter(([,arr])=>arr.length>0).map(([type,arr])=>(
        <div key={type} style={{marginBottom:16}}>
          <div style={{fontSize:11,color:`rgb(${TYPE_COLORS[type]||"99,102,241"})`,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>{type} — {TYPE_LABELS[type]}</div>
          <div className="guitar-grid">
            {arr.map(g=>(
              <button key={g.id} className={`guitar-card${guitarId===g.id?" selected":""}`} onClick={()=>{setGuitarId(g.id);setStep("style");}}>
                <div style={{fontSize:22,marginBottom:4}}>🎸</div>
                <div style={{fontSize:11,fontWeight:700,color:"var(--text-bright)",lineHeight:1.3}}>{g.name}</div>
              </button>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── SetlistsScreen (onglets Setlists + Morceaux) ────────────────────────────
function SetlistsScreen({songDb,onSongDb,setlists,allSetlists,onSetlists,checked,onChecked,onNext,onSettings,onNavigate,banksAnn,onBanksAnn,banksPlug,onBanksPlug,aiProvider,aiKeys,allGuitars,availableSources,activeProfileId}){
  const [tab,setTab]=useState("setlists");
  const tabBtn=(id,label)=>(
    <button onClick={()=>setTab(id)} style={{background:tab===id?"var(--accent-bg)":"var(--a5)",border:tab===id?"1px solid var(--accent-border)":"1px solid var(--a8)",color:tab===id?"var(--accent)":"var(--text-sec)",borderRadius:8,padding:"7px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>{label}</button>
  );
  // Songs tab state
  const [songSort,setSongSort]=useState("artist");
  const [newSongTitle,setNewSongTitle]=useState("");
  const [newSongArtist,setNewSongArtist]=useState("");
  const [newSongSlIds,setNewSongSlIds]=useState([]);
  const [expandedSongId,setExpandedSongId]=useState(null);
  const toggleNewSongSl=id=>setNewSongSlIds(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const toggleSongInSetlist=(songId,slId)=>onSetlists(p=>p.map(sl=>sl.id!==slId?sl:{...sl,songIds:sl.songIds.includes(songId)?sl.songIds.filter(x=>x!==songId):[...sl.songIds,songId]}));
  const addSongToDb=()=>{
    if(!newSongTitle.trim())return;
    const ns={id:`c_${Date.now()}`,title:newSongTitle.trim(),artist:newSongArtist.trim()||"Artiste inconnu",isCustom:true,ig:[],aiCache:null};
    onSongDb(p=>[...p,ns]);
    if(newSongSlIds.length>0)onSetlists(p=>p.map(sl=>newSongSlIds.includes(sl.id)?{...sl,songIds:[...sl.songIds,ns.id]}:sl));
    fetchAI(ns,"",banksAnn,banksPlug,aiProvider,aiKeys,allGuitars)
      .then(r=>onSongDb(p=>p.map(x=>x.id===ns.id?{...x,aiCache:updateAiCache(x.aiCache,"",r)}:x)))
      .catch(()=>{});
    setNewSongTitle("");setNewSongArtist("");setNewSongSlIds([]);
  };
  const deleteSongFromDb=id=>{onSongDb(p=>p.filter(s=>s.id!==id));onSetlists(p=>p.map(sl=>({...sl,songIds:sl.songIds.filter(x=>x!==id)})));};
  const inp={background:"var(--bg-card)",color:"var(--text)",border:"1px solid var(--a15)",borderRadius:7,padding:"6px 10px",fontSize:12,boxSizing:"border-box"};
  return(
    <div>
      <Breadcrumb crumbs={[{label:"Accueil",screen:"list"},{label:"Setlists & Morceaux"}]} onNavigate={onNavigate}/>
      <div style={{fontSize:20,fontWeight:800,color:"var(--text)",marginBottom:12}}>🎵 Setlists & Morceaux</div>
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {tabBtn("setlists","🎵 Setlists")}
        {tabBtn("songs","🎶 Morceaux")}
      </div>
      {tab==="setlists"&&<ListScreen songDb={songDb} onSongDb={onSongDb} allSetlists={allSetlists} setlists={setlists} onSetlists={onSetlists} checked={checked} onChecked={onChecked} onNext={onNext} onSettings={onSettings} banksAnn={banksAnn} onBanksAnn={onBanksAnn} banksPlug={banksPlug} onBanksPlug={onBanksPlug} aiProvider={aiProvider} aiKeys={aiKeys} hideHeader={true} allGuitars={allGuitars} availableSources={availableSources} activeProfileId={activeProfileId}/>}
      {tab==="songs"&&<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontSize:13,color:"var(--text-sec)"}}>{songDb.length} morceaux</div>
          <select value={songSort} onChange={e=>setSongSort(e.target.value)} style={{background:"var(--bg-card)",color:"var(--text-sec)",border:"1px solid var(--a12)",borderRadius:6,padding:"3px 8px",fontSize:11,cursor:"pointer"}}>
            <option value="alpha">A → Z (titre)</option>
            <option value="artist">Par artiste</option>
            <option value="recent">Récents</option>
          </select>
        </div>
        {(()=>{
          const sorted=[...songDb];
          if(songSort==="alpha") sorted.sort((a,b)=>a.title.localeCompare(b.title,"fr"));
          else if(songSort==="artist") sorted.sort((a,b)=>a.artist.localeCompare(b.artist,"fr")||a.title.localeCompare(b.title,"fr"));
          else sorted.reverse();
          // Group by artist if sorted by artist
          let lastArtist="";
          return sorted.map(s=>{
          const expanded=expandedSongId===s.id;
          const showArtistHeader=songSort==="artist"&&s.artist!==lastArtist;
          if(showArtistHeader) lastArtist=s.artist;
          return <div key={s.id}>
          {showArtistHeader&&<div style={{fontSize:12,fontWeight:700,color:"var(--text-sec)",marginTop:10,marginBottom:4,paddingLeft:2}}>{s.artist}</div>}
          <div style={{background:"var(--a3)",border:"1px solid var(--a6)",borderRadius:9,marginBottom:4,overflow:"hidden"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"9px 12px"}}>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>{s.title}</div>{songSort!=="artist"&&<div style={{fontSize:11,color:"var(--text-muted)"}}>{s.artist}{s.isCustom?" · ✨IA":""}</div>}</div>
              <button onClick={()=>setExpandedSongId(expanded?null:s.id)} style={{background:expanded?"var(--accent-bg)":"var(--a7)",border:expanded?"1px solid var(--accent-border)":"1px solid var(--a10)",color:expanded?"var(--accent)":"var(--text-sec)",borderRadius:6,padding:"4px 8px",fontSize:11,cursor:"pointer"}}>Setlists</button>
              <button onClick={()=>deleteSongFromDb(s.id)} style={{background:"rgba(239,68,68,0.15)",border:"1px solid var(--red-border)",color:"var(--red)",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer"}}>Supprimer</button>
            </div>
            {expanded&&<div style={{padding:"8px 12px 10px",borderTop:"1px solid var(--a5)",display:"flex",gap:6,flexWrap:"wrap"}}>
              {setlists.map(sl=>{const inSl=sl.songIds.includes(s.id);return(
                <button key={sl.id} onClick={()=>toggleSongInSetlist(s.id,sl.id)} style={{background:inSl?"rgba(74,222,128,0.2)":"var(--a5)",border:inSl?"1px solid rgba(74,222,128,0.4)":"1px solid var(--a10)",color:inSl?"var(--green)":"var(--text-sec)",borderRadius:7,padding:"4px 12px",fontSize:11,fontWeight:600,cursor:"pointer"}}>{inSl?"✓ ":""}{sl.name}</button>
              );})}
            </div>}
          </div>
        </div>;})})()}
        <div style={{background:"var(--accent-bg)",border:"1px solid rgba(99,102,241,0.2)",borderRadius:10,padding:14,marginTop:10}}>
          <div style={{fontSize:12,color:"var(--accent)",fontWeight:600,marginBottom:10}}>+ Ajouter un morceau</div>
          <input placeholder="Titre *" value={newSongTitle} onChange={e=>setNewSongTitle(e.target.value)} style={{...inp,width:"100%",marginBottom:7}}/>

// ─── SongSearchBar — free text → AI correction → validate ────────────────────
function SongSearchBar({onConfirm,aiProvider,aiKeys}){
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [suggestion,setSuggestion]=useState(null);
  const [err,setErr]=useState(null);

  const search=()=>{
    if(!input.trim())return;
    const key=aiKeys?.gemini||aiKeys?.anthropic||DEFAULT_GEMINI_KEY;
    const provider=(aiKeys?.gemini||DEFAULT_GEMINI_KEY)?"gemini":"anthropic";
    if(!key){setErr("Clé API manquante — configure-la dans les paramètres.");return;}
    setLoading(true);setErr(null);setSuggestion(null);
    const prompt=`L'utilisateur veut jouer un morceau de guitare. Il a tapé : "${input.trim()}"
Corrige l'orthographe et identifie le titre exact et l'artiste/groupe.
Réponds UNIQUEMENT en JSON (sans markdown) : {"title":"Titre exact","artist":"Artiste/Groupe","confidence":"high|medium|low"}`;
    const parse=safeParseJSON;
    const req=provider==="gemini"
      ?fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${key}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})})
        .then(r=>r.json()).then(d=>{if(d.error)throw new Error(d.error.message);return parse(d.candidates?.[0]?.content?.parts?.[0]?.text||"");})
      :fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:200,messages:[{role:"user",content:prompt}]})})
        .then(r=>r.json()).then(d=>{if(d.error)throw new Error(d.error.message);return parse(d.content?.map(i=>i.text||"").join("")||"");});
    req.then(s=>setSuggestion(s)).catch(e=>setErr(e.message)).finally(()=>setLoading(false));
  };

  const inp={background:"var(--bg-card)",color:"var(--text)",border:"2px solid var(--a15)",borderRadius:14,padding:"16px 18px",fontSize:17,width:"100%",boxSizing:"border-box"};
  return(
    <div>
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        <input placeholder="Titre, artiste..." value={input} onChange={e=>{setInput(e.target.value);setSuggestion(null);}} onKeyDown={e=>e.key==="Enter"&&search()} style={{...inp,flex:1}}/>
        <button onClick={search} disabled={!input.trim()||loading} style={{background:!input.trim()||loading?"#374151":"#4f46e5",border:"none",color:"#fff",borderRadius:14,padding:"0 22px",fontSize:17,fontWeight:700,cursor:!input.trim()||loading?"not-allowed":"pointer",flexShrink:0}}>{loading?"...":"OK"}</button>
      </div>
      {err&&<div style={{fontSize:12,color:"var(--red)",marginBottom:8}}>{err}</div>}
      {suggestion&&<div style={{background:"var(--green-bg)",border:"1px solid var(--green-border)",borderRadius:12,padding:14,marginBottom:8}}>
        <div style={{fontSize:14,fontWeight:700,color:"var(--text)",marginBottom:2}}>{suggestion.title}</div>
        <div style={{fontSize:12,color:"var(--text-sec)",marginBottom:10}}>{suggestion.artist}</div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>{onConfirm(suggestion.title,suggestion.artist);setSuggestion(null);setInput("");}} style={{background:"var(--green)",border:"none",color:"#0f172a",borderRadius:8,padding:"8px 16px",fontSize:13,fontWeight:700,cursor:"pointer"}}>C'est bon !</button>
          <button onClick={()=>setSuggestion(null)} style={{background:"var(--a7)",border:"none",color:"var(--text-sec)",borderRadius:8,padding:"8px 14px",fontSize:13,cursor:"pointer"}}>Non, corriger</button>
        </div>
      </div>}
    </div>
  );
}

// ─── HomeScreen (style Google) ────────────────────────────────────────────────
function HomeScreen({songDb,onSongDb,setlists,allSetlists,onSetlists,checked,onChecked,onNext,onSettings,onProfile,onSetlistScreen,onJam,onExplore,banksAnn,banksPlug,aiProvider,aiKeys,allGuitars,availableSources,profiles,activeProfileId,onSwitchProfile,onProfiles,customPacks,syncStatus,onViewProfile,onLogout}) {
  const profileName=(profiles[activeProfileId]||{}).name||"Profil";
  const profile=profiles[activeProfileId]||{};
  const [splashOpen,setSplashOpen]=useState(()=>{if(sessionStorage.getItem("tonex_splash"))return false;sessionStorage.setItem("tonex_splash","1");return true;});
  const [showOnboarding,setShowOnboarding]=useState(false);
  const [songResult,setSongResult]=useState(null);
  const [songBaseAI,setSongBaseAI]=useState(null); // résultat AI brut (sans scores guitare)
  const [songLoading,setSongLoading]=useState(false);
  const [songErr,setSongErr]=useState(null);
  const [confirmedSong,setConfirmedSong]=useState(null);
  const [showGuitarPick,setShowGuitarPick]=useState(false);
  const [selectedGuitar,setSelectedGuitar]=useState(null);
  const [showFeedback,setShowFeedback]=useState(false);
  const [showCotSearch,setShowCotSearch]=useState(false);
  const [feedback,setFeedback]=useState("");
  const rerunWithFeedback=()=>{
    if(!confirmedSong||!feedback.trim())return;
    setSongLoading(true);setShowFeedback(false);
    const prev=songResult;
    const gId=selectedGuitar?.id||"";
    const song={id:`tmp_${Date.now()}`,title:confirmedSong.title,artist:confirmedSong.artist};
    fetchAI(song,gId,banksAnn,banksPlug,aiProvider,aiKeys,allGuitars,feedback.trim())
      .then(r=>{
        const pick=mergeBestResults(prev,r);
        setSongResult(pick);setSongBaseAI(pick);setFeedback("");
      })
      .catch(e=>setSongErr(e.message))
      .finally(()=>setSongLoading(false));
  };

  return (
    <div style={{display:"flex",flexDirection:"column",minHeight:"80vh"}}>
      {splashOpen&&<SplashPopup onClose={()=>setSplashOpen(false)}/>}
      {showOnboarding&&<OnboardingWizard onClose={()=>setShowOnboarding(false)} onProfile={onProfile}/>}

      <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"stretch",padding:"8px 0 4px"}}>

            setConfirmedSong({title,artist});
            setSongResult(null);setSongBaseAI(null);setSongErr(null);setSelectedGuitar(null);
