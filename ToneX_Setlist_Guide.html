<script>
if('serviceWorker' in navigator){
  const SW_CODE=`
const CACHE='tonex-v48';
const HTML_URL=self.location.href.replace(/sw\\.js.*/,'ToneX_Setlist_Guide.html');
self.addEventListener('install',e=>{
  e.waitUntil(
    caches.open(CACHE).then(c=>c.addAll([self.registration.scope+'ToneX_Setlist_Guide.html']))
    .catch(()=>{})
  );
  self.skipWaiting();
});
self.addEventListener('activate',e=>{e.waitUntil(
  caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>self.clients.claim())
)});
self.addEventListener('fetch',e=>{
  e.respondWith(
    fetch(e.request).then(res=>{
      if(res.ok&&e.request.url.includes('ToneX_Setlist_Guide')){
        caches.open(CACHE).then(c=>c.put(e.request,res.clone()));
      }
      return res;
    }).catch(()=>caches.match(e.request))
  );
});`;
  const blob=new Blob([SW_CODE],{type:'application/javascript'});
  const swUrl=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}

<script>
// Firestore REST API — no SDK needed, just fetch()
var FS_BASE="https://firestore.googleapis.com/v1/projects/tonex-guide/databases/(default)/documents";
var FS_KEY="AIzaSyAnaJMN-a47S9W_cTC60lKAnzRMAgHNMAA";
var _lastSavedSyncId=null;
var _lastRemoteSyncId=null;

function saveToFirestore(s){
  var clean=JSON.parse(JSON.stringify(s));
  clean.lastModified=Date.now();
  var sid=Date.now().toString(36)+Math.random().toString(36).slice(2);
  _lastSavedSyncId=sid;
  clean.syncId=sid;
  if(clean.profiles){for(var pid in clean.profiles){if(clean.profiles[pid].aiKeys)clean.profiles[pid].aiKeys={anthropic:"",gemini:""};}}
  var body={fields:{data:{stringValue:JSON.stringify(clean)},syncId:{stringValue:sid},ts:{integerValue:String(clean.lastModified)}}};
  return fetch(FS_BASE+"/sync/state?key="+FS_KEY,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)})
    .then(function(r){if(!r.ok)throw new Error("Firestore save: "+r.status);return r.json();});
}

function loadFromFirestore(){
  return fetch(FS_BASE+"/sync/state?key="+FS_KEY)
    .then(function(r){if(!r.ok)return null;return r.json();})
    .then(function(doc){
      if(!doc||!doc.fields)return null;
      // New format: JSON stored in a single "data" string field
      if(doc.fields.data&&doc.fields.data.stringValue){
        var parsed=JSON.parse(doc.fields.data.stringValue);
        _lastRemoteSyncId=doc.fields.syncId?doc.fields.syncId.stringValue:null;
        return parsed;
      }
      // Legacy format: native Firestore fields from old SDK — convert inline
      try{
        var f=doc.fields;
        var legacy=firestoreToJs(f);
        _lastRemoteSyncId=legacy.syncId||null;
        return legacy;
      }catch(e){console.warn("Legacy parse failed:",e);return null;}
    })
    .catch(function(e){console.error("loadFromFirestore:",e);return null;});
}
// Convert Firestore REST value format to plain JS
function firestoreToJs(fields){
  var result={};
  for(var k in fields){
    result[k]=fsVal(fields[k]);
  }
  return result;
}
function fsVal(v){
  if(v.stringValue!==undefined)return v.stringValue;
  if(v.integerValue!==undefined)return Number(v.integerValue);
  if(v.doubleValue!==undefined)return v.doubleValue;
  if(v.booleanValue!==undefined)return v.booleanValue;
  if(v.nullValue!==undefined)return null;
  if(v.mapValue)return firestoreToJs(v.mapValue.fields||{});
  if(v.arrayValue)return(v.arrayValue.values||[]).map(fsVal);
  return null;
}

// Poll for remote syncId changes (lightweight — only reads syncId+ts fields)
function pollRemoteSyncId(){
  return fetch(FS_BASE+"/sync/state?key="+FS_KEY+"&mask.fieldPaths=syncId&mask.fieldPaths=ts")
    .then(function(r){if(!r.ok)return null;return r.json();})
    .then(function(doc){
      if(!doc||!doc.fields||!doc.fields.syncId)return null;
      return doc.fields.syncId.stringValue;
    })
    .catch(function(){return null;});
}

function loadSharedKey(){
  return fetch(FS_BASE+"/config/apikeys?key="+FS_KEY)
    .then(function(r){if(!r.ok)return;return r.json();})
    .then(function(doc){if(doc&&doc.fields&&doc.fields.gemini)DEFAULT_GEMINI_KEY=doc.fields.gemini.stringValue;})
    .catch(function(){});
}
function saveSharedKey(key){
  var body={fields:{gemini:{stringValue:key}}};
  return fetch(FS_BASE+"/config/apikeys?key="+FS_KEY,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}).catch(function(){});
}

  /* ── Bridge: old var names → new design tokens (from tokens.css) ── */

    color-scheme: light;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%;overflow-x:hidden}
  /* tokens.css handles body base styles; we add safe-area + responsive overrides */
  body{padding-bottom:env(safe-area-inset-bottom);padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right);overflow-x:hidden}
  /* iOS : empêche le zoom auto sur les inputs (seuil = 16px) */
  input,select,textarea{font-size:16px!important;-webkit-appearance:none;appearance:none;border-radius:var(--r-md);font-family:var(--font-ui);background:var(--bg-elev-1);color:var(--text-primary);border:1px solid var(--border-strong)}

  ::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:var(--r-xs)}
  table{border-collapse:collapse;width:100%}

  /* ── Eyebrow pattern ── */
  .eyebrow{font-family:var(--font-mono);font-size:var(--fs-xs);text-transform:uppercase;letter-spacing:var(--tracking-wider);color:var(--accent)}

  /* ── Buttons ── */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:var(--s-2);font-family:var(--font-ui);font-weight:600;border:none;cursor:pointer;transition:all var(--dur-fast) var(--ease-out);padding:var(--s-3) var(--s-5);font-size:var(--fs-sm);border-radius:var(--r-md)}

  .btn-secondary{background:transparent;border:1px solid var(--border-strong);color:var(--text-secondary)}
  .btn-secondary:hover{background:var(--surface-hover);border-color:var(--accent)}
  .btn-ghost{background:transparent;border:none;color:var(--text-secondary)}
  .btn-ghost:hover{color:var(--text-primary);background:var(--accent-soft)}

  .btn-icon{width:40px;height:40px;padding:0;border-radius:var(--r-md);background:var(--bg-elev-2);border:1px solid var(--border-subtle);color:var(--text-secondary)}

  /* ── Badges ── */
  .badge{display:inline-flex;align-items:center;font-family:var(--font-mono);font-size:var(--fs-xs);text-transform:uppercase;letter-spacing:var(--tracking-wider);padding:2px 8px;border-radius:var(--r-sm);border:1px solid;font-weight:500}
  .badge-brass{background:rgba(194,158,92,0.12);border-color:rgba(194,158,92,0.3);color:var(--brass-200)}
  .badge-wine{background:rgba(155,58,44,0.12);border-color:rgba(155,58,44,0.3);color:var(--wine-400)}
  .badge-tube{background:rgba(255,123,28,0.15);border-color:rgba(255,123,28,0.35);color:var(--tube-glow)}

  .badge-solid{background:var(--accent);border-color:var(--accent);color:var(--text-inverse)}

  /* ── Responsive ── */
  .page-root{padding:var(--s-3);max-width:700px;margin:0 auto;overflow-x:hidden;word-break:break-word}
  @media(min-width:400px){.page-root{padding:var(--s-4)}}

  .tab-btn{background:var(--bg-elev-1);border:1px solid var(--border-subtle);color:var(--text-tertiary);border-radius:var(--r-md);padding:var(--s-3) var(--s-1);font-family:var(--font-ui);font-size:var(--fs-xs);font-weight:600;cursor:pointer;text-align:center;line-height:var(--lh-snug);transition:all var(--dur-fast) var(--ease-out);-webkit-tap-highlight-color:transparent}
  .tab-btn.active{color:var(--text-primary);background:var(--accent-soft);border-color:var(--border-accent)}

  /* ── Guitar card grid ── */

// Couleur selon score
function getSongInfo(song){
  const init=INIT_SONG_DB_META.find(s=>s.id===song.id);
  const ai=song.aiCache?.result;
  return {
    year:init?.year||ai?.song_year||null,
    album:init?.album||ai?.song_album||null,
    desc:init?.desc||ai?.song_desc||null,
    key:ai?.song_key||null,
    bpm:ai?.song_bpm||null,
  };
}
// Seuils V2 : 80+ excellent (fidèle au son original), 65+ bon, 50+ acceptable, <50 mauvais
function scoreColor(s){return s>=80?"var(--green)":s>=65?"var(--blue)":s>=50?"var(--yellow)":"var(--red)";}
function scoreBg(s){return s>=80?"var(--green-bg)":s>=65?"var(--blue-bg)":s>=50?"var(--yellow-bg)":"var(--red-bg)";}
function scoreLabel(s){return s>=80?{t:"Excellent",tip:"Preset très adapté à ce morceau"}:s>=65?{t:"Bon",tip:"Preset convenable pour ce morceau"}:s>=50?{t:"Moyen",tip:"Ça dépanne, mais un meilleur preset existe"}:{t:"Faible",tip:"Preset peu adapté à ce morceau"};}
const BREAKDOWN_LABELS={pickup:"Micro",guitar:"Guitare",gainMatch:"Gain",refAmp:"Ampli",styleMatch:"Style"};
function ScoreWithBreakdown({score,breakdown,size}){
  const [open,setOpen]=useState(false);
  const sz=size||11;
  const ref=useRef(null);
  useEffect(()=>{if(!open)return;const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};document.addEventListener("click",h,true);return()=>document.removeEventListener("click",h,true);},[open]);
  if(!breakdown) return <span style={{fontFamily:"var(--font-mono)",fontSize:sz,fontWeight:800,color:scoreColor(score)}}>{score}%</span>;
  return(
    <span ref={ref} style={{position:"relative",display:"inline-block"}}>
      <span onClick={e=>{e.stopPropagation();setOpen(o=>!o);}}
        style={{fontFamily:"var(--font-mono)",fontSize:sz,fontWeight:800,color:scoreColor(score),cursor:"pointer",textDecoration:"underline dotted"}}>
        {score}% · {scoreLabel(score).t}
      </span>
      {open&&<div style={{position:"absolute",bottom:"120%",left:0,zIndex:999,background:"var(--bg-card)",border:"1px solid var(--a12)",borderRadius:"var(--r-md)",padding:"8px 10px",fontSize:10,whiteSpace:"nowrap",boxShadow:"var(--shadow-md)",minWidth:160}}>
        <div style={{fontSize:9,fontWeight:700,color:"var(--text-muted)",textTransform:"uppercase",marginBottom:4}}>Décomposition</div>
        {Object.entries(breakdown).map(([k,v])=>(
          <div key={k} style={{display:"flex",justifyContent:"space-between",gap:12,color:v.raw===null?"var(--text-dim)":"var(--text-sec)",marginBottom:2}}>
            <span>{BREAKDOWN_LABELS[k]||k}</span>
            {v.raw!==null
              ?<span><b style={{color:scoreColor(v.raw)}}>{v.raw}</b> x{v.weight}% = <b>{v.contribution}</b></span>
              :<span style={{fontStyle:"italic"}}>—</span>}
          </div>
        ))}
        <div style={{borderTop:"1px solid var(--a8)",marginTop:4,paddingTop:4,fontWeight:700,color:scoreColor(score),textAlign:"right"}}>Total : {score}%</div>
      </div>}
    </span>
  );
}
// Cherche un preset dans le catalogue par nom exact puis fuzzy
const PRESET_CATALOG_MERGED = {...PRESET_CATALOG_FULL, ...TSR_PACK_CATALOG, ...ANNIVERSARY_CATALOG, ...FACTORY_CATALOG, ...PLUG_FACTORY_CATALOG, ...PRESET_CATALOG};
function findCatalogEntry(name){
  if(!name) return null;
  if(PRESET_CATALOG_MERGED[name]) return PRESET_CATALOG_MERGED[name];
  // Chercher dans les presets ToneNET saisis par l'utilisateur
  if(window._toneNetLookup){
    var tnMatch=window._toneNetLookup[name];
    if(tnMatch) return tnMatch;
  }
  if(PRESET_CATALOG_MERGED["AA "+name]) return PRESET_CATALOG_MERGED["AA "+name];
  if(name.startsWith("AA ")&&PRESET_CATALOG_MERGED[name.slice(3)]) return PRESET_CATALOG_MERGED[name.slice(3)];
  const norm=normalizePresetName(name);
  for(const [k,v] of Object.entries(PRESET_CATALOG_MERGED)){
    if(normalizePresetName(k)===norm) return v;
  }
  const normBase=norm.replace(/\s+\d+$/,"");
  if(normBase!==norm){
    for(const [k,v] of Object.entries(PRESET_CATALOG_MERGED)){
      if(normalizePresetName(k)===normBase) return v;
    }
  }
  // Preset inconnu (ToneNET, custom) — deviner les caractéristiques depuis le nom
  return guessPresetInfo(name);
}
function guessPresetInfo(name){
  if(!name) return null;
  var nl=name.toLowerCase();
  // Deviner l'ampli depuis le nom
  var amp="Unknown";
  var ampKeywords=[
    ["supergroup","Laney Supergroup"],["laney","Laney Supergroup"],
    ["plexi","Marshall Plexi"],["jcm","Marshall JCM800"],["jubilee","Marshall Silver Jubilee"],["jtm","Marshall JTM45"],["marshall","Marshall"],
    ["blackface","Fender Twin"],["twin","Fender Twin"],["deluxe","Fender Deluxe"],["bassman","Fender Bassman"],["princeton","Fender Princeton"],["champ","Fender Champ"],["fender","Fender"],
    ["ac30","Vox AC30"],["ac15","Vox AC15"],["vox","Vox AC30"],
    ["rectifier","Mesa Rectifier"],["boogie","Mesa Boogie"],["mark v","Mesa Mark V"],["mesa","Mesa Boogie"],
    ["bogner","Bogner"],["ecstasy","Bogner Ecstasy"],
    ["orange","Orange"],["rockerverb","Orange Rockerverb"],
    ["hiwatt","Hiwatt"],["soldano","Soldano"],["slo","Soldano"],
    ["friedman","Friedman"],["matchless","Matchless"],
    ["dumble","Dumble"],["ods","Dumble ODS"],["d-style","Dumble"],
    ["peavey","Peavey 5150"],["5150","Peavey 5150"],["evh","Peavey 5150"],
    ["two rock","Two Rock"],["tworock","Two Rock"],
    ["dr z","Dr. Z"],["z-wreck","Dr. Z"],["wreck","Dr. Z"],
    ["supro","Supro"],["engl","ENGL"],["diezel","Diezel"],
    ["traynor","Traynor"],["ampeg","Ampeg"],["park","Park"],
    ["divided","Divided by 13"],["d13","Divided by 13"],
    ["budda","Budda"],["bad cat","Bad Cat"],["carr","Carr"],
    ["cornford","Cornford"],["reinhardt","Reinhardt"],
  ];
  for(var i=0;i<ampKeywords.length;i++){
    if(nl.includes(ampKeywords[i][0])){amp=ampKeywords[i][1];break;}
  }
  // Deviner le gain
  var gain="mid";
  if(/\bclean\b|\bcln\b|\bclr\b/i.test(nl)) gain="low";
  else if(/\bhigh.?gain\b|\blead\b|\bdimed\b|\bmax\b|\bfull.?beans\b/i.test(nl)) gain="high";
  else if(/\bdrive\b|\bod\b|\bcrunch\b|\bgrit\b|\bboost\b/i.test(nl)) gain="mid";
  // Deviner le style depuis l'ampli
  var style="rock";
  if(amp.includes("Fender")||amp.includes("Princeton")||amp.includes("Twin")) style="blues";
  else if(amp.includes("Mesa")||amp.includes("Rectifier")||amp.includes("5150")||amp.includes("ENGL")||amp.includes("Diezel")||amp.includes("Laney")) style="hard_rock";
  else if(amp.includes("Vox")) style="rock";
  return {src:"ToneNET",amp:amp,gain:gain,style:style,scores:{HB:75,SC:75,P90:75},guessed:true};
}

const GAIN_RANGES={clean:{min:0,max:3},crunch:{min:4,max:6},drive:{min:7,max:8},high_gain:{min:9,max:10}};
function getGainRange(gain){
  if(typeof gain==="number") return gain<=3?"clean":gain<=6?"crunch":gain<=8?"drive":"high_gain";
  return gain==="low"?"clean":gain==="high"?"high_gain":"crunch";
}
function gainToNumeric(gain){
  if(typeof gain==="number") return gain;
  return gain==="low"?2:gain==="high"?9:6;
}
function inferGainFromName(name){
  if(!name) return 6;
  const n=name.toLowerCase();
  if(/\bclean\b|\bcln\b/.test(n)) return 2;
  if(/\bedge\b|\bcrunch\b|\bbloom cln\b/.test(n)) return 5;
  if(/\bdrive\b|\bod\b|\bklon\b|\bkot\b|\bduellist\b/.test(n)) return 7;
  if(/\blead\b|\bdimed\b|\bmuff\b|\bhigh\b|\bfull beans\b/.test(n)) return 9;
  return 6;
}

function inferGuitarProfile(name,type){
  if(!name) return null;
  var n=name.toLowerCase();
  var t=type||"HB";
  if(/\btele(caster)?\b/.test(n)){
    var is51=/\b5[01]\b|\besquire\b|\bnocaster\b|\bbroad/.test(n);
    return {pickupType:t,voicing:"bright",bodyResonance:"solid",
      gainAffinity:{clean:is51?+3:+4,crunch:+2,drive:is51?0:-1,high_gain:-4},
      styleMods:{blues:+3,rock:+4,hard_rock:is51?0:-1,jazz:+1,pop:+2,metal:-6},
      desc:is51?"Tele 51, frêne, SC bridge, twang brut vintage":"Telecaster, twang, attaque percussive"};
  }
  if(/\bstrat(ocaster)?\b/.test(n)){
    var isVintage=/\b5[0-9]\b|\b6[0-9]\b|\bvintage\b/.test(n);
    var isClapton=/\bclapton\b|\bec\b/.test(n);
    return {pickupType:t,voicing:isClapton?"warm":isVintage?"bright":"balanced",bodyResonance:"solid",
      gainAffinity:{clean:+4,crunch:isClapton?+4:+2,drive:+1,high_gain:-3},
      styleMods:{blues:isClapton?+6:+5,rock:+3,hard_rock:-1,jazz:+3,pop:+2,metal:-5},
      desc:isClapton?"Strat noiseless, midboost, son smooth":isVintage?"Strat vintage, cleans cristallins":"Strat moderne, polyvalente"};
  }
  if(/\bjazzmaster\b|\bjazz\s?m\b/.test(n)){
    return {pickupType:t,voicing:"warm",bodyResonance:"solid",
      gainAffinity:{clean:+4,crunch:+1,drive:-1,high_gain:-4},
      styleMods:{blues:+4,rock:+2,hard_rock:-2,jazz:+6,pop:+3,metal:-6},
      desc:"SC large, son chaud et rond, peu de twang"};
  }
  if(/\bjaguar\b|\bmustang\b/.test(n)){

function findGuitarProfile(guitarId){
  if(GUITAR_PROFILES[guitarId]) return GUITAR_PROFILES[guitarId];

// ─── Fonctions de scoring V2 ─────────────────────────────────────────────────

function computePickupScore(presetStyle,presetGainRange,pickupType){
  const styleScores=BASE_SCORES[presetStyle];
  if(!styleScores) return 60;
  const gainScores=styleScores[presetGainRange];
  if(!gainScores) return styleScores.crunch?.[pickupType]??60;
  return gainScores[pickupType]??60;
}

function computeGuitarScoreV2(guitarId,presetStyle,presetGainRange,presetVoicing){
  const g=findGuitarProfile(guitarId);
  if(!g) return 50;
  const styleMod=g.styleMods[presetStyle]||0;
  const gainMod=g.gainAffinity[presetGainRange]||0;
  let voicingMod=0;
  if(g.voicing!=="balanced"&&presetVoicing&&presetVoicing!=="balanced"){
    voicingMod=(g.voicing!==presetVoicing)?+3:-2;
  }
  let resonanceMod=0;
  if(g.bodyResonance==="semi_hollow"&&["clean","crunch"].includes(presetGainRange)&&["blues","jazz"].includes(presetStyle)){
    resonanceMod=+4;
  }
  if(g.bodyResonance==="semi_hollow"&&presetGainRange==="high_gain"){
    resonanceMod=-3;
  }
  return Math.max(0,Math.min(100,50+(styleMod+gainMod+voicingMod+resonanceMod)*3));
}

// Matcher tolérant pour aligner un nom renvoyé par l'IA (ideal_guitar, cot_step2_guitars[].name)
// avec une guitare de la collection. Évite que "SG Ebony" rate "SG Standard Ebony".
function matchGuitarName(name,g){
  if(!name||!g) return false;
  const n=String(name).toLowerCase().replace(/\s+/g," ").trim();
  const a=String(g.name||"").toLowerCase().replace(/\s+/g," ").trim();
  const b=String(g.short||"").toLowerCase().replace(/\s+/g," ").trim();
  if(!n) return false;
  if(n===a||n===b) return true;
  if(a&&(n.includes(a)||a.includes(n))) return true;
  if(b&&(n.includes(b)||b.includes(n))) return true;
  return false;
}
function findGuitarByAIName(name,guitars){
  if(!name||!guitars) return null;
  return guitars.find(g=>matchGuitarName(name,g))||null;
}
function findCotEntryForGuitar(cotList,g){
  if(!cotList||!g) return null;
  return cotList.find(gt=>matchGuitarName(gt?.name,g))||null;
}

// Score local de compatibilité guitare ↔ morceau, utilisé quand l'IA ne renvoie pas cette guitare dans cot_step2_guitars (top 2-3 only).
function localGuitarSongScore(g,aiC){
  if(!g||!aiC) return null;
  const pref=aiC.pickup_preference;
  let pickupScore;
  if(!pref||pref==="any") pickupScore=80;
  else if(pref===g.type) pickupScore=95;
  else pickupScore=55;
  const presetGainRange=getGainRange(typeof aiC.target_gain==="number"?aiC.target_gain:5);
  const styleScore=aiC.song_style?computeGuitarScoreV2(g.id,aiC.song_style,presetGainRange,null):70;
  return Math.max(30,Math.min(99,Math.round(pickupScore*0.6+styleScore*0.4)));
}

function guitarChoiceFeedback(g,aiC,cotEntry){
  if(!g||!aiC) return null;
  if(cotEntry?.reason) return cotEntry.reason;
  var profile=findGuitarProfile(g.id);
  if(!profile) return null;
  var pros=[],cons=[];
  var pref=aiC.pickup_preference;
  var style=aiC.song_style;
  var gain=getGainRange(typeof aiC.target_gain==="number"?aiC.target_gain:5);
  if(pref&&pref!=="any"){
    if(pref===g.type) pros.push("micros "+g.type+" adaptés au morceau");
    else cons.push("micros "+g.type+" — le morceau demande plutôt des "+pref);
  }
  if(style&&profile.styleMods[style]!=null){
    var sm=profile.styleMods[style];
    if(sm>=4) pros.push("excellente affinité "+style.replace("_"," "));
    else if(sm<=-2) cons.push("peu naturelle en "+style.replace("_"," "));
  }
  if(gain&&profile.gainAffinity[gain]!=null){
    var gm=profile.gainAffinity[gain];
    if(gm>=3) pros.push("à l'aise en "+gain.replace("_"," "));
    else if(gm<=-3) cons.push("moins adaptée au registre "+gain.replace("_"," "));
  }
  var parts=[];
  if(pros.length) parts.push("✓ "+pros.join(", "));
  if(cons.length) parts.push("⚠ "+cons.join(", "));
  return parts.length?parts.join(" · "):profile.desc;
}
function localGuitarSettings(g,aiC){
  if(!g||!aiC) return null;
  const profile=findGuitarProfile(g.id)||{};
  const voicing=profile.voicing||"balanced";
  const pickupType=g.type;
  const targetGain=typeof aiC.target_gain==="number"?aiC.target_gain:5;
  const gainRange=getGainRange(targetGain);
  const wantedPickup=aiC.pickup_preference;
  const style=aiC.song_style;
  // Position des micros
  let pickupAdvice;
  if(gainRange==="clean"||style==="jazz"){
    pickupAdvice=pickupType==="SC"?"Micro manche (pos. 5)":"Micro manche";
  }else if(gainRange==="high_gain"||style==="metal"||style==="hard_rock"){
    pickupAdvice="Micro chevalet";
  }else if(gainRange==="drive"||style==="rock"){
    pickupAdvice=pickupType==="SC"?"Chevalet ou intermediaire (pos. 4)":"Micro chevalet";
  }else{ // crunch / blues
    if(pickupType==="SC") pickupAdvice="Position intermediaire (2 ou 4) ou manche";
    else if(pickupType==="P90") pickupAdvice="Au choix selon attaque";
    else pickupAdvice="Manche pour rondeur, chevalet pour mordant";
  }
  // Tone
  let tone;
  if(style==="jazz") tone="4-6";
  else if(voicing==="bright"&&(gainRange==="drive"||gainRange==="high_gain")) tone="6-7";
  else if(voicing==="warm"&&gainRange==="clean") tone="8-10";
  else if(gainRange==="high_gain") tone="8-10";
  else tone="7-9";
  // Volume
  const volume=gainRange==="clean"?"7-9":"10";
  // Hint si la guitare ne correspond pas au pickup ideal
  let mismatchHint="";
  if(wantedPickup&&wantedPickup!=="any"&&wantedPickup!==pickupType){
    if(wantedPickup==="HB"&&pickupType==="SC") mismatchHint=" — l'ideal serait un humbucker, baisse le tone pour epaissir";
    else if(wantedPickup==="SC"&&pickupType==="HB") mismatchHint=" — l'ideal serait un single coil, split le HB si possible";
    else if(wantedPickup==="P90") mismatchHint=" — l'ideal serait un P90 (mordant)";
    else if(pickupType==="P90"&&wantedPickup==="HB") mismatchHint=" — pour plus de chaleur, monte le volume";
  }
  return `${pickupAdvice} · Tone ${tone} · Volume ${volume}${mismatchHint}`;
}

function computeGainMatchScore(presetGain,songTargetGain){
  if(songTargetGain==null) return null;
  const diff=Math.abs(presetGain-songTargetGain);
  return Math.max(0,100-diff*12);
}

function computeRefAmpScore(presetAmp,songRefAmp){
  if(!songRefAmp||!presetAmp) return null;
  if(presetAmp===songRefAmp) return 100;
  // Normalize: strip common suffixes (bass, 100w, mkI, combo, head, etc.)
  var normalize=function(s){return s.toLowerCase().replace(/\b(bass|head|combo|cab|cabinet|\d+w|\d+watt|mk\s*[iv]+|mk\s*\d+|super|100|50|20|amp)\b/g,"").replace(/\s+/g," ").trim();};
  var pNorm=normalize(presetAmp),sNorm=normalize(songRefAmp);
  if(pNorm===sNorm) return 100;
  if(pNorm.includes(sNorm)||sNorm.includes(pNorm)) return 95;
  // AMP_TAXONOMY lookup
  var preset=AMP_TAXONOMY[presetAmp];
  var song=AMP_TAXONOMY[songRefAmp];
  if(!preset){for(var k in AMP_TAXONOMY){if(normalize(k)===pNorm||k.toLowerCase().includes(pNorm)||pNorm.includes(k.toLowerCase())){preset=AMP_TAXONOMY[k];break;}}}
  if(!song){for(var k2 in AMP_TAXONOMY){if(normalize(k2)===sNorm||k2.toLowerCase().includes(sNorm)||sNorm.includes(k2.toLowerCase())){song=AMP_TAXONOMY[k2];break;}}}
  if(!preset||!song) return 25;
  if(preset.family===song.family) return 85;
  if(preset.brand===song.brand) return 50;
  if(preset.school===song.school) return 40;
  return 10;
}

function computeStyleMatchScore(presetStyle,songStyle){
  if(!songStyle) return null;
  return STYLE_COMPATIBILITY[presetStyle]?.[songStyle]??30;
}

function computeFinalScore(preset,guitarId,songStyle,songTargetGain,songRefAmp,_returnBreakdown){
  const presetGain=typeof preset.gain==="number"?preset.gain:gainToNumeric(preset.gain);
  const presetGainRange=getGainRange(presetGain);
  const pickupType=findGuitarProfile(guitarId)?.pickupType||findGuitar(guitarId)?.type||"HB";
  // Always use BASE_SCORES matrix for consistent scoring (ignore inflated static catalog scores)
  const pickupScore=computePickupScore(preset.style,presetGainRange,pickupType);
  const guitarScore2=computeGuitarScoreV2(guitarId,preset.style,presetGainRange,preset.voicing);
  const gainMatchScore=computeGainMatchScore(presetGain,songTargetGain);
  const refAmpScore=computeRefAmpScore(preset.amp,songRefAmp);
  const styleScore=computeStyleMatchScore(preset.style,songStyle);
  // Build active dimensions, redistribute weights when some are null
  const dims=[
    {key:"pickup",score:pickupScore,weight:SCORING_WEIGHTS.pickup},
    {key:"guitar",score:guitarScore2,weight:SCORING_WEIGHTS.guitar},
    {key:"gainMatch",score:gainMatchScore,weight:SCORING_WEIGHTS.gainMatch},
    {key:"refAmp",score:refAmpScore,weight:SCORING_WEIGHTS.refAmp},
    {key:"styleMatch",score:styleScore,weight:SCORING_WEIGHTS.styleMatch}
  ];
  const active=dims.filter(d=>d.score!==null);
  const totalWeight=active.reduce((s,d)=>s+d.weight,0);
  let final=0;
  const breakdown={};
  for(const d of active){
    const ew=d.weight/totalWeight;
    const contrib=ew*d.score;
    final+=contrib;
    breakdown[d.key]={raw:d.score,weight:Math.round(ew*100),contribution:Math.round(contrib)};
  }
  for(const d of dims){if(d.score===null)breakdown[d.key]={raw:null,weight:0,contribution:0};}
  const result=Math.max(0,Math.min(100,Math.round(final)));
  const rawResult=Math.max(0,Math.min(100,final));
  if(_returnBreakdown) return {score:result,rawScore:rawResult,breakdown};
  return result;
}

// Score simplifié sans contexte morceau (pour affichage liste, worstSlot, etc.)
function computeSimpleScore(presetName,guitarId,gType){
  const entry=findCatalogEntry(presetName);
  if(!entry) return 60;
  if(!guitarId){return entry.scores?.[gType]??60;}
  const gp=findGuitarProfile(guitarId);
  if(!gp){const gt=findGuitar(guitarId)?.type||gType||"HB";return entry.scores?.[gt]??60;}
  const presetGain=gainToNumeric(entry.gain);
  const presetGainRange=getGainRange(presetGain);
  const pickupScore=entry.scores?.[gp.pickupType]??60;
  const guitarScore2=computeGuitarScoreV2(guitarId,entry.style,presetGainRange,entry.voicing);
  // Sans contexte morceau : pickup 60% + guitar 40%
  return Math.max(30,Math.min(99,Math.round(pickupScore*0.6+guitarScore2*0.4)));
}
// V2 wrappers — delegate to computeSimpleScore
function guitarScore(name,guitarId){return computeSimpleScore(name,guitarId,null);}
function presetScore(name,gType){return computeSimpleScore(name,null,gType);}
function srcBadge(name){const s=findCatalogEntry(name)?.src;return s==="TSR"?"TSR":s==="ML"?"ML":s==="Anniversary"?"Pédale":s==="custom"?"Custom":s==="ToneNET"?"ToneNET":"";}

// Vérifie si un preset (par sa source) est compatible avec un device
// Anniversary + Factory = pédale only, PlugFactory = plug only, le reste = les deux
function isSrcCompatible(src,deviceKey){
  if(!src) return true;
  if(deviceKey==="ann") return src!=="PlugFactory";

function styleBadge(style){const l={hard_rock:"Hard Rock",rock:"Rock",blues:"Blues",jazz:"Jazz",pop:"Pop",metal:"Metal"}[style]||style;return <span className="badge badge-brass">{l}</span>;}
function gainBadge(gain){const l={low:"Low",mid:"Mid",high:"High"}[gain]||gain;return <span className="badge badge-wine">{l} gain</span>;}

// Normalise un nom de preset pour comparaison souple
// "TSR - Mars 800SL Ch1 Drive" et "TSR Mars 800SL Chnl 1 Drive" doivent matcher
function normalizePresetName(n){
  if(!n) return "";
  return n.toLowerCase()
    .replace(/[^a-z0-9]/g," ")       // ponctuation/tirets → espaces
    .replace(/(\d)([a-z])/g,"$1 $2") // "1Dirty" → "1 Dirty", "800SL" → "800 sl" (sépare chiffre+lettre)
    .replace(/([a-z])(\d)/g,"$1 $2") // "ch1" → "ch 1" (sépare lettre+chiffre)
    .replace(/\bchnl\b/g,"ch")        // chnl → ch
    .replace(/\bchanl?\b/g,"ch")      // chanl/chan → ch
    .replace(/\s+/g," ").trim();      // espaces multiples → un seul
}

// Patch one-shot : certaines entrées TSR de PRESET_CATALOG_FULL n'ont pas le
// champ `pack` alors que TSR_PACK_CATALOG l'a. On enrichit PRESET_CATALOG_MERGED
// en cross-référençant via le nom normalisé pour que presetSourceInfo affiche
// le bon « <pack>.zip ».
(function patchTsrPacks(){
  if(typeof TSR_PACK_CATALOG==="undefined") return;
  const byNorm={};
  for(const [k,v] of Object.entries(TSR_PACK_CATALOG)){
    if(v?.src==="TSR"&&v.pack) byNorm[normalizePresetName(k)]=v.pack;
  }
  for(const [k,v] of Object.entries(PRESET_CATALOG_MERGED)){
    if(v?.src==="TSR"&&!v.pack){
      const p=byNorm[normalizePresetName(k)];
      if(p) PRESET_CATALOG_MERGED[k]={...v,pack:p};
    }
  }
})();

// Normalise un titre de morceau pour détection de doublons stricte
// "T.N.T." === "TNT", "Romeo & Juliet" === "Romeo and Juliet"
function normalizeSongTitle(t){
  if(!t) return "";
  return t.toLowerCase()
    .replace(/&/g,"and")
    .replace(/[^a-z0-9]/g,"");
}
function normalizeArtist(a){
  if(!a) return "";
  return a.toLowerCase().replace(/&/g,"and").replace(/[^a-z0-9]/g,"");
}
function findDuplicateSong(songDb,title,artist){
  const nt=normalizeSongTitle(title), na=normalizeArtist(artist);
  return songDb.find(s=>normalizeSongTitle(s.title)===nt&&(!na||!s.artist||normalizeArtist(s.artist)===na));

// Cherche un preset dans les banks d'une pédale (comparaison souple)
function findInBanks(name, banks){
  if(!name||!banks) return null;
  // Exact match d'abord (rapide)
  for(const [k,bank] of Object.entries(banks)){
    for(const slot of ["A","B","C"]){
      if(bank[slot]===name) return {bank:Number(k),slot};
    }
  }
  // Fuzzy match si pas trouvé
  const norm=normalizePresetName(name);
  for(const [k,bank] of Object.entries(banks)){
    for(const slot of ["A","B","C"]){
      if(normalizePresetName(bank[slot])===norm) return {bank:Number(k),slot};
    }
  }
  return null;
}

// Trouve le slot le moins pertinent pour un type de guitare (candidat au remplacement)
function worstSlot(banks, gType, exclude=[]){
  let worst={score:101,bank:null,slot:null,name:null};
  for(const [k,bank] of Object.entries(banks)){
    for(const slot of ["A","B","C"]){
      const name=bank[slot];
      if(!name||exclude.includes(name)) continue;
      const s=presetScore(name,gType);
      if(s<worst.score) worst={score:s,bank:Number(k),slot,name};
    }
  }
  return worst;
}

// Cherche la meilleure alternative disponible dans le catalogue pour le même style musical
// Retourne le preset avec le score gType le plus élevé du même style, non installé dans banks
// ou installé mais avec un score significativement plus élevé
// Styles compatibles : on accepte les styles proches pour trouver de meilleurs presets
const COMPAT_STYLES={
  blues:["blues","jazz","rock"],
  jazz:["jazz","blues"],
  rock:["rock","hard_rock","blues"],
  hard_rock:["hard_rock","rock","metal"],
  metal:["metal","hard_rock"],
  pop:["pop","rock","blues"],
};
function findBestAvailable(presetName, gType, banks, availableSources, guitarId){
  const entry=findCatalogEntry(presetName);
  if(!entry) return null;
  const currentScore=guitarId?guitarScore(presetName,guitarId):(entry.scores?.[gType]??60);
  const compatStyles=COMPAT_STYLES[entry.style]||[entry.style];
  const gainOrder={low:0,mid:1,high:2};
  const currentGainLevel=gainOrder[entry.gain]??1;

  let best={score:0,name:null,installed:false,bank:null,slot:null};
  for(const [name,info] of Object.entries(PRESET_CATALOG_MERGED)){
    if(!compatStyles.includes(info.style)) continue;
    if(availableSources&&availableSources[info.src]===false) continue;
    const gainDiff=Math.abs((gainOrder[info.gain]??1)-currentGainLevel);
    if(gainDiff>1) continue;
    const s=guitarId?guitarScore(name,guitarId):(info.scores?.[gType]??60);
    if(s>best.score||(s===best.score&&!best.installed)){
      const found=findInBanks(name,banks);
      if(s>best.score||(s===best.score&&found&&!best.installed)){
        best={score:s,name,src:info.src,amp:info.amp,installed:!!found,bank:found?.bank??null,slot:found?.slot??null};
      }
    }
  }
  if(!best.name) return null;
  const isCurrent=best.name===presetName;
  return {...best,isCurrent,currentScore};
}

// Recommandation d'installation pour un preset donné
// Retourne: {name, score, installed, bank?, slot?, replaceBank?, replaceSlot?, replaceName?, replaceScore?, upgrade?}
// upgrade = {name, score, installed, bank?, slot?} si un meilleur preset est disponible
function getInstallRec(presetName, gType, banks, guitarId){
  if(!presetName) return null;
  const score=guitarId?guitarScore(presetName,guitarId):presetScore(presetName,gType);
  const found=findInBanks(presetName,banks);
  if(found){
    const upgrade=findBestAvailable(presetName,gType,banks,null,guitarId);
    return {name:presetName,score,installed:true,bank:found.bank,slot:found.slot,upgrade};
  }
  const ws=worstSlot(banks,gType,[presetName]);
  return {name:presetName,score,installed:false,replaceBank:ws.bank,replaceSlot:ws.slot,replaceName:ws.name,replaceScore:ws.score};
}

function getIg(song, guitars) {
  // AI ideal guitar takes priority — but only if in user's collection
  var aiG=song.aiCache?.result?.ideal_guitar;
  var allG=guitars||GUITARS;
  if(aiG){
    var m=allG.find(function(g){return g.name===aiG||g.short===aiG||aiG.toLowerCase().includes(g.name.toLowerCase())||g.name.toLowerCase().includes(aiG.toLowerCase());});
    if(m) return [m.id];
    // Ideal guitar not in user's collection — find best match by pickup type
    var aiPickup=song.aiCache?.result?.pickup_preference;
    if(aiPickup&&aiPickup!=="any"){
      var typeMatch=allG.filter(function(g){return g.type===aiPickup;});
      if(typeMatch.length) return [typeMatch[0].id];
    }
    if(allG.length) return [allG[0].id];
  }
  var p = SONG_PRESETS[song.id];
  var ig=song.ig?.length?song.ig:p?.ig;
  if(ig?.length){
    var filtered=ig.filter(function(id){return allG.some(function(g){return g.id===id;});});
    if(filtered.length) return filtered;
    if(allG.length) return [allG[0].id];
  }
  return [];
}

const LS_BACKUP_KEY = "tonex_guide_backups";
const MAX_BACKUPS = 5;
function autoBackup(){
  try{
    const current=localStorage.getItem(LS_KEY);
    if(!current) return;
    const parsed=JSON.parse(current);
    // Only backup if there's real data (at least 1 song beyond defaults)
    if(!parsed?.shared?.songDb||parsed.shared.songDb.length<1) return;
    const backups=JSON.parse(localStorage.getItem(LS_BACKUP_KEY)||"[]");
    const lastBackup=backups[0];
    // Don't backup if less than 5 min since last backup
    if(lastBackup&&Date.now()-lastBackup.time<5*60*1000) return;
    backups.unshift({time:Date.now(),data:current,songs:parsed.shared.songDb.length,profiles:Object.keys(parsed.profiles||{}).length});
    // Keep only last N backups
    while(backups.length>MAX_BACKUPS) backups.pop();
    localStorage.setItem(LS_BACKUP_KEY,JSON.stringify(backups));
  }catch(e){console.warn("Backup failed:",e);}
}
function listBackups(){
  try{return JSON.parse(localStorage.getItem(LS_BACKUP_KEY)||"[]");}catch(e){return [];}
}
function restoreBackup(index){
  const backups=listBackups();
  if(!backups[index]) return false;
  localStorage.setItem(LS_KEY,backups[index].data);
  return true;
}
function saveState(state) {
  autoBackup();
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e){}
}

function generateCSV(banks, deviceName) {
  const rows=[["Pédale","Bank","Catégorie","Slot","Type","Preset"]];
  Object.entries(banks).sort((a,b)=>Number(a[0])-Number(b[0])).forEach(([k,v])=>{
    ["A","B","C"].forEach(c=>{rows.push([deviceName,k,v.cat,c,CL[c],v[c]||""]);});
  });
  return rows.map(r=>r.map(cell=>`"${String(cell).replace(/"/g,'""')}"`).join(",")).join("\n");
}
function downloadFile(content,filename,type="text/csv;charset=utf-8;") {
  try {
    const bom = type.includes("csv") ? "\uFEFF" : "";
    const blob=new Blob([bom+content],{type});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  } catch(e){console.error(e);}
}
function parseCSV(text) {
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2) return null;
  const sep=lines[0].includes(";")?";":",";
  const parseLine=line=>{
    const res=[];let cur="",inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(ch===sep&&!inQ){res.push(cur.trim());cur="";}else cur+=ch;
    }
    res.push(cur.trim());return res;
  };
  const header=parseLine(lines[0]).map(h=>h.toLowerCase().replace(/["""]/g,"").trim());
  const iDevice=header.findIndex(h=>h.includes("pédale")||h.includes("pedale"));
  const iBank=header.findIndex(h=>h==="bank"||h.includes("bank"));
  const iCat=header.findIndex(h=>h.includes("catég")||h.includes("categ")||h.includes("cat"));
  const iSlot=header.findIndex(h=>h==="slot");
  const iPreset=header.findIndex(h=>h==="preset");
  const iA=header.findIndex(h=>h.startsWith("preset a"));
  const iB=header.findIndex(h=>h.startsWith("preset b"));
  const iC=header.findIndex(h=>h.startsWith("preset c"));
  const isWide=iA>=0&&iB>=0&&iC>=0;
  if(iBank===-1) return null;
  if(!isWide&&(iSlot===-1||iPreset===-1)) return null;
  const ann={},plug={};
  for(let i=1;i<lines.length;i++){
    const cols=parseLine(lines[i]);if(cols.length<2)continue;
    const bank=parseInt(cols[iBank]);if(isNaN(bank))continue;
    const cat=iCat>=0?cols[iCat]||"":"";
    const device=(iDevice>=0?cols[iDevice]||"":"").toLowerCase();
    const target=device.includes("plug")?plug:ann;
    if(isWide){
      const pA=iA>=0?cols[iA]||"":"",pB=iB>=0?cols[iB]||"":"",pC=iC>=0?cols[iC]||"":"";
      if(!target[bank])target[bank]={cat,A:"",B:"",C:""};
      if(cat)target[bank].cat=cat;if(pA)target[bank].A=pA;if(pB)target[bank].B=pB;if(pC)target[bank].C=pC;
    } else {
      const slot=(cols[iSlot]||"").toUpperCase(),preset=cols[iPreset]||"";
      if(!["A","B","C"].includes(slot))continue;
      if(!target[bank])target[bank]={cat,A:"",B:"",C:""};
      if(cat&&!target[bank].cat)target[bank].cat=cat;
      target[bank][slot]=preset;
    }
  }
  return {ann,plug};
}

// Résout un ref_amp texte vers un nom canonique du catalogue via AMP_ALIASES
function resolveRefAmp(refAmp){
  if(!refAmp) return null;
  const refNorm=refAmp.toLowerCase().replace(/[^a-z0-9\s]/g,"").trim();
  for(const [alias,canonical] of Object.entries(AMP_ALIASES)){
    if(refNorm.includes(alias)) return canonical;
  }
  // Cherche directement dans AMP_TAXONOMY
  if(AMP_TAXONOMY[refAmp]) return refAmp;
  return refAmp; // retourne tel quel si non trouvé
}

function computeBestPresets(gType,style,banksAnn,banksPlug,guitarId,refAmp,targetGain,availableSources){
  // Fallback : si l'appelant n'a pas passé availableSources, on lit la config
  // active publiée par App() — évite de threader le param dans toute l'app.
  if(availableSources===undefined&&typeof window!=="undefined") availableSources=window.__activeSources;
  const resolvedAmp=resolveRefAmp(refAmp);
  const songTargetGain=targetGain!=null?targetGain:null;
  const scorePreset=(name,info,withBreakdown)=>{
    if(!guitarId) {
      // Sans guitare : utiliser le contexte morceau (style, gain, ref_amp) avec pickup statique
      const presetGain=typeof info.gain==="number"?info.gain:gainToNumeric(info.gain);
      const presetGainRange=getGainRange(presetGain);
      const pickupScore=computePickupScore(info.style,presetGainRange,gType);
      const gainMatchScore=computeGainMatchScore(presetGain,songTargetGain);
      const refAmpScore=computeRefAmpScore(info.amp,resolvedAmp);
      const styleScore=computeStyleMatchScore(info.style,style);
      const dims=[
        {key:"pickup",score:pickupScore,weight:0.25},
        {key:"gainMatch",score:gainMatchScore,weight:0.20},
        {key:"refAmp",score:refAmpScore,weight:0.30},
        {key:"styleMatch",score:styleScore,weight:0.25}
      ];
      const active=dims.filter(d=>d.score!==null);
      const totalWeight=active.reduce((s,d)=>s+d.weight,0);
      let final=0;
      const breakdown={};
      for(const d of active){const ew=d.weight/totalWeight;final+=ew*d.score;breakdown[d.key]={raw:d.score,weight:Math.round(ew*100),contribution:Math.round(ew*d.score)};}
      const s=Math.max(0,Math.min(100,Math.round(final)));
      return withBreakdown?{score:s,breakdown}:s;
    }
    return computeFinalScore(info,guitarId,style,songTargetGain,resolvedAmp,withBreakdown);
  };
  // Best installed on pedal — diversify amps
  const annPresets=[];
  for(const [k,v] of Object.entries(banksAnn)){
    for(const c of ["A","B","C"]){
      if(v[c]){const info=findCatalogEntry(v[c]);if(info){
        const score=scorePreset(v[c],info);
        annPresets.push({name:v[c],bank:Number(k),col:c,score,rawScore:score,amp:info.amp,style:info.style});
      }}
    }
  }
  annPresets.sort((a,b)=>b.score-a.score);
  // Best installed on plug
  const plugPresets=[];
  for(const [k,v] of Object.entries(banksPlug)){
    for(const c of ["A","B","C"]){
      if(v[c]){const info=findCatalogEntry(v[c]);if(info){
        const score=scorePreset(v[c],info);
        plugPresets.push({name:v[c],bank:Number(k),col:c,score,rawScore:score,amp:info.amp,style:info.style});
      }}
    }
  }
  plugPresets.sort((a,b)=>b.score-a.score);
  // Best from full catalog — diversify amps (no 2 presets from same amp in top 3)
  // Filtre par sources possédées (ne pas recommander un preset d'un pack que je n'ai pas)
  const catalogAll=Object.entries(PRESET_CATALOG_MERGED)
    .filter(([,info])=>!availableSources||!info?.src||availableSources[info.src]!==false)
    .map(([name,info])=>{
      const score=scorePreset(name,info);
      return {name,score,rawScore:score,amp:info.amp,style:info.style,src:info.src};
    })
    .sort((a,b)=>b.score-a.score);
  const catalogBest=[];
  const seenAmps=new Set();
  for(const p of catalogAll){
    if(!seenAmps.has(p.amp)){catalogBest.push(p);seenAmps.add(p.amp);}
    if(catalogBest.length>=6) break;
  }
  // Add breakdown to top presets
  const addBreakdown=(p)=>{if(!p)return p;const info=findCatalogEntry(p.name);if(!info)return p;const r=scorePreset(p.name,info,true);return{...p,score:r.score!=null?r.score:p.score,breakdown:r.breakdown||null};};
  return {annTop:addBreakdown(annPresets[0])||null,plugTop:addBreakdown(plugPresets[0])||null,idealTop:catalogBest[0]||null,idealTop3:catalogBest};
}

// ─── fetchAI (helper partagé) ─────────────────────────────────────────────────
function enrichAIResult(aiResult,gType,gId,banksAnn,banksPlug,availableSources){
  if(availableSources===undefined&&typeof window!=="undefined") availableSources=window.__activeSources;
  const style=aiResult.song_style||"rock";
  const targetGain=typeof aiResult.target_gain==="number"?aiResult.target_gain:null;
  const best=computeBestPresets(gType,style,banksAnn,banksPlug,gId,aiResult.ref_amp,targetGain,availableSources);
  // Si l'IA a proposé un ideal_preset depuis un pack non possédé, on l'oublie pour
  // forcer le remplacement par best.idealTop (qui respecte availableSources).
  if(availableSources&&aiResult.ideal_preset){
    const e=findCatalogEntry(aiResult.ideal_preset);
    if(e?.src&&availableSources[e.src]===false){
      aiResult.ideal_preset=null;aiResult.ideal_preset_score=0;
    }
  }
  // Idem pour le top3 : retire les entrées dont la source est décochée maintenant,
  // sinon la logique "never regress" plus bas garde l'ancien top3 si son score est
  // supérieur à la nouvelle version filtrée.
  if(availableSources&&aiResult.ideal_top3?.length){
    aiResult.ideal_top3=aiResult.ideal_top3.filter(p=>{
      const e=findCatalogEntry(p.name);
      return !e?.src||availableSources[e.src]!==false;
    });
    if(!aiResult.ideal_top3.length) aiResult.ideal_top3=null;
  }
  if(availableSources&&aiResult.preset_ann){
    const e=findCatalogEntry(aiResult.preset_ann.label);
    if(e?.src&&availableSources[e.src]===false) aiResult.preset_ann=null;
  }
  if(availableSources&&aiResult.preset_plug){
    const e=findCatalogEntry(aiResult.preset_plug.label);
    if(e?.src&&availableSources[e.src]===false) aiResult.preset_plug=null;
  }
  // Never regress: keep the better of old vs new for each dimension
  if(best.annTop){
    const newAnn={bank:best.annTop.bank,col:best.annTop.col,label:best.annTop.name,score:best.annTop.score,breakdown:best.annTop.breakdown||null};
    if(!aiResult.preset_ann||newAnn.score>=(aiResult.preset_ann.score||0)) aiResult.preset_ann=newAnn;
  }
  if(best.plugTop){
    const newPlug={bank:best.plugTop.bank,col:best.plugTop.col,label:best.plugTop.name,score:best.plugTop.score,breakdown:best.plugTop.breakdown||null};
    if(!aiResult.preset_plug||newPlug.score>=(aiResult.preset_plug.score||0)) aiResult.preset_plug=newPlug;
  }
  if(best.idealTop){
    if(!aiResult.ideal_preset||best.idealTop.score>=(aiResult.ideal_preset_score||0)){
      aiResult.ideal_preset=best.idealTop.name;aiResult.ideal_preset_score=best.idealTop.score;
    }
  }
  if(best.idealTop3?.length&&(!aiResult.ideal_top3?.length||best.idealTop3[0]?.score>=(aiResult.ideal_top3[0]?.score||0))){
    aiResult.ideal_top3=best.idealTop3;
  }
  return aiResult;
}
function bestScoreOf(r){return Math.max(r.preset_ann?.score||0,r.preset_plug?.score||0,r.ideal_preset_score||0);}

// Fusionne deux résultats en gardant le meilleur score pour CHAQUE dimension
function mergeBestResults(prev,next){
  if(!prev) return next;
  if(!next) return prev;
  const merged={...next};
  // Pédale : garder le meilleur
  if(prev.preset_ann?.score>0&&(!merged.preset_ann||prev.preset_ann.score>(merged.preset_ann.score||0))){
    merged.preset_ann=prev.preset_ann;
  }
  // Plug : garder le meilleur
  if(prev.preset_plug?.score>0&&(!merged.preset_plug||prev.preset_plug.score>(merged.preset_plug.score||0))){
    merged.preset_plug=prev.preset_plug;
  }
  // Idéal : garder le meilleur
  if((prev.ideal_preset_score||0)>(merged.ideal_preset_score||0)){
    merged.ideal_preset=prev.ideal_preset;
    merged.ideal_preset_score=prev.ideal_preset_score;
  }
  if(prev.ideal_top3?.length&&(!merged.ideal_top3?.length||prev.ideal_top3[0]?.score>merged.ideal_top3[0]?.score)){
    merged.ideal_top3=prev.ideal_top3;
  }
  return merged;
}

// Mise en cache avec mémoire du meilleur résultat par guitare (par dimension)
// Préserve les faits historiques (matériel original de l'artiste, infos morceau)
// — une optimisation ne doit JAMAIS réécrire ces faits, seulement la recommandation.
const HISTORICAL_FIELDS=["ref_guitarist","ref_guitar","ref_amp","ref_effects","song_year","song_album","song_desc","song_key","song_bpm"];
function preserveHistorical(prev,next){
  if(!prev) return next;
  const merged={...next};
  for(const k of HISTORICAL_FIELDS){
    if(prev[k]!=null&&prev[k]!=="") merged[k]=prev[k];
  }
  return merged;
}
function updateAiCache(existing,gId,newResult){
  const prevResult=existing?.result;
  const merged=preserveHistorical(prevResult,newResult);
  const prevBest=existing?.bestByGuitar?.[gId];
  const best=mergeBestResults(prevBest,merged);
  const bestByGuitar={...(existing?.bestByGuitar||{}), [gId]:best};
  return {gId,result:merged,sv:SCORING_VERSION,bestByGuitar};
}
function getBestResult(song,gId,fallback){
  const cached=song.aiCache?.bestByGuitar?.[gId];
  return mergeBestResults(cached,fallback);
}

// Parseur JSON robuste — gère les réponses tronquées par maxOutputTokens
function safeParseJSON(t){
  let s=t.replace(/```json|```/g,"").trim();
  try{return JSON.parse(s);}catch(e){
    let fixed=s,inStr=false,esc=false,opens=[];
    for(let i=0;i<fixed.length;i++){
      const c=fixed[i];
      if(esc){esc=false;continue;}
      if(c==='\\'){esc=true;continue;}
      if(c==='"'){inStr=!inStr;continue;}
      if(inStr)continue;
      if(c==='{'||c==='[')opens.push(c);
      if(c==='}'||c===']')opens.pop();
    }
    if(inStr)fixed+='"';
    while(opens.length){const o=opens.pop();fixed+=o==='{'?'}':']';}
    return JSON.parse(fixed);
  }
}

function fetchAI(song,gId,banksAnn,banksPlug,aiProvider,aiKeys,guitars,feedback,availableSources){
  guitars=guitars||GUITARS;

Morceau : "${song.title}" de "${song.artist}".
Guitare sélectionnée : ${g?g.name+" ("+g.type+")":"non précisée"}.

COLLECTION DE GUITARES DISPONIBLES :
${gProfiles}
${feedbackLine}
INSTRUCTIONS : Tu dois suivre un raisonnement structuré en 4 étapes AVANT de donner ta recommandation. Ce raisonnement DOIT apparaître dans le JSON de sortie.

ÉTAPE 1 – PROFIL TONAL DU MORCEAU
Analyse en détail : artiste, guitare originale utilisée sur l'enregistrement, ampli original, type de gain (clean/crunch/overdrive/high gain), texture sonore (chaud, brillant, mid-heavy, scooped…), style de jeu typique.

ÉTAPE 2 – SCORING GUITARE (sur la collection ci-dessus)
Pour chaque guitare de la collection, évalue la compatibilité avec le profil tonal :
- Type de micro (humbucker / single coil / P90) et adéquation
- Corps et caractéristiques (attaque, sustain, chaleur)
- Référence historique (le guitariste original jouait-il ce type de guitare ?)
Garde uniquement les 2-3 meilleures avec un score sur 100 et une justification courte.

ÉTAPE 3 – PROFIL AMPLI IDÉAL
Identifie le type d'ampli idéal pour reproduire le son de ce morceau :
- Type/famille d'ampli (Marshall Plexi, Fender Blackface, Vox AC30, Mesa Boogie, etc.)
- Niveau de gain approprié
- Caractère tonal (mid-forward, bright, dark, scooped…)

ÉTAPE 4 – SCORE FINAL DU COUPLE GUITARE + AMPLI
Pour la guitare recommandée, calcule un score global de 0 à 100 basé sur ces critères pondérés :
- Adéquation du micro (25%)
- Corps/bois de la guitare (15%)
- Référence historique (30%)
- Adéquation ampli/gain (30%)
Justifie chaque sous-score.

Réponds en JSON pur (sans backticks ni markdown). Tous les textes en français :
{"cot_step1":"3-5 phrases analysant le profil tonal du morceau","cot_step2_guitars":[{"name":"nom exact guitare de la collection","score":85,"reason":"1-2 phrases"},{"name":"2e guitare","score":75,"reason":"justification"}],"cot_step3_amp":"2-3 phrases décrivant l'ampli idéal et son caractère tonal","cot_step4_score":{"guitar_score":85,"micro":{"score":90,"reason":"justification"},"body":{"score":80,"reason":"justification"},"history":{"score":95,"reason":"justification"},"amp_match":{"score":85,"reason":"justification"}},"song_year":1970,"song_album":"album","song_desc":"2-3 phrases sur le morceau","song_key":"tonalite du morceau (ex: Em, A, Bb)","song_bpm":120,"song_style":"blues/rock/hard_rock/jazz/metal/pop","target_gain":5,"tonal_school":"fender_clean/marshall_crunch/vox_chime/dumble_smooth/mesa_heavy/hiwatt_clean","pickup_preference":"HB/SC/P90/any","ideal_guitar":"nom complet guitare idéale de la collection","guitar_reason":"1-2 phrases expliquant le choix","settings_preset":"conseils réglage preset","settings_guitar":"conseils de jeu guitare","ref_guitarist":"guitariste original","ref_guitar":"guitare(s) originale(s) (modèle précis)","ref_amp":"ampli(s) original(aux) (modèle précis)","ref_effects":"effets ou 'Aucun effet'"}

Champs spéciaux :
- song_key : tonalite du morceau (notation anglaise, ex: Em, A, Bb, F#m)
- song_bpm : tempo en BPM (nombre entier)
- target_gain : 0-10 (0=clean cristallin, 3=edge of breakup, 5=crunch, 7=drive, 9=high gain, 10=metal extrême)
- tonal_school : famille tonale de l'ampli original
- pickup_preference : type de micro idéal
- cot_step2_guitars : guitares choisies UNIQUEMENT dans la collection listée ci-dessus
- ideal_guitar : DOIT être une guitare de la collection ci-dessus`;
  const key=aiKeys.gemini||aiKeys.anthropic||DEFAULT_GEMINI_KEY;
  const provider=(aiKeys.gemini||DEFAULT_GEMINI_KEY)?"gemini":"anthropic";
  if(!key) return Promise.reject(new Error("Clé API manquante — configure-la dans ⚙️ Paramètres."));
  const parse=safeParseJSON;
  const callAI=()=>{
    const req=provider==="gemini"
      ?fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${key}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:4096}})})
        .then(r=>r.json()).then(d=>{if(d.error)throw new Error(d.error.message||d.error.status);return parse(d.candidates?.[0]?.content?.parts?.[0]?.text||"");})
      :fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:4096,messages:[{role:"user",content:prompt}]})})
        .then(r=>r.json()).then(d=>{if(d.error)throw new Error(d.error.message||d.error.type);return parse(d.content?.map(i=>i.text||"").join("")||"");});
    return req.then(r=>enrichAIResult(r,gType,gId,banksAnn,banksPlug,availableSources));
  };
  // Retry intelligent : si le meilleur score < 85%, relancer l'IA (max 2 retries)
  const RETRY_THRESHOLD=85;
  const MAX_RETRIES=2;
  const tryBest=(currentBest,retries)=>{
    if(retries<=0||bestScoreOf(currentBest)>=RETRY_THRESHOLD) return Promise.resolve(currentBest);
    return callAI().then(newResult=>{
      return tryBest(mergeBestResults(currentBest,newResult),retries-1);
    }).catch(()=>currentBest);
  };
  return callAI().then(first=>tryBest(first,MAX_RETRIES));
}

function AICard({song,gId,onResult,banksAnn,banksPlug,aiProvider,aiKeys,onCacheResult,guitars}) {
  const [res,setRes]=useState(null);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState(null);
  const [showFB,setShowFB]=useState(false);
  const [showCot,setShowCot]=useState(false);
  const doFetch=useCallback((keepBest,feedback)=>{
    const prev=keepBest?getBestResult(song,gId,res):null;
    if(!prev)setRes(null);
    setErr(null);setLoading(true);
    fetchAI(song,gId,banksAnn,banksPlug,aiProvider,aiKeys,guitars,feedback||null)
      .then(r=>{
        const best=getBestResult(song,gId,r);
        const pick=mergeBestResults(prev,best);
        setRes(pick);onResult(pick);if(onCacheResult)onCacheResult(gId,pick);
      })
      .catch(e=>{if(!prev)setErr(e.message||"Erreur IA");})
      .finally(()=>setLoading(false));
  },[song.id,gId,banksAnn,banksPlug,aiProvider,aiKeys,guitars,res]);
  useEffect(()=>{
    // Cache valide pour cette guitare ET même version de scoring ET CoT présent → utiliser le meilleur connu
    if(song.aiCache&&song.aiCache.gId===gId&&song.aiCache.sv===SCORING_VERSION&&song.aiCache.result?.cot_step1){
      const best=getBestResult(song,gId,song.aiCache.result);
      setRes(best);onResult(best);return;
    }
    // Cache existant mais guitare différente ou scoring obsolète → recalculer les scores sans rappeler l'IA
    // Sauf si le résultat n'a pas de CoT (ancien prompt) → forcer un re-fetch
    if(song.aiCache&&song.aiCache.result&&gId){
      if(!song.aiCache.result.cot_step1){doFetch(false);return;}
      const cached={...song.aiCache.result};
      const gType=(guitars||GUITARS).find(x=>x.id===gId)?.type||"HB";
      const recalc=enrichAIResult(cached,gType,gId,banksAnn,banksPlug);
      const best=getBestResult(song,gId,recalc);
      setRes(best);onResult(best);if(onCacheResult)onCacheResult(gId,best);
      return;
    }
    doFetch(false);
  },[song.id,gId,aiProvider,aiKeys.anthropic,aiKeys.gemini]);
  if(loading&&!res) return <div style={{fontSize:12,color:"var(--text-muted)",padding:"8px 0"}}>✨ Analyse IA…</div>;
  if(err) return <div style={{fontSize:12,color:"var(--red)"}}>{err}</div>;
  if(!res) return null;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:9}}>
      <Row icon="🎯"><div style={{flex:1}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
          <div><div style={{fontSize:12,color:"var(--text-bright)",fontWeight:700,marginBottom:2}}>IA : {res.ideal_guitar}</div><div style={{fontSize:11,color:"var(--text-sec)"}}>{res.guitar_reason}</div></div>
          <button onClick={()=>setShowFB(p=>!p)} style={{background:"none",border:"1px solid var(--a10)",borderRadius:"var(--r-md)",padding:"4px 8px",cursor:"pointer",fontSize:10,color:"var(--text-muted)",flexShrink:0}}>{loading?"⏳ Analyse...":"🔄 Améliorer"}</button>
        </div>
        {showFB&&<FeedbackPanel onSubmit={fb=>{setShowFB(false);doFetch(true,fb);}} onCancel={()=>setShowFB(false)}/>}
      </div></Row>

function fuzzyMatch(query,catalog){
  const norm=normalizePresetName(query);
  const words=norm.split(" ").filter(w=>w.length>1);
  return Object.entries(catalog).map(([name,info])=>{
    const nn=normalizePresetName(name);
    let score=0;
    words.forEach(w=>{if(nn.includes(w))score+=w.length;});
    // Bonus for same start
    if(nn.startsWith(words[0]||""))score+=5;
    return {name,info,score};
  }).filter(r=>r.score>3).sort((a,b)=>b.score-a.score).slice(0,5);
}

function FuzzyPresetMatch({name,bank,slot,onAccept,onSearch,onManual,onClose}){
  const suggestions=useMemo(()=>fuzzyMatch(name,PRESET_CATALOG_MERGED),[name]);
  return(
    <div style={{background:"var(--a4)",border:"1px solid var(--a8)",borderRadius:"var(--r-md)",padding:10}}>
      <div style={{fontSize:11,color:"var(--text-muted)",marginBottom:6}}>Preset non trouvé : <b style={{color:"var(--text)"}}>{name}</b></div>
      {suggestions.length>0&&<div style={{marginBottom:8}}>
        <div style={{fontSize:10,color:"var(--text-dim)",marginBottom:4}}>Presets approchants :</div>
        {suggestions.map(s=>(
          <button key={s.name} onClick={()=>onAccept(s.name)} style={{display:"block",width:"100%",textAlign:"left",background:"var(--green-bg)",border:"1px solid var(--green-border)",borderRadius:"var(--r-md)",padding:"6px 8px",marginBottom:3,cursor:"pointer"}}>
            <div style={{fontSize:11,fontWeight:600,color:"var(--text)"}}>{s.name}</div>
            <div style={{fontSize:9,color:"var(--text-muted)"}}>{s.info.amp} · {SOURCE_LABELS[s.info.src]||s.info.src}</div>

        ))}
      </div>}

// ─── Profile Picker (startup) ─────────────────────────────────────────────────
function ProfilePickerScreen({profiles,onPick}){
  const [selectedId,setSelectedId]=useState(null);
  const [pwd,setPwd]=useState("");
  const [pwdErr,setPwdErr]=useState(false);
  const [remember,setRemember]=useState(true);
  const pwdRef=useRef(null);
  useEffect(()=>{if(selectedId&&profiles[selectedId]?.password)setTimeout(()=>pwdRef.current?.focus(),50);},[selectedId]);
  const pickWith=(id)=>{
    const p=profiles[id];if(!p)return;
    if(!p.password){onPick(id);return;}
    if(isTrusted(id)){onPick(id);return;}
    setSelectedId(id);setPwd("");setPwdErr(false);setRemember(true);
  };
  const tryLogin=()=>{
    const p=profiles[selectedId];
    if(!p)return;
    if(!p.password||p.password===pwd){
      if(p.password)setTrusted(selectedId,remember);
      onPick(selectedId);
    }
    else{setPwdErr(true);}
  };
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"80vh",padding:20}}>
      <div style={{fontSize:32,marginBottom:8}}>🎸</div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,width:"100%",maxWidth:400,marginBottom:16}}>
        {Object.values(profiles).sort((a,b)=>a.name.localeCompare(b.name)).map(p=>{
          const c=profileColor(p.id);
          const sel=selectedId===p.id;
          const trusted=p.password&&isTrusted(p.id);
          return <button key={p.id} onClick={()=>pickWith(p.id)} style={{background:sel?"var(--accent-bg)":"var(--a4)",border:sel?"2px solid var(--accent)":"2px solid var(--a10)",borderRadius:"var(--r-xl)",padding:"24px 12px",cursor:"pointer",textAlign:"center",transition:"all .15s"}}>
            <div style={{background:c,color:"var(--text-inverse)",borderRadius:"var(--r-pill)",width:48,height:48,fontSize:22,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 10px"}}>{p.name[0].toUpperCase()}</div>
            <div style={{fontSize:14,fontWeight:700,color:"var(--text)"}}>{p.name}</div>
            {p.password&&<div style={{fontSize:11,color:"var(--text-muted)",marginTop:4}}>{trusted?"🔓":"🔒"}</div>}
          </button>;
        })}
      </div>
      {selectedId&&profiles[selectedId]?.password&&!isTrusted(selectedId)&&<div style={{width:"100%",maxWidth:300}}>
        <div style={{fontSize:12,color:"var(--text-sec)",marginBottom:8,textAlign:"center"}}>Mot de passe pour {profiles[selectedId].name}</div>
        <div style={{display:"flex",gap:8}}>
          <input ref={pwdRef} type="password" inputMode="numeric" autoFocus placeholder="Mot de passe" value={pwd} onChange={e=>{setPwd(e.target.value);setPwdErr(false);}} onKeyDown={e=>e.key==="Enter"&&tryLogin()} style={{flex:1,background:"var(--bg-card)",color:"var(--text)",border:`1px solid ${pwdErr?"var(--red)":"var(--a15)"}`,borderRadius:"var(--r-md)",padding:"10px 14px",fontSize:14}}/>
          <button onClick={tryLogin} style={{background:"var(--accent)",border:"none",color:"var(--text-inverse)",borderRadius:"var(--r-md)",padding:"10px 18px",fontSize:14,fontWeight:700,cursor:"pointer"}}>OK</button>
        </div>
        <label style={{display:"flex",alignItems:"center",gap:6,marginTop:10,fontSize:12,color:"var(--text-sec)",cursor:"pointer",justifyContent:"center"}}>
          <input type="checkbox" checked={remember} onChange={e=>setRemember(e.target.checked)} style={{cursor:"pointer"}}/>

        {pwdErr&&<div style={{fontSize:11,color:"var(--red)",marginTop:6,textAlign:"center"}}>Mot de passe incorrect</div>}

// ─── Profile Selector ─────────────────────────────────────────────────────────
function ProfileSelector({profiles,activeProfileId,onSwitch,onSettings,onViewProfile}){
  const [open,setOpen]=useState(false);
  const [loginId,setLoginId]=useState(null);
  const [pwd,setPwd]=useState("");
  const [pwdErr,setPwdErr]=useState(false);
  const [remember,setRemember]=useState(true);
  const ref=useRef(null);
  const pwdRef2=useRef(null);
  useEffect(()=>{if(loginId)setTimeout(()=>pwdRef2.current?.focus(),50);},[loginId]);
  useEffect(()=>{
    if(!open)return;
    const h=e=>{if(ref.current&&!ref.current.contains(e.target)){setOpen(false);setLoginId(null);}};
    document.addEventListener("click",h,true);
    return ()=>document.removeEventListener("click",h,true);
  },[open]);
  const trySwitch=(id)=>{
    const p=profiles[id];
    if(!p)return;
    if(!p.password||isTrusted(id)){onSwitch(id);setOpen(false);setLoginId(null);return;}
    setLoginId(id);setPwd("");setPwdErr(false);setRemember(true);
  };
  const tryLogin=()=>{
    const p=profiles[loginId];
    if(!p)return;
    if(p.password===pwd){
      setTrusted(loginId,remember);
      onSwitch(loginId);setOpen(false);setLoginId(null);
    }
    else setPwdErr(true);
  };
  const active=profiles[activeProfileId];
  const color=profileColor(activeProfileId);
  return(
    <div ref={ref} style={{position:"relative"}}>
      <button onClick={()=>{setOpen(!open);setLoginId(null);}} style={{background:color,border:"none",color:"var(--text-inverse)",borderRadius:"var(--r-pill)",width:34,height:34,fontSize:15,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
        {(active?.name||"?")[0].toUpperCase()}
      </button>
      {open&&<div style={{position:"absolute",top:40,left:0,background:"var(--bg-card)",border:"1px solid var(--a12)",borderRadius:"var(--r-lg)",padding:8,zIndex:50,minWidth:200,boxShadow:"var(--shadow-lg)"}}>
        {Object.values(profiles).sort((a,b)=>a.name.localeCompare(b.name)).map(p=>{
          const isActive=p.id===activeProfileId;
          const c=profileColor(p.id);
          const isLogin=loginId===p.id;
          return <div key={p.id}>
            <div style={{display:"flex",alignItems:"center",gap:6,width:"100%",background:isActive?"var(--a7)":isLogin?"var(--accent-bg)":"transparent",borderRadius:"var(--r-md)",padding:"6px 8px",marginBottom:2}}>
              <button onClick={()=>trySwitch(p.id)} style={{display:"flex",alignItems:"center",gap:8,flex:1,background:"transparent",border:"none",cursor:"pointer",padding:0}}>
                <div style={{background:c,color:"var(--text-inverse)",borderRadius:"var(--r-pill)",width:26,height:26,fontSize:12,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{p.name[0].toUpperCase()}</div>
                <span style={{fontSize:13,color:isActive?"var(--text)":"var(--text-sec)",fontWeight:isActive?700:400}}>{p.name}</span>
                {p.password&&<span style={{fontSize:9,color:"var(--text-dim)"}}>{isTrusted(p.id)?"🔓":"🔒"}</span>}
              </button>
              {isActive&&<span style={{fontSize:11,color:"var(--green)"}}>✓</span>}
              {!isActive&&<button onClick={()=>{if(onViewProfile){onViewProfile(p.id);setOpen(false);}}} style={{background:"var(--a5)",border:"none",color:"var(--text-dim)",borderRadius:"var(--r-sm)",padding:"2px 6px",fontSize:9,cursor:"pointer"}} title="Voir la config">👁</button>}
            </div>
            {isLogin&&<div style={{padding:"4px 8px 8px"}}>
              <div style={{display:"flex",gap:6}}>
                <input ref={pwdRef2} type="password" inputMode="numeric" autoFocus placeholder="Mot de passe" value={pwd} onChange={e=>{setPwd(e.target.value);setPwdErr(false);}} onKeyDown={e=>e.key==="Enter"&&tryLogin()} style={{flex:1,background:"var(--bg-elev-1)",color:"var(--text)",border:`1px solid ${pwdErr?"var(--red)":"var(--a15)"}`,borderRadius:"var(--r-md)",padding:"5px 8px",fontSize:11}}/>
                <button onClick={tryLogin} style={{background:"var(--accent)",border:"none",color:"var(--text-inverse)",borderRadius:"var(--r-md)",padding:"5px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>OK</button>
              </div>
              <label style={{display:"flex",alignItems:"center",gap:5,marginTop:5,fontSize:10,color:"var(--text-muted)",cursor:"pointer"}}>
                <input type="checkbox" checked={remember} onChange={e=>setRemember(e.target.checked)} style={{cursor:"pointer"}}/>
                Mémoriser sur cet appareil
              </label>
            </div>}
          </div>;
        })}
      </div>}
    </div>
  );
}

const PROFILE_COLORS=["var(--brass-400)","var(--copper-400)","var(--wine-400)","var(--brass-300)","var(--copper-500)","var(--brass-600)"];
function profileColor(id){
  let h=0;for(let i=0;i<id.length;i++)h=id.charCodeAt(i)+((h<<5)-h);
  return PROFILE_COLORS[Math.abs(h)%PROFILE_COLORS.length];
}

const SOURCE_LABELS={TSR:"64 Studio Rats",ML:"ML Sound Lab Essentials",Anniversary:"ToneX Anniversary Factory",Factory:"ToneX Factory",PlugFactory:"ToneX Plug Factory",ToneNET:"ToneNET"};

function GuitarSearchAdd({inp,aiKeys,onAdd}){
  const [query,setQuery]=useState("");
  const [loading,setLoading]=useState(false);
  const [suggestion,setSuggestion]=useState(null);
  const [err,setErr]=useState(null);
  const [manual,setManual]=useState(false);
  const [mName,setMName]=useState("");
  const [mShort,setMShort]=useState("");
  const [mType,setMType]=useState("HB");

  const search=()=>{
    if(!query.trim())return;
    const key=aiKeys?.gemini||aiKeys?.anthropic||DEFAULT_GEMINI_KEY;
    if(!key){setErr("Clé API manquante");return;}
    setLoading(true);setErr(null);setSuggestion(null);
    const prompt=`L'utilisateur veut ajouter une guitare à son profil. Il a tapé : "${query.trim()}"
Identifie le modèle exact de guitare (marque + modèle + variante si mentionnée).
Détermine le type de micro principal : HB (humbucker), SC (single coil) ou P90.
Propose un nom abrégé court (ex: "Strat 60s", "LP Standard", "Tele 72", "SG 61", "ES-335").
Réponds UNIQUEMENT en JSON (sans markdown) : {"name":"Nom complet (Marque Modèle)","short":"Abrégé court","type":"HB|SC|P90","confidence":"high|medium|low"}`;
    const parse=safeParseJSON;
    fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${key}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})})
      .then(r=>r.json()).then(d=>{if(d.error)throw new Error(d.error.message);return parse(d.candidates?.[0]?.content?.parts?.[0]?.text||"");})
      .then(s=>setSuggestion(s)).catch(e=>setErr(e.message)).finally(()=>setLoading(false));
  };

  const confirm=()=>{
    if(suggestion){onAdd(suggestion.name,suggestion.short,suggestion.type);setSuggestion(null);setQuery("");}
  };
  const addManual=()=>{
    if(mName.trim()&&mShort.trim()){onAdd(mName.trim(),mShort.trim(),mType);setMName("");setMShort("");setMType("HB");setManual(false);}
  };

  return(
    <div style={{background:"var(--accent-bg)",border:"1px solid var(--accent-soft)",borderRadius:"var(--r-lg)",padding:12}}>
      <div style={{fontSize:11,color:"var(--accent)",fontWeight:600,marginBottom:8}}>+ Ajouter une guitare</div>
      {!manual?<>
        <div style={{display:"flex",gap:6,marginBottom:suggestion||err?8:0}}>
          <input placeholder="Ex: telecaster 72, les paul junior..." value={query} onChange={e=>{setQuery(e.target.value);setSuggestion(null);}} onKeyDown={e=>e.key==="Enter"&&search()} style={{...inp,flex:1,fontSize:11,padding:"6px 10px"}}/>
          <button onClick={search} disabled={!query.trim()||loading} style={{background:!query.trim()||loading?"var(--bg-disabled)":"var(--accent)",border:"none",color:"var(--text-inverse)",borderRadius:"var(--r-md)",padding:"5px 12px",fontSize:11,fontWeight:700,cursor:!query.trim()||loading?"not-allowed":"pointer"}}>{loading?"...":"🔍"}</button>
        </div>
        {err&&<div style={{fontSize:10,color:"var(--red)",marginBottom:6}}>{err}</div>}
        {suggestion&&<div style={{background:"var(--green-bg)",border:"1px solid var(--green-border)",borderRadius:"var(--r-md)",padding:10}}>
          <div style={{fontSize:12,fontWeight:700,color:"var(--text)",marginBottom:2}}>{suggestion.name}</div>
          <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:11,color:"var(--text-sec)"}}>{suggestion.short}</span>
            <span style={{fontSize:10,color:`rgb(${TYPE_COLORS[suggestion.type]||"99,102,241"})`,background:`rgba(${TYPE_COLORS[suggestion.type]||"99,102,241"},0.15)`,borderRadius:"var(--r-sm)",padding:"1px 7px",fontWeight:700}}>{suggestion.type} — {TYPE_LABELS[suggestion.type]}</span>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={confirm} style={{background:"var(--green)",border:"none",color:"var(--bg)",borderRadius:"var(--r-md)",padding:"5px 12px",fontSize:11,fontWeight:700,cursor:"pointer"}}>Ajouter</button>
            <button onClick={()=>setSuggestion(null)} style={{background:"var(--a7)",border:"none",color:"var(--text-sec)",borderRadius:"var(--r-md)",padding:"5px 10px",fontSize:11,cursor:"pointer"}}>Corriger</button>
          </div>
        </div>}
        <button onClick={()=>setManual(true)} style={{background:"none",border:"none",color:"var(--text-dim)",fontSize:10,cursor:"pointer",padding:"6px 0 0",textDecoration:"underline"}}>Saisie manuelle</button>
      </>:<>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6}}>
          <input placeholder="Nom complet" value={mName} onChange={e=>setMName(e.target.value)} style={{...inp,flex:"1 1 120px",fontSize:11,padding:"5px 8px"}}/>
          <input placeholder="Abrégé" value={mShort} onChange={e=>setMShort(e.target.value)} style={{...inp,flex:"0 1 80px",fontSize:11,padding:"5px 8px"}}/>
          <select value={mType} onChange={e=>setMType(e.target.value)} style={{...inp,flex:"0 0 60px",fontSize:11,padding:"5px 4px"}}>
            <option value="HB">HB</option><option value="SC">SC</option><option value="P90">P90</option>
          </select>
          <button onClick={addManual} disabled={!mName.trim()||!mShort.trim()} style={{background:mName.trim()&&mShort.trim()?"var(--accent)":"var(--bg-disabled)",border:"none",color:"var(--text-inverse)",borderRadius:"var(--r-md)",padding:"5px 12px",fontSize:11,fontWeight:700,cursor:mName.trim()&&mShort.trim()?"pointer":"not-allowed"}}>Ajouter</button>
        </div>
        <button onClick={()=>setManual(false)} style={{background:"none",border:"none",color:"var(--text-dim)",fontSize:10,cursor:"pointer",padding:0,textDecoration:"underline"}}>← Recherche IA</button>
      </>}
    </div>
  );
}

function ProfileTab({profile,profiles,onProfiles,activeProfileId,inp,section,aiKeys,customGuitars,onCustomGuitars}){
  const [editName,setEditName]=useState(profile.name);
  const [newProfileName,setNewProfileName]=useState("");
  const [newGuitarName,setNewGuitarName]=useState("");
  const [newGuitarShort,setNewGuitarShort]=useState("");
  const [newGuitarType,setNewGuitarType]=useState("HB");
  const [confirmDelete,setConfirmDelete]=useState(false);
  const [editingGuitarId,setEditingGuitarId]=useState(null);
  const [editGName,setEditGName]=useState("");
  const [editGShort,setEditGShort]=useState("");
  const [editGType,setEditGType]=useState("HB");

  const updateProfile=(field,value)=>onProfiles(p=>({...p,[activeProfileId]:{...p[activeProfileId],[field]:typeof value==="function"?value(p[activeProfileId][field]):value}}));

  const toggleGuitar=id=>{
    updateProfile("myGuitars",prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);
  };
  const toggleSource=key=>{
    updateProfile("availableSources",prev=>({...prev,[key]:!prev[key]}));
  };
  const addCustomGuitar=(cg)=>{
    onCustomGuitars(prev=>[...(prev||[]),cg]);
    // Auto-check in current profile
    updateProfile("myGuitars",prev=>[...prev,cg.id]);
  };
  const removeCustomGuitar=id=>{
    onCustomGuitars(prev=>(prev||[]).filter(g=>g.id!==id));
    // Uncheck from all profiles
    onProfiles(p=>{const n={...p};for(const pid in n){n[pid]={...n[pid],myGuitars:(n[pid].myGuitars||[]).filter(x=>x!==id)};}return n;});
  };
  const startEditGuitar=(g,isCustom)=>{
    const edits=profile.editedGuitars||{};
    const orig=isCustom?g:({...GUITARS.find(x=>x.id===g.id),...(edits[g.id]||{})});
    setEditingGuitarId(g.id);setEditGName(orig.name);setEditGShort(orig.short);setEditGType(orig.type);
  };
  const saveEditGuitar=()=>{
    if(!editGName.trim()||!editGShort.trim()){setEditingGuitarId(null);return;}
    const isCustom=editingGuitarId?.startsWith("cg_");
    if(isCustom){
      onCustomGuitars(prev=>(prev||[]).map(g=>g.id===editingGuitarId?{...g,name:editGName.trim(),short:editGShort.trim(),type:editGType}:g));
    } else {
      updateProfile("editedGuitars",prev=>({...(prev||{}), [editingGuitarId]:{name:editGName.trim(),short:editGShort.trim(),type:editGType}}));
    }
    setEditingGuitarId(null);
  };
  const resetGuitar=id=>{
    updateProfile("editedGuitars",prev=>{const n={...(prev||{})};delete n[id];return n;});
    setEditingGuitarId(null);
  };
  const [adminPin,setAdminPin]=useState("");
  const [adminPinErr,setAdminPinErr]=useState(false);
  const createProfile=()=>{
    if(!newProfileName.trim())return;
    if(adminPin!==ADMIN_PIN){setAdminPinErr(true);return;}
    setAdminPinErr(false);
    const id=newProfileName.trim().toLowerCase().replace(/[^a-z0-9]/g,"_")+`_${Date.now()}`;
    onProfiles(p=>({...p,[id]:makeDefaultProfile(id,newProfileName.trim())}));
    setNewProfileName("");setAdminPin("");
  };
  const deleteProfile=()=>{
    if(Object.keys(profiles).length<=1)return;
    const remaining={...profiles};delete remaining[activeProfileId];
    onProfiles(remaining);
    setConfirmDelete(false);
  };
  const saveName=()=>{
    if(!editName.trim())return;
    updateProfile("name",editName.trim());
  };

  const s=section||"guitars";
  return (
    <div>
      {/* Mes guitares */}

                  <div style={{flex:1}}><span style={{fontSize:12,fontWeight:600,color:sel?"var(--text)":"var(--text-muted)"}}>{g.short}</span><span style={{fontSize:10,color:"var(--text-dim)",marginLeft:6}}>{g.name}</span></div>
                  <span style={{fontSize:10,color:"var(--text-dim)",marginRight:4}}>{g.type}</span>
                  {sel&&<button onClick={e=>{e.stopPropagation();startEditGuitar(g,true);}} style={{background:"var(--a7)",border:"none",color:"var(--text-sec)",borderRadius:"var(--r-sm)",padding:"3px 7px",fontSize:10,cursor:"pointer"}}>✏️</button>}
                  <button onClick={e=>{e.stopPropagation();removeCustomGuitar(g.id);}} style={{background:"none",border:"none",color:"var(--red)",cursor:"pointer",fontSize:11,padding:"2px 4px"}}>✕</button>
                </div>
                {isEditing&&<div style={{background:"var(--a5)",borderRadius:"0 0 8px 8px",padding:"10px 12px",marginTop:-1,border:"1px solid var(--a8)",borderTop:"none"}}>

                    <input placeholder="Nom" value={editGName} onChange={e=>setEditGName(e.target.value)} style={{...inp,flex:"1 1 140px",fontSize:11,padding:"5px 8px"}}/>
                    <input placeholder="Abrégé" value={editGShort} onChange={e=>setEditGShort(e.target.value)} style={{...inp,flex:"0 1 80px",fontSize:11,padding:"5px 8px"}}/>
                    <select value={editGType} onChange={e=>setEditGType(e.target.value)} style={{...inp,flex:"0 0 55px",fontSize:11,padding:"5px 4px"}}><option value="HB">HB</option><option value="SC">SC</option><option value="P90">P90</option></select>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={saveEditGuitar} style={{background:"var(--accent)",border:"none",color:"var(--text-inverse)",borderRadius:"var(--r-md)",padding:"5px 12px",fontSize:11,fontWeight:700,cursor:"pointer"}}>Sauver</button>
                    <button onClick={()=>setEditingGuitarId(null)} style={{background:"var(--a7)",border:"none",color:"var(--text-sec)",borderRadius:"var(--r-md)",padding:"5px 10px",fontSize:11,cursor:"pointer"}}>Annuler</button>
                  </div>

              </div>;
            })}
            </div>
          </div>;
          })}
        </div>;})()}
        <GuitarSearchAdd inp={inp} aiKeys={aiKeys} onAdd={(name,short,type)=>{
          const knownBrands=["Gibson","Fender","Epiphone","PRS","Ibanez","ESP","Jackson","Schecter","Gretsch","Squier","Yamaha","Taylor","Martin"];

          return <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {/* Pédale ToneX ? */}
            <div>
              <div style={{fontSize:12,fontWeight:600,color:"var(--text-sec)",marginBottom:6}}>As-tu une pédale ToneX ?</div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{setDevice("pedale",true);setDevice("anniversary",false);}} style={btnStyle(d.pedale&&!d.anniversary)}>
                  {check(d.pedale&&!d.anniversary)}
                  <div style={{fontSize:12,color:d.pedale&&!d.anniversary?"var(--text)":"var(--text-muted)",fontWeight:600}}>Oui, Standard</div>
                </button>
                <button onClick={()=>{setDevice("anniversary",true);setDevice("pedale",false);}} style={btnStyle(d.anniversary)}>
                  {check(d.anniversary)}
                  <div style={{fontSize:12,color:d.anniversary?"var(--text)":"var(--text-muted)",fontWeight:600}}>Oui, Anniversary</div>
                </button>
                <button onClick={()=>{setDevice("pedale",false);setDevice("anniversary",false);}} style={btnStyle(!hasPedale)}>
