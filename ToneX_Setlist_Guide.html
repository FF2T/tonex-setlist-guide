          </div>
          {g&&chosenGuitarScore&&<div style={{fontSize:10,color:"var(--text-dim)",marginTop:3,marginLeft:24}}>Compatibilite : <b style={{color:scoreColor(chosenGuitarScore)}}>{chosenGuitarScore}%</b>{chosenGuitarScoreEstimated&&<span style={{marginLeft:6,color:"var(--text-tertiary)",fontStyle:"italic"}}>(estime)</span>}</div>}
          {g&&aiC&&(()=>{const fb=guitarChoiceFeedback(g,aiC,chosenGuitarCot);return fb?<div style={{fontSize:10,color:"var(--text-sec)",marginTop:3,marginLeft:24,lineHeight:1.4}}>{fb}</div>:null;})()}
          {g&&aiC&&(()=>{const s=localGuitarSettings(g,aiC);return s?<div style={{fontSize:10,background:"var(--a4)",border:"1px solid var(--a10)",borderRadius:"var(--r-md)",padding:"5px 8px",color:"var(--text-sec)",marginTop:5,marginLeft:24}}><b style={{color:"var(--text-muted)"}}>Reglages :</b> {s}</div>:null;})()}
        </div>
        <div style={{fontSize:10,color:"var(--text-muted)",marginBottom:4}}>Meilleurs presets installes pour {g?.short||"cette guitare"}</div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          <div style={{display:"flex",alignItems:"center",gap:4}}><StatusDot score={aiC.preset_ann?.score} ideal={aiC.preset_ann?.label===aiC.ideal_preset} size={10}/><div style={{flex:1}}><PBlock device="Pedale" emoji="📦" presetName={aiC.preset_ann?.label} gType={gId?type:null} banks={banksAnn} availableSources={availableSources} guitarId={gId} noUpgrade finalScore={aiC.preset_ann?.score} breakdown={aiC.preset_ann?.breakdown}/></div></div>
          <div style={{display:"flex",alignItems:"center",gap:4}}><StatusDot score={aiC.preset_plug?.score} ideal={aiC.preset_plug?.label===aiC.ideal_preset} size={10}/><div style={{flex:1}}><PBlock device="ToneX Plug" emoji="🔌" presetName={aiC.preset_plug?.label} gType={gId?type:null} banks={banksPlug} availableSources={availableSources} guitarId={gId} noUpgrade finalScore={aiC.preset_plug?.score} breakdown={aiC.preset_plug?.breakdown}/></div></div>
        </div>
        {/* Suggestion si score < 90% */}
        {(()=>{
          var bestScore=Math.max(aiC.preset_ann?.score||0,aiC.preset_plug?.score||0,aiC.ideal_preset_score||0);
          if(bestScore>=90) return null;
          var bestBreakdown=aiC.preset_ann?.breakdown||aiC.preset_plug?.breakdown;
          var refAmp=aiC.ref_amp||"l'ampli original";
          var weakest=null;var weakLabel="";var weakScore=100;
          if(bestBreakdown){
            var dims=[
              {key:"refAmp",label:"Ampli",score:bestBreakdown.refAmp?.raw},
              {key:"gainMatch",label:"Gain",score:bestBreakdown.gainMatch?.raw},
              {key:"styleMatch",label:"Style",score:bestBreakdown.styleMatch?.raw},
              {key:"pickup",label:"Micro",score:bestBreakdown.pickup?.raw}
            ];
            dims.forEach(function(d){if(d.score!=null&&d.score<weakScore){weakScore=d.score;weakest=d.key;weakLabel=d.label;}});
          }
          // Chercher dans les catalogues externes (packs disponibles a l'achat)
          var extMatches=[];
          var refLower=(refAmp||"").toLowerCase();
          // D'abord chercher dans TSR_PACK_ZIPS (64 packs complets)
          if(typeof TSR_PACK_ZIPS!=="undefined"){
            for(var packName in TSR_PACK_ZIPS){
              if(packName.toLowerCase().includes(refLower)||refLower.includes(packName.toLowerCase())){
                extMatches.push({creator:"The Studio Rats",url:"thestudiorats.com",pack:packName});
              }
            }
          }
          // Puis les autres createurs via EXTERNAL_PACK_CATALOG
          if(typeof EXTERNAL_PACK_CATALOG!=="undefined"){
            EXTERNAL_PACK_CATALOG.forEach(function(creator){
              if(creator.creator==="The Studio Rats") return; // deja couvert par TSR_PACK_ZIPS
              creator.packs.forEach(function(pack){
                var match=pack.amps.some(function(a){return refLower.includes(a)||a.includes(refLower);});
                if(match){
                  var already=extMatches.find(function(e){return e.creator===creator.creator&&e.pack===pack.name;});
                  if(!already) extMatches.push({creator:creator.creator,url:creator.url,pack:pack.name});
                }
              });
            });
          }
          // Aussi chercher par famille dans AMP_TAXONOMY si pas de match direct
          if(extMatches.length===0&&typeof AMP_TAXONOMY!=="undefined"){
            var refTax=AMP_TAXONOMY[refAmp];
            if(refTax){
              // Chercher dans TSR_PACK_ZIPS par famille
              if(typeof TSR_PACK_ZIPS!=="undefined"){
                for(var pn in TSR_PACK_ZIPS){
                  var pnLower=pn.toLowerCase();
                  for(var ampName in AMP_TAXONOMY){
                    if(pnLower.includes(ampName.toLowerCase().split(" ")[0])&&AMP_TAXONOMY[ampName].family===refTax.family){
                      var alr=extMatches.find(function(e){return e.creator==="The Studio Rats"&&e.pack===pn;});
                      if(!alr) extMatches.push({creator:"The Studio Rats",url:"thestudiorats.com",pack:pn,family:true});
                      break;
                    }
                  }
                }
              }
              // Chercher dans les autres createurs
              if(typeof EXTERNAL_PACK_CATALOG!=="undefined"){
                EXTERNAL_PACK_CATALOG.forEach(function(creator){
                  if(creator.creator==="The Studio Rats") return;
                creator.packs.forEach(function(pack){
                  pack.amps.forEach(function(a){
                    for(var ampName in AMP_TAXONOMY){
                      if(ampName.toLowerCase().includes(a)&&AMP_TAXONOMY[ampName].family===refTax.family){
                        var already=extMatches.find(function(e){return e.creator===creator.creator&&e.pack===pack.name;});
                        if(!already) extMatches.push({creator:creator.creator,url:creator.url,pack:pack.name,family:true});
                        return;
                      }
                    }
                  });
                });
              });
              }
            }
          }
          var suggestion="";
          if(weakest==="refAmp") suggestion="Aucun preset installe ne simule "+refAmp+".";
          else if(weakest==="gainMatch") suggestion="Le gain des presets disponibles ne correspond pas au son original.";
          else if(weakest==="styleMatch") suggestion="Le style des presets disponibles ne matche pas bien.";
          else if(weakest==="pickup") suggestion="Les presets ne sont pas optimises pour votre type de micro ("+type+").";
          else suggestion="Le meilleur preset installe n'atteint pas 90%.";
          return <div style={{marginTop:8,background:"rgba(251,191,36,0.06)",border:"1px solid rgba(251,191,36,0.2)",borderRadius:8,padding:"10px 12px"}}>
            <div style={{fontSize:10,fontWeight:700,color:"var(--yellow)",textTransform:"uppercase",letterSpacing:0.3,marginBottom:4}}>Ameliorable — {bestScore}% max</div>
            <div style={{fontSize:11,color:"var(--text-sec)",lineHeight:1.5,marginBottom:6}}>
              {weakest&&<span>Point faible : <b>{weakLabel}</b> ({weakScore}%). </span>}
              {suggestion}
            </div>
            {extMatches.length>0&&<div style={{marginBottom:6}}>
              <div style={{fontSize:10,fontWeight:700,color:"var(--text-muted)",marginBottom:4}}>Packs recommandes a l'achat :</div>
              {extMatches.map(function(e,i){return <div key={i} style={{fontSize:10,color:"var(--text-sec)",marginBottom:3,display:"flex",alignItems:"baseline",gap:4}}>
                <StatusDot score={e.family?65:85} size={6}/>
                <span style={{fontWeight:600,color:"var(--text-bright)"}}>{e.pack}</span>
                <span style={{color:"var(--text-dim)"}}>{e.creator}</span>
                {e.family&&<span style={{fontSize:9,color:"var(--text-dim)"}}>[famille similaire]</span>}
              </div>;})}
            </div>}
            {extMatches.length===0&&<div style={{fontSize:10,color:"var(--text-dim)",marginBottom:6}}>Aucun pack connu pour "{refAmp}" dans notre base.</div>}
            <div style={{marginTop:6,background:"var(--a4)",border:"1px solid var(--a8)",borderRadius:6,padding:"8px 10px"}}>
              <div style={{fontSize:10,fontWeight:600,color:"var(--text-sec)",marginBottom:3}}>Recherche ToneNET</div>
              <div style={{fontSize:10,color:"var(--text-dim)",marginBottom:4}}>Recherchez <b style={{color:"var(--text-bright)"}}>{refAmp}</b> dans le moteur de recherche ToneNET</div>
              <a href="https://tone.net" target="_blank" rel="noopener noreferrer" style={{fontSize:10,color:"var(--accent)",textDecoration:"underline"}}>tone.net</a>
            </div>
          </div>;
        })()}
      </div>

      </>}
      {!reloading&&!aiC&&<div style={{fontSize:12,color:"var(--text-dim)",padding:"10px 0"}}>Aucune analyse IA en cache. Selectionne une guitare pour lancer l'analyse.</div>}

      {/* ── SECTION 6 : Améliorer ── */}
      {!reloading&&aiC&&<div>
        {!showFeedback
          ?<button onClick={()=>setShowFeedback(true)} style={{fontSize:10,background:"none",border:"1px solid var(--a10)",color:"var(--text-dim)",borderRadius:"var(--r-md)",padding:"3px 8px",cursor:"pointer"}}>🔄 Affiner l'analyse</button>
          :<FeedbackPanel onSubmit={fb=>{
            setShowFeedback(false);setReloading(true);
            const prev=aiC;
            fetchAI(song,gId,banksAnn,banksPlug,aiProvider,aiKeys,guitars,fb||null)
              .then(r=>{
                const pick=mergeBestResults(prev,r);
                setLocalAiResult(pick);
                if(onSongDb)onSongDb(p=>p.map(x=>x.id===song.id?{...x,aiCache:updateAiCache(x.aiCache,gId,pick)}:x));
              })
              .catch(()=>{})
              .finally(()=>setReloading(false));
          }} onCancel={()=>setShowFeedback(false)}/>
        }
      </div>}
      <button onClick={onClose} style={{fontSize:11,color:"var(--text-muted)",background:"none",border:"none",cursor:"pointer",textDecoration:"underline",padding:0,marginTop:4}}>Fermer ↑</button>
    </div>
  );
}

// ─── ListScreen ───────────────────────────────────────────────────────────────
function InlineRenameInput({initialName,onSave,onCancel,inp,placeholder,buttonLabel}){
  const [val,setVal]=useState(initialName||"");
  const submit=()=>{if(val.trim()){onSave(val.trim());setVal("");}};
  return <div style={{display:"flex",gap:6}}>
    <input value={val} onChange={e=>setVal(e.target.value)} placeholder={placeholder||""} style={{...inp,flex:1}} autoFocus={!!initialName} onKeyDown={e=>e.key==="Enter"&&submit()}/>
    <button onClick={submit} disabled={!val.trim()} style={{background:val.trim()?"var(--accent)":"var(--a7)",border:"none",color:val.trim()?"var(--text-inverse)":"var(--text-dim)",borderRadius:"var(--r-md)",padding:"4px 12px",fontSize:11,fontWeight:700,cursor:val.trim()?"pointer":"not-allowed"}}>{buttonLabel||"OK"}</button>
    {initialName&&<button onClick={onCancel} style={{background:"none",border:"none",color:"var(--text-muted)",fontSize:12,cursor:"pointer"}}>✕</button>}
  </div>;
}

function ListScreen({songDb,onSongDb,setlists,allSetlists,onSetlists,checked,onChecked,onNext,onSettings,banksAnn,onBanksAnn,banksPlug,onBanksPlug,aiProvider,aiKeys,hideHeader=false,allGuitars,availableSources,activeProfileId}) {
  const [activeSlId,setActiveSlId]=useState(setlists[0]?.id||null);
  const activeSl=activeSlId?setlists.find(s=>s.id===activeSlId):null;
  const [showAdd,setShowAdd]=useState(false);
  const [sort,setSort]=useState((activeSl?.sort&&activeSl.sort!=="default")?activeSl.sort:"artist");
  const saveSort=(v)=>{setSort(v);if(activeSlId)onSetlists(p=>p.map(sl=>sl.id===activeSlId?{...sl,sort:v}:sl));};
  const activeSongs=useMemo(()=>{
    const sl=activeSl;
    const arr=sl?(sl.songIds||[]).map(id=>songDb.find(s=>s.id===id)).filter(Boolean):[...songDb];
    if(sort==="alpha") arr.sort((a,b)=>a.title.localeCompare(b.title,"fr"));
    else if(sort==="artist") arr.sort((a,b)=>a.artist.localeCompare(b.artist,"fr")||a.title.localeCompare(b.title,"fr"));
    return arr;
  },[songDb,activeSlId,sort,setlists]);
  const [expandedId,setExpandedId]=useState(null);
  const [showTopGuitars,setShowTopGuitars]=useState(false);
  const [editingSetlists,setEditingSetlists]=useState(false);
  const [newSlName,setNewSlName]=useState("");
  const [editSlId,setEditSlId]=useState(null);
  const [editSlName,setEditSlName]=useState("");
  const createSetlist=()=>{if(!newSlName.trim())return;onSetlists(p=>[...p,{id:`sl_${Date.now()}`,name:newSlName.trim(),songIds:[],profileIds:[activeProfileId]}]);setNewSlName("");};
  const deleteSetlist=id=>{
    const sl=setlists.find(s=>s.id===id);
    if(!sl) return;
    const n=sl.songIds.length;
    if(!window.confirm(`Supprimer la setlist "${sl.name}" ?${n>0?"\nElle contient "+n+" morceau"+(n>1?"x":"")+" (les morceaux ne sont pas supprimés de la base).":""}`)) return;
    onSetlists(p=>p.filter(s=>s.id!==id));if(activeSlId===id){setActiveSlId(null);onChecked([]);}
  };
  const renameSetlist=(id,name)=>{onSetlists(p=>p.map(s=>s.id===id?{...s,name}:s));setEditSlId(null);};
  const toggle=id=>onChecked(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const toggleAll=()=>onChecked(checked.length===activeSongs.length?[]:activeSongs.map(s=>s.id));
  const inp={background:"var(--bg-card)",color:"var(--text)",border:"1px solid var(--a15)",borderRadius:"var(--r-md)",padding:"6px 10px",fontSize:12,boxSizing:"border-box"};

  // ─── Tout améliorer ───
  const IMPROVE_THRESHOLD=90;
  const IMPROVE_MAX_ROUNDS=3;
  const [improving,setImproving]=useState(false);
  const [improveStatus,setImproveStatus]=useState(null); // {current,total,round,songTitle}
  const [cancelRequested,setCancelRequested]=useState(false);
  const improveCancelRef=useRef(false);
  const songDbRef=useRef(songDb);
  songDbRef.current=songDb;
  const getSongsToImprove=()=>{
    const guitars=allGuitars||GUITARS;
    const sl=activeSl;
    const arr=sl?(sl.songIds||[]).map(id=>songDbRef.current.find(s=>s.id===id)).filter(Boolean):[...songDbRef.current];
    return arr.filter(s=>{
      if(!s.aiCache) return false;
      const ig=getIg(s,guitars);const savedGId=sl?.guitars?.[s.id];const gId=savedGId||ig?.[0]||"";
      const gType=(guitars.find(x=>x.id===gId))?.type||"HB";
      const best=getBestResult(s,gId,s.aiCache?.result);
      // Only enrich if guitar differs from cache
      const enriched=(best&&gId&&s.aiCache?.gId!==gId)?enrichAIResult({...best},gType,gId,banksAnn,banksPlug):best;
      return enriched?bestScoreOf(enriched)<IMPROVE_THRESHOLD:false;
    });
  };
  const improveBadgeCount=useMemo(()=>getSongsToImprove().length,[songDb,activeSl,banksAnn,banksPlug,allGuitars]);
  const improveAll=async()=>{
    improveCancelRef.current=false;
    setCancelRequested(false);
    setImproving(true);
    const guitars=allGuitars||GUITARS;
    // Race fetchAI against the cancel flag so "Arrêter" interrompt aussitôt l'attente IA
    const waitOrCancel=(p)=>new Promise((resolve,reject)=>{
      let done=false;
      const tick=setInterval(()=>{
        if(improveCancelRef.current&&!done){done=true;clearInterval(tick);reject(new Error("cancelled"));}
      },120);
      p.then(r=>{if(!done){done=true;clearInterval(tick);resolve(r);}},
            e=>{if(!done){done=true;clearInterval(tick);reject(e);}});
    });
    for(let round=1;round<=IMPROVE_MAX_ROUNDS;round++){
      if(improveCancelRef.current) break;
      const toImprove=getSongsToImprove();
      if(toImprove.length===0) break;
      for(let i=0;i<toImprove.length;i++){
        if(improveCancelRef.current) break;
        const s=toImprove[i];
        const ig=getIg(s,guitars);
        const savedGId=activeSl?.guitars?.[s.id];
        const gId=savedGId||ig?.[0]||"";
        setImproveStatus({current:i+1,total:toImprove.length,round,songTitle:s.title});
        try{
          const r=await waitOrCancel(fetchAI(s,gId,banksAnn,banksPlug,aiProvider,aiKeys,guitars));
          if(improveCancelRef.current) break;
          onSongDb(p=>p.map(x=>x.id===s.id?{...x,aiCache:updateAiCache(x.aiCache,gId,r)}:x));
        }catch(e){if(improveCancelRef.current) break; /* skip */}
      }
      if(improveCancelRef.current) break;
    }
    setImproving(false);setImproveStatus(null);setCancelRequested(false);
  };
  return (
    <div>
      {/* Sélecteur setlist compact */}
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
        <select value={activeSlId||""} onChange={e=>{var v=e.target.value;setActiveSlId(v||null);onChecked([]);var ss=v&&setlists.find(s=>s.id===v)?.sort;setSort(ss&&ss!=="default"?ss:"artist");}} style={{flex:1,background:"var(--bg-card)",color:"var(--text-primary)",border:"1px solid var(--border-strong,var(--a15))",borderRadius:"var(--r-md)",padding:"8px 12px",fontSize:13,cursor:"pointer"}}>
          <option value="">Tous les morceaux ({songDb.length})</option>
          {setlists.map(sl=><option key={sl.id} value={sl.id}>{sl.name} ({sl.songIds.length})</option>)}
        </select>
        <button onClick={()=>setEditingSetlists(!editingSetlists)} style={{background:editingSetlists?"var(--accent-bg)":"var(--a5)",border:"1px solid "+(editingSetlists?"var(--accent-border)":"var(--a10)"),color:editingSetlists?"var(--accent)":"var(--text-muted)",borderRadius:"var(--r-md)",padding:"8px 10px",fontSize:11,cursor:"pointer",flexShrink:0}}>{editingSetlists?"✕":"✏️"}</button>
      </div>
      {editingSetlists&&<div style={{background:"var(--a3)",border:"1px solid var(--a7)",borderRadius:"var(--r-md)",padding:10,marginBottom:8}}>
        {setlists.map(sl=>(
          <div key={sl.id} style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
            {editSlId===sl.id?<InlineRenameInput initialName={sl.name} onSave={name=>renameSetlist(sl.id,name)} onCancel={()=>setEditSlId(null)} inp={inp}/>:(<>
              <span style={{flex:1,fontSize:12,fontWeight:600,color:"var(--text)"}}>{sl.name} <span style={{color:"var(--text-dim)",fontWeight:400}}>({sl.songIds.length})</span></span>
              <button onClick={()=>setEditSlId(sl.id)} style={{background:"none",border:"none",color:"var(--text-muted)",fontSize:11,cursor:"pointer"}}>✏️</button>
              {setlists.length>1&&<button onClick={()=>deleteSetlist(sl.id)} style={{background:"none",border:"none",color:"var(--red)",fontSize:11,cursor:"pointer"}}>🗑</button>}
            </>)}
          </div>
        ))}
        <InlineRenameInput initialName="" onSave={name=>{onSetlists(p=>[...p,{id:`sl_${Date.now()}`,name,songIds:[],profileIds:[activeProfileId]}]);}} onCancel={()=>{}} inp={inp} placeholder="Nouvelle setlist..." buttonLabel="+ Creer"/>
      </div>}
      {/* Barre d'actions compacte */}
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8,flexWrap:"wrap"}}>
        <span style={{fontSize:11,color:"var(--text-muted)"}}>{activeSongs.length} morceau{activeSongs.length>1?"x":""}</span>
        <select value={sort} onChange={e=>saveSort(e.target.value)} style={{background:"var(--bg-card)",color:"var(--text-sec)",border:"1px solid var(--a10)",borderRadius:"var(--r-sm)",padding:"3px 6px",fontSize:10,cursor:"pointer"}}>
          <option value="artist">Par artiste</option>
          <option value="alpha">A → Z</option>
        </select>
        <div style={{marginLeft:"auto",display:"flex",gap:4}}>
          {activeSongs.length>0&&<button onClick={()=>setShowTopGuitars(!showTopGuitars)} style={{fontSize:10,color:showTopGuitars?"var(--accent)":"var(--text-muted)",background:showTopGuitars?"var(--accent-bg)":"var(--a5)",border:"1px solid "+(showTopGuitars?"var(--accent-border)":"var(--a10)"),borderRadius:"var(--r-sm)",padding:"3px 8px",cursor:"pointer"}}>Guitares</button>}
          {activeSongs.length>0&&<button onClick={toggleAll} style={{fontSize:10,color:"var(--text-muted)",background:"var(--a5)",border:"1px solid var(--a10)",borderRadius:"var(--r-sm)",padding:"3px 8px",cursor:"pointer"}}>{checked.length===activeSongs.length?"Décocher":"Cocher"}</button>}
          <button onClick={()=>setShowAdd(true)} style={{fontSize:10,color:"var(--accent)",background:"var(--accent-bg)",border:"1px solid var(--accent-border)",borderRadius:"var(--r-sm)",padding:"3px 8px",cursor:"pointer",fontWeight:600}}>+</button>
        </div>
      </div>
      {/* Top guitares (dépliable) */}
      {showTopGuitars&&activeSongs.length>0&&(()=>{
          const guitars=allGuitars||GUITARS;
          const songsByGuitar={};
          activeSongs.forEach(s=>{
            const ig=getIg(s,guitars);
            let matched=false;
            ig.forEach(gId=>{
              if(!songsByGuitar[gId]) songsByGuitar[gId]=new Set();
              songsByGuitar[gId].add(s.id);
              matched=true;
            });
            const aiG=s.aiCache?.result?.ideal_guitar;
            if(aiG){
              const m=findGuitarByAIName(aiG,guitars);
              if(m){if(!songsByGuitar[m.id]) songsByGuitar[m.id]=new Set();songsByGuitar[m.id].add(s.id);matched=true;}
            }
            if(!matched){
              // Fallback: tester les presets pour chaque type et trouver le meilleur score
              const typeScores={HB:0,SC:0,P90:0};
              ["HB","SC","P90"].forEach(t=>{
                const pA=getPA(s,t);const pP=getPP(s,t);
                const name=pA?.l||pP?.l;
                if(name){const e=findCatalogEntry(name);if(e?.scores?.[t]) typeScores[t]=e.scores[t];}
              });
              const bestType=Object.entries(typeScores).sort((a,b)=>b[1]-a[1])[0]?.[0]||"HB";
              const matching=guitars.filter(g=>g.type===bestType);
              if(matching.length){
                if(!songsByGuitar[matching[0].id]) songsByGuitar[matching[0].id]=new Set();
                songsByGuitar[matching[0].id].add(s.id);
              }
            }
          });
          const ranked=Object.entries(songsByGuitar)
            .map(([gId,songs])=>({gId,count:songs.size}))
            .sort((a,b)=>b.count-a.count).slice(0,3);
          if(!ranked.length) return null;
          return <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            {ranked.map(({gId,count},i)=>{
              const g=guitars.find(x=>x.id===gId);
              if(!g) return null;
              const rgb=TYPE_COLORS[g.type]||"99,102,241";
              return <span key={gId} style={{fontSize:11,fontWeight:i===0?700:600,color:`rgb(${rgb})`,background:`rgba(${rgb},${i===0?0.15:0.08})`,border:`1px solid rgba(${rgb},${i===0?0.4:0.2})`,borderRadius:"var(--r-md)",padding:"4px 10px",display:"inline-flex",alignItems:"center",gap:4}}>
                {i===0&&"🏆 "}{g.short||g.name}
                <span style={{fontSize:9,color:"var(--text-dim)"}}>{count} morceau{count>1?"x":""}</span>
              </span>;
            })}
          </div>;
        })()}
      {activeSongs.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:"var(--text-dim)"}}><div style={{fontSize:24,marginBottom:8}}>🎵</div><div style={{fontSize:14}}>Setlist vide — clique sur "+ Ajouter"</div></div>}
      {(()=>{let lastArtist="";return activeSongs.map(s=>{
        const showArtistHeader=sort==="artist"&&s.artist!==lastArtist;
        if(showArtistHeader) lastArtist=s.artist;
        const isC=checked.includes(s.id);
        const ig=getIg(s,allGuitars);
        const savedGId=activeSl?.guitars?.[s.id];
        const gId=savedGId||ig?.[0]||"";
        const g=gId?(allGuitars||GUITARS).find(x=>x.id===gId):null;
        const gType=g?.type||"HB";
        const isExpanded=expandedId===s.id;
        const aiCraw=getBestResult(s,gId,s.aiCache?.result)||null;
        // Re-enrich only for expanded song (expensive: scans catalog). Collapsed rows use cached data as-is.
        const needRescore=isExpanded&&aiCraw&&gId&&s.aiCache?.gId!==gId;
        const aiC=needRescore?enrichAIResult({...aiCraw},gType,gId,banksAnn,banksPlug):aiCraw;
        const aiPA=aiC?.preset_ann||null;
        const aiPP=aiC?.preset_plug||null;
        const hist=getSongHist(s);
        const presetRow=(emoji,label,banks,overrideScore)=>{
          const loc=findInBanks(label,banks);
          const entry=findCatalogEntry(label);
          const sc=overrideScore!=null?overrideScore:(aiC&&gId&&entry?computeFinalScore(entry,gId,aiC.song_style,typeof aiC.target_gain==="number"?aiC.target_gain:null,resolveRefAmp(aiC.ref_amp)):(gId?guitarScore(label,gId):(entry?.scores?.[gType]??null)));
          const ampName=entry?.amp||null;
          const scColor=sc!=null?scoreColor(sc):null;
          const scBg=sc!=null?scoreBg(sc):null;
          const isIdeal=label&&aiC?.ideal_preset&&label===aiC.ideal_preset;
          const isWeak=sc!=null&&sc<65;
          return(
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <StatusDot score={sc} ideal={isIdeal}/>
              {loc
                ?<span title={`Banque ${loc.bank}, slot ${loc.slot} — ${CL[loc.slot]}`} style={{fontSize:10,background:`${CC[loc.slot]}18`,color:CC[loc.slot],border:`1px solid ${CC[loc.slot]}40`,borderRadius:"var(--r-sm)",padding:"1px 6px",fontWeight:700}}>{loc.bank}{loc.slot}</span>
                :<span style={{fontSize:10,background:"var(--yellow-bg)",color:"var(--yellow)",borderRadius:"var(--r-sm)",padding:"1px 6px",fontWeight:700}}>⬇</span>
              }
              {ampName&&<span style={{fontSize:10,color:scColor||"var(--text-sec)",background:scBg||"transparent",border:scColor?`1px solid ${scColor}30`:"none",borderRadius:"var(--r-sm)",padding:"1px 6px",fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:120}}>{ampName}</span>}
              {sc!=null&&<span style={{fontFamily:"var(--font-mono)",fontSize:10,fontWeight:800,color:scColor,background:scBg,borderRadius:"var(--r-sm)",padding:"1px 6px",border:`1px solid ${scColor}30`}} title={scoreLabel(sc).tip}>{sc}%</span>}
            </div>
          );
        };
        return (
          <div key={s.id} id={"song-"+s.id}>
          {showArtistHeader&&<div style={{fontSize:12,fontWeight:700,color:"var(--text-sec)",marginTop:lastArtist===s.artist?0:12,marginBottom:4,paddingLeft:2,borderBottom:"1px solid var(--a7)",paddingBottom:4}}>{s.artist}</div>}
          <div style={{marginBottom: isExpanded?0:8}}>
            <div style={{display:"flex"}}>
              <button onClick={()=>toggle(s.id)} style={{background:isC?"rgba(74,222,128,0.15)":"var(--a4)",border:isC?"1px solid rgba(74,222,128,0.4)":"1px solid var(--a10)",borderRight:"none",borderRadius:isExpanded?"10px 0 0 0":"10px 0 0 10px",padding:"0 14px",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center"}}>
                <div style={{width:18,height:18,borderRadius:"var(--r-sm)",border:isC?"2px solid #4ade80":"2px solid var(--text-muted)",background:isC?"var(--green)":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{isC&&<span style={{color:"var(--bg)",fontSize:11,fontWeight:900}}>✓</span>}</div>
              </button>
              <div onClick={()=>{
                const newId=isExpanded?null:s.id;
                setExpandedId(newId);
                if(newId){
                  // Double rAF : attend que React ait rendu le SongDetailCard avant de scroller,
                  // sinon scrollIntoView se base sur la hauteur d'avant expansion et on finit
                  // au milieu/bas du contenu déplié.
                  requestAnimationFrame(()=>requestAnimationFrame(()=>{
                    const el=document.getElementById("song-"+s.id);
                    if(el){
                      var headerH=document.querySelector(".app-header-bar");
                      var offset=headerH?headerH.offsetHeight+8:60;
                      var top=el.getBoundingClientRect().top+window.scrollY-offset;
                      window.scrollTo({top:top,behavior:"smooth"});
                    }
                  }));
                }
              }} style={{flex:1,background:isC?"rgba(74,222,128,0.05)":"var(--a3)",border:isC?"1px solid var(--green-border)":"1px solid var(--a7)",borderLeft:"none",borderRadius:isExpanded?"0 10px 0 0":"0 10px 10px 0",padding:"10px 13px",cursor:"pointer"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:2}}>
                  <span style={{fontSize:14,fontWeight:600,color:"var(--text)"}}>{s.title}</span>
                  {!s.aiCache&&<span style={{fontSize:10,color:"var(--text-muted)"}}>⏳</span>}
                  <span style={{marginLeft:"auto",fontSize:11,color:"var(--text-dim)"}}>{isExpanded?"▲":"▼"}</span>
                </div>
                {sort!=="artist"&&<div style={{fontSize:11,color:"var(--text-muted)",marginBottom:hist?3:0}}>{s.artist}</div>}
                {hist&&!isExpanded&&<div style={{fontSize:10,color:"var(--text-dim)",marginTop:2,display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>
                  <span style={{color:"var(--text-secondary)",fontWeight:600}}>{hist.guitarist}</span>
                  <span style={{color:"var(--text-tertiary)"}}>·</span>
                  <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1,minWidth:0}}>{hist.amp}</span>
                </div>}
                {!isExpanded&&(g||aiC?.ideal_guitar)&&(()=>{
                  // Même métrique que la vue dépliée : compatibilité guitare↔morceau (cot_step2_guitars)
                  // avec fallback localGuitarSongScore, et idealGuitarScore quand on affiche la guitare idéale
                  const chosenGuitarCot=findCotEntryForGuitar(aiC?.cot_step2_guitars,g);
                  const idealGuitarScore=aiC?.cot_step2_guitars?.[0]?.score||null;
                  const gScore=chosenGuitarCot?.score||(g?localGuitarSongScore(g,aiC):idealGuitarScore);
                  const isIdealGuitar=g?ig.includes(gId):true;
                  return <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap",marginTop:4}}>
                  <StatusDot score={gScore||null} ideal={isIdealGuitar}/>
                  {g
                    ?<span style={{fontSize:10,color:"var(--text-sec)",background:"var(--a6)",borderRadius:"var(--r-sm)",padding:"1px 7px",fontWeight:600}}>{g.name} ({g.type}){savedGId&&!ig.includes(savedGId)?" (choix perso)":""}</span>
                    :aiC?.ideal_guitar&&<span style={{fontSize:10,color:"var(--text-sec)",background:"var(--a6)",borderRadius:"var(--r-sm)",padding:"1px 7px",fontWeight:600}}>{aiC.ideal_guitar}</span>
                  }
                  {gScore>0&&<span style={{fontSize:10,fontWeight:800,color:scoreColor(gScore),background:scoreBg(gScore),borderRadius:"var(--r-sm)",padding:"1px 6px",border:`1px solid ${scoreColor(gScore)}30`}} title={scoreLabel(gScore).tip+"  —  score guitare"}>{gScore}%</span>}
                </div>;})()}
                {!isExpanded&&<div style={{display:"flex",flexDirection:"column",gap:3,marginTop:aiPA||aiPP?4:0}}>
                  {aiPA&&presetRow("📦",aiPA.label,banksAnn,aiPA.score)}
                  {aiPP&&presetRow("🔌",aiPP.label,banksPlug,aiPP.score)}
                </div>}
              </div>
            </div>
            {isExpanded&&<SongDetailCard song={s} banksAnn={banksAnn} banksPlug={banksPlug} onBanksAnn={onBanksAnn} onBanksPlug={onBanksPlug} onClose={()=>setExpandedId(null)} guitars={allGuitars} availableSources={availableSources} savedGuitarId={activeSl?.guitars?.[s.id]} onGuitarChange={(songId,gId)=>{if(activeSlId)onSetlists(p=>p.map(sl=>sl.id===activeSlId?{...sl,guitars:{...(sl.guitars||{}),[songId]:gId}}:sl));}} aiProvider={aiProvider} aiKeys={aiKeys} onSongDb={onSongDb}/>}
          </div>
          </div>
        );
      })})()}
      {checked.length>0&&<div className="bottom-action" style={{paddingTop:12}}><button onClick={onNext} style={{width:"100%",background:"linear-gradient(180deg,var(--brass-200),var(--brass-400))",border:"none",color:"var(--tolex-900)",borderRadius:"var(--r-lg)",padding:"14px",fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:"var(--shadow-sm)",fontFamily:"var(--font-ui)"}}>Générer le récap — {checked.length} morceau{checked.length>1?"x":""} →</button></div>}
      {showAdd&&<AddSongModal songDb={songDb} onSongDb={onSongDb} setlists={setlists} onSetlists={onSetlists} activeSlId={activeSlId} onClose={()=>setShowAdd(false)} banksAnn={banksAnn} banksPlug={banksPlug} aiProvider={aiProvider} aiKeys={aiKeys} guitars={allGuitars}/>}
    </div>
  );
}

// ─── Bank Optimizer Screen ───────────────────────────────────────────────────
function BankOptimizerScreen({songDb,setlists,banksAnn,onBanksAnn,banksPlug,onBanksPlug,allGuitars,availableSources,onNavigate}) {
  const [slId,setSlId]=useState(setlists[0]?.id||"");
  const [showReconfig,setShowReconfig]=useState(null); // "ann"|"plug"|null
  const sl=setlists.find(s=>s.id===slId);
  const songs=sl?sl.songIds.map(id=>songDb.find(s=>s.id===id)).filter(Boolean):[];
  // Types de micros du rig — ordre : SC, P90, HB
  const PICKUP_ORDER=["SC","HB","P90"];
  const pickupTypes=PICKUP_ORDER.filter(t=>allGuitars.some(g=>g.type===t));
  const TYPE_LABELS={HB:"Humbucker",SC:"Single Coil",P90:"P-90"};

  // Pour chaque morceau, trouver la meilleure guitare du rig
  const bestGuitarForSong=(s)=>{
    // 1. Utiliser la guitare du cache (même que dans la setlist)
    const cachedGId=s.aiCache?.gId;
    if(cachedGId){const m=allGuitars.find(g=>g.id===cachedGId);if(m) return m;}
    const ai=s.aiCache?.result;
    if(!ai) return allGuitars[0];
    // 2. Guitare idéale recommandée par l'IA
    if(ai.ideal_guitar){
      const m=findGuitarByAIName(ai.ideal_guitar,allGuitars);
      if(m) return m;
    }
    // 3. Type de micro recommandé
    const pref=ai.pickup_preference;
    if(pref&&pref!=="any"){const m=allGuitars.find(g=>g.type===pref);if(m) return m;}
    // 4. Scorer toutes les guitares et prendre la meilleure
    const style=ai.song_style||"rock";
    const targetGain=typeof ai.target_gain==="number"?ai.target_gain:null;
    let bestG=allGuitars[0],bestScore=0;
    allGuitars.forEach(g=>{
      const sc=computePickupScore(style,getGainRange(targetGain||6),g.type);
      if(sc>bestScore){bestScore=sc;bestG=g;}
    });
    return bestG;
  };

  // Analyse pour un device — scorer chaque morceau avec sa meilleure guitare
  const analyzeDevice=(banks,deviceKey)=>{
    const usedPresets=new Map();
    const songRows=songs.map(s=>{
      const ai=s.aiCache?.result;
      if(!ai?.cot_step1) return {song:s,installed:null,installedScore:-1,ideal:null,idealScore:0,delta:0,noAI:true,guitar:null};
      const g=bestGuitarForSong(s);
      const gType=g?.type||"HB";const gId=g?.id||"";
      const style=ai.song_style||"rock";
      const targetGain=typeof ai.target_gain==="number"?ai.target_gain:null;
      // Score installé : cache setlist en priorité (source de vérité), sinon recalcul
      const cachedPreset=deviceKey==="ann"?ai.preset_ann:ai.preset_plug;
      let top=null;
      if(cachedPreset?.label&&cachedPreset.score>0){
        top={name:cachedPreset.label,score:cachedPreset.score,bank:cachedPreset.bank,col:cachedPreset.col,amp:"",style:"",breakdown:cachedPreset.breakdown};
      }
      if(!top){
        const bestInstalled=computeBestPresets(gType,style,deviceKey==="ann"?banks:{},deviceKey==="plug"?banks:{},gId,ai.ref_amp,targetGain);
        top=deviceKey==="ann"?bestInstalled.annTop:bestInstalled.plugTop;
      }
      // IdealTop : scan complet du catalogue (pas de limite d'amplis)
      const resolvedAmp=resolveRefAmp(ai.ref_amp);
      const allCandidates=[];
      for(const [pName,pInfo] of Object.entries(PRESET_CATALOG_MERGED)){
        if(!pInfo||!pInfo.amp) continue;
        if(pInfo.src&&!isSrcCompatible(pInfo.src,deviceKey)) continue;
        const sc=computeFinalScore(pInfo,gId,style,targetGain,resolvedAmp,false);
        if(sc>=(top?.score||0)) allCandidates.push({name:pName,score:sc,amp:pInfo.amp,style:pInfo.style,src:pInfo.src});
      }
      allCandidates.sort((a,b)=>b.score-a.score);
      const idealCompat=[];
      const seenAmps=new Set();
      for(const c of allCandidates){
        if(!seenAmps.has(c.amp)){idealCompat.push(c);seenAmps.add(c.amp);}
        if(idealCompat.length>=10) break;
      }
      const idealTop=idealCompat[0]||null;
      if(top){
        if(!usedPresets.has(top.name)) usedPresets.set(top.name,{songs:[],bestScore:0});
        const u=usedPresets.get(top.name);u.songs.push(s.title);if(top.score>u.bestScore) u.bestScore=top.score;
      }
      return {song:s,installed:top,installedScore:top?.score||0,ideal:idealTop,idealTop3:idealCompat,idealScore:idealTop?.score||0,delta:(idealTop?.score||0)-(top?.score||0),guitar:g};
    });
    const allInstalled=[];
    for(const [k,v] of Object.entries(banks)){for(const slot of ["A","B","C"]){if(v[slot]) allInstalled.push({name:v[slot],bank:Number(k),slot});}}
    const unusedPresets=allInstalled.filter(p=>!usedPresets.has(p.name));
    const analyzed=songRows.filter(r=>!r.noAI);
    // Seuils alignés avec le perçu utilisateur : <70% = Faible, 70-80% = Moyen, ≥80% = Couvert
    const covered=analyzed.filter(r=>r.installedScore>=80).length;
    const acceptable=analyzed.filter(r=>r.installedScore>=70&&r.installedScore<80).length;
    const poor=analyzed.filter(r=>r.installedScore<70).length;
    const noAICount=songRows.filter(r=>r.noAI).length;
    return {songRows,usedPresets,unusedPresets,covered,acceptable,poor,noAICount};
  };

  const annAnalysis=useMemo(()=>analyzeDevice(banksAnn,"ann"),[songs,allGuitars,banksAnn]);
  const plugAnalysis=useMemo(()=>analyzeDevice(banksPlug,"plug"),[songs,allGuitars,banksPlug]);

  // Auto-pick d'une banque/slot pour installer un preset.
  // 1ère passe : un slot vide du bon gain. 2e passe : remplace le slot le plus faible
  // de la même famille de gain (banks plein → on fait une vraie optimisation, pas un blocage).
  const autoPlace=(banks,presetName,deviceKey,songRows)=>{
    const entry=findCatalogEntry(presetName);
    if(!entry) return null;
    const gain=typeof entry.gain==="number"?entry.gain:gainToNumeric(entry.gain);
    const gainRange=getGainRange(gain);
    const slot=gainRange==="clean"?"A":gainRange==="high_gain"?"C":"B";
    const startBank=deviceKey==="ann"?0:1;
    const maxBank=deviceKey==="ann"?49:9;
    // 1ère passe : slot vide
    for(let i=startBank;i<=maxBank;i++){
      const b=banks[i];
      if(!b||!b[slot]) return {bank:i,slot,replaces:null};
    }
    // 2e passe : remplace le preset le plus faible de ce slot (toutes banques)
    let worstBank=null,worstScore=101,worstPreset=null;
    for(let i=startBank;i<=maxBank;i++){
      const cur=banks[i]?.[slot];if(!cur) continue;
      const sc=computeSimpleScore(cur,null,pickupTypes[0]||"HB");
      if(sc<worstScore){worstScore=sc;worstBank=i;worstPreset=cur;}
    }
    if(worstBank!=null) return {bank:worstBank,slot,replaces:worstPreset,replacesScore:worstScore};
    return null;
  };

  // Actions prioritaires PAR DEVICE — chaque pédale/plug a ses propres top 3.
  // Pour chaque morceau, on parcourt tout le top 3 catalogue (pas juste le 1er).
  // Groupé par preset, classé par bénéfice total. Seuil bas (1%) pour ne plus rater
  // les micro-gains qui s'accumulent quand un même preset profite à plusieurs morceaux.
  const PRIO_DELTA_MIN=1;
  const computePriority=(rows,deviceKey,banks)=>{
    const grouped={};
    for(const r of rows){
      if(r.noAI) continue;
      const candidates=r.idealTop3?.length?r.idealTop3:(r.ideal?[r.ideal]:[]);
      for(const cand of candidates){
        if(!cand?.name) continue;
        if(findInBanks(cand.name,banks)) continue;
        const candScore=cand.score||0;
        const delta=candScore-r.installedScore;
        if(delta<PRIO_DELTA_MIN) continue;
        const k=cand.name;
        if(!grouped[k]){
          const place=autoPlace(banks,cand.name,deviceKey,rows);
          if(!place) continue;
          grouped[k]={device:deviceKey,preset:cand,songs:[],totalDelta:0,place,coveredIds:new Set()};
        }
        if(grouped[k].coveredIds.has(r.song.id)) continue;
        grouped[k].coveredIds.add(r.song.id);
        grouped[k].songs.push({song:r.song,currentScore:r.installedScore,newScore:candScore,delta});
        grouped[k].totalDelta+=delta;
      }
    }
    return Object.values(grouped).sort((a,b)=>b.totalDelta-a.totalDelta).slice(0,5);
  };
  const annPriority=useMemo(()=>computePriority(annAnalysis.songRows,"ann",banksAnn),[annAnalysis,banksAnn]);
  const plugPriority=useMemo(()=>computePriority(plugAnalysis.songRows,"plug",banksPlug),[plugAnalysis,banksPlug]);
  // Score moyen actuel + projection si toutes les actions sont appliquées
  const computeMean=(rows)=>{
    const ar=rows.filter(r=>!r.noAI);
    if(!ar.length) return null;
    return Math.round(ar.reduce((s,r)=>s+r.installedScore,0)/ar.length);
  };
  const annMean=computeMean(annAnalysis.songRows);
  const plugMean=computeMean(plugAnalysis.songRows);
  const computeProjected=(rows,priorityList)=>{
    const ar=rows.filter(r=>!r.noAI);
    if(!ar.length) return null;
    const upgrades={};
    priorityList.forEach(a=>{
      a.songs.forEach(s=>{if((upgrades[s.song.id]||0)<s.newScore) upgrades[s.song.id]=s.newScore;});
    });
    return Math.round(ar.reduce((sum,r)=>sum+(upgrades[r.song.id]!=null?Math.max(upgrades[r.song.id],r.installedScore):r.installedScore),0)/ar.length);
  };
  const annProjected=computeProjected(annAnalysis.songRows,annPriority);
  const plugProjected=computeProjected(plugAnalysis.songRows,plugPriority);

  const applyAction=(action)=>{
    if(!action.place) return;
    const onBanks=action.device==="ann"?onBanksAnn:onBanksPlug;
    onBanks(prev=>({...prev,[action.place.bank]:{...(prev[action.place.bank]||{cat:"",A:"",B:"",C:""}),[action.place.slot]:action.preset.name}}));
  };
  const applyAllForDevice=(list,deviceLabel,curMean,projMean)=>{
    if(!list.length) return;
    if(!window.confirm(`Appliquer les ${list.length} actions ${deviceLabel} ?\nGain estimé : ${curMean}% → ${projMean}% (+${projMean-curMean}%)`)) return;
    list.forEach(applyAction);
  };

  // Banques standard "univers" — un ampli iconique par banque, 3 slots Clean/Drive/Lead
  const standardBanks=useMemo(()=>{
    const UNIVERSES=[
      {label:"Marshall Plexi",          amp:"Marshall Plexi",        style:"rock"},
      {label:"Marshall JCM800",         amp:"Marshall JCM800",       style:"hard_rock"},
      {label:"Fender Deluxe Reverb",    amp:"Fender Deluxe Reverb",  style:"blues"},
      {label:"Fender Twin Reverb",      amp:"Fender Twin Reverb",    style:"rock"},
      {label:"Fender Bassman",          amp:"Fender Bassman",        style:"blues"},
      {label:"Vox AC30",                amp:"Vox AC30",              style:"rock"},
      {label:"Mesa Dual Rectifier",     amp:"Mesa Boogie Rectifier", style:"hard_rock"},
      {label:"Hiwatt DR103",            amp:"Hiwatt DR103",          style:"rock"},
      {label:"Dumble ODS",              amp:"Dumble ODS",            style:"blues"},
      {label:"Soldano SLO 100",         amp:"Soldano SLO-100",       style:"hard_rock"},
    ];
    const SLOT_GAINS=[{slot:"A",label:"Clean",gainRange:"clean"},{slot:"B",label:"Drive",gainRange:"drive"},{slot:"C",label:"Lead",gainRange:"high_gain"}];
    const dominantPickup=pickupTypes[0]||"HB";
    return UNIVERSES.map(u=>{
      const usedNames=new Set();
      const slots=SLOT_GAINS.map(({slot,label,gainRange})=>{
        const candidates=Object.entries(PRESET_CATALOG_MERGED)
          .filter(([,info])=>{
            const g=getGainRange(gainToNumeric(info.gain));
            if(g!==gainRange&&!(gainRange==="drive"&&g==="crunch")) return false;
            if(info.src==="Anniversary"||info.src==="Factory"||info.src==="PlugFactory") return false;
            if(availableSources&&info.src&&availableSources[info.src]===false) return false;
            return true;
          })
          .map(([name,info])=>{
            const ampScore=computeRefAmpScore(info.amp,u.amp);
            const styleScore=computeStyleMatchScore(info.style,u.style);
            const pickupScore=computePickupScore(info.style,gainRange,dominantPickup);
            const dims=[{s:ampScore,w:0.60},{s:styleScore,w:0.25},{s:pickupScore,w:0.15}].filter(d=>d.s!==null);
            const tw=dims.reduce((s,d)=>s+d.w,0);
            const score=Math.round(dims.reduce((s,d)=>s+d.s*(d.w/tw),0));
            return {name,amp:info.amp,src:info.src,score};
          }).sort((a,b)=>b.score-a.score);
        const pick=candidates.find(c=>!usedNames.has(c.name))||candidates[0];
        if(pick) usedNames.add(pick.name);
        return {slot,label,preset:pick?.name||"—",amp:pick?.amp||"",src:pick?.src||"",score:pick?.score||0};
      });
      return {label:u.label,amp:u.amp,style:u.style,slots};
    });
  },[pickupTypes,availableSources]);

  // Reconfig A/B/C pour un device
  const reconfigPlan=useMemo(()=>{
    if(!showReconfig) return null;
    const banks=showReconfig==="ann"?banksAnn:banksPlug;
    const maxBanks=showReconfig==="ann"?50:10;
    const startBank=showReconfig==="ann"?0:1;
    const usedBanks=new Set();
    const analysis=showReconfig==="ann"?annAnalysis:plugAnalysis;
    analysis.songRows.forEach(r=>{if(r.installed?.bank!=null) usedBanks.add(r.installed.bank);});
    if(!usedBanks.size){for(let i=startBank;i<startBank+3&&i<startBank+maxBanks;i++) usedBanks.add(i);}
    const SLOT_GAINS=[{slot:"A",label:"Clean",targetGain:2},{slot:"B",label:"Drive",targetGain:7},{slot:"C",label:"Lead",targetGain:9}];
    const plan=[...usedBanks].sort((a,b)=>a-b).slice(0,10).map(bankNum=>{
      const current=banks[bankNum]||{cat:"",A:"",B:"",C:""};
      const bankSongs=analysis.songRows.filter(r=>r.installed?.bank===bankNum);
      const styles={};bankSongs.forEach(r=>{const st=r.song.aiCache?.result?.song_style||"rock";styles[st]=(styles[st]||0)+1;});
      const dominantStyle=Object.entries(styles).sort((a,b)=>b[1]-a[1])[0]?.[0]||"rock";
      const dominantAmp=bankSongs.map(r=>r.song.aiCache?.result?.ref_amp).filter(Boolean)[0]||null;
      // Utiliser le type de micro le plus fréquent des morceaux de cette banque
      const typeCounts={};bankSongs.forEach(r=>{if(r.guitar) typeCounts[r.guitar.type]=(typeCounts[r.guitar.type]||0)+1;});
      const bankGType=Object.entries(typeCounts).sort((a,b)=>b[1]-a[1])[0]?.[0]||"HB";
      const bankGId=allGuitars.find(g=>g.type===bankGType)?.id||"";
      const slots=SLOT_GAINS.map(({slot,label,targetGain})=>{
        const currentPreset=current[slot];
        const best=computeBestPresets(bankGType,dominantStyle,{},{},bankGId,dominantAmp,targetGain);
        // Filtrer par compatibilité source/device
        const idealRaw=best.idealTop3||[];
        const idealPreset=idealRaw.find(p=>{const e=findCatalogEntry(p.name);return !e||isSrcCompatible(e.src,showReconfig);})||best.idealTop;
        return {slot,label,current:currentPreset||"(vide)",proposed:idealPreset?.name||currentPreset||"—",proposedAmp:idealPreset?.amp||"",proposedScore:idealPreset?.score||0,changed:idealPreset&&idealPreset.name!==currentPreset};
      });
      return {bank:bankNum,cat:current.cat,dominantStyle,bankGType,slots};
    });
    return plan;
  },[showReconfig,banksAnn,banksPlug,annAnalysis,plugAnalysis,allGuitars,songs]);

  const applyReconfig=()=>{
    if(!reconfigPlan||!showReconfig) return;
    const onBanks=showReconfig==="ann"?onBanksAnn:onBanksPlug;
    onBanks(prev=>{
      const next={...prev};
      reconfigPlan.forEach(({bank,slots})=>{
        const current=next[bank]||{cat:"",A:"",B:"",C:""};
        const updated={...current};
        slots.forEach(({slot,proposed,changed})=>{if(changed) updated[slot]=proposed;});
        next[bank]=updated;
      });
      return next;
    });
    setShowReconfig(null);
  };

  const sectionStyle={background:"var(--bg-elev-1)",border:"1px solid var(--border-subtle)",borderRadius:"var(--r-lg)",padding:"var(--s-4)",marginBottom:"var(--s-4)"};
  const eyebrow=(icon,label)=><div style={{fontFamily:"var(--font-mono)",fontSize:"var(--fs-xs)",textTransform:"uppercase",letterSpacing:"var(--tracking-wider)",color:"var(--accent)",marginBottom:"var(--s-3)",display:"flex",alignItems:"center",gap:5}}>{icon} {label}</div>;

  const renderStats=(a)=><div style={{display:"flex",gap:"var(--s-2)",marginBottom:"var(--s-3)"}}>
    {[{n:a.covered,c:"var(--success)",bg:"var(--green-bg)",bd:"var(--green-border)",l:"Couverts"},{n:a.acceptable,c:"var(--yellow)",bg:"var(--yellow-bg)",bd:"var(--yellow-border)",l:"Moyens"},{n:a.poor,c:"var(--danger)",bg:"var(--red-bg)",bd:"var(--red-border)",l:"Faibles"}].map(({n,c,bg,bd,l})=>
      <div key={l} style={{flex:1,background:bg,border:"1px solid "+bd,borderRadius:"var(--r-md)",padding:"var(--s-2)",textAlign:"center"}}>
        <div style={{fontFamily:"var(--font-mono)",fontSize:"var(--fs-lg)",fontWeight:800,color:c}}>{n}</div>
        <div style={{fontSize:9,color:"var(--text-secondary)"}}>{l}</div>
      </div>
    )}
  </div>;

  // Song rows avec suggestion inline
  const [songInstall,setSongInstall]=useState(null); // {songId,presetName,deviceKey,bank:0,slot:"A"}
  const renderSongRows=(rows,banks,onBanks,deviceKey)=>{
    const maxBank=deviceKey==="ann"?49:9;
    const startBank=deviceKey==="ann"?0:1;
    return <div style={{display:"flex",flexDirection:"column",gap:4}}>
    {rows.map(({song,installed,installedScore,ideal,idealScore,delta,noAI,guitar})=>{
      if(noAI) return <div key={song.id} style={{display:"flex",alignItems:"center",gap:"var(--s-2)",padding:"4px var(--s-2)",background:"var(--bg-elev-2)",borderRadius:"var(--r-sm)",border:"1px solid var(--border-subtle)",opacity:0.5}}>
        <span style={{fontSize:12}}>⏳</span>
        <div style={{flex:1,fontSize:11,color:"var(--text-tertiary)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{song.title}</div>
        <span style={{fontSize:9,color:"var(--text-tertiary)"}}>Non analysé</span>
      </div>;
      const needsSuggestion=delta>5&&ideal&&!findInBanks(ideal.name,banks);
      const isInstalling=songInstall?.songId===song.id&&songInstall?.deviceKey===deviceKey;
      return <div key={song.id}>
        <div style={{display:"flex",alignItems:"center",gap:"var(--s-2)",padding:"4px var(--s-2)",background:"var(--bg-elev-2)",borderRadius:needsSuggestion||isInstalling?"var(--r-sm) var(--r-sm) 0 0":"var(--r-sm)",border:"1px solid var(--border-subtle)"}}>
          <span style={{fontSize:12}}>{installedScore>=80?"✅":installedScore>=70?"⚠️":"❌"}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:11,fontWeight:600,color:"var(--text-primary)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{song.title}</div>
            <div style={{fontSize:9,color:"var(--text-tertiary)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{installed?installed.name:"—"}{guitar?" · "+guitar.short:""}</div>
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            <div style={{fontFamily:"var(--font-mono)",fontSize:11,fontWeight:800,color:scoreColor(installedScore)}}>{installedScore}%</div>
          </div>
        </div>
        {needsSuggestion&&!isInstalling&&<div style={{display:"flex",alignItems:"center",gap:"var(--s-2)",padding:"3px var(--s-2) 3px var(--s-6)",background:"var(--accent-soft)",borderRadius:"0 0 var(--r-sm) var(--r-sm)",border:"1px solid var(--border-accent)",borderTop:"none",fontSize:10}}>
          <span style={{color:"var(--accent)"}}>💡</span>
          <span style={{flex:1,color:"var(--text-secondary)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ideal.name} <span style={{color:"var(--text-tertiary)"}}>({ideal.amp})</span></span>
          <span style={{fontFamily:"var(--font-mono)",fontWeight:700,color:"var(--success)",flexShrink:0}}>{idealScore}%</span>
          <button onClick={()=>setSongInstall({songId:song.id,presetName:ideal.name,deviceKey,bank:startBank,slot:"B"})} style={{background:"linear-gradient(180deg,var(--brass-200),var(--brass-400))",border:"none",color:"var(--tolex-900)",borderRadius:"var(--r-sm)",padding:"2px 6px",fontSize:8,fontWeight:700,cursor:"pointer",flexShrink:0}}>Installer</button>
        </div>}
        {isInstalling&&<div style={{display:"flex",alignItems:"center",gap:"var(--s-2)",padding:"4px var(--s-2)",background:"var(--accent-soft)",borderRadius:"0 0 var(--r-sm) var(--r-sm)",border:"1px solid var(--border-accent)",borderTop:"none",fontSize:10,flexWrap:"wrap"}}>
          <span style={{fontSize:9,color:"var(--text-secondary)",flexShrink:0}}>{songInstall.presetName}</span>
          <select value={songInstall.bank} onChange={e=>setSongInstall(p=>({...p,bank:Number(e.target.value)}))} style={{background:"var(--bg-elev-1)",color:"var(--text-primary)",border:"1px solid var(--border-strong)",borderRadius:"var(--r-xs)",padding:"2px 4px",fontSize:10}}>
            {Array.from({length:maxBank-startBank+1},(_,i)=>i+startBank).map(b=><option key={b} value={b}>B{b}</option>)}
          </select>
          <select value={songInstall.slot} onChange={e=>setSongInstall(p=>({...p,slot:e.target.value}))} style={{background:"var(--bg-elev-1)",color:"var(--text-primary)",border:"1px solid var(--border-strong)",borderRadius:"var(--r-xs)",padding:"2px 4px",fontSize:10}}>
            <option value="A">A</option><option value="B">B</option><option value="C">C</option>
          </select>
          <button onClick={()=>{onBanks(p=>({...p,[songInstall.bank]:{...(p[songInstall.bank]||{cat:"",A:"",B:"",C:""}),[songInstall.slot]:songInstall.presetName}}));setSongInstall(null);}} style={{background:"linear-gradient(180deg,var(--brass-200),var(--brass-400))",border:"none",color:"var(--tolex-900)",borderRadius:"var(--r-sm)",padding:"2px 8px",fontSize:9,fontWeight:700,cursor:"pointer"}}>OK</button>

  };

  const renderUnused=(unused)=>unused.length>0&&<div style={{marginTop:"var(--s-3)"}}>
    <div style={{fontSize:10,fontWeight:700,color:"var(--text-tertiary)",fontFamily:"var(--font-mono)",textTransform:"uppercase",letterSpacing:"var(--tracking-wider)",marginBottom:4}}>🗑 Non utilisés ({unused.length})</div>

      {unused.slice(0,10).map((p,i)=><span key={i} style={{fontSize:9,background:"var(--bg-elev-2)",border:"1px solid var(--border-subtle)",borderRadius:"var(--r-sm)",padding:"2px 6px",color:"var(--text-tertiary)"}}><span style={{fontFamily:"var(--font-mono)",color:"var(--accent)",marginRight:3}}>B{p.bank}{p.slot}</span>{p.name}</span>)}
      {unused.length>10&&<span style={{fontSize:9,color:"var(--text-tertiary)"}}>+{unused.length-10}</span>}
    </div>
  </div>;

  const renderReconfigInline=(plan)=><div>
    <div style={{overflowX:"auto",marginBottom:"var(--s-2)"}}>
      {plan.map(({bank,slots})=>(
        <div key={bank} style={{background:"var(--bg-elev-2)",border:"1px solid var(--border-subtle)",borderRadius:"var(--r-sm)",padding:"var(--s-2)",marginBottom:4}}>
          <div style={{fontFamily:"var(--font-mono)",fontSize:10,fontWeight:700,color:"var(--text-primary)",marginBottom:4}}>Banque {bank}</div>
          <div style={{display:"flex",gap:4}}>
            {slots.map(s=>(
