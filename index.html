function JamScreen({banksAnn,banksPlug,allGuitars,availableSources}){
  const guitars=allGuitars||GUITARS;
  const [step,setStep]=useState("guitar"); // "guitar" | "style" | "results"
  const [guitarId,setGuitarId]=useState(null);
  const [style,setStyle]=useState(null);

  const guitar=guitars.find(g=>g.id===guitarId);
  const recs=useMemo(()=>{
    if(!guitarId||!style) return null;
    return getJamRecs(guitarId,style,banksAnn,banksPlug,guitars);
  },[guitarId,style,banksAnn,banksPlug,guitars]);

  const reset=()=>{setStep("guitar");setGuitarId(null);setStyle(null);};

  if(step==="results"&&recs){
    const styleInfo=JAM_STYLES.find(s=>s.id===style);
    const typeRgb=TYPE_COLORS[recs.gType]||"99,102,241";
    return(
      <div>
        {/* Header */}
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap"}}>
          <button onClick={reset} style={{background:"var(--a8)",border:"1px solid var(--a12)",color:"var(--text-sec)",borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer",flexShrink:0}}>← Nouveau Jam</button>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            <span style={{fontSize:12,background:`rgba(${typeRgb},0.15)`,color:`rgb(${typeRgb})`,border:`1px solid rgba(${typeRgb},0.4)`,borderRadius:6,padding:"3px 10px",fontWeight:700}}>{guitar?.name} · {TYPE_LABELS[recs.gType]}</span>
            <span style={{fontSize:12,background:`rgba(${styleInfo?.color||"99,102,241"},0.15)`,color:`rgb(${styleInfo?.color||"99,102,241"})`,border:`1px solid rgba(${styleInfo?.color||"99,102,241"},0.4)`,borderRadius:6,padding:"3px 10px",fontWeight:700}}>{styleInfo?.emoji} {styleInfo?.label}</span>
          </div>
        </div>

        {/* Top 3 Anniversary */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12,color:"#93c5fd",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>📦 Top 3 — ToneX Anniversary <span style={{fontSize:10,color:"#475569",fontWeight:400,textTransform:"none"}}>(presets installés)</span></div>
          {recs.annTop3.length>0
            ?recs.annTop3.map((p,i)=><JamPresetItem key={p.name} p={p} rank={i}/>)
            :<div style={{fontSize:12,color:"#475569",padding:"12px",background:"var(--a3)",borderRadius:8,textAlign:"center"}}>Aucun preset {styleInfo?.label} installé sur l'Anniversary pour ce type de guitare.</div>
          }
        </div>

        {/* Best Plug */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12,color:"#a5b4fc",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>🔌 Top 3 — ToneX Plug <span style={{fontSize:10,color:"#475569",fontWeight:400,textTransform:"none"}}>(presets installés)</span></div>
          {recs.plugBest.length>0
            ?recs.plugBest.map((p,i)=><JamPresetItem key={p.name} p={p} rank={i}/>)
            :<div style={{fontSize:12,color:"#475569",padding:"12px",background:"var(--a3)",borderRadius:8,textAlign:"center"}}>Aucun preset {styleInfo?.label} installé sur le Plug pour ce type de guitare.</div>
          }
        </div>

        {/* Top 3 Full Catalog */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12,color:"#4ade80",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>🌐 Top 3 — Catalogue complet <span style={{fontSize:10,color:"#475569",fontWeight:400,textTransform:"none"}}>(tous presets, installés ou non)</span></div>
          {recs.fullTop3.map((p,i)=>{
            const annLoc=findInBanks(p.name,banksAnn);
            const plugLoc=findInBanks(p.name,banksPlug);
            const installed=annLoc||plugLoc;
            return(
              <div key={p.name} className="preset-result-card">
                <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                  <span style={{fontSize:18,fontWeight:900,color:["#fbbf24","#94a3b8","#cd7c2f"][i]||"#64748b",minWidth:22}}>#{i+1}</span>
                  {annLoc&&<span style={{background:"rgba(147,197,253,0.15)",color:"#93c5fd",border:"1px solid rgba(147,197,253,0.3)",borderRadius:5,padding:"2px 7px",fontSize:11,fontWeight:700}}>📦 Bank {annLoc.bank}{annLoc.slot}</span>}
                  {plugLoc&&<span style={{background:"rgba(165,180,252,0.15)",color:"#a5b4fc",border:"1px solid rgba(165,180,252,0.3)",borderRadius:5,padding:"2px 7px",fontSize:11,fontWeight:700}}>🔌 Bank {plugLoc.bank}{plugLoc.slot}</span>}
                  {!installed&&<span style={{fontSize:10,background:"rgba(251,191,36,0.15)",color:"#fbbf24",borderRadius:4,padding:"1px 7px",fontWeight:700}}>⬇ À installer</span>}
                  <span style={{fontSize:11,fontWeight:800,color:scoreColor(p.score),background:scoreBg(p.score),borderRadius:4,padding:"1px 7px",border:`1px solid ${scoreColor(p.score)}40`}}>{p.score}%</span>
                  {gainBadge(p.gain)}
                  <span style={{fontSize:9,color:"var(--text-muted)",background:"var(--a6)",borderRadius:4,padding:"1px 5px",fontWeight:600}}>{p.src}</span>
                </div>
                <div style={{fontSize:12,color:"var(--text-bright)",fontWeight:600,marginTop:5,lineHeight:1.3}}>{p.name}</div>
                <div style={{fontSize:11,color:"var(--text-muted)",marginTop:2}}>{p.amp}</div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  if(step==="style"){
    return(
      <div>
        <button onClick={()=>setStep("guitar")} style={{background:"var(--a8)",border:"1px solid var(--a12)",color:"var(--text-sec)",borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer",marginBottom:16}}>← Changer de guitare</button>
        <div style={{fontSize:14,color:"var(--text)",fontWeight:700,marginBottom:4}}>Guitare : <span style={{color:"#4ade80"}}>{guitar?.name}</span></div>
        <div style={{fontSize:12,color:"var(--text-muted)",marginBottom:16}}>Quel style joues-tu ?</div>
        <div className="style-grid">
          {JAM_STYLES.map(s=>(
            <button key={s.id} onClick={()=>{setStyle(s.id);setStep("results");}}
              style={{background:`rgba(${s.color},0.1)`,border:`1px solid rgba(${s.color},0.3)`,borderRadius:12,padding:"14px 8px",cursor:"pointer",textAlign:"center",transition:"all .15s"}}>
              <div style={{fontSize:22,marginBottom:4}}>{s.emoji}</div>
              <div style={{fontSize:12,fontWeight:700,color:`rgb(${s.color})`}}>{s.label}</div>
            </button>
          ))}
        </div>
      </div>
    );
  }

  // step === "guitar"
  const typeGroups={HB:[],SC:[],P90:[]};
  guitars.forEach(g=>typeGroups[g.type]?.push(g));
  return(
    <div>
      <div style={{fontSize:12,color:"var(--text-muted)",marginBottom:16}}>Sélectionne ta guitare pour ce jam :</div>
      {Object.entries(typeGroups).filter(([,arr])=>arr.length>0).map(([type,arr])=>(
        <div key={type} style={{marginBottom:16}}>
          <div style={{fontSize:11,color:`rgb(${TYPE_COLORS[type]||"99,102,241"})`,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>{type} — {TYPE_LABELS[type]}</div>
          <div className="guitar-grid">
            {arr.map(g=>(
              <button key={g.id} className={`guitar-card${guitarId===g.id?" selected":""}`} onClick={()=>{setGuitarId(g.id);setStep("style");}}>
                <div style={{fontSize:22,marginBottom:4}}>🎸</div>
                <div style={{fontSize:11,fontWeight:700,color:"var(--text-bright)",lineHeight:1.3}}>{g.name}</div>
              </button>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── HomeScreen ───────────────────────────────────────────────────────────────
function HomeScreen({songDb,onSongDb,setlists,allSetlists,onSetlists,checked,onChecked,onNext,onSettings,banksAnn,banksPlug,aiProvider,aiKeys,allGuitars,availableSources,profiles,activeProfileId,onSwitchProfile,customPacks}) {
  const [tab,setTab]=useState("jam");
  const tabBtn=(id,emoji,label,rgb)=>(
    <button className={`tab-btn${tab===id?" active":""}`} onClick={()=>setTab(id)}
      style={tab===id?{background:`rgba(${rgb},0.22)`,border:`1px solid rgba(${rgb},0.5)`}:{}}>
      <span className="tab-icon">{emoji}</span>
      {label}
    </button>
  );
  return (
    <div>
      <div style={{marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,minWidth:0}}>
        <ProfileSelector profiles={profiles} activeProfileId={activeProfileId} onSwitch={onSwitchProfile} onSettings={onSettings}/>
        <div style={{fontSize:20,fontWeight:800,color:"var(--text)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",minWidth:0,flex:1}}>🎸 ToneX Guide</div>
        <button onClick={onSettings} style={{background:"var(--a5)",border:"1px solid var(--a10)",color:"var(--text-muted)",borderRadius:8,padding:"8px 12px",fontSize:14,cursor:"pointer",flexShrink:0}}>⚙️</button>
      </div>
      <div className="tab-bar tabs-4" style={{marginBottom:20}}>
        {tabBtn("jam","🎲","Jam","251,191,36")}
        {tabBtn("setlist","🎵","Setlist","99,102,241")}
        {tabBtn("newsong","🔍","Nouveau","167,139,250")}
        {tabBtn("presets","🎛","Presets","74,222,128")}
      </div>
      {tab==="jam"&&<JamScreen banksAnn={banksAnn} banksPlug={banksPlug} allGuitars={allGuitars} availableSources={availableSources}/>}
      {tab==="setlist"&&<ListScreen songDb={songDb} onSongDb={onSongDb} allSetlists={allSetlists} setlists={setlists} onSetlists={onSetlists} checked={checked} onChecked={onChecked} onNext={onNext} onSettings={onSettings} banksAnn={banksAnn} banksPlug={banksPlug} aiProvider={aiProvider} aiKeys={aiKeys} hideHeader={true} allGuitars={allGuitars} availableSources={availableSources}/>}
      {tab==="newsong"&&<NewSongExplorer songDb={songDb} onSongDb={onSongDb} setlists={setlists} onSetlists={onSetlists} banksAnn={banksAnn} banksPlug={banksPlug} aiProvider={aiProvider} aiKeys={aiKeys} allGuitars={allGuitars}/>}
      {tab==="presets"&&<PresetBrowser banksAnn={banksAnn} banksPlug={banksPlug} availableSources={availableSources} customPacks={customPacks}/>}
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
// Fusionne les banks sauvées avec les banks initiales (ajoute les nouvelles sans écraser les modifs utilisateur)
function mergeBanks(saved, init){
  if(!saved) return init;
  const merged={...saved};
  for(const [k,v] of Object.entries(init)){
    if(!(k in merged)) merged[k]=v;
  }
  return merged;
}

function App() {
  const saved = loadState();
  const initDefault = saved || {
    version:2,
    activeProfileId:"sebastien",
    shared:{songDb:INIT_SONG_DB_META, theme:"dark", setlists:[{id:"sl_main",name:"Ma Setlist",songIds:INIT_SONG_DB_META.map(s=>s.id),profileIds:["sebastien"]}]},
    profiles:{sebastien:makeDefaultProfile("sebastien","Sébastien",true)}
  };

  // Shared state
  const [songDb,  setSongDb]  = useState(initDefault.shared.songDb);
  const [theme,   setTheme]   = useState(initDefault.shared.theme);
  const [setlists, setSetlists] = useState(initDefault.shared?.setlists || [{id:"sl_main",name:"Ma Setlist",songIds:INIT_SONG_DB_META.map(s=>s.id),profileIds:[initDefault.activeProfileId]}]);

  // Profiles state
  const [profiles, setProfiles] = useState(initDefault.profiles);
  const [activeProfileId, setActiveProfileId] = useState(initDefault.activeProfileId);

  // Current profile (derived)
  const profile = profiles[activeProfileId] || Object.values(profiles)[0];

  // Per-profile convenience setters
  const setProfileField = (field, value) => {
    setProfiles(p => ({...p, [activeProfileId]: {...p[activeProfileId], [field]: typeof value==="function"?value(p[activeProfileId][field]):value}}));
  };
  const setBanksAnn  = v => setProfileField("banksAnn", v);
  const setBanksPlug = v => setProfileField("banksPlug", v);
  const setAiProvider= v => setProfileField("aiProvider", v);
  const setAiKeys    = v => setProfileField("aiKeys", v);

  // Guitars for current profile (with edits merged)
  const allGuitars = useMemo(()=>{
    const edits=profile.editedGuitars||{};
    const base = GUITARS.filter(g=>profile.myGuitars.includes(g.id)).map(g=>({...g,...(edits[g.id]||{})}));
    return [...base, ...(profile.customGuitars||[])];
  },[profile.myGuitars, profile.customGuitars, profile.editedGuitars]);

  // Non-persisted
  const multiProfile = Object.keys(initDefault.profiles).length > 1;
  const [screen,  setScreen]  = useState(multiProfile ? "pick" : "list");
  const [checked, setChecked] = useState([]);
  const [synth,   setSynth]   = useState(null);

  // Destructure profile fields for convenience
  const {banksAnn, banksPlug, aiProvider, aiKeys, availableSources} = profile;
  // Filter setlists for current profile
  const mySetlists = setlists.filter(sl => !sl.profileIds || sl.profileIds.length === 0 || sl.profileIds.includes(activeProfileId));

  // Persist
  useEffect(()=>{saveState({version:2, activeProfileId, shared:{songDb,theme,setlists}, profiles});},[songDb,theme,setlists,profiles,activeProfileId]);

  // Reset on profile switch
  useEffect(()=>{setChecked([]);setScreen("list");},[activeProfileId]);

  // Apply theme to document
  useEffect(()=>{
    document.documentElement.setAttribute("data-theme",theme);
    const meta=document.querySelector('meta[name="theme-color"]');
    if(meta) meta.content=theme==="dark"?"#0f172a":"#f1f5f9";
  },[theme]);

  const switchProfile = id => { if(profiles[id]) setActiveProfileId(id); };
  const isAdmin = profile.isAdmin === true;
  const pickProfile = id => { setActiveProfileId(id); setScreen("list"); };
  const createAndPick = name => {
    const id=name.toLowerCase().replace(/[^a-z0-9]/g,"_")+`_${Date.now()}`;
    const np=makeDefaultProfile(id,name);
    setProfiles(p=>({...p,[id]:np}));
    setActiveProfileId(id);
    setScreen("list");
  };

  const songs=useMemo(()=>checked.map(id=>{
    const d=songDb.find(x=>x.id===id);
    return d?{...d}:{id,title:id,artist:"",isCustom:true,ig:[]};
  }),[checked,songDb]);

  const fullState={songDb,setlists,banksAnn,banksPlug};
  const onImportState=data=>{
    if(data.songDb)    setSongDb(data.songDb);
    if(data.setlists)  setSetlists(data.setlists);
    if(data.banksAnn)  setBanksAnn(data.banksAnn);
    if(data.banksPlug) setBanksPlug(data.banksPlug);
    setChecked([]);
    setScreen("list");
  };

  if(screen==="pick") return <div className="page-root"><ProfilePickerScreen profiles={profiles} onPick={pickProfile} onCreateNew={createAndPick}/></div>;
  if(screen==="exportimport") return <div className="page-root"><ExportImportScreen banksAnn={banksAnn} onBanksAnn={setBanksAnn} banksPlug={banksPlug} onBanksPlug={setBanksPlug} onBack={()=>setScreen("settings")} onNavigate={setScreen} fullState={fullState} onImportState={onImportState}/></div>;
  if(screen==="settings")     return <div className="page-root"><SettingsScreen songDb={songDb} onSongDb={setSongDb} setlists={mySetlists} allSetlists={setlists} allSetlists={setlists} onSetlists={setSetlists} banksAnn={banksAnn} onBanksAnn={setBanksAnn} banksPlug={banksPlug} onBanksPlug={setBanksPlug} onBack={()=>setScreen("list")} onNavigate={setScreen} aiProvider={aiProvider} onAiProvider={setAiProvider} aiKeys={aiKeys} onAiKeys={setAiKeys} theme={theme} onTheme={setTheme} profile={profile} profiles={profiles} onProfiles={setProfiles} activeProfileId={activeProfileId} allGuitars={allGuitars} isAdmin={isAdmin} activeProfileId={activeProfileId}/></div>;
  if(screen==="synthesis"&&synth) return <div className="page-root"><SynthesisScreen songs={songs} gps={synth.gps} aiR={synth.aiR} onBack={()=>setScreen("recap")} onNavigate={setScreen} songDb={songDb} banksAnn={banksAnn} banksPlug={banksPlug} allGuitars={allGuitars} availableSources={availableSources}/></div>;
  if(screen==="recap")        return <div className="page-root"><RecapScreen songs={songs} onBack={()=>setScreen("list")} onNavigate={setScreen} onValidate={(gps,aiR)=>{setSynth({gps,aiR});setScreen("synthesis");}} songDb={songDb} onSongDb={setSongDb} banksAnn={banksAnn} banksPlug={banksPlug} aiProvider={aiProvider} aiKeys={aiKeys} allGuitars={allGuitars} availableSources={availableSources}/></div>;
  return <div className="page-root"><HomeScreen songDb={songDb} onSongDb={setSongDb} setlists={mySetlists} allSetlists={setlists} onSetlists={setSetlists} checked={checked} onChecked={setChecked} onNext={()=>setScreen("recap")} onSettings={()=>setScreen("settings")} banksAnn={banksAnn} banksPlug={banksPlug} aiProvider={aiProvider} aiKeys={aiKeys} allGuitars={allGuitars} availableSources={availableSources} profiles={profiles} activeProfileId={activeProfileId} onSwitchProfile={switchProfile} customPacks={profile.customPacks}/></div>;
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
