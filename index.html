            {filtered.map(s=>{const sel=selectedSongs.includes(s.id);return(
              <div key={s.id} onClick={()=>toggleSong(s.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:8,cursor:"pointer",background:sel?"rgba(74,222,128,0.08)":"transparent",border:sel?"1px solid rgba(74,222,128,0.2)":"1px solid transparent",marginBottom:4}}>
                <div style={{width:16,height:16,borderRadius:4,border:sel?"2px solid #4ade80":"2px solid var(--text-muted)",background:sel?"var(--green)":"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>{sel&&<span style={{color:"#0f172a",fontSize:9,fontWeight:900}}>✓</span>}</div>

          <input placeholder="Artiste" value={newArtist} onChange={e=>setNewArtist(e.target.value)} style={{width:"100%",background:"var(--bg-body)",color:"var(--text)",border:"1px solid var(--a15)",borderRadius:8,padding:"9px 12px",fontSize:13,boxSizing:"border-box"}}/>

// ─── Jam helpers ─────────────────────────────────────────────────────────────
function getJamRecs(guitarId, style, banksAnn, banksPlug, guitars){
  const guitar=(guitars||GUITARS).find(g=>g.id===guitarId);
  const gType=guitar?.type||"HB";
  const allCatalog={...PRESET_CATALOG_FULL,...PRESET_CATALOG};
  // deduplicate by name
  const allEntries=Object.entries(allCatalog);
  const seen=new Set();
  const unique=allEntries.filter(([n])=>{if(seen.has(n))return false;seen.add(n);return true;});
  const scored=unique
    .filter(([,info])=>!style||info.style===style)
    .map(([name,info])=>({name,score:info.scores?.[gType]??60,amp:info.amp,gain:info.gain,style:info.style,src:info.src}))
    .sort((a,b)=>b.score-a.score);
  const annInstalled=scored.map(p=>{const loc=findInBanks(p.name,banksAnn);return loc?{...p,...loc}:null;}).filter(Boolean);
  const plugInstalled=scored.map(p=>{const loc=findInBanks(p.name,banksPlug);return loc?{...p,...loc}:null;}).filter(Boolean);
  return{annTop3:annInstalled.slice(0,3),plugBest:plugInstalled.slice(0,3),fullTop3:scored.slice(0,3),gType};
}

        </div>
        {(aiC.settings_preset||aiC.settings_guitar)&&<div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:8}}>
          {aiC.settings_preset&&<div style={{fontSize:11,background:"rgba(251,191,36,0.07)",border:"1px solid var(--yellow-border)",borderRadius:7,padding:"6px 10px",color:"var(--yellow)"}}><b style={{color:"var(--yellow)"}}>Preset · </b>{aiC.settings_preset}</div>}
          {aiC.settings_guitar&&<div style={{fontSize:11,background:"rgba(34,197,94,0.07)",border:"1px solid rgba(34,197,94,0.15)",borderRadius:7,padding:"6px 10px",color:"var(--green)"}}><b style={{color:"var(--green)"}}>Guitare · </b>{aiC.settings_guitar}</div>}
        </div>}
      </>}
      {song.isCustom&&!aiC&&<div style={{fontSize:12,color:"var(--text-dim)",padding:"10px 0"}}>Aucune analyse IA en cache. Ouvre ce morceau dans le Récap pour lancer l'analyse.</div>}
      <button onClick={onClose} style={{fontSize:11,color:"var(--text-muted)",background:"none",border:"none",cursor:"pointer",textDecoration:"underline",padding:0}}>Fermer ↑</button>

}

// ─── ListScreen ───────────────────────────────────────────────────────────────
function ListScreen({songDb,onSongDb,setlists,allSetlists,onSetlists,checked,onChecked,onNext,onSettings,banksAnn,banksPlug,aiProvider,aiKeys,hideHeader=false,allGuitars,availableSources}) {
  const [activeSlId,setActiveSlId]=useState(setlists[0]?.id||null);
  const [showAdd,setShowAdd]=useState(false);
  const [sort,setSort]=useState("default");
  const activeSongs=useMemo(()=>{
    const sl=activeSlId?setlists.find(s=>s.id===activeSlId):null;
    const arr=sl?(sl.songIds||[]).map(id=>songDb.find(s=>s.id===id)).filter(Boolean):[...songDb];
    if(sort==="alpha") arr.sort((a,b)=>a.title.localeCompare(b.title,"fr"));
    else if(sort==="artist") arr.sort((a,b)=>a.artist.localeCompare(b.artist,"fr")||a.title.localeCompare(b.title,"fr"));
    return arr;
  },[songDb,activeSlId,sort,setlists]);
  const [expandedId,setExpandedId]=useState(null);
  const toggle=id=>onChecked(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const toggleAll=()=>onChecked(checked.length===activeSongs.length?[]:activeSongs.map(s=>s.id));
  return (
    <div>
      {!hideHeader&&<div style={{marginBottom:20,textAlign:"center"}}>
        <div style={{fontSize:26,fontWeight:800,color:"var(--text)",marginBottom:3}}>🎸 ToneX Poweruser</div>
      </div>}
      <div style={{marginBottom:14}}>
        <div style={{fontSize:11,color:"var(--text-muted)",fontWeight:600,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Setlist active</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
          <button onClick={()=>{setActiveSlId(null);onChecked([]);}}
            style={{background:!activeSlId?"var(--accent-bg)":"var(--a5)",border:!activeSlId?"1px solid rgba(99,102,241,0.6)":"1px solid var(--a10)",color:!activeSlId?"var(--accent)":"var(--text-sec)",borderRadius:8,padding:"7px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>
            Tous<span style={{fontSize:10,marginLeft:5,color:!activeSlId?"var(--accent)":"var(--text-dim)"}}>({songDb.length})</span>
          </button>
          {setlists.map(sl=>(
            <button key={sl.id} onClick={()=>{setActiveSlId(activeSlId===sl.id?null:sl.id);onChecked([]);}}
              style={{background:activeSlId===sl.id?"var(--accent-bg)":"var(--a5)",border:activeSlId===sl.id?"1px solid rgba(99,102,241,0.6)":"1px solid var(--a10)",color:activeSlId===sl.id?"var(--accent)":"var(--text-sec)",borderRadius:8,padding:"7px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>
              {sl.name}<span style={{fontSize:10,marginLeft:5,color:activeSlId===sl.id?"var(--accent)":"var(--text-dim)"}}>({sl.songIds.length})</span>
            </button>

          {!hideHeader&&<button onClick={onSettings} style={{background:"var(--a5)",border:"1px solid var(--a10)",color:"var(--text-muted)",borderRadius:8,padding:"7px 12px",fontSize:13,cursor:"pointer",marginLeft:"auto"}}>⚙️</button>}
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:12,color:"var(--text-muted)",fontWeight:600}}>{activeSongs.length} morceaux</span>
          {activeSongs.length>0&&<button onClick={toggleAll} style={{background:"var(--a7)",border:"1px solid var(--a10)",color:"var(--text-sec)",borderRadius:6,padding:"3px 10px",fontSize:11,cursor:"pointer"}}>{checked.length===activeSongs.length?"Tout décocher":"Tout cocher"}</button>}

      {activeSongs.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:"var(--text-dim)"}}><div style={{fontSize:24,marginBottom:8}}>🎵</div><div style={{fontSize:14}}>Setlist vide — clique sur "+ Ajouter"</div></div>}
      {activeSongs.map(s=>{
        const isC=checked.includes(s.id);

              <div onClick={()=>setExpandedId(isExpanded?null:s.id)} style={{flex:1,background:isC?"rgba(74,222,128,0.05)":"var(--a3)",border:isC?"1px solid var(--green-border)":"1px solid var(--a7)",borderLeft:"none",borderRadius:isExpanded?"0 10px 0 0":"0 10px 10px 0",padding:"10px 13px",cursor:"pointer"}}>

                <div style={{fontSize:11,color:"var(--text-muted)",marginBottom:hist?3:0}}>{s.artist}</div>
                {hist&&!isExpanded&&<div style={{fontSize:10,color:"var(--text-dim)",marginTop:2,display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>

                  <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1,minWidth:0}}>{hist.amp}</span>
                </div>}
                {!isExpanded&&<div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap",marginTop:g||aiC?.ideal_guitar?4:0}}>
                  {g&&<><span style={{fontSize:10,color:"var(--text-muted)"}}>🎸</span><span style={{fontSize:10,color:"var(--green)",background:"var(--green-bg)",borderRadius:4,padding:"1px 7px",fontWeight:600}}>{g.short}</span>{ig.slice(1).map(gid=>{const gg=(allGuitars||GUITARS).find(x=>x.id===gid);return gg?<span key={gid} style={{fontSize:10,color:"var(--text-muted)",background:"var(--a5)",borderRadius:4,padding:"1px 7px"}}>{gg.short}</span>:null;})}</>}
                  {aiC?.ideal_guitar&&<><span style={{fontSize:10,color:"var(--text-muted)"}}>🎸</span><span style={{fontSize:10,color:"var(--purple)",background:"rgba(167,139,250,0.1)",borderRadius:4,padding:"1px 7px",fontWeight:600}}>{aiC.ideal_guitar}</span></>}
                </div>}
                {!isExpanded&&<div style={{display:"flex",flexDirection:"column",gap:3,marginTop:pa||pp?4:0}}>
                  {pa&&presetRow("📦",pa.l,banksAnn)}
                  {pp&&presetRow("🔌",pp.l,banksPlug)}

                  {aiPP&&presetRow("🔌",aiPP.label,banksPlug)}
                </div>}

            {isExpanded&&<SongDetailCard song={s} banksAnn={banksAnn} banksPlug={banksPlug} onClose={()=>setExpandedId(null)} guitars={allGuitars} availableSources={availableSources}/>}

      {checked.length>0&&<div className="bottom-action" style={{paddingTop:12}}><button onClick={onNext} style={{width:"100%",background:"#16a34a",border:"none",color:"var(--text)",borderRadius:12,padding:"14px",fontSize:15,fontWeight:700,cursor:"pointer"}}>Générer le récap — {checked.length} morceau{checked.length>1?"x":""} →</button></div>}
      {showAdd&&<AddSongModal songDb={songDb} onSongDb={onSongDb} setlists={setlists} onSetlists={onSetlists} activeSlId={activeSlId} onClose={()=>setShowAdd(false)} banksAnn={banksAnn} banksPlug={banksPlug} aiProvider={aiProvider} aiKeys={aiKeys} guitars={allGuitars}/>}
    </div>
  );
}

// ─── Recap Screen ─────────────────────────────────────────────────────────────

              {(()=>{const hist=getSongHist(s,aiR[s.id]);return hist&&(

                  <div style={{display:"flex",flexDirection:"column",gap:3}}>
                    <div style={{display:"flex",gap:5,alignItems:"baseline",flexWrap:"wrap"}}>

// ─── Synthesis Screen ─────────────────────────────────────────────────────────
function SynthesisScreen({songs,gps,aiR,onBack,onNavigate,songDb,banksAnn,banksPlug,allGuitars,availableSources}) {
  const rows=songs.map(s=>{
    const g=(allGuitars||GUITARS).find(x=>x.id===gps[s.id]);
    const type=g?.type||"HB";
    let ann=null,plug=null;
    if(!s.isCustom){
      const pa=getPA(s,type),pp=getPP(s,type);
      if(pa){const rec=getInstallRec(pa.l,type,banksAnn);ann={name:pa.l,rec};}
      if(pp){const rec=getInstallRec(pp.l,type,banksPlug);plug={name:pp.l,rec};}
    } else if(aiR[s.id]){
      const ai=aiR[s.id];
      if(ai.preset_ann)ann={name:ai.preset_ann.label,rec:getInstallRec(ai.preset_ann.label,type,banksAnn)};
      if(ai.preset_plug)plug={name:ai.preset_plug.label,rec:getInstallRec(ai.preset_plug.label,type,banksPlug)};
    }
    return {s,g,type,ann,plug};
  });
  const th={fontSize:11,color:"var(--text-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,padding:"8px 10px",borderBottom:"1px solid var(--a10)",textAlign:"left"};
  const td={fontSize:12,padding:"10px",borderBottom:"1px solid var(--a5)",verticalAlign:"top"};
  const cellPreset=(item,accentColor)=>{
    if(!item) return <span style={{color:"var(--text-muted)"}}>—</span>;
    const {name,rec}=item;
    const sc=rec?.score;
    const scC=sc!=null?scoreColor(sc):"#888";
    const scB=sc!=null?scoreBg(sc):"transparent";
    return (
      <div>
        {rec?.installed
          ?<span style={{fontWeight:700,color:accentColor,fontSize:13,marginRight:4}}>Banque {rec.bank}{rec.slot}</span>
          :<span style={{fontSize:10,background:"var(--yellow-bg)",color:"var(--yellow)",borderRadius:4,padding:"1px 6px",fontWeight:700,marginRight:4}}>⬇ À installer</span>
        }
        {sc!=null&&<span style={{fontSize:10,fontWeight:800,color:scC,background:scB,borderRadius:4,padding:"1px 6px"}}>{sc}%</span>}
        <div style={{fontSize:11,color:"var(--text-sec)",lineHeight:1.5,marginTop:2}}>{name}</div>
        {!rec?.installed&&rec?.replaceBank!=null&&<div style={{fontSize:10,color:"var(--text-dim)",marginTop:1}}>→ Remplace Banque {rec.replaceBank}{rec.replaceSlot}</div>}
      </div>
    );
  };
  return (
    <div>
      <Breadcrumb crumbs={[{label:"Accueil",screen:"list"},{label:"Récap",screen:"recap"},{label:"Synthèse"}]} onNavigate={onNavigate}/>
      <div style={{marginBottom:20}}><div style={{fontSize:22,fontWeight:800,color:"var(--text)"}}>Tableau de synthèse</div><div style={{fontSize:12,color:"var(--text-muted)",marginTop:3}}>{songs.length} morceau{songs.length>1?"x":""}</div></div>
      <div style={{overflowX:"auto",borderRadius:12,border:"1px solid var(--a8)"}}>
        <table>
          <thead><tr style={{background:"var(--a4)"}}><th style={th}>Morceau</th><th style={th}>Guitare</th><th style={{...th,color:"var(--blue)"}}>📦 Pédale</th><th style={{...th,color:"var(--accent)"}}>🔌 Plug</th></tr></thead>
          <tbody>
            {rows.map(({s,g,ann,plug},i)=>(
              <tr key={s.id} style={{background:i%2===0?"transparent":"var(--a3)"}}>
                <td style={td}><div style={{fontWeight:600,color:"var(--text)",fontSize:13}}>{s.title}</div><div style={{fontSize:11,color:"var(--text-muted)"}}>{s.artist}</div></td>
                <td style={td}>{g?<span style={{fontSize:12,color:"var(--green)",background:"var(--green-bg)",borderRadius:5,padding:"2px 8px",fontWeight:600,whiteSpace:"nowrap"}}>{g.short}</span>:<span style={{color:"var(--text-muted)"}}>—</span>}</td>
                <td style={td}>{cellPreset(ann,"var(--blue)")}</td>
                <td style={td}>{cellPreset(plug,"var(--accent)")}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── NewSongExplorer ─────────────────────────────────────────────────────────
function NewSongExplorer({songDb,onSongDb,setlists,onSetlists,banksAnn,banksPlug,aiProvider,aiKeys,allGuitars}) {
  const [title,setTitle]=useState("");
  const [artist,setArtist]=useState("");
  const [gId,setGId]=useState("");
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);
  const [err,setErr]=useState(null);
  const [addToDb,setAddToDb]=useState(true);
  const [addToSlIds,setAddToSlIds]=useState([]);
  const [saved,setSaved]=useState(false);
  const inp={background:"var(--bg-card)",color:"var(--text)",border:"1px solid var(--a15)",borderRadius:8,padding:"9px 12px",fontSize:13,width:"100%",boxSizing:"border-box"};

  const analyze=()=>{
    if(!title.trim())return;
    setLoading(true);setErr(null);setResult(null);setSaved(false);
    const fakeSong={id:`tmp_${Date.now()}`,title:title.trim(),artist:artist.trim()||"Artiste inconnu"};
    fetchAI(fakeSong,gId,banksAnn,banksPlug,aiProvider,aiKeys,allGuitars)
      .then(r=>setResult(r))

function PresetList({filtered,selected,setSelected,banksAnn,banksPlug,fullCatalog,filterSrcs,filterPacks,togglePack,setFilterPacks,mergedContext}){
  const [shown,setShown]=useState(PRESET_PAGE_SIZE);
  useEffect(()=>setShown(PRESET_PAGE_SIZE),[filtered,filterPacks]);

  // Sub-pack grouping (show when TSR is among selected sources or all sources shown)
  const showSubPacks=filterSrcs.length===0||filterSrcs.includes("TSR");
  const subPacks=useMemo(()=>{
    if(!showSubPacks) return null;
    const packs={};
    filtered.forEach(([name,info])=>{if(info.pack){packs[info.pack]=(packs[info.pack]||0)+1;}});
    return Object.entries(packs).sort((a,b)=>a[0].localeCompare(b[0]));
  },[filtered,showSubPacks]);

  const displayFiltered=useMemo(()=>{
    if(filterPacks.length===0) return filtered;
    return filtered.filter(([,info])=>filterPacks.includes(info.pack));
  },[filtered,filterPacks]);

  const visible=displayFiltered.slice(0,shown);
  const remaining=displayFiltered.length-shown;

    <div>
      {/* Sub-pack chips for TSR */}
      {subPacks&&subPacks.length>1&&<div style={{marginBottom:12}}>

        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>

          {subPacks.map(([pack,count])=>{const on=filterPacks.includes(pack);return(
            <button key={pack} onClick={()=>togglePack(pack)} style={{fontSize:10,fontWeight:on?700:500,color:on?"var(--yellow)":"var(--text-sec)",background:on?"var(--yellow-bg)":"var(--a3)",border:on?"1px solid var(--yellow-border)":"1px solid var(--a6)",borderRadius:6,padding:"4px 8px",cursor:"pointer"}}>{pack} ({count})</button>);})}

                <div style={{flex:1,minWidth:0}}>

                  <div style={{display:"flex",gap:5,alignItems:"center",marginTop:2,flexWrap:"wrap"}}>

function PresetBrowser({banksAnn,banksPlug,availableSources,customPacks}) {
  const [filterStyle,setFilterStyle]=useState("all");
  const [filterGain,setFilterGain]=useState("all");
  const [filterSrcs,setFilterSrcs]=useState([]); // empty = all
  const [search,setSearch]=useState("");
  const [selected,setSelected]=useState(null);
  const [filterPacks,setFilterPacks]=useState([]); // empty = all
  const toggleSrc=key=>setFilterSrcs(p=>p.includes(key)?p.filter(x=>x!==key):[...p,key]);
  const togglePack=key=>setFilterPacks(p=>p.includes(key)?p.filter(x=>x!==key):[...p,key]);

  // Merge PRESET_CONTEXT with custom pack ampContext
  const mergedContext=useMemo(()=>{
    const ctx={...PRESET_CONTEXT};
    (customPacks||[]).forEach(pack=>{
      if(pack.ampContext){
        for(const [amp,info] of Object.entries(pack.ampContext)){
          if(!ctx[amp]) ctx[amp]=info;
        }
      }
    });
    return ctx;
  },[customPacks]);

  // Merge custom packs into catalog — only keep sources the user has
  const fullCatalog=useMemo(()=>{
    const existingNorms=new Set(Object.keys(PRESET_CATALOG_FULL).map(normalizePresetName));
    const tsrDeduped={};
    for(const [k,v] of Object.entries(TSR_PACK_CATALOG)){
      if(!existingNorms.has(normalizePresetName(k))) tsrDeduped[k]=v;
    }
    const cat={...PRESET_CATALOG_FULL,...tsrDeduped,...ANNIVERSARY_CATALOG,...FACTORY_CATALOG,...PLUG_FACTORY_CATALOG};
    (customPacks||[]).forEach(pack=>{
      (pack.presets||[]).forEach(p=>{
        if(p.name&&!cat[p.name]) cat[p.name]={src:pack.name,amp:p.amp||"Custom",gain:p.gain||"mid",style:p.style||"rock",scores:p.scores||{HB:78,SC:78,P90:78}};
      });
    });
    // Filter to only sources the user has
    if(availableSources){
      for(const k of Object.keys(cat)){
        if(availableSources[cat[k].src]===false) delete cat[k];
      }
    }
    return cat;
  },[customPacks,availableSources]);

  const filtered=useMemo(()=>
    Object.entries(fullCatalog).filter(([name,info])=>{
      if(filterStyle!=="all"&&info.style!==filterStyle)return false;
      if(filterGain!=="all"&&info.gain!==filterGain)return false;
      if(filterSrcs.length>0&&!filterSrcs.includes(info.src))return false;
      if(search.trim()){
        const q=search.toLowerCase();
        const ctx=mergedContext[info.amp];
        const artistsStr=(ctx?.refs||[]).map(r=>r.a).join(" ").toLowerCase();
        const tracksStr=(ctx?.refs||[]).flatMap(r=>r.t).join(" ").toLowerCase();
        if(!name.toLowerCase().includes(q)&&!info.amp.toLowerCase().includes(q)&&!artistsStr.includes(q)&&!tracksStr.includes(q))return false;
      }
      return true;
    })
  ,[filterStyle,filterGain,filterSrcs,search]);

  const [randomPick,setRandomPick]=useState(null);
  const pickRandom=()=>{
    const pool=Object.entries(fullCatalog);
    if(!pool.length)return;
    const [name,info]=pool[Math.floor(Math.random()*pool.length)];
    setRandomPick({name,info});
    setSelected(null);
  };

  const STYLE_OPTS={all:"Tous styles",hard_rock:"Hard Rock",rock:"Rock",blues:"Blues",jazz:"Jazz",pop:"Pop",metal:"Metal"};
  const GAIN_OPTS={all:"Tous gains",low:"Low gain",mid:"Mid gain",high:"High gain"};
  const ALL_SRC_OPTS={TSR:"64 Studio Rats",ML:"ML Sound Lab Essentials",Anniversary:"ToneX Anniversary Factory",Factory:"ToneX Factory",PlugFactory:"ToneX Plug Factory",custom:"Custom"};
  const SRC_OPTS={all:"Toutes sources",...Object.fromEntries(Object.entries(ALL_SRC_OPTS).filter(([k])=>!availableSources||availableSources[k]!==false))};
  const selStyle={background:"var(--bg-card)",color:"var(--text-sec)",border:"1px solid var(--a12)",borderRadius:7,padding:"6px 10px",fontSize:12,cursor:"pointer"};

  const hasFilter=filterStyle!=="all"||filterGain!=="all"||filterSrcs.length>0||search.trim();
  return (
    <div>
      <div style={{fontSize:13,color:"var(--text-muted)",marginBottom:14}}>Explore ta bibliothèque de presets et découvre leur contexte musical.</div>

      {/* Bouton aléatoire */}
      <button onClick={pickRandom} style={{width:"100%",background:"linear-gradient(135deg,#7c3aed,#0ea5e9)",border:"none",color:"var(--text)",borderRadius:12,padding:"14px",fontSize:15,fontWeight:700,cursor:"pointer",marginBottom:16}}>
        🎲 Preset aléatoire
      </button>

      {/* Fiche du preset aléatoire */}
      {randomPick&&<div style={{marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
          <span style={{fontSize:13,fontWeight:800,color:"var(--text)"}}>{randomPick.name}</span>
          <button onClick={()=>setRandomPick(null)} style={{background:"none",border:"none",color:"var(--text-muted)",cursor:"pointer",fontSize:14}}>✕</button>
        </div>
        <PresetDetailInline name={randomPick.name} info={randomPick.info} banksAnn={banksAnn} banksPlug={banksPlug} presetContext={mergedContext}/>
      </div>}

      {/* Filtres */}
      <div style={{background:"var(--a3)",border:"1px solid var(--a7)",borderRadius:12,padding:12,marginBottom:16}}>
        <div style={{fontSize:10,color:"var(--text-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>Filtres</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
          <select value={filterStyle} onChange={e=>setFilterStyle(e.target.value)} style={selStyle}>{Object.entries(STYLE_OPTS).map(([v,l])=><option key={v} value={v}>{l}</option>)}</select>
          <select value={filterGain} onChange={e=>setFilterGain(e.target.value)} style={selStyle}>{Object.entries(GAIN_OPTS).map(([v,l])=><option key={v} value={v}>{l}</option>)}</select>
          </div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:8}}>
          <button onClick={()=>setFilterSrcs([])} style={{fontSize:10,fontWeight:filterSrcs.length===0?700:500,color:filterSrcs.length===0?"var(--accent)":"var(--text-muted)",background:filterSrcs.length===0?"var(--accent-bg)":"var(--a3)",border:filterSrcs.length===0?"1px solid var(--accent-border)":"1px solid var(--a6)",borderRadius:6,padding:"4px 8px",cursor:"pointer"}}>Toutes sources</button>

// ─── SongSearchBar — free text → AI correction → validate ────────────────────
function SongSearchBar({onConfirm,aiProvider,aiKeys}){
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [suggestion,setSuggestion]=useState(null);
  const [err,setErr]=useState(null);

  const search=()=>{
    if(!input.trim())return;
    const key=aiKeys?.gemini||aiKeys?.anthropic;
    const provider=aiKeys?.gemini?"gemini":"anthropic";
    if(!key){setErr("Clé API manquante — configure-la dans les paramètres.");return;}
    setLoading(true);setErr(null);setSuggestion(null);
    const prompt=`L'utilisateur veut jouer un morceau de guitare. Il a tapé : "${input.trim()}"
Corrige l'orthographe et identifie le titre exact et l'artiste/groupe.
Réponds UNIQUEMENT en JSON (sans markdown) : {"title":"Titre exact","artist":"Artiste/Groupe","confidence":"high|medium|low"}`;
    const parse=t=>JSON.parse(t.replace(/```json|```/g,"").trim());
    const req=provider==="gemini"
      ?fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})})
        .then(r=>r.json()).then(d=>{if(d.error)throw new Error(d.error.message);return parse(d.candidates?.[0]?.content?.parts?.[0]?.text||"");})
      :fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:200,messages:[{role:"user",content:prompt}]})})
        .then(r=>r.json()).then(d=>{if(d.error)throw new Error(d.error.message);return parse(d.content?.map(i=>i.text||"").join("")||"");});
    req.then(s=>setSuggestion(s)).catch(e=>setErr(e.message)).finally(()=>setLoading(false));
  };

  const inp={background:"var(--bg-card)",color:"var(--text)",border:"1px solid var(--a15)",borderRadius:10,padding:"12px 14px",fontSize:14,width:"100%",boxSizing:"border-box"};
  return(
    <div>
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        <input placeholder="Ex: highway to hel acdc" value={input} onChange={e=>{setInput(e.target.value);setSuggestion(null);}} onKeyDown={e=>e.key==="Enter"&&search()} style={{...inp,flex:1}}/>
        <button onClick={search} disabled={!input.trim()||loading} style={{background:!input.trim()||loading?"#374151":"#4f46e5",border:"none",color:"#fff",borderRadius:10,padding:"0 18px",fontSize:14,fontWeight:700,cursor:!input.trim()||loading?"not-allowed":"pointer",flexShrink:0}}>{loading?"...":"OK"}</button>
      </div>
      {err&&<div style={{fontSize:12,color:"var(--red)",marginBottom:8}}>{err}</div>}
      {suggestion&&<div style={{background:"var(--green-bg)",border:"1px solid var(--green-border)",borderRadius:12,padding:14,marginBottom:8}}>
        <div style={{fontSize:14,fontWeight:700,color:"var(--text)",marginBottom:2}}>{suggestion.title}</div>
        <div style={{fontSize:12,color:"var(--text-sec)",marginBottom:10}}>{suggestion.artist}</div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>{onConfirm(suggestion.title,suggestion.artist);setSuggestion(null);setInput("");}} style={{background:"var(--green)",border:"none",color:"#0f172a",borderRadius:8,padding:"8px 16px",fontSize:13,fontWeight:700,cursor:"pointer"}}>C'est bon !</button>
          <button onClick={()=>setSuggestion(null)} style={{background:"var(--a7)",border:"none",color:"var(--text-sec)",borderRadius:8,padding:"8px 14px",fontSize:13,cursor:"pointer"}}>Non, corriger</button>
        </div>
      </div>}
    </div>
  );
}

      {/* Zone centrale style Google */}

            {/* Guitare recommandée */}
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
              {songResult.ideal_guitar&&<span style={{fontSize:11,background:"var(--green-bg)",border:"1px solid var(--green-border)",borderRadius:7,padding:"4px 10px",color:"var(--green)",fontWeight:600}}>🎸 {songResult.ideal_guitar}</span>}
            </div>
            {songResult.guitar_reason&&<div style={{fontSize:11,color:"var(--text-sec)",marginBottom:10}}>{songResult.guitar_reason}</div>}

            {/* Référence originale */}
            {(songResult.ref_guitarist||songResult.ref_guitar||songResult.ref_amp)&&<div style={{background:"var(--a4)",borderRadius:8,padding:"8px 10px",marginBottom:10,fontSize:11,color:"var(--text-sec)",lineHeight:1.6}}>
              {songResult.ref_guitarist&&<div><b style={{color:"var(--text-muted)"}}>Guitariste :</b> {songResult.ref_guitarist}</div>}
              {songResult.ref_guitar&&<div><b style={{color:"var(--text-muted)"}}>Guitare :</b> {songResult.ref_guitar}</div>}
              {songResult.ref_amp&&<div><b style={{color:"var(--text-muted)"}}>Ampli :</b> {songResult.ref_amp}</div>}
              {songResult.ref_effects&&songResult.ref_effects!=="Aucun effet"&&<div><b style={{color:"var(--text-muted)"}}>Effets :</b> {songResult.ref_effects}</div>}
            </div>}

            {/* Presets recommandés */}
            <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:10}}>
              {songResult.preset_ann&&<div style={{display:"flex",alignItems:"center",gap:8,background:"rgba(74,222,128,0.06)",border:"1px solid var(--green-border)",borderRadius:8,padding:"8px 10px"}}>
                <span style={{fontSize:11,color:"var(--green)",fontWeight:700,flexShrink:0}}>📦 Pédale</span>
                <span style={{fontSize:11,color:"var(--text)",fontWeight:600}}>{songResult.preset_ann.label}</span>
                <span style={{fontSize:10,color:"var(--text-muted)",marginLeft:"auto"}}>Banque {songResult.preset_ann.bank}{songResult.preset_ann.col}</span>
              </div>}
              {songResult.preset_plug&&<div style={{display:"flex",alignItems:"center",gap:8,background:"rgba(99,102,241,0.06)",border:"1px solid rgba(99,102,241,0.15)",borderRadius:8,padding:"8px 10px"}}>
                <span style={{fontSize:11,color:"var(--accent)",fontWeight:700,flexShrink:0}}>🔌 Plug</span>
                <span style={{fontSize:11,color:"var(--text)",fontWeight:600}}>{songResult.preset_plug.label}</span>
                <span style={{fontSize:10,color:"var(--text-muted)",marginLeft:"auto"}}>Banque {songResult.preset_plug.bank}{songResult.preset_plug.col}</span>
              </div>}
            </div>

            {/* Réglages */}
            {songResult.settings_preset&&<div style={{fontSize:11,background:"rgba(251,191,36,0.07)",border:"1px solid var(--yellow-border)",borderRadius:7,padding:"6px 10px",color:"var(--yellow)",marginBottom:6}}><b style={{color:"var(--yellow)"}}>Preset :</b> {songResult.settings_preset}</div>}
            {songResult.settings_guitar&&<div style={{fontSize:11,background:"rgba(34,197,94,0.07)",border:"1px solid rgba(34,197,94,0.15)",borderRadius:7,padding:"6px 10px",color:"var(--green)"}}><b style={{color:"var(--green)"}}>Guitare :</b> {songResult.settings_guitar}</div>}

            {/* Nouveau morceau */}
            <button onClick={()=>{setConfirmedSong(null);setSongResult(null);}} style={{width:"100%",marginTop:10,background:"var(--a5)",border:"1px solid var(--a10)",color:"var(--text-sec)",borderRadius:8,padding:"8px",fontSize:12,cursor:"pointer"}}>Autre morceau</button>
          </div>
        </div>}
      </div>}
      </div>

      {/* Tuiles en bas (masquer si résultat ou loading) */}
      {!songResult&&!songLoading&&<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,paddingBottom:12}}>
        <button onClick={onSetlistScreen} style={{background:"rgba(99,102,241,0.1)",border:"1px solid var(--accent-border)",borderRadius:14,padding:"16px 12px",cursor:"pointer",textAlign:"center",transition:"all .15s"}}>
          <div style={{fontSize:24,marginBottom:4}}>🎵</div>
          <div style={{fontSize:13,fontWeight:700,color:"var(--accent)"}}>Mes setlists</div>
          <div style={{fontSize:10,color:"var(--text-muted)",marginTop:2}}>{setlists.length} setlist{setlists.length>1?"s":""}</div>
        </button>
        <button onClick={()=>onJam()} style={{background:"var(--yellow-bg)",border:"1px solid var(--yellow-border)",borderRadius:14,padding:"16px 12px",cursor:"pointer",textAlign:"center",transition:"all .15s"}}>
          <div style={{fontSize:24,marginBottom:4}}>🎲</div>
          <div style={{fontSize:13,fontWeight:700,color:"var(--yellow)"}}>Jammer</div>
          <div style={{fontSize:10,color:"var(--text-muted)",marginTop:2}}>Guitare + style</div>
        </button>
        <button onClick={()=>onExplore()} style={{background:"rgba(167,139,250,0.1)",border:"1px solid rgba(167,139,250,0.3)",borderRadius:14,padding:"16px 12px",cursor:"pointer",textAlign:"center",transition:"all .15s"}}>
          <div style={{fontSize:24,marginBottom:4}}>🎛️</div>
          <div style={{fontSize:13,fontWeight:700,color:"var(--purple)"}}>Explorer</div>
          <div style={{fontSize:10,color:"var(--text-muted)",marginTop:2}}>Bibliothèque de presets</div>
        </button>
      </div>}
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
// Fusionne les banks sauvées avec les banks initiales (ajoute les nouvelles sans écraser les modifs utilisateur)
function mergeBanks(saved, init){
  if(!saved) return init;
  const merged={...saved};
  for(const [k,v] of Object.entries(init)){
    if(!(k in merged)) merged[k]=v;
  }
  return merged;
}

function App() {
  const saved = loadState();
  const [firestoreLoaded, setFirestoreLoaded] = useState(false);
  const initDefault = saved || {
    version:2,
    activeProfileId:"sebastien",
    shared:{songDb:INIT_SONG_DB_META, theme:"dark", setlists:[{id:"sl_main",name:"Ma Setlist",songIds:INIT_SONG_DB_META.map(s=>s.id),profileIds:["sebastien"]}]},
    profiles:{sebastien:makeDefaultProfile("sebastien","Sébastien",true)}
  };

  // Shared state
  const [songDb,  setSongDb]  = useState(initDefault.shared.songDb);
  const [theme,   setTheme]   = useState(initDefault.shared.theme);
  const [setlists, setSetlists] = useState(initDefault.shared?.setlists || [{id:"sl_main",name:"Ma Setlist",songIds:INIT_SONG_DB_META.map(s=>s.id),profileIds:[initDefault.activeProfileId]}]);

  // Profiles state — merge new banks from INIT without overwriting user changes
  const mergedProfiles = useMemo(()=>{
    const p={...initDefault.profiles};
    for(const [id,prof] of Object.entries(p)){
      p[id]={...prof, banksAnn:mergeBanks(prof.banksAnn,INIT_BANKS_ANN), banksPlug:mergeBanks(prof.banksPlug,INIT_BANKS_PLUG)};
    }
    return p;
  },[]);
  const [profiles, setProfiles] = useState(mergedProfiles);
  const [activeProfileId, setActiveProfileId] = useState(initDefault.activeProfileId);

  // Current profile (derived)
  const profile = profiles[activeProfileId] || Object.values(profiles)[0];

  // Per-profile convenience setters
  const setProfileField = (field, value) => {
    setProfiles(p => ({...p, [activeProfileId]: {...p[activeProfileId], [field]: typeof value==="function"?value(p[activeProfileId][field]):value}}));
  };
  const setBanksAnn  = v => setProfileField("banksAnn", v);
  const setBanksPlug = v => setProfileField("banksPlug", v);
  const setAiProvider= v => setProfileField("aiProvider", v);
  const setAiKeys    = v => setProfileField("aiKeys", v);

  // Guitars for current profile (with edits merged)
  const allGuitars = useMemo(()=>{
    const edits=profile.editedGuitars||{};
    const base = GUITARS.filter(g=>profile.myGuitars.includes(g.id)).map(g=>({...g,...(edits[g.id]||{})}));
    return [...base, ...(profile.customGuitars||[])];
  },[profile.myGuitars, profile.customGuitars, profile.editedGuitars]);

  // Non-persisted
  const multiProfile = Object.keys(initDefault.profiles).length > 1;
  const [screen,  setScreen]  = useState(multiProfile ? "pick" : "list");
  const [checked, setChecked] = useState([]);
  const [synth,   setSynth]   = useState(null);
  const [syncStatus, setSyncStatus] = useState("idle"); // idle|syncing|synced|error
  const ignoreNextSnapshot = useRef(false);

  // Destructure profile fields for convenience
  const {banksAnn, banksPlug, aiProvider, aiKeys, availableSources} = profile;
  // Filter setlists for current profile
  const mySetlists = setlists.filter(sl => !sl.profileIds || sl.profileIds.length === 0 || sl.profileIds.includes(activeProfileId));

  // Persist to localStorage + Firestore (skip first render to avoid overwriting remote)
  const hasMounted = useRef(false);
  useEffect(()=>{
    const state={version:2, activeProfileId, shared:{songDb,theme,setlists}, profiles};
    try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e){}
    if(!hasMounted.current){hasMounted.current=true;return;} // don't push to Firestore on first render
    ignoreNextSnapshot.current = true;
    setSyncStatus("syncing");
    saveToFirestore(state).then(()=>setSyncStatus("synced")).catch(()=>setSyncStatus("error"));
  },[songDb,theme,setlists,profiles,activeProfileId]);

  // Load from Firestore on first mount (for new devices)
  useEffect(()=>{
    if(saved) {setFirestoreLoaded(true);return;} // already have local data
    loadFromFirestore().then(data=>{
      if(data&&data.shared&&data.profiles){
        if(data.shared.songDb) setSongDb(data.shared.songDb);
        if(data.shared.theme) setTheme(data.shared.theme);
        if(data.shared.setlists) setSetlists(data.shared.setlists);
        if(data.profiles) setProfiles(data.profiles);
        if(data.activeProfileId) setActiveProfileId(data.activeProfileId);
      }
      setFirestoreLoaded(true);
    }).catch(()=>setFirestoreLoaded(true));
  },[]);

  // Listen for remote changes from other devices
  useEffect(()=>{
    let firstSnapshot=true;
    const unsub = onFirestoreChange(data=>{
      if(ignoreNextSnapshot.current){ignoreNextSnapshot.current=false;return;}
      if(firstSnapshot){firstSnapshot=false;return;} // skip initial snapshot
      if(!data||!data.shared||!data.profiles) return;
      // Apply remote state
      if(data.shared.songDb) setSongDb(data.shared.songDb);
      if(data.shared.theme) setTheme(data.shared.theme);
      if(data.shared.setlists) setSetlists(data.shared.setlists);
      if(data.profiles) setProfiles(data.profiles);
      setSyncStatus("synced");
    });
    return ()=>unsub();
  },[]);

  // Reset on profile switch
  useEffect(()=>{setChecked([]);setScreen("list");},[activeProfileId]);

  // Apply theme to document
  useEffect(()=>{
    document.documentElement.setAttribute("data-theme",theme);
    const meta=document.querySelector('meta[name="theme-color"]');
    if(meta) meta.content=theme==="dark"?"#0f172a":"#f1f5f9";
  },[theme]);

  const switchProfile = id => { if(profiles[id]) setActiveProfileId(id); };
  const isAdmin = profile.isAdmin === true;
  const pickProfile = id => { setActiveProfileId(id); setScreen("list"); };
  const createAndPick = name => {
    const id=name.toLowerCase().replace(/[^a-z0-9]/g,"_")+`_${Date.now()}`;
    const np=makeDefaultProfile(id,name);
    setProfiles(p=>({...p,[id]:np}));
    setActiveProfileId(id);
    setScreen("list");
  };

  const songs=useMemo(()=>checked.map(id=>{
    const d=songDb.find(x=>x.id===id);
    return d?{...d}:{id,title:id,artist:"",isCustom:true,ig:[]};
  }),[checked,songDb]);

  const fullState={songDb,setlists,banksAnn,banksPlug};
  const onImportState=data=>{
    if(data.songDb)    setSongDb(data.songDb);
    if(data.setlists)  setSetlists(data.setlists);
    if(data.banksAnn)  setBanksAnn(data.banksAnn);
    if(data.banksPlug) setBanksPlug(data.banksPlug);
    setChecked([]);
    setScreen("list");
  };

  const [profileInitTab,setProfileInitTab]=useState(null);

  if(screen==="pick") return <div className="page-root"><ProfilePickerScreen profiles={profiles} onPick={pickProfile} onCreateNew={createAndPick}/></div>;
  if(screen==="exportimport") return <div className="page-root"><ExportImportScreen banksAnn={banksAnn} onBanksAnn={setBanksAnn} banksPlug={banksPlug} onBanksPlug={setBanksPlug} onBack={()=>setScreen("settings")} onNavigate={setScreen} fullState={fullState} onImportState={onImportState}/></div>;
  if(screen==="profile")      return <div className="page-root"><MonProfilScreen songDb={songDb} onSongDb={setSongDb} setlists={mySetlists} allSetlists={setlists} onSetlists={setSetlists} banksAnn={banksAnn} onBanksAnn={setBanksAnn} banksPlug={banksPlug} onBanksPlug={setBanksPlug} onBack={()=>setScreen("list")} onNavigate={setScreen} aiProvider={aiProvider} aiKeys={aiKeys} theme={theme} onTheme={setTheme} profile={profile} profiles={profiles} onProfiles={setProfiles} activeProfileId={activeProfileId} allGuitars={allGuitars} initTab={profileInitTab}/></div>;
  if(screen==="settings")     return <div className="page-root"><ParametresScreen onBack={()=>setScreen("list")} onNavigate={setScreen} aiProvider={aiProvider} onAiProvider={setAiProvider} aiKeys={aiKeys} onAiKeys={setAiKeys} profile={profile} profiles={profiles} onProfiles={setProfiles} activeProfileId={activeProfileId} fullState={fullState} onImportState={onImportState} banksAnn={banksAnn} onBanksAnn={setBanksAnn} banksPlug={banksPlug} onBanksPlug={setBanksPlug}/></div>;
  if(screen==="setlists")     return <div className="page-root">
    <Breadcrumb crumbs={[{label:"Accueil",screen:"list"},{label:"Mes setlists"}]} onNavigate={setScreen}/>
    <div style={{fontSize:20,fontWeight:800,color:"var(--text)",marginBottom:16}}>🎵 Mes setlists</div>
    <ListScreen songDb={songDb} onSongDb={setSongDb} allSetlists={setlists} setlists={mySetlists} onSetlists={setSetlists} checked={checked} onChecked={setChecked} onNext={()=>setScreen("recap")} onSettings={()=>setScreen("profile")} banksAnn={banksAnn} banksPlug={banksPlug} aiProvider={aiProvider} aiKeys={aiKeys} hideHeader={true} allGuitars={allGuitars} availableSources={availableSources}/>
  </div>;
  if(screen==="jam") return <div className="page-root">
    <Breadcrumb crumbs={[{label:"Accueil",screen:"list"},{label:"Jammer"}]} onNavigate={setScreen}/>
    <div style={{fontSize:20,fontWeight:800,color:"var(--text)",marginBottom:16}}>🎲 Jammer</div>
    <JamScreen banksAnn={banksAnn} banksPlug={banksPlug} allGuitars={allGuitars} availableSources={availableSources}/>
  </div>;
  if(screen==="explore") return <div className="page-root">
    <Breadcrumb crumbs={[{label:"Accueil",screen:"list"},{label:"Explorer"}]} onNavigate={setScreen}/>
    <div style={{fontSize:20,fontWeight:800,color:"var(--text)",marginBottom:16}}>🎛️ Explorer les presets</div>
    <PresetBrowser banksAnn={banksAnn} banksPlug={banksPlug} availableSources={availableSources} customPacks={profile.customPacks}/>
  </div>;
  if(screen==="synthesis"&&synth) return <div className="page-root"><SynthesisScreen songs={songs} gps={synth.gps} aiR={synth.aiR} onBack={()=>setScreen("recap")} onNavigate={setScreen} songDb={songDb} banksAnn={banksAnn} banksPlug={banksPlug} allGuitars={allGuitars} availableSources={availableSources}/></div>;
  if(screen==="recap")        return <div className="page-root"><RecapScreen songs={songs} onBack={()=>setScreen("list")} onNavigate={setScreen} onValidate={(gps,aiR)=>{setSynth({gps,aiR});setScreen("synthesis");}} songDb={songDb} onSongDb={setSongDb} banksAnn={banksAnn} banksPlug={banksPlug} aiProvider={aiProvider} aiKeys={aiKeys} allGuitars={allGuitars} availableSources={availableSources}/></div>;
  return <div className="page-root"><HomeScreen songDb={songDb} onSongDb={setSongDb} setlists={mySetlists} allSetlists={setlists} onSetlists={setSetlists} checked={checked} onChecked={setChecked} onNext={()=>setScreen("recap")} onSettings={()=>setScreen("settings")} onProfile={(tab)=>{setProfileInitTab(tab||null);setScreen("profile");}} onSetlistScreen={()=>setScreen("setlists")} onJam={()=>setScreen("jam")} onExplore={()=>setScreen("explore")} banksAnn={banksAnn} banksPlug={banksPlug} aiProvider={aiProvider} aiKeys={aiKeys} allGuitars={allGuitars} availableSources={availableSources} profiles={profiles} activeProfileId={activeProfileId} onSwitchProfile={switchProfile} customPacks={profile.customPacks} syncStatus={syncStatus}/></div>;
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
