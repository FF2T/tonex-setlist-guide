<script>
if('serviceWorker' in navigator){
  const SW_CODE=`
const CACHE='tonex-v2';
const HTML_URL=self.location.href.replace(/sw\\.js.*/,'ToneX_Setlist_Guide.html');
self.addEventListener('install',e=>{
  e.waitUntil(
    caches.open(CACHE).then(c=>c.addAll([self.registration.scope+'ToneX_Setlist_Guide.html']))
    .catch(()=>{})
  );
  self.skipWaiting();
});
self.addEventListener('activate',e=>{e.waitUntil(
  caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>self.clients.claim())
)});
self.addEventListener('fetch',e=>{
  e.respondWith(
    fetch(e.request).then(res=>{
      if(res.ok&&e.request.url.includes('ToneX_Setlist_Guide')){
        caches.open(CACHE).then(c=>c.put(e.request,res.clone()));
      }
      return res;
    }).catch(()=>caches.match(e.request))
  );
});`;
  const blob=new Blob([SW_CODE],{type:'application/javascript'});
  const swUrl=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}

function scoreColor(s){return s>=90?"#4ade80":s>=75?"#38bdf8":s>=60?"#fbbf24":"#f87171";}
function scoreBg(s){return s>=90?"rgba(74,222,128,0.12)":s>=75?"rgba(56,189,248,0.12)":s>=60?"rgba(251,191,36,0.12)":"rgba(248,113,113,0.12)";}
// Cherche un preset dans le catalogue par nom exact puis fuzzy
const PRESET_CATALOG_MERGED = {...PRESET_CATALOG, ...ANNIVERSARY_CATALOG, ...PRESET_CATALOG_FULL};
function findCatalogEntry(name){
  if(!name) return null;
  if(PRESET_CATALOG[name]) return PRESET_CATALOG[name];
  const norm=normalizePresetName(name);
  for(const [k,v] of Object.entries(PRESET_CATALOG)){
    if(normalizePresetName(k)===norm) return v;
  }
  return null;
}
function presetScore(name,gType){return findCatalogEntry(name)?.scores?.[gType]??60;}
function srcBadge(name){const s=findCatalogEntry(name)?.src;return s==="TSR"?"TSR":s==="ML"?"ML":s==="Anniversary"?"Anniversary":s==="custom"?"Custom":"";}
function styleBadge(style){const c={hard_rock:"#ef4444",rock:"#f59e0b",blues:"#38bdf8",jazz:"#4ade80",pop:"#ec4899",metal:"#8b5cf6"}[style]||"#94a3b8";const l={hard_rock:"Hard Rock",rock:"Rock",blues:"Blues",jazz:"Jazz",pop:"Pop",metal:"Metal"}[style]||style;return <span style={{fontSize:10,background:`${c}20`,color:c,border:`1px solid ${c}40`,borderRadius:4,padding:"1px 7px",fontWeight:700}}>{l}</span>;}
function gainBadge(gain){const c={low:"#4ade80",mid:"#fbbf24",high:"#f87171"}[gain]||"#94a3b8";const l={low:"Low",mid:"Mid",high:"High"}[gain]||gain;return <span style={{fontSize:10,background:`${c}20`,color:c,border:`1px solid ${c}40`,borderRadius:4,padding:"1px 7px",fontWeight:700}}>{l} gain</span>;}

// Normalise un nom de preset pour comparaison souple
// "TSR - Mars 800SL Ch1 Drive" et "TSR Mars 800SL Chnl 1 Drive" doivent matcher
function normalizePresetName(n){
  if(!n) return "";
  return n.toLowerCase()
    .replace(/[^a-z0-9]/g," ")       // ponctuation/tirets → espaces
    .replace(/(\d)([a-z])/g,"$1 $2") // "1Dirty" → "1 Dirty", "800SL" → "800 sl" (sépare chiffre+lettre)
    .replace(/([a-z])(\d)/g,"$1 $2") // "ch1" → "ch 1" (sépare lettre+chiffre)
    .replace(/\bchnl\b/g,"ch")        // chnl → ch
    .replace(/\bchanl?\b/g,"ch")      // chanl/chan → ch
    .replace(/\s+/g," ").trim();      // espaces multiples → un seul
}

// Cherche un preset dans les banks d'une pédale (comparaison souple)
function findInBanks(name, banks){
  if(!name||!banks) return null;
  // Exact match d'abord (rapide)
  for(const [k,bank] of Object.entries(banks)){
    for(const slot of ["A","B","C"]){
      if(bank[slot]===name) return {bank:Number(k),slot};
    }
  }
  // Fuzzy match si pas trouvé
  const norm=normalizePresetName(name);
  for(const [k,bank] of Object.entries(banks)){
    for(const slot of ["A","B","C"]){
      if(normalizePresetName(bank[slot])===norm) return {bank:Number(k),slot};
    }
  }
  return null;
}

// Trouve le slot le moins pertinent pour un type de guitare (candidat au remplacement)
function worstSlot(banks, gType, exclude=[]){
  let worst={score:101,bank:null,slot:null,name:null};
  for(const [k,bank] of Object.entries(banks)){
    for(const slot of ["A","B","C"]){
      const name=bank[slot];
      if(!name||exclude.includes(name)) continue;
      const s=presetScore(name,gType);
      if(s<worst.score) worst={score:s,bank:Number(k),slot,name};
    }
  }
  return worst;
}

// Cherche la meilleure alternative disponible dans le catalogue pour le même style musical
// Retourne le preset avec le score gType le plus élevé du même style, non installé dans banks
// ou installé mais avec un score significativement plus élevé
function findUpgrade(presetName, gType, banks){
  const entry=PRESET_CATALOG[presetName];
  if(!entry) return null;
  const currentScore=entry.scores?.[gType]??60;
  if(currentScore>=80) return null; // déjà bon, pas d'upgrade à chercher
  const style=entry.style;
  const minGain=entry.gain; // chercher un niveau de gain similaire ou compatible

  // Ordre de compatibilité gain : low < mid < high
  const gainOrder={low:0,mid:1,high:2};
  const currentGainLevel=gainOrder[minGain]??1;

  let best={score:currentScore+8,name:null,installed:false,bank:null,slot:null}; // seuil minimum : +8 pts
  for(const [name,info] of Object.entries(PRESET_CATALOG)){
    if(name===presetName) continue;
    if(info.style!==style) continue;
    // Compatibilité gain : ±1 niveau max pour rester cohérent avec le contexte du morceau
    const gainDiff=Math.abs((gainOrder[info.gain]??1)-currentGainLevel);
    if(gainDiff>1) continue;
    const s=info.scores?.[gType]??60;
    if(s>best.score){
      const found=findInBanks(name,banks);
      best={score:s,name,installed:!!found,bank:found?.bank??null,slot:found?.slot??null};
    }
  }
  return best.name?best:null;
}

// Recommandation d'installation pour un preset donné
// Retourne: {name, score, installed, bank?, slot?, replaceBank?, replaceSlot?, replaceName?, replaceScore?, upgrade?}
// upgrade = {name, score, installed, bank?, slot?} si un meilleur preset est disponible
function getInstallRec(presetName, gType, banks){
  if(!presetName) return null;
  const score=presetScore(presetName,gType);
  const found=findInBanks(presetName,banks);
  if(found){
    const upgrade=findUpgrade(presetName,gType,banks);
    return {name:presetName,score,installed:true,bank:found.bank,slot:found.slot,upgrade};
  }
  const ws=worstSlot(banks,gType,[presetName]);
  return {name:presetName,score,installed:false,replaceBank:ws.bank,replaceSlot:ws.slot,replaceName:ws.name,replaceScore:ws.score};
}

// ─── Export/Import CSV ────────────────────────────────────────────────────────
function generateCSV(banks, deviceName) {
  const rows=[["Pédale","Bank","Catégorie","Slot","Type","Preset"]];
  Object.entries(banks).sort((a,b)=>Number(a[0])-Number(b[0])).forEach(([k,v])=>{
    ["A","B","C"].forEach(c=>{rows.push([deviceName,k,v.cat,c,CL[c],v[c]||""]);});
  });
  return rows.map(r=>r.map(cell=>`"${String(cell).replace(/"/g,'""')}"`).join(",")).join("\n");
}
function downloadFile(content,filename,type="text/csv;charset=utf-8;") {
  try {
    const bom = type.includes("csv") ? "\uFEFF" : "";
    const blob=new Blob([bom+content],{type});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  } catch(e){console.error(e);}
}
function parseCSV(text) {
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2) return null;
  const sep=lines[0].includes(";")?";":",";
  const parseLine=line=>{
    const res=[];let cur="",inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(ch===sep&&!inQ){res.push(cur.trim());cur="";}else cur+=ch;
    }
    res.push(cur.trim());return res;
  };
  const header=parseLine(lines[0]).map(h=>h.toLowerCase().replace(/["""]/g,"").trim());
  const iDevice=header.findIndex(h=>h.includes("pédale")||h.includes("pedale"));
  const iBank=header.findIndex(h=>h==="bank"||h.includes("bank"));
  const iCat=header.findIndex(h=>h.includes("catég")||h.includes("categ")||h.includes("cat"));
  const iSlot=header.findIndex(h=>h==="slot");
  const iPreset=header.findIndex(h=>h==="preset");
  const iA=header.findIndex(h=>h.startsWith("preset a"));
  const iB=header.findIndex(h=>h.startsWith("preset b"));
  const iC=header.findIndex(h=>h.startsWith("preset c"));
  const isWide=iA>=0&&iB>=0&&iC>=0;
  if(iBank===-1) return null;
  if(!isWide&&(iSlot===-1||iPreset===-1)) return null;
  const ann={},plug={};
  for(let i=1;i<lines.length;i++){
    const cols=parseLine(lines[i]);if(cols.length<2)continue;
    const bank=parseInt(cols[iBank]);if(isNaN(bank))continue;
    const cat=iCat>=0?cols[iCat]||"":"";
    const device=(iDevice>=0?cols[iDevice]||"":"").toLowerCase();
    const target=device.includes("plug")?plug:ann;
    if(isWide){
      const pA=iA>=0?cols[iA]||"":"",pB=iB>=0?cols[iB]||"":"",pC=iC>=0?cols[iC]||"":"";
      if(!target[bank])target[bank]={cat,A:"",B:"",C:""};
      if(cat)target[bank].cat=cat;if(pA)target[bank].A=pA;if(pB)target[bank].B=pB;if(pC)target[bank].C=pC;
    } else {
      const slot=(cols[iSlot]||"").toUpperCase(),preset=cols[iPreset]||"";
      if(!["A","B","C"].includes(slot))continue;
      if(!target[bank])target[bank]={cat,A:"",B:"",C:""};
      if(cat&&!target[bank].cat)target[bank].cat=cat;
      target[bank][slot]=preset;
    }
  }
  return {ann,plug};
}

// ─── fetchAI (helper partagé) ─────────────────────────────────────────────────
function fetchAI(song,gId,banksAnn,banksPlug,aiProvider,aiKeys,guitars){
  guitars=guitars||GUITARS;
  const g=guitars.find(x=>x.id===gId);
  const annCtx=Object.entries(banksAnn).map(([k,v])=>`Banque ${k}: A=${v.A} | B=${v.B} | C=${v.C}`).join("\n");
  const plugCtx=Object.entries(banksPlug).map(([k,v])=>`Banque ${k}: A=${v.A} | B=${v.B} | C=${v.C}`).join("\n");
  const glist=guitars.map(x=>`${x.name} (${x.type})`).join(", ");
  const prompt=`Expert guitare ToneX. Réponds TOUJOURS en français, toutes tes réponses doivent être rédigées en français.\nAnniversary:\n${annCtx}\nPlug:\n${plugCtx}\nMorceau: "${song.title}" de "${song.artist}".\nGuitare: ${g?g.name+" ("+g.type+")":"non précisée"}.\nGuitares disponibles: ${glist}.\nJSON sans markdown (tous les textes en français):\n{"ideal_guitar":"nom complet de la guitare idéale","guitar_reason":"1-2 phrases en français expliquant le choix","preset_ann":{"bank":0,"col":"A","label":"nom exact du preset Anniversary"},"preset_plug":{"bank":1,"col":"A","label":"nom exact du preset Plug"},"settings_preset":"conseils de réglage preset en français","settings_guitar":"conseils de jeu guitare en français","ref_guitarist":"nom du guitariste principal sur l'enregistrement original","ref_guitar":"guitare(s) utilisée(s) sur l'enregistrement original (modèle précis)","ref_amp":"ampli(s) utilisé(s) sur l'enregistrement original (modèle précis)","ref_effects":"effets utilisés sur l'enregistrement (ou 'Aucun effet' si signal direct)"}`;
  const key=aiProvider==="gemini"?aiKeys.gemini:aiKeys.anthropic;
  if(!key) return Promise.reject(new Error(`Clé ${aiProvider==="gemini"?"Gemini":"Anthropic"} manquante — configure-la dans ⚙️ Paramètres > 🔑 IA.`));
  const parse=t=>JSON.parse(t.replace(/```json|```/g,"").trim());
  if(aiProvider==="gemini"){
    return fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})})
      .then(r=>r.json()).then(d=>{if(d.error)throw new Error(d.error.message||d.error.status);return parse(d.candidates?.[0]?.content?.parts?.[0]?.text||"");});
  } else {
    return fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:600,messages:[{role:"user",content:prompt}]})})
      .then(r=>r.json()).then(d=>{if(d.error)throw new Error(d.error.message||d.error.type);return parse(d.content?.map(i=>i.text||"").join("")||"");});
  }
}

function AICard({song,gId,onResult,banksAnn,banksPlug,aiProvider,aiKeys,onCacheResult,guitars}) {
  const [res,setRes]=useState(null);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState(null);
  useEffect(()=>{
    // Cache valide pour cette guitare → pas d'appel API
    if(song.aiCache&&song.aiCache.gId===gId){
      setRes(song.aiCache.result);onResult(song.aiCache.result);return;
    }
    setRes(null);setErr(null);setLoading(true);
    fetchAI(song,gId,banksAnn,banksPlug,aiProvider,aiKeys,guitars)
      .then(r=>{setRes(r);onResult(r);if(onCacheResult)onCacheResult(gId,r);})
      .catch(e=>setErr(e.message||"Erreur IA"))
      .finally(()=>setLoading(false));
  },[song.id,gId,aiProvider,aiKeys.anthropic,aiKeys.gemini]);
  if(loading) return <div style={{fontSize:12,color:"var(--text-muted)",padding:"8px 0"}}>✨ Analyse IA…</div>;
  if(err) return <div style={{fontSize:12,color:"#f87171"}}>{err}</div>;
  if(!res) return null;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:9}}>
      <Row icon="🎯"><div><div style={{fontSize:12,color:"#a78bfa",fontWeight:700,marginBottom:2}}>IA : {res.ideal_guitar}</div><div style={{fontSize:11,color:"var(--text-sec)"}}>{res.guitar_reason}</div></div></Row>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        <PBlock device="ToneX Anniversary" emoji="📦" presetName={res.preset_ann?.label} gType={gId?(guitars||GUITARS).find(x=>x.id===gId)?.type||"HB":null} banks={banksAnn}/>
        <PBlock device="ToneX Plug" emoji="🔌" presetName={res.preset_plug?.label} gType={gId?(guitars||GUITARS).find(x=>x.id===gId)?.type||"HB":null} banks={banksPlug} bg2="rgba(99,102,241,0.06)"/>
      </div>
      <Row icon="🎛️"><div style={{display:"flex",flexDirection:"column",gap:4}}>
        {res.settings_preset&&<div style={{fontSize:11,background:"rgba(251,191,36,0.07)",border:"1px solid rgba(251,191,36,0.15)",borderRadius:7,padding:"6px 10px",color:"#fde68a"}}><b style={{color:"#fbbf24"}}>Preset · </b>{res.settings_preset}</div>}
        {res.settings_guitar&&<div style={{fontSize:11,background:"rgba(34,197,94,0.07)",border:"1px solid rgba(34,197,94,0.15)",borderRadius:7,padding:"6px 10px",color:"#bbf7d0"}}><b style={{color:"#4ade80"}}>Guitare · </b>{res.settings_guitar}</div>}
      </div></Row>
      {res.ref_guitarist&&<Row icon="📖"><div style={{background:"var(--a3)",border:"1px solid var(--a7)",borderRadius:9,padding:"9px 12px",flex:1}}>
        <div style={{fontSize:10,color:"var(--text-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Référence originale — {res.ref_guitarist}</div>
        <div style={{display:"flex",flexDirection:"column",gap:3}}>
          <div style={{display:"flex",gap:5,alignItems:"baseline",flexWrap:"wrap"}}><span style={{fontSize:10,color:"var(--text-muted)",flexShrink:0}}>🎸 Guitare</span><span style={{fontSize:11,color:"var(--text-bright)",fontWeight:500}}>{res.ref_guitar}</span></div>
          <div style={{display:"flex",gap:5,alignItems:"baseline",flexWrap:"wrap"}}><span style={{fontSize:10,color:"var(--text-muted)",flexShrink:0}}>🔊 Ampli</span><span style={{fontSize:11,color:"var(--text-bright)",fontWeight:500}}>{res.ref_amp}</span></div>
          {res.ref_effects&&<div style={{display:"flex",gap:5,alignItems:"baseline",flexWrap:"wrap"}}><span style={{fontSize:10,color:"var(--text-muted)",flexShrink:0}}>🎚 Effets</span><span style={{fontSize:11,color:"var(--text-sec)"}}>{res.ref_effects}</span></div>}
        </div>
      </div></Row>}
    </div>
  );
}

// ─── Export/Import Screen ─────────────────────────────────────────────────────
function ExportImportScreen({banksAnn,onBanksAnn,banksPlug,onBanksPlug,onBack,onNavigate,fullState,onImportState}) {
  const [exported,setExported]=useState(null);
  const [importData,setImportData]=useState(null);
  const [importErr,setImportErr]=useState(null);
  const [importMode,setImportMode]=useState("merge");
  const [toast,setToast]=useState(null);
  const csvRef=useRef(null);
  const jsonRef=useRef(null);
  const flash=msg=>{setToast(msg);setTimeout(()=>setToast(null),2500);};

  const doExportCSV=(banks,name,key)=>{try{downloadFile(generateCSV(banks,name),`ToneX_${key}.csv`);setExported(key);setTimeout(()=>setExported(null),2000);}catch(e){}};
  const doExportAll=()=>{try{const c1=generateCSV(banksAnn,"ToneX Anniversary");const c2=generateCSV(banksPlug,"ToneX Plug").split("\n").slice(1).join("\n");downloadFile(c1+"\n"+c2,"ToneX_Tous_Presets.csv");setExported("all");setTimeout(()=>setExported(null),2000);}catch(e){}};
  const doExportJSON=()=>{exportJSON(fullState);flash("Sauvegarde JSON exportée ✅");};

  const handleCSVFile=e=>{
    const file=e.target.files[0];if(!file)return;setImportErr(null);
    const reader=new FileReader();
    reader.onload=ev=>{try{const p=parseCSV(ev.target.result);if(!p){setImportErr("Format non reconnu.");return;}setImportData(p);}catch(err){setImportErr("Erreur : "+err.message);}};
    reader.readAsText(file,"UTF-8");e.target.value="";
  };
  const handleJSONFile=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        onImportState(data);
        flash("Import JSON réussi ✅");
      }catch(err){setImportErr("Fichier JSON invalide.");}
    };
    reader.readAsText(file,"UTF-8");e.target.value="";
  };
  const confirmCSV=()=>{
    if(!importData)return;
    if(importMode==="replace"){if(Object.keys(importData.ann).length>0)onBanksAnn(importData.ann);if(Object.keys(importData.plug).length>0)onBanksPlug(importData.plug);}
    else{if(Object.keys(importData.ann).length>0)onBanksAnn(p=>({...p,...importData.ann}));if(Object.keys(importData.plug).length>0)onBanksPlug(p=>({...p,...importData.plug}));}
    setImportData(null);flash("Import CSV réussi ✅");
  };

  const xBtn=(onClick,key,label,color)=>(
    <button onClick={onClick} style={{background:exported===key?"rgba(74,222,128,0.2)":color,border:"none",color:"var(--text)",borderRadius:9,padding:"10px 16px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
      {exported===key?"✅ OK":label}
    </button>
  );
  const th={padding:"7px 10px",textAlign:"left",fontSize:11,fontWeight:700,textTransform:"uppercase",borderBottom:"2px solid var(--a10)",color:"var(--text-sec)"};
  const td={padding:"6px 10px",fontSize:11,borderBottom:"1px solid var(--a5)",verticalAlign:"middle"};

  return (
    <div>
      {toast&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:"#16a34a",color:"var(--text)",borderRadius:10,padding:"10px 22px",fontSize:13,fontWeight:700,zIndex:999}}>✅ {toast}</div>}
      <Breadcrumb crumbs={[{label:"Accueil",screen:"list"},{label:"Paramètres",screen:"settings"},{label:"Import / Export"}]} onNavigate={onNavigate}/>
      <div style={{fontSize:20,fontWeight:800,color:"var(--text)",marginBottom:20}}>📋 Export / Import</div>

      {/* Sauvegarde JSON */}
      <div style={{background:"rgba(74,222,128,0.06)",border:"1px solid rgba(74,222,128,0.2)",borderRadius:12,padding:16,marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:700,color:"#4ade80",marginBottom:10,textTransform:"uppercase",letterSpacing:0.5}}>💾 Sauvegarde complète (JSON)</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button onClick={doExportJSON} style={{background:"#16a34a",border:"none",color:"var(--text)",borderRadius:9,padding:"10px 16px",fontSize:13,fontWeight:700,cursor:"pointer"}}>⬇ Exporter JSON</button>
          <button onClick={()=>jsonRef.current?.click()} style={{background:"rgba(74,222,128,0.15)",border:"1px solid rgba(74,222,128,0.35)",color:"#4ade80",borderRadius:9,padding:"10px 16px",fontSize:13,fontWeight:700,cursor:"pointer"}}>📂 Importer JSON</button>
          <input ref={jsonRef} type="file" accept=".json" onChange={handleJSONFile} style={{display:"none"}}/>
        </div>
        <div style={{fontSize:11,color:"var(--text-muted)",marginTop:8}}>Sauvegarde complète : setlists, morceaux, presets, banks. Parfait pour sauvegarder ou transférer entre appareils.</div>
      </div>

      {/* Export CSV */}
      <div style={{background:"var(--a3)",border:"1px solid var(--a7)",borderRadius:12,padding:16,marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:700,color:"var(--text-sec)",marginBottom:12,textTransform:"uppercase",letterSpacing:0.5}}>Export CSV (Banks)</div>

              <span style={{fontSize:11,fontWeight:700,color:CC[c],minWidth:28}}>{c}</span>
              <span style={{fontSize:10,color:"var(--text-muted)",minWidth:36}}>{CL[c]}</span>

// ─── Profile Selector ─────────────────────────────────────────────────────────
function ProfileSelector({profiles,activeProfileId,onSwitch,onSettings}){
  const [open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    if(!open)return;
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("click",h,true);
    return ()=>document.removeEventListener("click",h,true);
  },[open]);
  const active=profiles[activeProfileId];
  const color=profileColor(activeProfileId);
  return(
    <div ref={ref} style={{position:"relative"}}>
      <button onClick={()=>setOpen(!open)} style={{background:color,border:"none",color:"#fff",borderRadius:"50%",width:34,height:34,fontSize:15,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
        {(active?.name||"?")[0].toUpperCase()}
      </button>
      {open&&<div style={{position:"absolute",top:40,left:0,background:"var(--bg-card)",border:"1px solid var(--a12)",borderRadius:12,padding:8,zIndex:50,minWidth:180,boxShadow:"0 8px 24px rgba(0,0,0,0.3)"}}>
        {Object.values(profiles).map(p=>{
          const isActive=p.id===activeProfileId;
          const c=profileColor(p.id);
          return <button key={p.id} onClick={()=>{onSwitch(p.id);setOpen(false);}} style={{display:"flex",alignItems:"center",gap:10,width:"100%",background:isActive?"var(--a7)":"transparent",border:"none",borderRadius:8,padding:"8px 10px",cursor:"pointer",marginBottom:2}}>
            <div style={{background:c,color:"#fff",borderRadius:"50%",width:26,height:26,fontSize:12,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{p.name[0].toUpperCase()}</div>
            <span style={{fontSize:13,color:isActive?"var(--text)":"var(--text-sec)",fontWeight:isActive?700:400}}>{p.name}</span>
            {isActive&&<span style={{marginLeft:"auto",fontSize:11,color:"#4ade80"}}>✓</span>}
          </button>;
        })}
        <div style={{borderTop:"1px solid var(--a8)",marginTop:4,paddingTop:4}}>
          <button onClick={()=>{onSettings();setOpen(false);}} style={{display:"flex",alignItems:"center",gap:8,width:"100%",background:"transparent",border:"none",borderRadius:8,padding:"8px 10px",cursor:"pointer",color:"#818cf8",fontSize:12,fontWeight:600}}>
            + Gérer les profils
          </button>
        </div>
      </div>}
    </div>
  );
}

// ─── Profile Tab ──────────────────────────────────────────────────────────────
const PROFILE_COLORS=["#6366f1","#f59e0b","#10b981","#ef4444","#8b5cf6","#ec4899"];
function profileColor(id){
  let h=0;for(let i=0;i<id.length;i++)h=id.charCodeAt(i)+((h<<5)-h);
  return PROFILE_COLORS[Math.abs(h)%PROFILE_COLORS.length];
}

const SOURCE_LABELS={TSR:"64 Studio Rats",ML:"ML Sound Lab Essentials",Anniversary:"ToneX Anniversary Factory",Factory:"ToneX Factory"};

function ProfileTab({profile,profiles,onProfiles,activeProfileId,inp}){
  const [editName,setEditName]=useState(profile.name);
  const [newProfileName,setNewProfileName]=useState("");
  const [newGuitarName,setNewGuitarName]=useState("");
  const [newGuitarShort,setNewGuitarShort]=useState("");
  const [newGuitarType,setNewGuitarType]=useState("HB");
  const [confirmDelete,setConfirmDelete]=useState(false);
  const [editingGuitarId,setEditingGuitarId]=useState(null);
  const [editGName,setEditGName]=useState("");
  const [editGShort,setEditGShort]=useState("");
  const [editGType,setEditGType]=useState("HB");

  const updateProfile=(field,value)=>onProfiles(p=>({...p,[activeProfileId]:{...p[activeProfileId],[field]:typeof value==="function"?value(p[activeProfileId][field]):value}}));

  const toggleGuitar=id=>{
    updateProfile("myGuitars",prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);
  };
  const toggleSource=key=>{
    updateProfile("availableSources",prev=>({...prev,[key]:!prev[key]}));
  };
  const addCustomGuitar=()=>{
    if(!newGuitarName.trim()||!newGuitarShort.trim())return;
    const cg={id:`cg_${Date.now()}`,name:newGuitarName.trim(),short:newGuitarShort.trim(),type:newGuitarType};
    updateProfile("customGuitars",prev=>[...(prev||[]),cg]);
    setNewGuitarName("");setNewGuitarShort("");setNewGuitarType("HB");
  };
  const removeCustomGuitar=id=>{
    updateProfile("customGuitars",prev=>(prev||[]).filter(g=>g.id!==id));
  };
  const startEditGuitar=(g,isCustom)=>{
    const edits=profile.editedGuitars||{};
    const orig=isCustom?g:({...GUITARS.find(x=>x.id===g.id),...(edits[g.id]||{})});
    setEditingGuitarId(g.id);setEditGName(orig.name);setEditGShort(orig.short);setEditGType(orig.type);
  };
  const saveEditGuitar=()=>{
    if(!editGName.trim()||!editGShort.trim()){setEditingGuitarId(null);return;}
    const isCustom=editingGuitarId?.startsWith("cg_");
    if(isCustom){
      updateProfile("customGuitars",prev=>(prev||[]).map(g=>g.id===editingGuitarId?{...g,name:editGName.trim(),short:editGShort.trim(),type:editGType}:g));
    } else {
      updateProfile("editedGuitars",prev=>({...(prev||{}), [editingGuitarId]:{name:editGName.trim(),short:editGShort.trim(),type:editGType}}));
    }
    setEditingGuitarId(null);
  };
  const resetGuitar=id=>{
    updateProfile("editedGuitars",prev=>{const n={...(prev||{})};delete n[id];return n;});
    setEditingGuitarId(null);
  };
  const [adminPin,setAdminPin]=useState("");
  const [adminPinErr,setAdminPinErr]=useState(false);
  const createProfile=()=>{
    if(!newProfileName.trim())return;
    if(adminPin!==ADMIN_PIN){setAdminPinErr(true);return;}
    setAdminPinErr(false);
    const id=newProfileName.trim().toLowerCase().replace(/[^a-z0-9]/g,"_")+`_${Date.now()}`;
    onProfiles(p=>({...p,[id]:makeDefaultProfile(id,newProfileName.trim())}));
    setNewProfileName("");setAdminPin("");
  };
  const deleteProfile=()=>{
    if(Object.keys(profiles).length<=1)return;
    const remaining={...profiles};delete remaining[activeProfileId];
    onProfiles(remaining);
    setConfirmDelete(false);
  };
  const saveName=()=>{
    if(!editName.trim())return;
    updateProfile("name",editName.trim());
  };

  return (
    <div>
      {/* Nom du profil */}
      <div style={{background:"var(--a4)",border:"1px solid var(--a8)",borderRadius:12,padding:16,marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:700,color:"var(--text)",marginBottom:10}}>Nom du profil</div>
        <div style={{display:"flex",gap:8}}>
          <input value={editName} onChange={e=>setEditName(e.target.value)} onBlur={saveName} onKeyDown={e=>e.key==="Enter"&&saveName()} style={{...inp,flex:1}}/>
          <button onClick={saveName} style={{background:"#4f46e5",border:"none",color:"#fff",borderRadius:7,padding:"6px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>OK</button>
        </div>
        {Object.keys(profiles).length>1&&<div style={{marginTop:12}}>
          {!confirmDelete?<button onClick={()=>setConfirmDelete(true)} style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",color:"#f87171",borderRadius:8,padding:"6px 14px",fontSize:12,cursor:"pointer"}}>Supprimer ce profil</button>
          :<div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:12,color:"#f87171"}}>Confirmer ?</span><button onClick={deleteProfile} style={{background:"#ef4444",border:"none",color:"#fff",borderRadius:6,padding:"5px 12px",fontSize:11,fontWeight:700,cursor:"pointer"}}>Oui, supprimer</button><button onClick={()=>setConfirmDelete(false)} style={{background:"var(--a7)",border:"none",color:"var(--text-sec)",borderRadius:6,padding:"5px 10px",fontSize:11,cursor:"pointer"}}>Annuler</button></div>}
        </div>}
      </div>

      {/* Mes guitares */}
      <div style={{background:"var(--a4)",border:"1px solid var(--a8)",borderRadius:12,padding:16,marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:700,color:"var(--text)",marginBottom:4}}>Mes guitares</div>
        <div style={{fontSize:11,color:"var(--text-muted)",marginBottom:12}}>Coche les guitares que tu possèdes.</div>
        <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:12}}>
          {GUITAR_BRANDS.map(brand=><div key={brand}>
            <div style={{fontSize:11,fontWeight:700,color:"var(--text-sec)",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6,paddingLeft:2}}>{brand}</div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>

              const display={...g,...(edits[g.id]||{})};

// ─── Packs Tab ────────────────────────────────────────────────────────────────
function PacksTab({profile,onProfiles,activeProfileId,aiProvider,aiKeys}){
  const [packName,setPackName]=useState("");
  const [file,setFile]=useState(null);
  const [filePreview,setFilePreview]=useState(null);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState(null);
  const fileRef=useRef(null);

  const updateProfile=(field,value)=>onProfiles(p=>({...p,[activeProfileId]:{...p[activeProfileId],[field]:typeof value==="function"?value(p[activeProfileId][field]):value}}));

  const handleFile=e=>{
    const f=e.target.files?.[0];
    if(!f)return;
    setFile(f);setErr(null);
    const reader=new FileReader();
    reader.onload=ev=>{setFilePreview(ev.target.result);};
    reader.readAsDataURL(f);
  };

  const extractPresets=()=>{
    if(!packName.trim()||!filePreview)return;
    const key=aiProvider==="gemini"?aiKeys.gemini:aiKeys.anthropic;
    if(!key){setErr(`Clé API ${aiProvider==="gemini"?"Gemini":"Anthropic"} manquante — configure-la dans 🔑 IA.`);return;}
    setLoading(true);setErr(null);
    const prompt=`Analyse cette image/document d'un pack de presets pour guitare ToneX appelé "${packName.trim()}".
Extrais TOUS les noms de presets visibles et pour chacun déduis :
- amp : le modèle d'ampli simulé
- gain : "low", "mid" ou "high"
- style : "clean", "blues", "rock", "hard_rock" ou "metal"
- scores : compatibilité par type de micro {HB: 50-97, SC: 50-97, P90: 50-97}

Réponds UNIQUEMENT en JSON (sans markdown) : {"presets":[{"name":"...","amp":"...","gain":"...","style":"...","scores":{"HB":85,"SC":70,"P90":78}},...]}`;
    const base64=filePreview.split(",")[1];
    const mimeType=filePreview.split(";")[0].split(":")[1];
    if(aiProvider==="gemini"){
      fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({contents:[{parts:[{inlineData:{mimeType,data:base64}},{text:prompt}]}]})
      }).then(r=>r.json()).then(d=>{
        if(d.error)throw new Error(d.error.message);
        const txt=d.candidates?.[0]?.content?.parts?.[0]?.text||"";
        const parsed=JSON.parse(txt.replace(/```json|```/g,"").trim());
        savePack(parsed.presets||[]);
      }).catch(e=>setErr(e.message)).finally(()=>setLoading(false));
    } else {
      fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:4096,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:mimeType,data:base64}},{type:"text",text:prompt}]}]})
      }).then(r=>r.json()).then(d=>{
        if(d.error)throw new Error(d.error.message);
        const txt=d.content?.map(i=>i.text||"").join("")||"";
        const parsed=JSON.parse(txt.replace(/```json|```/g,"").trim());
        savePack(parsed.presets||[]);
      }).catch(e=>setErr(e.message)).finally(()=>setLoading(false));
    }
  };

  const savePack=(presets)=>{
    const pack={id:`pack_${Date.now()}`,name:packName.trim(),presetCount:presets.length,presets:presets.map(p=>({...p,src:packName.trim()}))};
    updateProfile("customPacks",prev=>[...(prev||[]),pack]);
    setPackName("");setFile(null);setFilePreview(null);
    if(fileRef.current)fileRef.current.value="";
  };

  const deletePack=id=>{
    updateProfile("customPacks",prev=>(prev||[]).filter(p=>p.id!==id));
  };

  const packs=profile.customPacks||[];
  const inp={background:"var(--bg-card)",color:"var(--text)",border:"1px solid var(--a15)",borderRadius:7,padding:"6px 10px",fontSize:12,boxSizing:"border-box"};

  return(
    <div>
      <div style={{fontSize:13,color:"var(--text-sec)",marginBottom:16}}>Ajoute des packs de presets en joignant une photo ou un document. L'IA en extraira les presets.</div>

      {/* Packs existants */}
      {packs.length>0&&<div style={{marginBottom:16}}>
        {packs.map(p=>(
          <div key={p.id} style={{background:"var(--a4)",border:"1px solid var(--a8)",borderRadius:10,padding:12,marginBottom:8}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <div style={{flex:1,fontSize:13,fontWeight:700,color:"var(--text)"}}>{p.name}</div>
              <span style={{fontSize:11,color:"var(--text-muted)"}}>{p.presetCount||p.presets?.length||0} presets</span>
              <button onClick={()=>deletePack(p.id)} style={{background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.3)",color:"#f87171",borderRadius:6,padding:"3px 8px",fontSize:11,cursor:"pointer"}}>Supprimer</button>
            </div>
            {p.presets?.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {p.presets.slice(0,8).map((pr,i)=><span key={i} style={{fontSize:10,background:"var(--a5)",border:"1px solid var(--a8)",borderRadius:4,padding:"2px 6px",color:"var(--text-sec)"}}>{pr.name}</span>)}
              {p.presets.length>8&&<span style={{fontSize:10,color:"var(--text-muted)"}}>+{p.presets.length-8} autres</span>}
            </div>}
          </div>
        ))}
      </div>}

      {/* Ajouter un pack */}
      <div style={{background:"rgba(99,102,241,0.08)",border:"1px solid rgba(99,102,241,0.2)",borderRadius:12,padding:16}}>
        <div style={{fontSize:13,fontWeight:700,color:"#818cf8",marginBottom:12}}>+ Nouveau pack</div>
        <input placeholder="Nom du pack (ex: TSR Blues Pack)" value={packName} onChange={e=>setPackName(e.target.value)} style={{...inp,width:"100%",marginBottom:10}}/>
        <div style={{marginBottom:10}}>
          <input ref={fileRef} type="file" accept="image/*,.pdf" onChange={handleFile} style={{fontSize:12,color:"var(--text-sec)"}}/>
        </div>
        {filePreview&&filePreview.startsWith("data:image")&&<div style={{marginBottom:10,borderRadius:8,overflow:"hidden",border:"1px solid var(--a8)"}}>
          <img src={filePreview} style={{width:"100%",maxHeight:200,objectFit:"contain",background:"var(--a3)"}}/>
        </div>}
        {filePreview&&!filePreview.startsWith("data:image")&&<div style={{fontSize:11,color:"var(--text-muted)",marginBottom:10}}>Document joint ({file?.name})</div>}
        {err&&<div style={{fontSize:12,color:"#f87171",marginBottom:10}}>{err}</div>}
        <button onClick={extractPresets} disabled={!packName.trim()||!filePreview||loading}
          style={{width:"100%",background:packName.trim()&&filePreview&&!loading?"linear-gradient(135deg,#7c3aed,#4f46e5)":"var(--bg-disabled)",border:"none",color:"#fff",borderRadius:10,padding:"12px",fontSize:13,fontWeight:700,cursor:packName.trim()&&filePreview&&!loading?"pointer":"not-allowed"}}>
          {loading?"Extraction IA en cours...":"Extraire les presets avec l'IA"}
        </button>
      </div>
    </div>
  );
}

function SettingsScreen({songDb,onSongDb,setlists,allSetlists,onSetlists,banksAnn,onBanksAnn,banksPlug,onBanksPlug,onBack,onNavigate,aiProvider,onAiProvider,aiKeys,onAiKeys,theme,onTheme,profile,profiles,onProfiles,activeProfileId,allGuitars,isAdmin}) {

  const removeSongFromSetlist=(slId,songId)=>onSetlists(p=>p.map(sl=>sl.id===slId?{...sl,songIds:sl.songIds.filter(x=>x!==songId)}:sl));
  const addSongToDb=()=>{
    if(!newSongTitle.trim())return;

  const deleteSongFromDb=id=>{onSongDb(p=>p.filter(s=>s.id!==id));onSetlists(p=>p.map(sl=>({...sl,songIds:sl.songIds.filter(x=>x!==id)})));};

        📋 Export / Import →

// ─── Modal Ajout Morceau ──────────────────────────────────────────────────────
function AddSongModal({songDb,onSongDb,setlists,onSetlists,activeSlId,onClose,banksAnn,banksPlug,aiProvider,aiKeys,guitars}) {
  const [mode,setMode]=useState("existing");
  const [search,setSearch]=useState("");
  const [selectedSongs,setSelectedSongs]=useState([]);
  const [targetSlIds,setTargetSlIds]=useState([activeSlId]);
  const [newTitle,setNewTitle]=useState("");
  const [newArtist,setNewArtist]=useState("");
  const activeSl=setlists.find(s=>s.id===activeSlId);
  const existingIds=new Set(activeSl?.songIds||[]);
  const filtered=songDb.filter(s=>(!existingIds.has(s.id))&&(s.title.toLowerCase().includes(search.toLowerCase())||s.artist.toLowerCase().includes(search.toLowerCase())));
  const toggleSong=id=>setSelectedSongs(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const toggleSl=id=>setTargetSlIds(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const handleAdd=()=>{
    if(mode==="existing"){
      if(selectedSongs.length===0||targetSlIds.length===0)return;
      onSetlists(p=>p.map(sl=>targetSlIds.includes(sl.id)?{...sl,songIds:[...new Set([...sl.songIds,...selectedSongs])]}:sl));
    } else {
      if(!newTitle.trim()||targetSlIds.length===0)return;
      const ns={id:`c_${Date.now()}`,title:newTitle.trim(),artist:newArtist.trim()||"Artiste inconnu",isCustom:true,ig:[],aiCache:null};
      onSongDb(p=>[...p,ns]);
      onSetlists(p=>p.map(sl=>targetSlIds.includes(sl.id)?{...sl,songIds:[...sl.songIds,ns.id]}:sl));
      fetchAI(ns,"",banksAnn,banksPlug,aiProvider,aiKeys,guitars)
        .then(r=>onSongDb(p=>p.map(x=>x.id===ns.id?{...x,aiCache:{gId:"",result:r}}:x)))
        .catch(()=>{});
    }
    onClose();
  };
  return (
    <div style={{position:"fixed",inset:0,background:"var(--overlay)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:100}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:"var(--bg-card)",borderRadius:"16px 16px 0 0",padding:20,width:"100%",maxWidth:700,maxHeight:"85vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div style={{fontSize:16,fontWeight:700,color:"var(--text)"}}>Ajouter un morceau</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"var(--text-sec)",fontSize:20,cursor:"pointer"}}>✕</button>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          {[{v:"existing",l:"Depuis la base"},{v:"new",l:"Nouveau morceau"}].map(({v,l})=>(
            <button key={v} onClick={()=>setMode(v)} style={{flex:1,background:mode===v?"rgba(99,102,241,0.3)":"var(--a5)",border:mode===v?"1px solid rgba(99,102,241,0.6)":"1px solid var(--a10)",color:mode===v?"#a5b4fc":"#94a3b8",borderRadius:8,padding:"8px",fontSize:12,fontWeight:600,cursor:"pointer"}}>{l}</button>
          ))}
        </div>
        {mode==="existing"&&<>
          <input placeholder="Rechercher..." value={search} onChange={e=>setSearch(e.target.value)} style={{width:"100%",background:"var(--bg-body)",color:"var(--text)",border:"1px solid var(--a15)",borderRadius:8,padding:"9px 12px",fontSize:13,marginBottom:10,boxSizing:"border-box"}}/>
          <div style={{maxHeight:200,overflowY:"auto",marginBottom:14}}>
            {filtered.length===0&&<div style={{fontSize:12,color:"var(--text-muted)",textAlign:"center",padding:"20px 0"}}>Aucun morceau disponible</div>}
            {filtered.map(s=>{const sel=selectedSongs.includes(s.id);return(
              <div key={s.id} onClick={()=>toggleSong(s.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:8,cursor:"pointer",background:sel?"rgba(74,222,128,0.08)":"transparent",border:sel?"1px solid rgba(74,222,128,0.2)":"1px solid transparent",marginBottom:4}}>
                <div style={{width:16,height:16,borderRadius:4,border:sel?"2px solid #4ade80":"2px solid var(--text-muted)",background:sel?"#4ade80":"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>{sel&&<span style={{color:"#0f172a",fontSize:9,fontWeight:900}}>✓</span>}</div>
                <div><div style={{fontSize:13,color:"var(--text)",fontWeight:600}}>{s.title}</div><div style={{fontSize:11,color:"var(--text-muted)"}}>{s.artist}</div></div>

          <input placeholder="Titre *" value={newTitle} onChange={e=>setNewTitle(e.target.value)} style={{width:"100%",background:"var(--bg-body)",color:"var(--text)",border:"1px solid var(--a15)",borderRadius:8,padding:"9px 12px",fontSize:13,marginBottom:8,boxSizing:"border-box"}}/>

          <div style={{fontSize:11,color:"var(--text-muted)",marginTop:6}}>Analysé par l'IA dans le récap.</div>
        </div>}

      </div>
    </div>
  );
}

// ─── Jam helpers ─────────────────────────────────────────────────────────────
function getJamRecs(guitarId, style, banksAnn, banksPlug, guitars){
  const guitar=(guitars||GUITARS).find(g=>g.id===guitarId);
  const gType=guitar?.type||"HB";
  const allCatalog={...PRESET_CATALOG_FULL,...PRESET_CATALOG};
  // deduplicate by name
  const allEntries=Object.entries(allCatalog);
  const seen=new Set();
  const unique=allEntries.filter(([n])=>{if(seen.has(n))return false;seen.add(n);return true;});
  const scored=unique
    .filter(([,info])=>!style||info.style===style)
    .map(([name,info])=>({name,score:info.scores?.[gType]??60,amp:info.amp,gain:info.gain,style:info.style,src:info.src}))
    .sort((a,b)=>b.score-a.score);
  const annInstalled=scored.map(p=>{const loc=findInBanks(p.name,banksAnn);return loc?{...p,...loc}:null;}).filter(Boolean);
  const plugInstalled=scored.map(p=>{const loc=findInBanks(p.name,banksPlug);return loc?{...p,...loc}:null;}).filter(Boolean);
  return{annTop3:annInstalled.slice(0,3),plugBest:plugInstalled.slice(0,3),fullTop3:scored.slice(0,3),gType};
}

              </button>
              <div onClick={()=>setExpandedId(isExpanded?null:s.id)} style={{flex:1,background:isC?"rgba(74,222,128,0.05)":"var(--a3)",border:isC?"1px solid rgba(74,222,128,0.15)":"1px solid var(--a7)",borderLeft:"none",borderRadius:isExpanded?"0 10px 0 0":"0 10px 10px 0",padding:"10px 13px",cursor:"pointer"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:2}}>
                  <span style={{fontSize:14,fontWeight:600,color:"var(--text)"}}>{s.title}</span>

                  {s.isCustom&&!s.aiCache&&<span style={{fontSize:10,color:"var(--text-muted)"}}>⏳</span>}
                  <span style={{marginLeft:"auto",fontSize:11,color:"var(--text-dim)"}}>{isExpanded?"▲":"▼"}</span>
                </div>
                <div style={{fontSize:11,color:"var(--text-muted)",marginBottom:hist?3:0}}>{s.artist}</div>
                {hist&&!isExpanded&&<div style={{fontSize:10,color:"#475569",marginTop:2,display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>
                  <span style={{color:"#4a5568",fontWeight:600}}>{hist.guitarist}</span>
                  <span style={{color:"#2d3748"}}>·</span>
                  <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1,minWidth:0}}>{hist.amp}</span>
                </div>}
                {!isExpanded&&<div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap",marginTop:g||aiC?.ideal_guitar?4:0}}>
                  {g&&<><span style={{fontSize:10,color:"var(--text-muted)"}}>🎸</span><span style={{fontSize:10,color:"#4ade80",background:"rgba(74,222,128,0.1)",borderRadius:4,padding:"1px 7px",fontWeight:600}}>{g.short}</span>{ig.slice(1).map(gid=>{const gg=(allGuitars||GUITARS).find(x=>x.id===gid);return gg?<span key={gid} style={{fontSize:10,color:"var(--text-muted)",background:"var(--a5)",borderRadius:4,padding:"1px 7px"}}>{gg.short}</span>:null;})}</>}
                  {aiC?.ideal_guitar&&<><span style={{fontSize:10,color:"var(--text-muted)"}}>🎸</span><span style={{fontSize:10,color:"#a78bfa",background:"rgba(167,139,250,0.1)",borderRadius:4,padding:"1px 7px",fontWeight:600}}>{aiC.ideal_guitar}</span></>}
                </div>}
                {!isExpanded&&<div style={{display:"flex",flexDirection:"column",gap:3,marginTop:pa||pp?4:0}}>
                  {pa&&presetRow("📦",pa.l,banksAnn)}
                  {pp&&presetRow("🔌",pp.l,banksPlug)}

                  {aiPP&&presetRow("🔌",aiPP.label,banksPlug)}
                </div>}
              </div>
            </div>
            {isExpanded&&<SongDetailCard song={s} banksAnn={banksAnn} banksPlug={banksPlug} onClose={()=>setExpandedId(null)} guitars={allGuitars} availableSources={availableSources}/>}
          </div>
        );
      })}
      {checked.length>0&&<div className="bottom-action" style={{paddingTop:12}}><button onClick={onNext} style={{width:"100%",background:"#16a34a",border:"none",color:"var(--text)",borderRadius:12,padding:"14px",fontSize:15,fontWeight:700,cursor:"pointer"}}>Générer le récap — {checked.length} morceau{checked.length>1?"x":""} →</button></div>}
      {showAdd&&<AddSongModal songDb={songDb} onSongDb={onSongDb} setlists={setlists} onSetlists={onSetlists} activeSlId={activeSlId} onClose={()=>setShowAdd(false)} banksAnn={banksAnn} banksPlug={banksPlug} aiProvider={aiProvider} aiKeys={aiKeys} guitars={allGuitars}/>}
    </div>
  );
}

// ─── Recap Screen ─────────────────────────────────────────────────────────────

      {songs.map(s=>{
        const gId=gps[s.id]||"";
        const g=(allGuitars||GUITARS).find(x=>x.id===gId);

        return (
          <div key={s.id} style={{background:"var(--a4)",border:"1px solid var(--a8)",borderRadius:14,padding:16,marginBottom:14}}>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:1}}>{s.artist}</div>
              <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:17,fontWeight:700,color:"var(--text)"}}>{s.title}</span>{s.isCustom&&<span style={{fontSize:10,color:"#a78bfa",background:"rgba(167,139,250,0.15)",borderRadius:4,padding:"1px 6px"}}>✨ IA</span>}</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <Row icon="🎸"><div style={{flex:1}}><GuitarSelect value={gId} onChange={v=>sg(s.id,v)} ig={ig} guitars={allGuitars}/>{g&&!s.isCustom&&<div style={{fontSize:11,color:"var(--text-sec)",marginTop:4}}>{getGr(s,type)}</div>}</div></Row>
              {(()=>{const hist=getSongHist(s,aiR[s.id]);return hist&&(
                <Row icon="📖"><div style={{background:"var(--a3)",border:"1px solid var(--a7)",borderRadius:9,padding:"9px 12px",flex:1}}>
                  <div style={{fontSize:10,color:"var(--text-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Référence originale — {hist.guitarist}</div>
                  <div style={{display:"flex",flexDirection:"column",gap:3}}>
                    <div style={{display:"flex",gap:5,alignItems:"baseline",flexWrap:"wrap"}}>
                      <span style={{fontSize:10,color:"var(--text-muted)",flexShrink:0}}>🎸 Guitare</span>
                      <span style={{fontSize:11,color:"var(--text-bright)",fontWeight:500}}>{hist.guitar}</span>
                    </div>
                    <div style={{display:"flex",gap:5,alignItems:"baseline",flexWrap:"wrap"}}>
                      <span style={{fontSize:10,color:"var(--text-muted)",flexShrink:0}}>🔊 Ampli</span>
                      <span style={{fontSize:11,color:"var(--text-bright)",fontWeight:500}}>{hist.amp}</span>
                    </div>
                    {hist.effects&&<div style={{display:"flex",gap:5,alignItems:"baseline",flexWrap:"wrap"}}>
                      <span style={{fontSize:10,color:"var(--text-muted)",flexShrink:0}}>🎚 Effets</span>
                      <span style={{fontSize:11,color:"var(--text-sec)"}}>{hist.effects}</span>
                    </div>}
                  </div>
                </div></Row>
              );})()}
              {!s.isCustom&&<>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  <PBlock device="ToneX Anniversary" emoji="📦" presetName={pA?.l} gType={gId?type:null} banks={banksAnn} adapted={adapted} gs={g?.short} availableSources={availableSources}/>
                  <PBlock device="ToneX Plug" emoji="🔌" presetName={pP?.l} gType={gId?type:null} banks={banksPlug} adapted={adapted} gs={g?.short} bg2="rgba(99,102,241,0.06)" availableSources={availableSources}/>
                </div>
                {(set?.p||set?.g)&&<Row icon="🎛️"><div style={{display:"flex",flexDirection:"column",gap:4,flex:1}}>
                  {set?.p&&<div style={{fontSize:11,background:"rgba(251,191,36,0.07)",border:"1px solid rgba(251,191,36,0.15)",borderRadius:7,padding:"6px 10px",color:"#fde68a"}}><b style={{color:"#fbbf24"}}>Preset · </b>{set.p}</div>}
                  {set?.g&&<div style={{fontSize:11,background:"rgba(34,197,94,0.07)",border:"1px solid rgba(34,197,94,0.15)",borderRadius:7,padding:"6px 10px",color:"#bbf7d0"}}><b style={{color:"#4ade80"}}>Guitare · </b>{set.g}</div>}

      <div className="bottom-action" style={{paddingTop:8}}>

          ✅ Valider et voir le tableau de synthèse →
        </button>

  );
}

// ─── Synthesis Screen ─────────────────────────────────────────────────────────
function SynthesisScreen({songs,gps,aiR,onBack,onNavigate,songDb,banksAnn,banksPlug,allGuitars,availableSources}) {
  const rows=songs.map(s=>{
    const g=(allGuitars||GUITARS).find(x=>x.id===gps[s.id]);
    const type=g?.type||"HB";
    let ann=null,plug=null;
    if(!s.isCustom){
      const pa=getPA(s,type),pp=getPP(s,type);
      if(pa){const rec=getInstallRec(pa.l,type,banksAnn);ann={name:pa.l,rec};}
      if(pp){const rec=getInstallRec(pp.l,type,banksPlug);plug={name:pp.l,rec};}
    } else if(aiR[s.id]){
      const ai=aiR[s.id];
      if(ai.preset_ann)ann={name:ai.preset_ann.label,rec:getInstallRec(ai.preset_ann.label,type,banksAnn)};
      if(ai.preset_plug)plug={name:ai.preset_plug.label,rec:getInstallRec(ai.preset_plug.label,type,banksPlug)};
    }
    return {s,g,type,ann,plug};
  });
  const th={fontSize:11,color:"var(--text-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,padding:"8px 10px",borderBottom:"1px solid var(--a10)",textAlign:"left"};
  const td={fontSize:12,padding:"10px",borderBottom:"1px solid var(--a5)",verticalAlign:"top"};
  const cellPreset=(item,accentColor)=>{
    if(!item) return <span style={{color:"var(--text-muted)"}}>—</span>;
    const {name,rec}=item;
    const sc=rec?.score;
    const scC=sc!=null?scoreColor(sc):"#888";
    const scB=sc!=null?scoreBg(sc):"transparent";
    return (
      <div>
        {rec?.installed
          ?<span style={{fontWeight:700,color:accentColor,fontSize:13,marginRight:4}}>Banque {rec.bank}{rec.slot}</span>
          :<span style={{fontSize:10,background:"rgba(251,191,36,0.15)",color:"#fbbf24",borderRadius:4,padding:"1px 6px",fontWeight:700,marginRight:4}}>⬇ À installer</span>
        }
        {sc!=null&&<span style={{fontSize:10,fontWeight:800,color:scC,background:scB,borderRadius:4,padding:"1px 6px"}}>{sc}%</span>}
        <div style={{fontSize:11,color:"var(--text-sec)",lineHeight:1.5,marginTop:2}}>{name}</div>
        {!rec?.installed&&rec?.replaceBank!=null&&<div style={{fontSize:10,color:"#475569",marginTop:1}}>→ Remplace Banque {rec.replaceBank}{rec.replaceSlot}</div>}
      </div>
    );
  };
  return (
    <div>
      <Breadcrumb crumbs={[{label:"Accueil",screen:"list"},{label:"Récap",screen:"recap"},{label:"Synthèse"}]} onNavigate={onNavigate}/>
      <div style={{marginBottom:20}}><div style={{fontSize:22,fontWeight:800,color:"var(--text)"}}>Tableau de synthèse</div><div style={{fontSize:12,color:"var(--text-muted)",marginTop:3}}>{songs.length} morceau{songs.length>1?"x":""}</div></div>
      <div style={{overflowX:"auto",borderRadius:12,border:"1px solid var(--a8)"}}>
        <table>
          <thead><tr style={{background:"var(--a4)"}}><th style={th}>Morceau</th><th style={th}>Guitare</th><th style={{...th,color:"#93c5fd"}}>📦 Anniversary</th><th style={{...th,color:"#a5b4fc"}}>🔌 Plug</th></tr></thead>
          <tbody>
            {rows.map(({s,g,ann,plug},i)=>(
              <tr key={s.id} style={{background:i%2===0?"transparent":"var(--a3)"}}>
                <td style={td}><div style={{fontWeight:600,color:"var(--text)",fontSize:13}}>{s.title}</div><div style={{fontSize:11,color:"var(--text-muted)"}}>{s.artist}</div></td>
                <td style={td}>{g?<span style={{fontSize:12,color:"#4ade80",background:"rgba(74,222,128,0.1)",borderRadius:5,padding:"2px 8px",fontWeight:600,whiteSpace:"nowrap"}}>{g.short}</span>:<span style={{color:"var(--text-muted)"}}>—</span>}</td>
                <td style={td}>{cellPreset(ann,"#93c5fd")}</td>
                <td style={td}>{cellPreset(plug,"#a5b4fc")}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── NewSongExplorer ─────────────────────────────────────────────────────────
function NewSongExplorer({songDb,onSongDb,setlists,onSetlists,banksAnn,banksPlug,aiProvider,aiKeys,allGuitars}) {
  const [title,setTitle]=useState("");
  const [artist,setArtist]=useState("");
  const [gId,setGId]=useState("");
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);
  const [err,setErr]=useState(null);
  const [addToDb,setAddToDb]=useState(true);
  const [addToSlIds,setAddToSlIds]=useState([]);
  const [saved,setSaved]=useState(false);
  const inp={background:"var(--bg-card)",color:"var(--text)",border:"1px solid var(--a15)",borderRadius:8,padding:"9px 12px",fontSize:13,width:"100%",boxSizing:"border-box"};

  const analyze=()=>{
    if(!title.trim())return;
    setLoading(true);setErr(null);setResult(null);setSaved(false);
    const fakeSong={id:`tmp_${Date.now()}`,title:title.trim(),artist:artist.trim()||"Artiste inconnu"};
    fetchAI(fakeSong,gId,banksAnn,banksPlug,aiProvider,aiKeys,allGuitars)
      .then(r=>setResult(r))
      .catch(e=>setErr(e.message||"Erreur IA"))
      .finally(()=>setLoading(false));
  };

  const doSave=()=>{
    if(saved)return;
    const ns={id:`c_${Date.now()}`,title:title.trim(),artist:artist.trim()||"Artiste inconnu",isCustom:true,ig:gId?[gId]:[],aiCache:result?{gId,result}:null};
    onSongDb(p=>[...p,ns]);
    if(addToSlIds.length>0)onSetlists(p=>p.map(sl=>addToSlIds.includes(sl.id)?{...sl,songIds:[...sl.songIds,ns.id]}:sl));
    setSaved(true);
  };

  const gType=gId?(allGuitars||GUITARS).find(x=>x.id===gId)?.type||"HB":null;
  return (
    <div>
      <div style={{fontSize:13,color:"var(--text-muted)",marginBottom:16}}>Explore un nouveau morceau avec l'IA et ajoute-le éventuellement à ta base.</div>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:14}}>
        <input placeholder="Titre du morceau *" value={title} onChange={e=>setTitle(e.target.value)} style={inp} onKeyDown={e=>e.key==="Enter"&&analyze()}/>
        <input placeholder="Artiste" value={artist} onChange={e=>setArtist(e.target.value)} style={inp}/>
      </div>
      <button onClick={analyze} disabled={!title.trim()||loading}
        style={{width:"100%",background:!title.trim()||loading?"#374151":"linear-gradient(135deg,#7c3aed,#4f46e5)",border:"none",color:"var(--text)",borderRadius:10,padding:"12px",fontSize:14,fontWeight:700,cursor:!title.trim()||loading?"not-allowed":"pointer",marginBottom:16}}>
        {loading?"✨ Analyse en cours…":"✨ Analyser avec l'IA"}
      </button>
      {err&&<div style={{fontSize:12,color:"#f87171",background:"rgba(239,68,68,0.1)",borderRadius:8,padding:"10px 12px",marginBottom:12}}>{err}</div>}
      {result&&<div>
        <div style={{background:"rgba(99,102,241,0.08)",border:"1px solid rgba(99,102,241,0.3)",borderRadius:14,padding:16,marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:700,color:"#a5b4fc",marginBottom:12}}>{title}{artist?" — "+artist:""}</div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <Row icon="🎯"><div><div style={{fontSize:12,color:"#a78bfa",fontWeight:700,marginBottom:2}}>Guitare idéale : {result.ideal_guitar}</div><div style={{fontSize:11,color:"var(--text-sec)"}}>{result.guitar_reason}</div></div></Row>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              <PBlock device="ToneX Anniversary" emoji="📦" presetName={result.preset_ann?.label} gType={gType} banks={banksAnn}/>
              <PBlock device="ToneX Plug" emoji="🔌" presetName={result.preset_plug?.label} gType={gType} banks={banksPlug} bg2="rgba(99,102,241,0.06)"/>
            </div>
            <Row icon="🎛️"><div style={{display:"flex",flexDirection:"column",gap:4}}>
              {result.settings_preset&&<div style={{fontSize:11,background:"rgba(251,191,36,0.07)",border:"1px solid rgba(251,191,36,0.15)",borderRadius:7,padding:"6px 10px",color:"#fde68a"}}><b style={{color:"#fbbf24"}}>Preset · </b>{result.settings_preset}</div>}
              {result.settings_guitar&&<div style={{fontSize:11,background:"rgba(34,197,94,0.07)",border:"1px solid rgba(34,197,94,0.15)",borderRadius:7,padding:"6px 10px",color:"#bbf7d0"}}><b style={{color:"#4ade80"}}>Guitare · </b>{result.settings_guitar}</div>}
            </div></Row>
            {result.ref_guitarist&&<Row icon="📖"><div style={{background:"var(--a3)",border:"1px solid var(--a7)",borderRadius:9,padding:"9px 12px",flex:1}}>
              <div style={{fontSize:10,color:"var(--text-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Référence originale — {result.ref_guitarist}</div>
              <div style={{display:"flex",flexDirection:"column",gap:3}}>
                <div style={{display:"flex",gap:5,alignItems:"baseline",flexWrap:"wrap"}}><span style={{fontSize:10,color:"var(--text-muted)",flexShrink:0}}>🎸 Guitare</span><span style={{fontSize:11,color:"var(--text-bright)",fontWeight:500}}>{result.ref_guitar}</span></div>
                <div style={{display:"flex",gap:5,alignItems:"baseline",flexWrap:"wrap"}}><span style={{fontSize:10,color:"var(--text-muted)",flexShrink:0}}>🔊 Ampli</span><span style={{fontSize:11,color:"var(--text-bright)",fontWeight:500}}>{result.ref_amp}</span></div>
                {result.ref_effects&&<div style={{display:"flex",gap:5,alignItems:"baseline",flexWrap:"wrap"}}><span style={{fontSize:10,color:"var(--text-muted)",flexShrink:0}}>🎚 Effets</span><span style={{fontSize:11,color:"var(--text-sec)"}}>{result.ref_effects}</span></div>}
              </div>
            </div></Row>}
          </div>
        </div>
        {!saved?(
          <div style={{background:"rgba(74,222,128,0.06)",border:"1px solid rgba(74,222,128,0.2)",borderRadius:12,padding:16}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,cursor:"pointer"}} onClick={()=>setAddToDb(!addToDb)}>

              <div style={{fontSize:13,color:"var(--text)",fontWeight:600}}>Ajouter à ma base de morceaux</div>
            </div>
            {addToDb&&setlists.length>0&&<div style={{marginBottom:10}}>
              <div style={{fontSize:11,color:"var(--text-muted)",marginBottom:6}}>Ajouter aussi à :</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {setlists.map(sl=>{const sel=addToSlIds.includes(sl.id);return(
                  <button key={sl.id} onClick={()=>setAddToSlIds(p=>p.includes(sl.id)?p.filter(x=>x!==sl.id):[...p,sl.id])} style={{background:sel?"rgba(99,102,241,0.3)":"var(--a5)",border:sel?"1px solid rgba(99,102,241,0.6)":"1px solid var(--a10)",color:sel?"#a5b4fc":"#94a3b8",borderRadius:7,padding:"4px 12px",fontSize:11,fontWeight:600,cursor:"pointer"}}>{sl.name}</button>
                );})}
              </div>
            </div>}
            {addToDb&&<button onClick={doSave} style={{width:"100%",background:"#16a34a",border:"none",color:"var(--text)",borderRadius:10,padding:"11px",fontSize:13,fontWeight:700,cursor:"pointer"}}>✅ Sauvegarder dans la base</button>}
          </div>
        ):(
          <div style={{background:"rgba(74,222,128,0.12)",border:"1px solid rgba(74,222,128,0.4)",borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"center",gap:8}}>
            <span style={{color:"#4ade80",fontSize:16}}>✓</span>
            <div style={{fontSize:13,color:"#4ade80",fontWeight:600}}>"{title}" ajouté à ta base !</div>
          </div>
        )}
      </div>}
    </div>
  );
}

// ─── PresetBrowser ────────────────────────────────────────────────────────────
const PRESET_PAGE_SIZE=30;
function PresetList({filtered,selected,setSelected,banksAnn,banksPlug}){
  const [shown,setShown]=useState(PRESET_PAGE_SIZE);
  useEffect(()=>setShown(PRESET_PAGE_SIZE),[filtered]);
  const visible=filtered.slice(0,shown);
  const remaining=filtered.length-shown;
  return(
    <div>
      <div style={{fontSize:10,color:"var(--text-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>
        {filtered.length} preset{filtered.length>1?"s":""} trouvé{filtered.length>1?"s":""} — clique pour voir la fiche
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:3}}>
        {visible.map(([name,info])=>{
          const annLoc=findInBanks(name,banksAnn);
          const plugLoc=findInBanks(name,banksPlug);
          const installed=!!(annLoc||plugLoc);
          const isSel=selected===name;
          return(
            <div key={name} onClick={()=>setSelected(isSel?null:name)}
              style={{display:"flex",alignItems:"center",gap:8,background:isSel?"rgba(99,102,241,0.18)":"var(--a3)",border:isSel?"1px solid rgba(99,102,241,0.45)":"1px solid var(--a6)",borderRadius:9,padding:"8px 11px",cursor:"pointer"}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,color:isSel?"#a5b4fc":"#e2e8f0",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name}</div>
                <div style={{display:"flex",gap:5,alignItems:"center",marginTop:2,flexWrap:"wrap"}}>
                  <span style={{fontSize:10,color:"var(--text-muted)"}}>{info.amp}</span>
                  {annLoc&&<span style={{fontSize:9,color:"#93c5fd",background:"rgba(147,197,253,0.1)",borderRadius:3,padding:"1px 5px",fontWeight:700}}>📦{annLoc.bank}{annLoc.slot}</span>}
                  {plugLoc&&<span style={{fontSize:9,color:"#a5b4fc",background:"rgba(165,180,252,0.1)",borderRadius:3,padding:"1px 5px",fontWeight:700}}>🔌{plugLoc.bank}{plugLoc.slot}</span>}
                </div>
              </div>
              <div style={{display:"flex",gap:3,alignItems:"center",flexShrink:0}}>
                {["HB","SC","P90"].map(gt=>(
                  <span key={gt} style={{fontSize:9,color:scoreColor(info.scores[gt]||60),fontWeight:700,background:scoreBg(info.scores[gt]||60),borderRadius:3,padding:"1px 4px"}}>{info.scores[gt]||60}</span>
                ))}
              </div>
            </div>
          );
        })}
      </div>
      {remaining>0&&(
        <button onClick={()=>setShown(s=>s+PRESET_PAGE_SIZE)}
          style={{width:"100%",marginTop:10,background:"var(--a5)",border:"1px solid var(--a10)",color:"var(--text-sec)",borderRadius:9,padding:"10px",fontSize:12,cursor:"pointer",fontWeight:600}}>
          Voir {Math.min(remaining,PRESET_PAGE_SIZE)} de plus ({remaining} restants)
        </button>
      )}
    </div>
  );
}

function PresetBrowser({banksAnn,banksPlug,availableSources,customPacks}) {
  const [filterStyle,setFilterStyle]=useState("all");
  const [filterGain,setFilterGain]=useState("all");
  const [filterSrc,setFilterSrc]=useState("all");
  const [showAllSrc,setShowAllSrc]=useState(false);
  const [search,setSearch]=useState("");
  const [selected,setSelected]=useState(null);

  // Merge custom packs into catalog
  const fullCatalog=useMemo(()=>{
    // Dedup TSR_PACK_CATALOG against PRESET_CATALOG_FULL (same presets, different key format: "TSR - X" vs "TSR X")
    const existingNorms=new Set(Object.keys(PRESET_CATALOG_FULL).map(normalizePresetName));
    const tsrDeduped={};
    for(const [k,v] of Object.entries(TSR_PACK_CATALOG)){
      if(!existingNorms.has(normalizePresetName(k))) tsrDeduped[k]=v;
    }
    const cat={...PRESET_CATALOG_FULL,...tsrDeduped,...ANNIVERSARY_CATALOG,...FACTORY_CATALOG};
    (customPacks||[]).forEach(pack=>{
      (pack.presets||[]).forEach(p=>{
        if(p.name&&!cat[p.name]) cat[p.name]={src:pack.name,amp:p.amp||"Custom",gain:p.gain||"mid",style:p.style||"rock",scores:p.scores||{HB:78,SC:78,P90:78}};
      });
    });
    return cat;
  },[customPacks]);

  const filtered=useMemo(()=>
    Object.entries(fullCatalog).filter(([name,info])=>{
      if(!showAllSrc&&availableSources&&availableSources[info.src]===false)return false;
      if(filterStyle!=="all"&&info.style!==filterStyle)return false;
      if(filterGain!=="all"&&info.gain!==filterGain)return false;
      if(filterSrc!=="all"&&info.src!==filterSrc)return false;
      if(search.trim()){
        const q=search.toLowerCase();
        const ctx=PRESET_CONTEXT[info.amp];
        const artistsStr=(ctx?.artists||[]).join(" ").toLowerCase();
        const tracksStr=(ctx?.tracks||[]).join(" ").toLowerCase();
        if(!name.toLowerCase().includes(q)&&!info.amp.toLowerCase().includes(q)&&!artistsStr.includes(q)&&!tracksStr.includes(q))return false;
      }
      return true;
    })
  ,[filterStyle,filterGain,filterSrc,search]);

  const pickRandom=()=>{
    if(!filtered.length)return;
    const [name]=filtered[Math.floor(Math.random()*filtered.length)];
    setSelected(name);
  };

  const selInfo=selected?(fullCatalog[selected]||PRESET_CATALOG[selected]):null;
  const selCtx=selInfo?PRESET_CONTEXT[selInfo.amp]:null;
  const annLoc=selected?findInBanks(selected,banksAnn):null;
  const plugLoc=selected?findInBanks(selected,banksPlug):null;

  const ScoreBar=({label,score})=>(
    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
      <span style={{fontSize:10,color:"var(--text-muted)",width:28,flexShrink:0}}>{label}</span>
      <div style={{flex:1,height:5,background:"var(--a8)",borderRadius:3,overflow:"hidden"}}>
        <div style={{width:`${score}%`,height:"100%",background:scoreColor(score),borderRadius:3}}/>
      </div>
      <span style={{fontSize:10,fontWeight:700,color:scoreColor(score),width:30,textAlign:"right"}}>{score}%</span>
    </div>
  );

  const STYLE_OPTS={all:"Tous styles",hard_rock:"Hard Rock",rock:"Rock",blues:"Blues",jazz:"Jazz",pop:"Pop",metal:"Metal"};
  const GAIN_OPTS={all:"Tous gains",low:"Low gain",mid:"Mid gain",high:"High gain"};
  const SRC_OPTS={all:"Toutes sources",TSR:"64 Studio Rats",ML:"ML Sound Lab Essentials",Anniversary:"ToneX Anniversary Factory",Factory:"ToneX Factory",custom:"Custom"};
  const selStyle={background:"var(--bg-card)",color:"var(--text-sec)",border:"1px solid var(--a12)",borderRadius:7,padding:"6px 10px",fontSize:12,cursor:"pointer"};

  const hasFilter=filterStyle!=="all"||filterGain!=="all"||filterSrc!=="all"||search.trim();
  return (
    <div>
      <div style={{fontSize:13,color:"var(--text-muted)",marginBottom:14}}>Explore ta bibliothèque de presets et découvre leur contexte musical.</div>

      {/* Bouton aléatoire */}
      <button onClick={pickRandom} style={{width:"100%",background:"linear-gradient(135deg,#7c3aed,#0ea5e9)",border:"none",color:"var(--text)",borderRadius:12,padding:"14px",fontSize:15,fontWeight:700,cursor:"pointer",marginBottom:16}}>
        🎲 Preset aléatoire {filtered.length<Object.keys(fullCatalog).length?`(dans les ${filtered.length} filtrés)`:""}
      </button>

      {/* Filtres */}
      <div style={{background:"var(--a3)",border:"1px solid var(--a7)",borderRadius:12,padding:12,marginBottom:16}}>
        <div style={{fontSize:10,color:"var(--text-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>Filtres</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
          <select value={filterStyle} onChange={e=>setFilterStyle(e.target.value)} style={selStyle}>{Object.entries(STYLE_OPTS).map(([v,l])=><option key={v} value={v}>{l}</option>)}</select>
          <select value={filterGain} onChange={e=>setFilterGain(e.target.value)} style={selStyle}>{Object.entries(GAIN_OPTS).map(([v,l])=><option key={v} value={v}>{l}</option>)}</select>
          <select value={filterSrc} onChange={e=>setFilterSrc(e.target.value)} style={selStyle}>{Object.entries(SRC_OPTS).map(([v,l])=><option key={v} value={v}>{l}</option>)}</select>
        </div>
        <input placeholder="Artiste, morceau, ampli…" value={search} onChange={e=>setSearch(e.target.value)}
          style={{width:"100%",background:"var(--bg-body)",color:"var(--text)",border:"1px solid var(--a15)",borderRadius:8,padding:"7px 11px",fontSize:12,boxSizing:"border-box"}}/>
        {availableSources&&Object.values(availableSources).some(v=>!v)&&<label style={{display:"flex",alignItems:"center",gap:6,marginTop:8,fontSize:11,color:"var(--text-sec)",cursor:"pointer"}}>
          <input type="checkbox" checked={showAllSrc} onChange={e=>setShowAllSrc(e.target.checked)} style={{width:14,height:14}}/> Inclure les sources non disponibles
        </label>}
        {hasFilter&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
          <span style={{fontSize:11,color:"var(--text-muted)"}}>{filtered.length} preset{filtered.length>1?"s":""} trouvé{filtered.length>1?"s":""}</span>
          <button onClick={()=>{setFilterStyle("all");setFilterGain("all");setFilterSrc("all");setSearch("");}} style={{fontSize:11,color:"var(--text-muted)",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>Réinitialiser</button>
        </div>}
      </div>

      {/* Fiche preset sélectionné */}
      {selected&&selInfo&&(
        <div style={{background:"rgba(99,102,241,0.08)",border:"2px solid rgba(99,102,241,0.4)",borderRadius:16,padding:18,marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
            <div style={{flex:1,marginRight:10}}>
              {selCtx?.emoji&&<div style={{fontSize:26,marginBottom:4}}>{selCtx.emoji}</div>}
              <div style={{fontSize:15,fontWeight:800,color:"var(--text)",marginBottom:2}}>{selected}</div>
              <div style={{fontSize:12,color:"var(--text-sec)"}}>{selInfo.amp}</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"flex-end",flexShrink:0}}>
              {styleBadge(selInfo.style)}
              {gainBadge(selInfo.gain)}
              <span style={{fontSize:9,color:"var(--text-muted)",background:"var(--a6)",borderRadius:4,padding:"1px 7px",fontWeight:600}}>{srcBadge(selected)||selInfo.src}</span>
            </div>
          </div>
          {selCtx?.desc&&<div style={{fontSize:12,color:"#cbd5e1",lineHeight:1.65,marginBottom:12,padding:"9px 12px",background:"var(--a4)",borderRadius:8,borderLeft:"3px solid rgba(99,102,241,0.5)"}}>{selCtx.desc}</div>}
          {selCtx?.artists&&<div style={{marginBottom:10}}>
            <div style={{fontSize:9,color:"var(--text-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:5}}>Artistes de référence</div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {selCtx.artists.map(a=><span key={a} style={{fontSize:11,background:"rgba(167,139,250,0.12)",color:"#a78bfa",border:"1px solid rgba(167,139,250,0.25)",borderRadius:5,padding:"2px 9px",fontWeight:600}}>{a}</span>)}
            </div>
          </div>}
          {selCtx?.tracks&&<div style={{marginBottom:12}}>
            <div style={{fontSize:9,color:"var(--text-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:5}}>Morceaux / Albums évocateurs</div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {selCtx.tracks.map(t=><span key={t} style={{fontSize:11,background:"rgba(56,189,248,0.08)",color:"#7dd3fc",border:"1px solid rgba(56,189,248,0.2)",borderRadius:5,padding:"2px 9px"}}>{t}</span>)}
            </div>
          </div>}
          <div style={{marginBottom:10}}>
            <div style={{fontSize:9,color:"var(--text-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Pertinence par guitare</div>
            {["HB","SC","P90"].map(gt=><ScoreBar key={gt} label={gt} score={selInfo.scores[gt]||60}/>)}
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {annLoc
              ?<span style={{fontSize:11,background:"rgba(74,222,128,0.12)",border:"1px solid rgba(74,222,128,0.3)",borderRadius:7,padding:"4px 10px",color:"#4ade80",fontWeight:600}}>📦 Bank {annLoc.bank}{annLoc.slot}</span>
              :<span style={{fontSize:11,background:"var(--a4)",border:"1px solid var(--a8)",borderRadius:7,padding:"4px 10px",color:"var(--text-dim)"}}>📦 Non installé (Ann.)</span>
            }
            {plugLoc
              ?<span style={{fontSize:11,background:"rgba(99,102,241,0.12)",border:"1px solid rgba(99,102,241,0.3)",borderRadius:7,padding:"4px 10px",color:"#a5b4fc",fontWeight:600}}>🔌 Bank {plugLoc.bank}{plugLoc.slot}</span>
              :<span style={{fontSize:11,background:"var(--a4)",border:"1px solid var(--a8)",borderRadius:7,padding:"4px 10px",color:"var(--text-dim)"}}>🔌 Non installé (Plug)</span>
            }
          </div>
        </div>
      )}

      {/* Packs browsing / Liste des presets */}
      {!hasFilter&&(()=>{
        const srcCounts={};
        Object.values(fullCatalog).forEach(info=>{
          srcCounts[info.src]=(srcCounts[info.src]||0)+1;
        });
        const packCards=[
          {id:"TSR",label:"64 Studio Rats",emoji:"🎸",color:"251,191,36"},
          {id:"ML",label:"ML Sound Lab Essentials",emoji:"🎛",color:"56,189,248"},
          {id:"Anniversary",label:"ToneX Anniversary Factory",emoji:"📦",color:"167,139,250"},
          {id:"Factory",label:"ToneX Factory",emoji:"🎹",color:"74,222,128"},
        ];
        // Add custom packs
        (customPacks||[]).forEach(p=>{
          if(srcCounts[p.name]) packCards.push({id:p.name,label:p.name,emoji:"📂",color:"236,72,153",desc:`${srcCounts[p.name]} presets`});
        });
        return <div>
          <div style={{fontSize:10,color:"var(--text-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>Parcourir par pack — {Object.keys(fullCatalog).length} presets au total</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8}}>
            {packCards.filter(p=>srcCounts[p.id]).map(p=>(
              <button key={p.id} onClick={()=>setFilterSrc(p.id)}
                style={{background:"var(--a4)",border:"1px solid var(--a8)",borderRadius:12,padding:"14px 10px",cursor:"pointer",textAlign:"center",transition:"all .15s"}}
                onMouseOver={e=>{e.currentTarget.style.borderColor=`rgb(${p.color})`;e.currentTarget.style.background="var(--a7)";}}
                onMouseOut={e=>{e.currentTarget.style.borderColor="var(--a8)";e.currentTarget.style.background="var(--a4)";}}>
                <div style={{fontSize:22,marginBottom:4}}>{p.emoji}</div>
                <div style={{fontSize:12,fontWeight:700,color:"var(--text)",marginBottom:2}}>{p.label}</div>
                <div style={{fontSize:11,color:`rgb(${p.color})`,fontWeight:600}}>{srcCounts[p.id]} presets</div>
                {p.desc&&<div style={{fontSize:10,color:"var(--text-dim)",marginTop:2}}>{p.desc}</div>}
              </button>
            ))}
          </div>
        </div>;
      })()}
      {hasFilter&&filtered.length===0&&<div style={{textAlign:"center",padding:"24px",color:"#475569",fontSize:13}}>Aucun preset ne correspond à ces critères.</div>}
      {hasFilter&&filtered.length>0&&<PresetList filtered={filtered} selected={selected} setSelected={setSelected} banksAnn={banksAnn} banksPlug={banksPlug}/>}
    </div>
  );
}

const JAM_STYLES=[
  {id:"jazz",   label:"Jazz",       emoji:"🎹", color:"74,222,128"},
  {id:"pop",    label:"Pop",        emoji:"🎤", color:"236,72,153"},
  {id:"blues",  label:"Blues",      emoji:"🎷", color:"56,189,248"},
  {id:"rock",   label:"Rock",       emoji:"🎸", color:"251,191,36"},
  {id:"hard_rock",label:"Hard Rock",emoji:"🔥", color:"249,115,22"},
  {id:"metal",  label:"Metal",      emoji:"💀", color:"139,92,246"},
];
const TYPE_LABELS={HB:"Humbucker",SC:"Single Coil",P90:"P-90"};
const TYPE_COLORS={HB:"249,115,22",SC:"56,189,248",P90:"167,139,250"};

function JamPresetItem({p,rank}){
