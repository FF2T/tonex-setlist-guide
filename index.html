<script>
if('serviceWorker' in navigator){
  const SW_CODE=`
const CACHE='tonex-v2';
const HTML_URL=self.location.href.replace(/sw\\.js.*/,'ToneX_Setlist_Guide.html');
self.addEventListener('install',e=>{
  e.waitUntil(
    caches.open(CACHE).then(c=>c.addAll([self.registration.scope+'ToneX_Setlist_Guide.html']))
    .catch(()=>{})
  );
  self.skipWaiting();
});
self.addEventListener('activate',e=>{e.waitUntil(
  caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>self.clients.claim())
)});
self.addEventListener('fetch',e=>{
  e.respondWith(
    fetch(e.request).then(res=>{
      if(res.ok&&e.request.url.includes('ToneX_Setlist_Guide')){
        caches.open(CACHE).then(c=>c.put(e.request,res.clone()));
      }
      return res;
    }).catch(()=>caches.match(e.request))
  );
});`;
  const blob=new Blob([SW_CODE],{type:'application/javascript'});
  const swUrl=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
</script>

function loadFromFirestore(){if(!db)return Promise.resolve(null);return db.collection("sync").doc("state").get().then(function(d){return d.exists?d.data():null;}).catch(function(){return null;});}
function onFirestoreChange(cb){if(!db)return function(){};return db.collection("sync").doc("state").onSnapshot(function(d){if(d.exists)cb(d.data());},function(){});}

  "Marshall Plexi":{emoji:"🔥",refs:[{a:"Jimi Hendrix",t:["All Along the Watchtower"]},{a:"Jimmy Page",t:["Whole Lotta Love"]},{a:"Eric Clapton",t:["Crossroads"]},{a:"Pete Townshend",t:["Won't Get Fooled Again"]}],desc:"L'ampli rock par excellence. Le Plexi définit le son du rock des années 60-70. Crunch chaud et harmonique, sustain naturel, réponse dynamique magistrale."},

  "Matchless DC30":{emoji:"🎼",refs:[{a:"Tom Petty",t:["American Girl"]},{a:"Thurston Moore",t:["Teen Age Riot"]},{a:"Grant Green",t:["Idle Moments"]}],desc:"Le Matchless DC30 : l'héritier moderne du Vox AC30. Plus articulé et hi-fi, ses cleans sont brillants et son crunch exceptionnel. Très apprécié des guitaristes de session et des amateurs de son vintage moderne."},
  "Matchless HC15":{emoji:"🎼",refs:[{a:"Peter Buck (R.E.M.)",t:["Losing My Religion"]},{a:"Johnny Marr",t:["This Charming Man"]},{a:"Andy Summers",t:["Every Breath You Take"]}],desc:"Le Matchless HC15 en version 15W : son british vintage ultra-musical. Cleans brillants, crunch expressif, réponse dynamique remarquable. Idéal pour le rock indé et le post-punk."},
  "Matchless Independence 35":{emoji:"🎼",refs:[{a:"John Frusciante",t:["Under the Bridge"]},{a:"Jonny Greenwood",t:["Karma Police"]},{a:"Dave Grohl",t:["Best of You"]}],desc:"Le Matchless Independence 35 est l'ampli double canal de Matchless. Clean impeccable, overdrive musical. Utilisé par John Frusciante sur de nombreux enregistrements avec les RHCP."},
  "Hiwatt HG100":{emoji:"🇬🇧",refs:[{a:"Pete Townshend",t:["Won't Get Fooled Again"]},{a:"Ritchie Blackmore",t:["Highway Star"]},{a:"David Gilmour",t:["Comfortably Numb"]}],desc:"Le Hiwatt HG100 avec ses modifications gain : le son british puissant et agressif. Dérivé du légendaire DR103, il conserve cette clarté et ce headroom caractéristiques tout en ajoutant de la saturation."},
  "Hiwatt Wizard":{emoji:"🧙",refs:[{a:"Dave Murray",t:["The Trooper","Aces High"]},{a:"Adrian Smith",t:["Aces High"]},{a:"Michael Schenker",t:["Rock You Like a Hurricane"]}],desc:"Combinaison du son britannique Hiwatt avec les capacités haute gain d'un Wizard. Son puissant, articulé, idéal pour le heavy metal et le hard rock des années 80."},
  "Budda V20":{emoji:"🏔️",refs:[{a:"Billy Gibbons",t:["Sharp Dressed Man"]},{a:"Joe Walsh",t:["Life's Been Good"]},{a:"Warren Haynes",t:["Soulshine"]}],desc:"Le Budda V20 est un petit combo américain au son tweed moderne. Breakup naturel, chaleur incomparable, dynamique réactive. Très apprécié pour les blues et rock américain."},
  "D13 AMP39":{emoji:"🎵",refs:[{a:"Derek Trucks",t:["Whipping Post (live)"]},{a:"Doyle Bramhall II",t:["It's Not Easy Being Green"]},{a:"Gary Clark Jr.",t:["Bright Lights"]}],desc:"Le D13 AMP39 est un ampli boutique canadien inspiré des circuits des années 40-50. Son vintage et chaud, réponse organique, idéal pour le blues moderne et le soul rock."},
  "Fender Concert":{emoji:"🌟",refs:[{a:"Buddy Holly",t:["That'll Be the Day"]},{a:"Chuck Berry",t:["Roll Over Beethoven"]},{a:"James Burton",t:["Mystery Train"]}],desc:"Le Fender Concert 4x10 : puissance américaine, son clean et percutant. Intermédiaire entre le Deluxe et le Twin, parfait pour les single coils qui cherchent clarté et headroom."},
  "Fender Deluxe Reverb":{emoji:"🌅",refs:[{a:"Neil Young",t:["Heart of Gold"]},{a:"SRV",t:["Couldn't Stand the Weather"]},{a:"John Mayer",t:["Slow Dancing in a Burning Room"]},{a:"Albert King",t:[]}],desc:"Le Fender Deluxe Reverb est l'ampli américain vintage idéal. Reverb à ressort intégrée, clean chaleureux qui se casse légèrement quand on pousse le volume. Une référence absolue pour le blues et la country."},
  "Fender Champ":{emoji:"🎵",refs:[{a:"Hound Dog Taylor",t:["Taylor's Rock"]},{a:"Robert Johnson Jr.",t:["Various blues recordings"]},{a:"Eddie Cochran",t:["Summertime Blues"]}],desc:"Le petit Fender Champ : son intime, breakup très expressif à faible volume. Les enregistrements de blues Chicago des années 50 doivent beaucoup à cet ampli."},
  "Fender 5051 Tweed":{emoji:"🎶",refs:[{a:"Carl Perkins",t:["Blue Suede Shoes"]},{a:"Sun Records artists",t:["Mystery Train"]},{a:"Elvis Presley (Scott Moore)",t:["That's All Right"]}],desc:"Le Fender Tweed des années 50 : le son originel du rock'n'roll. Breakup naturel et musical, midrange chaleureux. Les sessions Sun Records de Memphis ont défini ce son."},
  "Friedman Buxom Betty":{emoji:"💥",refs:[{a:"The Dead Daisies",t:["Highway Star (cover)"]},{a:"Zakk Wylde",t:["Bark at the Moon"]},{a:"Jerry Cantrell",t:["Would?"]}],desc:"La Friedman Buxom Betty est une tête au son chaud et puissant, moins agressif que la BE-100. Crunch british, sustain impressionnant, très polyvalente pour le hard rock."},
  "Cornford HellCat":{emoji:"😈",refs:[{a:"Radiohead",t:["Karma Police"]},{a:"Muse",t:["Hysteria"]},{a:"Mark Knopfler",t:["Walk of Life"]}],desc:"L'ampli britannique boutique par excellence. Cleans soyeux, crunch naturel, réponse dynamique remarquable. Particulièrement apprécié pour sa polyvalence des jeux rythmiques aux solos."},
  "Cornford Harle":{emoji:"😈",refs:[{a:"Thom Yorke",t:["The Bends era"]},{a:"Tom Morello (alt.)",t:["Rage setup"]},{a:"Nile Rodgers",t:["Le Freak"]}],desc:"Le Cornford Harle est la version clean/crunch de la gamme Cornford. Son aéré, réponse en cloche, idéal pour les jeux dynamiques et les textures sonores recherchées."},
  "Chandler 19T":{emoji:"🧪",refs:[{a:"The Beatles",t:["Please Please Me"]},{a:"Gerry & The Pacemakers",t:["You'll Never Walk Alone"]},{a:"The Shadows",t:["Apache"]}],desc:"Le Chandler 19T est une réplique du Vox AC15 des années 60 avec préampli modificable. Le son de la British Invasion originel, cleans brillants, chime caractéristique des lampes EL84."},
  "Electro Dime":{emoji:"⚡",refs:[{a:"Jeff Beck",t:["Freeway Jam"]},{a:"Robin Trower",t:["Bridge of Sighs"]},{a:"Roy Buchanan",t:["Sweet Dreams"]}],desc:"Ampli boutique au son transparent et dynamique. Particulièrement apprécié pour les single coils, il produit des harmoniques riches et une réponse très expressive au toucher."},
  "Reinguard T-36":{emoji:"🎸",refs:[{a:"Gary Moore",t:["Still Got the Blues"]},{a:"Rory Gallagher",t:["Moonchild"]},{a:"Robin Trower",t:["Day of the Eagle"]}],desc:"Le Reinguard T-36 est un ampli boutique au son vintage british. Son chaud et réactif, midrange prononcé, très apprécié pour le blues-rock et le rock classique."},
  "Rouge Plate D50":{emoji:"🎭",refs:[{a:"Robben Ford",t:["Talk to Your Daughter"]},{a:"Larry Carlton",t:["Room 335","Captain Caribe"]},{a:"Lee Ritenour",t:["Captain Caribe"]}],desc:"Le Rouge Plate D50 offre un son jazz-fusion d'exception. Clean transparent, overdrive musical et articulé. Très utilisé par les guitaristes de jazz-fusion et de soul."},
  "Silver J":{emoji:"⚡",refs:[{a:"Randy Bachman",t:["American Woman"]},{a:"Angus Young (alt.)",t:["Highway to Hell alt."]},{a:"Ted Nugent",t:["Cat Scratch Fever"]}],desc:"Ampli boutique inspiré du Silver Jubilee de Marshall. Son dynamique et puissant, crunch explosif, midrange expressif. Parfait pour le hard rock et le classic rock."},
  "Independence 35":{emoji:"🎼",refs:[{a:"John Frusciante",t:["Give It Away"]},{a:"Kim Thayil",t:["Black Hole Sun"]},{a:"Mike McCready",t:["Even Flow"]}],desc:"Ampli multi-canaux offrant une grande palette sonore. Apprécié du rock alternatif américain des années 90 pour sa flexibilité et sa musicalité."},
  "Jimi H20":{emoji:"🔥",refs:[{a:"Jimi Hendrix",t:["Purple Haze","Machine Gun"]},{a:"Stevie Ray Vaughan",t:["Pride and Joy"]},{a:"Billy Cox",t:[]}],desc:"Ampli inspiré par le setup de Jimi Hendrix — un circuit basé sur le Marshall modifié. Son légendaire : cleans cristallins qui se cassent naturellement, feedback musical, sustain infini."},
  "Talon 50":{emoji:"🦅",refs:[{a:"Brad Paisley",t:["Mud on the Tires"]},{a:"Keith Urban",t:["You'll Think of Me"]},{a:"Brent Mason",t:["Guitar Man"]}],desc:"Amplificateur boutique américain au son country/rock moderne. Cleans brillants, crunch twangy, réponse parfaite pour les Telecasters et les styles country et roots rock."},
  "VMP-1":{emoji:"🎸",refs:[{a:"Carlos Santana",t:["Smooth"]},{a:"Gary Moore",t:["Still Got the Blues"]},{a:"George Lynch",t:["Mr. Scary"]}],desc:"Le VMP-1 (Vacuum Microphone Preamplifier) est un préampli rack à lampes légendaire. Son chaud et transparent, utilisé dans de nombreux studios pour son caractère analogique distinctif."},
  "Sons Amplification":{emoji:"🎵",refs:[{a:"Stevie Ray Vaughan (inspired)",t:["Texas Flood"]},{a:"BB King",t:["The Thrill Is Gone"]},{a:"Buddy Guy",t:["First Time I Met the Blues"]}],desc:"Sons Amplification produit des amplis boutique au son blues américain authentique. Inspirés des grands classiques Fender et Dumble, ils offrent une dynamique et une chaleur exceptionnelles."},
  "TWS 2864-S":{emoji:"🎸",refs:[{a:"Ritchie Blackmore",t:["Highway Star"]},{a:"Glenn Tipton",t:["Screaming for Vengeance"]},{a:"K.K. Downing",t:["Breaking the Law"]}],desc:"Ampli boutique au son british puissant et défini. Inspiré des grandes têtes Marshall 100W des années 70-80, idéal pour le hard rock et le heavy metal classique."},
  "Amp Nation WOD":{emoji:"🎸",refs:[{a:"Dave Grohl",t:["Everlong"]},{a:"Billy Corgan",t:["Bullet with Butterfly Wings"]},{a:"Stone Gossard",t:["Even Flow"]}],desc:"Ampli au son grunge/alternative des années 90. Mur de son compressé, sustain massif, grain agressif. Tout ce dont le rock alternatif américain avait besoin."},
  "Amp Nation ODR":{emoji:"🎸",refs:[{a:"Brad Whitford",t:["Walk This Way"]},{a:"Joe Perry",t:["Sweet Emotion"]},{a:"Slash",t:["Mr. Brownstone"]}],desc:"Ampli boutique overdrive orienté rock classique américain. Son chaud et percutant, réponse dynamique, grain characteristique du rock américain des années 70-80."},
  "Ironlung":{emoji:"🤖",refs:[{a:"Josh Homme",t:["No One Knows"]},{a:"Nick Oliveri",t:["Millionaire"]},{a:"Omar Rodríguez-López",t:["Roulette Dares"]}],desc:"Ampli boutique au son épais et psych. Apprécié du stoner rock et du rock psychédélique pour son grain unique, son sustain naturel et son caractère sonore distinctif."},
  "ZWREK":{emoji:"⚡",refs:[{a:"Various rock artists",t:["Rock moderne"]},{a:"Boutique users",t:["Hard rock contemporain"]}],desc:"Ampli boutique ZWREK au son moderne et puissant. Polyvalent, du clean transparent au gain élevé, avec une réponse articulée très appréciée des guitaristes modernes."},
  "Dumble ODS":{emoji:"💎",refs:[{a:"Robben Ford",t:["Inside Story"]},{a:"Larry Carlton",t:["Room 335"]},{a:"BB King",t:["Every Day I Have the Blues"]},{a:"Eric Clapton",t:["Every Day I Have the Blues"]}],desc:"Le Dumble ODS (Overdrive Special) est l'ampli le plus exclusif au monde. Son transparent et dynamique, overdrive naturel et musical. Prisé par les meilleurs guitaristes blues-rock au monde."},
  "Mesa Boogie Rectifier":{emoji:"🔴",refs:[{a:"Metallica",t:["The Unforgiven"]},{a:"Tool",t:["Schism"]},{a:"System of a Down",t:["B.Y.O.B."]},{a:"Deftones",t:["Change"]}],desc:"Le Rectifier de Mesa/Boogie a redéfini le son du metal moderne. Gain massif, basses profondes, mur de son impressionnant. Essentiel pour le metal des années 90-2000."},
  "GK MB150":{emoji:"🎸",refs:[{a:"Stanley Clarke",t:["School Days"]},{a:"Jaco Pastorius",t:["Portrait of Tracy"]},{a:"Marcus Miller",t:["Run for Cover"]}],desc:"Le GK MB150 est une référence pour la basse électrique. Son articulé et percutant, parfait pour le jazz, la fusion et le funk. Marcus Miller et Stanley Clarke l'utilisaient régulièrement."},
  "Ampeg SVT Pro 4":{emoji:"🎸",refs:[{a:"Geddy Lee",t:["YYZ"]},{a:"John Paul Jones",t:["Whole Lotta Love"]},{a:"Mike Dirnt",t:["Basket Case"]}],desc:"L'Ampeg SVT Pro 4 est une légende de la basse. Son massif et chaud, caractéristique du rock classique. Geddy Lee (Rush) et John Paul Jones (Led Zeppelin) lui ont rendu hommage."},
  "Ampeg Bass":{emoji:"🎸",refs:[{a:"Paul McCartney",t:["Come Together"]},{a:"Dee Dee Ramone",t:["Blitzkrieg Bop"]},{a:"Geezer Butler",t:["Iron Man"]}],desc:"Les amplis Ampeg pour basse sont des références absolues dans le rock. Son ample, punchy, avec cette chaleur lampiste caractéristique qui a défini le son du rock classique."},
  "Aguilar DB750":{emoji:"🎸",refs:[{a:"Marcus Miller",t:[]},{a:"Victor Wooten",t:[]}],desc:"L'Aguilar DB750 est une tête basse à lampes au son chaud et massif. Référence absolue pour le funk, le jazz et le R&B. Son gros et rond avec une dynamique remarquable."},
  "Ampeg SVT":{emoji:"🎸",refs:[{a:"Lemmy Kilmister",t:["Ace of Spades"]},{a:"Chris Squire",t:["Roundabout"]},{a:"Flea",t:["Give It Away"]}],desc:"L'Ampeg SVT est LA référence basse depuis 1969. Son massif, puissant, avec une chaleur incomparable. Utilisé sur d'innombrables enregistrements rock et funk."},
  "Amplifonics":{emoji:"🎸",refs:[{a:"Session guitarists",t:[]}],desc:"Ampli boutique Amplifonics au son polyvalent. Cleans transparents, gain progressif et musical. Apprécié des guitaristes de session pour sa réponse dynamique et sa palette sonore étendue."},
  "Bad Cat Cub":{emoji:"🐱",refs:[{a:"Joe Walsh",t:["Life's Been Good"]},{a:"Warren Haynes",t:["Soulshine"]}],desc:"Le Bad Cat Cub est un petit combo américain inspiré des circuits Fender Tweed. Son chaleureux, breakup naturel à faible volume. Parfait pour le blues et le rock roots en studio."},
  "Benson Chimera":{emoji:"🌟",refs:[{a:"Julian Lage",t:[]},{a:"Cory Wong",t:[]}],desc:"Le Benson Chimera est un ampli boutique de Portland au son vintage moderne. Cleans soyeux, breakup expressif. Très prisé des guitaristes de jazz moderne et de funk."},
  "Carr Sportsman":{emoji:"☀️",refs:[{a:"Bill Frisell",t:[]},{a:"Blake Mills",t:[]}],desc:"Le Carr Sportsman est un ampli boutique américain au son Fender-like raffiné. Cleans cristallins, réverb intégrée, breakup musical. Idéal pour le jazz, le country et le blues propre."},
  "Cornfield Harle":{emoji:"😈",refs:[{a:"Thom Yorke",t:[]},{a:"Nile Rodgers",t:["Le Freak"]}],desc:"Le Cornford Harlequin est la version clean/crunch de Cornford. Son aéré, réponse en cloche, idéal pour les textures sonores et les jeux dynamiques."},
  "Custom 30":{emoji:"🫖",refs:[{a:"Brian May",t:["Bohemian Rhapsody"]},{a:"Tom Petty",t:["Free Fallin'"]}],desc:"Ampli de type Vox AC30 custom. Son british classique avec ses harmoniques chimey caractéristiques. Chime et crunch naturel pour le rock britannique."},
  "Diezel":{emoji:"⚙️",refs:[{a:"Adam Jones",t:["Schism"]},{a:"Bumblefoot",t:[]},{a:"Rivera (Metallica tech)",t:[]}],desc:"Les amplis Diezel allemands sont des machines de guerre du high gain. Son serré, articulé même dans les graves. Référence du metal et du hard rock moderne."},
  "Dr. Z":{emoji:"🩺",refs:[{a:"Brad Paisley",t:["Mud on the Tires"]},{a:"Joe Bonamassa",t:["Sloe Gin"]}],desc:"Les amplis Dr. Z sont des boutiques américains au son vintage inspiré du Vox et du Fender. Chaleur, réponse dynamique et musicalité exceptionnelles."},
  "Dr. Z Wreck":{emoji:"🩺",refs:[{a:"Joe Bonamassa",t:["Sloe Gin"]},{a:"Brad Paisley",t:[]}],desc:"Le Dr. Z Wreck est un ampli boutique inspiré du Trainwreck. Son clair brillant, crunch musical et expressif. Très réactif au volume de la guitare."},
  "Drive Pedals":{emoji:"🎛️",refs:[],desc:"Pédales de drive capturées via ToneX. Ces presets modélisent des pédales d'overdrive, fuzz et distortion populaires, jouées à travers différents amplis."},
  "ENGL":{emoji:"🦅",refs:[{a:"Ritchie Blackmore",t:["Highway Star"]},{a:"Steve Morse",t:[]},{a:"Marty Friedman",t:[]}],desc:"Les amplis ENGL allemands offrent un son tight et agressif. Gain massif et articulé, idéal pour le metal européen et le hard rock moderne."},
  "EVH 5150":{emoji:"⚡",refs:[{a:"Eddie Van Halen",t:["Eruption","Panama"]},{a:"Wolfgang Van Halen",t:[]}],desc:"L'EVH 5150 est la version moderne du légendaire Peavey 5150. Conçu par Eddie Van Halen, c'est l'ampli metal/hard rock ultime. Gain massif, son percutant et articulé."},
  "Fender":{emoji:"🌅",refs:[{a:"Various Fender artists",t:[]}],desc:"Ampli Fender générique. Le son américain par excellence : cleans brillants, réponse cristalline, le socle de la musique populaire depuis les années 50."},
  "Fender 5E3 Tweed Deluxe":{emoji:"🎶",refs:[{a:"Neil Young",t:["Cinnamon Girl"]},{a:"Billy Gibbons",t:["La Grange"]},{a:"Larry Carlton",t:[]}],desc:"Le Fender 5E3 Tweed Deluxe est l'un des amplis les plus enregistrés de l'histoire. Breakup naturel et musical dès les premiers volumes. Son chaud, compressé, magique pour le blues et le rock."},
  "Fender 5E7 Bandmaster":{emoji:"🎶",refs:[{a:"Buddy Holly",t:["That'll Be the Day"]},{a:"Roy Buchanan",t:["Sweet Dreams"]}],desc:"Le Fender 5E7 Bandmaster Tweed de 1958 est un ampli 3x10 au son puissant et chaud. Version plus grande du Tweed Deluxe, il offre plus de headroom tout en gardant ce breakup naturel légendaire."},
  "Fender Bassman":{emoji:"🎷",refs:[{a:"Buddy Guy",t:["Stone Crazy"]},{a:"Jim Campilongo",t:[]}],desc:"Le Fender Bassman est l'ampli qui a inspiré les premiers Marshall. Son rond, chaud, crunch musical. Le son du blues et du rock'n'roll originel."},
  "Fender Blues Deluxe II":{emoji:"🌅",refs:[{a:"John Mayer",t:[]},{a:"Jonny Lang",t:[]}],desc:"Le Fender Blues Deluxe Reissue II est un combo 40W au son Tweed moderne. Réverb à ressort, gain naturel, le compagnon idéal du blues et du rock roots."},
  "Fender Cambridge":{emoji:"🌅",refs:[{a:"Syd Barrett",t:["Interstellar Overdrive"]}],desc:"Le Fender Cambridge Reverb est un combo à transistors vintage des années 60-70. Son propre et net, avec un charme lo-fi particulier. Utilisé par Syd Barrett aux débuts de Pink Floyd."},
  "Fender Hot Rod Twin":{emoji:"🌟",refs:[{a:"Session guitarists",t:[]}],desc:"Le Fender Hot Rod Twin est un ampli à fort headroom dérivé du Twin Reverb. Cleans immenses, canal drive ajouté. Polyvalent pour le live et le studio."},
  "Fender Princeton":{emoji:"🌅",refs:[{a:"Eric Clapton",t:["Unplugged"]},{a:"Mike Campbell",t:["Free Fallin'"]}],desc:"Le Fender Princeton Reverb est le petit ampli studio par excellence. Réverb à ressort légendaire, breakup naturel à volume modéré. Le son intime des grands enregistrements."},
  "Fender Pro Amp":{emoji:"🌅",refs:[{a:"Muddy Waters",t:["Hoochie Coochie Man"]},{a:"Stevie Ray Vaughan",t:[]}],desc:"Le Fender Pro Amp est un combo 1x15 au son plein et rond. Plus de basses que le Deluxe, idéal pour le blues de Chicago et les sonorités vintage."},
  "Fender Super Reverb":{emoji:"🌅",refs:[{a:"Stevie Ray Vaughan",t:["Texas Flood"]},{a:"Mike Campbell",t:[]}],desc:"Le Fender Super Reverb 4x10 est l'ampli de SRV sur ses premiers enregistrements. Son plein, projection puissante, breakup naturel. Le son du Texas Blues."},
  "Fender Texas Star":{emoji:"⭐",refs:[{a:"Eric Johnson",t:["Cliffs of Dover"]}],desc:"Le Fender Texas Star est un ampli prototype/boutique au son clair et articulé. Headroom important, dynamique exceptionnelle. Associé au son cristallin d'Eric Johnson."},
  "Fender Twin":{emoji:"🌟",refs:[{a:"Keith Richards",t:["Brown Sugar"]},{a:"Albert King",t:["Born Under a Bad Sign"]}],desc:"Le Fender Twin est la référence des cleans américains. Headroom immense, son brillant et défini. L'ampli des grands studios depuis les années 60."},
  "Fender Twin Reverb":{emoji:"🌟",refs:[{a:"Jerry Garcia",t:["Truckin'"]},{a:"B.B. King",t:["The Thrill Is Gone"]},{a:"Jazz Fusion artists",t:[]}],desc:"Le Fender Twin Reverb est la version avec réverb intégrée du Twin. Son propre légendaire, 85W de headroom pur. L'ampli jazz et clean par excellence."},
  "Fuzzy":{emoji:"🎛️",refs:[{a:"Jimi Hendrix",t:["Purple Haze"]}],desc:"Preset basé sur un circuit fuzz. Son saturé, compressé et sustain infini. Le son de Jimi Hendrix et du psychédélisme des années 60."},
  "Gallien-Krueger 800RB":{emoji:"🎸",refs:[{a:"Flea",t:["Give It Away"]},{a:"Robert Trujillo",t:[]}],desc:"Le GK 800RB est un ampli basse à transistors au son punchy et articulé. Le choix de Flea (Red Hot Chili Peppers) pour son attaque et sa clarté."},
  "Gibson Skylark":{emoji:"🎵",refs:[{a:"Chuck Berry",t:["Johnny B. Goode"]},{a:"Bo Diddley",t:["Who Do You Love"]}],desc:"Le petit ampli Gibson Skylark GA5 incarne le son roots des années 50. Breakup naturel à faible volume, chaleur vintage. Idéal pour le rockabilly et le blues."},
  "Hiwatt":{emoji:"🇬🇧",refs:[{a:"Pete Townshend",t:["Won't Get Fooled Again"]},{a:"David Gilmour",t:["Comfortably Numb"]}],desc:"Les amplis Hiwatt sont réputés pour leur headroom et leur clarté. Son british cristallin et puissant, le choix de Townshend et Gilmour."},
  "Marshall":{emoji:"🤘",refs:[{a:"Various rock artists",t:[]}],desc:"Ampli Marshall générique. Le son du rock par excellence depuis 1962. Grain british, crunch naturel, le mur de son qui a défini le genre."},
  "Marshall 18W":{emoji:"🎩",refs:[{a:"Eric Clapton",t:["Beano album"]},{a:"Jimmy Page",t:[]}],desc:"Le Marshall 18W est un petit ampli vintage très recherché. Son crunch naturel à faible volume, le son du Beano album de Clapton. Breakup musical et harmoniques riches."},
  "Marshall 1974X":{emoji:"🏺",refs:[{a:"Jimi Hendrix",t:["Purple Haze"]},{a:"Eric Clapton",t:[]}],desc:"Le Marshall 1974X est la réédition du combo 18W des années 60. Son crunch vintage authentique, breakup naturel. Le son des petits clubs de blues-rock des sixties."},
  "Marshall JTM45 / Super Lead":{emoji:"🎩",refs:[{a:"Eric Clapton",t:["Crossroads"]},{a:"Pete Townshend",t:["My Generation"]}],desc:"Le Marshall JTM45 / Super Lead combine les caractéristiques des deux circuits. Crunch bluesy, sustain naturel. Le fondement du son rock britannique."},
  "Marshall Major 200W (modifié)":{emoji:"🔊",refs:[{a:"Ritchie Blackmore",t:["Highway Star"]},{a:"John Entwistle",t:[]}],desc:"Le Marshall Major 200W modifié est un monstre de puissance. Volume et headroom extrêmes. Ritchie Blackmore (Deep Purple) l'utilisait pour ses solos perçants."},
  "Marshall Silver Jubilee":{emoji:"⚡",refs:[{a:"Slash",t:["November Rain"]},{a:"Alex Lifeson",t:["Tom Sawyer"]}],desc:"Le Marshall Silver Jubilee (2555) est un ampli mythique de 1987. Son crunch signature entre le Plexi et le JCM800. Le son de Slash sur Appetite for Destruction."},
  "Marshall Super 100":{emoji:"⚡",refs:[{a:"Jimi Hendrix",t:["All Along the Watchtower"]},{a:"Eric Clapton",t:[]},{a:"Jimmy Page",t:["Whole Lotta Love"]}],desc:"Le Marshall Super 100 (Plexi 100W) est l'ampli qui a défini le rock. Volume massif, crunch naturel, le son des années 60-70 dans les stades."},
  "Marshall Super Lead 100W":{emoji:"⚡",refs:[{a:"Angus Young",t:["Back in Black"]},{a:"Jimmy Page",t:["Stairway to Heaven"]},{a:"Jimi Hendrix",t:["Voodoo Child"]}],desc:"Le Marshall Super Lead 100W est le Plexi originel. Son brut et puissant, le mur de son qui a construit le hard rock. L'ampli le plus iconique de l'histoire du rock."},

// Couleur selon score
function scoreColor(s){return s>=90?"var(--green)":s>=75?"var(--blue)":s>=60?"var(--yellow)":"var(--red)";}
function scoreBg(s){return s>=90?"var(--green-bg)":s>=75?"var(--blue-bg)":s>=60?"var(--yellow-bg)":"var(--red-bg)";}
// Cherche un preset dans le catalogue par nom exact puis fuzzy
const PRESET_CATALOG_MERGED = {...PRESET_CATALOG, ...ANNIVERSARY_CATALOG, ...PRESET_CATALOG_FULL};
function findCatalogEntry(name){
  if(!name) return null;
  if(PRESET_CATALOG[name]) return PRESET_CATALOG[name];
  const norm=normalizePresetName(name);
  for(const [k,v] of Object.entries(PRESET_CATALOG)){
    if(normalizePresetName(k)===norm) return v;
  }
  return null;
}
function presetScore(name,gType){return findCatalogEntry(name)?.scores?.[gType]??60;}
function srcBadge(name){const s=findCatalogEntry(name)?.src;return s==="TSR"?"TSR":s==="ML"?"ML":s==="Anniversary"?"Pédale":s==="custom"?"Custom":"";}
function styleBadge(style){const c={hard_rock:"#ef4444",rock:"#f59e0b",blues:"var(--blue)",jazz:"var(--green)",pop:"#ec4899",metal:"#8b5cf6"}[style]||"var(--text-sec)";const l={hard_rock:"Hard Rock",rock:"Rock",blues:"Blues",jazz:"Jazz",pop:"Pop",metal:"Metal"}[style]||style;return <span style={{fontSize:10,background:`${c}20`,color:c,border:`1px solid ${c}40`,borderRadius:4,padding:"1px 7px",fontWeight:700}}>{l}</span>;}
function gainBadge(gain){const c={low:"var(--green)",mid:"var(--yellow)",high:"var(--red)"}[gain]||"var(--text-sec)";const l={low:"Low",mid:"Mid",high:"High"}[gain]||gain;return <span style={{fontSize:10,background:`${c}20`,color:c,border:`1px solid ${c}40`,borderRadius:4,padding:"1px 7px",fontWeight:700}}>{l} gain</span>;}

// Normalise un nom de preset pour comparaison souple
// "TSR - Mars 800SL Ch1 Drive" et "TSR Mars 800SL Chnl 1 Drive" doivent matcher
function normalizePresetName(n){
  if(!n) return "";
  return n.toLowerCase()
    .replace(/[^a-z0-9]/g," ")       // ponctuation/tirets → espaces
    .replace(/(\d)([a-z])/g,"$1 $2") // "1Dirty" → "1 Dirty", "800SL" → "800 sl" (sépare chiffre+lettre)
    .replace(/([a-z])(\d)/g,"$1 $2") // "ch1" → "ch 1" (sépare lettre+chiffre)
    .replace(/\bchnl\b/g,"ch")        // chnl → ch
    .replace(/\bchanl?\b/g,"ch")      // chanl/chan → ch
    .replace(/\s+/g," ").trim();      // espaces multiples → un seul
}

// Cherche un preset dans les banks d'une pédale (comparaison souple)
function findInBanks(name, banks){
  if(!name||!banks) return null;
  // Exact match d'abord (rapide)
  for(const [k,bank] of Object.entries(banks)){
    for(const slot of ["A","B","C"]){
      if(bank[slot]===name) return {bank:Number(k),slot};
    }
  }
  // Fuzzy match si pas trouvé
  const norm=normalizePresetName(name);
  for(const [k,bank] of Object.entries(banks)){
    for(const slot of ["A","B","C"]){
      if(normalizePresetName(bank[slot])===norm) return {bank:Number(k),slot};
    }
  }
  return null;
}

// Trouve le slot le moins pertinent pour un type de guitare (candidat au remplacement)
function worstSlot(banks, gType, exclude=[]){
  let worst={score:101,bank:null,slot:null,name:null};
  for(const [k,bank] of Object.entries(banks)){
    for(const slot of ["A","B","C"]){
      const name=bank[slot];
      if(!name||exclude.includes(name)) continue;
      const s=presetScore(name,gType);
      if(s<worst.score) worst={score:s,bank:Number(k),slot,name};
    }
  }
  return worst;
}

// Cherche la meilleure alternative disponible dans le catalogue pour le même style musical
// Retourne le preset avec le score gType le plus élevé du même style, non installé dans banks
// ou installé mais avec un score significativement plus élevé
function findUpgrade(presetName, gType, banks){
  const entry=PRESET_CATALOG[presetName];
  if(!entry) return null;
  const currentScore=entry.scores?.[gType]??60;
  if(currentScore>=80) return null; // déjà bon, pas d'upgrade à chercher
  const style=entry.style;
  const minGain=entry.gain; // chercher un niveau de gain similaire ou compatible

  // Ordre de compatibilité gain : low < mid < high
  const gainOrder={low:0,mid:1,high:2};
  const currentGainLevel=gainOrder[minGain]??1;

  let best={score:currentScore+8,name:null,installed:false,bank:null,slot:null}; // seuil minimum : +8 pts
  for(const [name,info] of Object.entries(PRESET_CATALOG)){
    if(name===presetName) continue;
    if(info.style!==style) continue;
    // Compatibilité gain : ±1 niveau max pour rester cohérent avec le contexte du morceau
    const gainDiff=Math.abs((gainOrder[info.gain]??1)-currentGainLevel);
    if(gainDiff>1) continue;
    const s=info.scores?.[gType]??60;
    if(s>best.score){
      const found=findInBanks(name,banks);
      best={score:s,name,installed:!!found,bank:found?.bank??null,slot:found?.slot??null};
    }
  }
  return best.name?best:null;
}

// Recommandation d'installation pour un preset donné
// Retourne: {name, score, installed, bank?, slot?, replaceBank?, replaceSlot?, replaceName?, replaceScore?, upgrade?}
// upgrade = {name, score, installed, bank?, slot?} si un meilleur preset est disponible
function getInstallRec(presetName, gType, banks){
  if(!presetName) return null;
  const score=presetScore(presetName,gType);
  const found=findInBanks(presetName,banks);
  if(found){
    const upgrade=findUpgrade(presetName,gType,banks);
    return {name:presetName,score,installed:true,bank:found.bank,slot:found.slot,upgrade};
  }
  const ws=worstSlot(banks,gType,[presetName]);
  return {name:presetName,score,installed:false,replaceBank:ws.bank,replaceSlot:ws.slot,replaceName:ws.name,replaceScore:ws.score};
}

// ─── Export/Import CSV ────────────────────────────────────────────────────────
function generateCSV(banks, deviceName) {
  const rows=[["Pédale","Bank","Catégorie","Slot","Type","Preset"]];
  Object.entries(banks).sort((a,b)=>Number(a[0])-Number(b[0])).forEach(([k,v])=>{
    ["A","B","C"].forEach(c=>{rows.push([deviceName,k,v.cat,c,CL[c],v[c]||""]);});
  });
  return rows.map(r=>r.map(cell=>`"${String(cell).replace(/"/g,'""')}"`).join(",")).join("\n");
}
function downloadFile(content,filename,type="text/csv;charset=utf-8;") {
  try {
    const bom = type.includes("csv") ? "\uFEFF" : "";
    const blob=new Blob([bom+content],{type});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  } catch(e){console.error(e);}
}
function parseCSV(text) {
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2) return null;
  const sep=lines[0].includes(";")?";":",";
  const parseLine=line=>{
    const res=[];let cur="",inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(ch===sep&&!inQ){res.push(cur.trim());cur="";}else cur+=ch;
    }
    res.push(cur.trim());return res;
  };
  const header=parseLine(lines[0]).map(h=>h.toLowerCase().replace(/["""]/g,"").trim());
  const iDevice=header.findIndex(h=>h.includes("pédale")||h.includes("pedale"));
  const iBank=header.findIndex(h=>h==="bank"||h.includes("bank"));
  const iCat=header.findIndex(h=>h.includes("catég")||h.includes("categ")||h.includes("cat"));
  const iSlot=header.findIndex(h=>h==="slot");
  const iPreset=header.findIndex(h=>h==="preset");
  const iA=header.findIndex(h=>h.startsWith("preset a"));
  const iB=header.findIndex(h=>h.startsWith("preset b"));
  const iC=header.findIndex(h=>h.startsWith("preset c"));
  const isWide=iA>=0&&iB>=0&&iC>=0;
  if(iBank===-1) return null;
  if(!isWide&&(iSlot===-1||iPreset===-1)) return null;
  const ann={},plug={};
  for(let i=1;i<lines.length;i++){
    const cols=parseLine(lines[i]);if(cols.length<2)continue;
    const bank=parseInt(cols[iBank]);if(isNaN(bank))continue;
    const cat=iCat>=0?cols[iCat]||"":"";
    const device=(iDevice>=0?cols[iDevice]||"":"").toLowerCase();
    const target=device.includes("plug")?plug:ann;
    if(isWide){
      const pA=iA>=0?cols[iA]||"":"",pB=iB>=0?cols[iB]||"":"",pC=iC>=0?cols[iC]||"":"";
      if(!target[bank])target[bank]={cat,A:"",B:"",C:""};
      if(cat)target[bank].cat=cat;if(pA)target[bank].A=pA;if(pB)target[bank].B=pB;if(pC)target[bank].C=pC;
    } else {
      const slot=(cols[iSlot]||"").toUpperCase(),preset=cols[iPreset]||"";
      if(!["A","B","C"].includes(slot))continue;
      if(!target[bank])target[bank]={cat,A:"",B:"",C:""};
      if(cat&&!target[bank].cat)target[bank].cat=cat;
      target[bank][slot]=preset;
    }
  }
  return {ann,plug};
}

function PBlock({device,emoji,presetName,gType,banks,adapted,gs,bg2,availableSources}) {
  const rec=presetName&&gType?getInstallRec(presetName,gType,banks||{}):null;
  const sc=rec?.score;
  const scC=sc!=null?scoreColor(sc):"#888";
  const scB=sc!=null?scoreBg(sc):"transparent";
  const badge=srcBadge(presetName);
  const up=rec?.upgrade; // upgrade suggestion si score < 80%
  const entry=findCatalogEntry(presetName);

            {!up.installed&&(()=>{const ws=worstSlot(banks,gType,[presetName,up.name]);return ws.bank!=null&&<div style={{fontSize:10,color:"var(--text-muted)",marginTop:2}}>→ Remplace Banque {ws.bank}{ws.slot}</div>;})()}
          </div>
        )}
      </>:<div style={{fontSize:12,color:"var(--text-muted)"}}>Sélectionne une guitare.</div>}
    </div>
  );
}

// ─── fetchAI (helper partagé) ─────────────────────────────────────────────────
function fetchAI(song,gId,banksAnn,banksPlug,aiProvider,aiKeys,guitars){
  guitars=guitars||GUITARS;
  const g=guitars.find(x=>x.id===gId);
  const annCtx=Object.entries(banksAnn).map(([k,v])=>`Banque ${k}: A=${v.A} | B=${v.B} | C=${v.C}`).join("\n");
  const plugCtx=Object.entries(banksPlug).map(([k,v])=>`Banque ${k}: A=${v.A} | B=${v.B} | C=${v.C}`).join("\n");
  const glist=guitars.map(x=>`${x.name} (${x.type})`).join(", ");
  const prompt=`Expert guitare ToneX. Réponds TOUJOURS en français, toutes tes réponses doivent être rédigées en français.\nPédale:\n${annCtx}\nPlug:\n${plugCtx}\nMorceau: "${song.title}" de "${song.artist}".\nGuitare: ${g?g.name+" ("+g.type+")":"non précisée"}.\nGuitares disponibles: ${glist}.\nJSON sans markdown (tous les textes en français):\n{"ideal_guitar":"nom complet de la guitare idéale","guitar_reason":"1-2 phrases en français expliquant le choix","preset_ann":{"bank":0,"col":"A","label":"nom exact du preset Pédale"},"preset_plug":{"bank":1,"col":"A","label":"nom exact du preset Plug"},"settings_preset":"conseils de réglage preset en français","settings_guitar":"conseils de jeu guitare en français","ref_guitarist":"nom du guitariste principal sur l'enregistrement original","ref_guitar":"guitare(s) utilisée(s) sur l'enregistrement original (modèle précis)","ref_amp":"ampli(s) utilisé(s) sur l'enregistrement original (modèle précis)","ref_effects":"effets utilisés sur l'enregistrement (ou 'Aucun effet' si signal direct)"}`;
  const key=aiKeys.gemini||aiKeys.anthropic;
  const provider=aiKeys.gemini?"gemini":"anthropic";
  if(!key) return Promise.reject(new Error("Clé API manquante — configure-la dans ⚙️ Paramètres."));
  const parse=t=>JSON.parse(t.replace(/```json|```/g,"").trim());
  if(provider==="gemini"){
    return fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})})
      .then(r=>r.json()).then(d=>{if(d.error)throw new Error(d.error.message||d.error.status);return parse(d.candidates?.[0]?.content?.parts?.[0]?.text||"");});
  } else {
    return fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:600,messages:[{role:"user",content:prompt}]})})
      .then(r=>r.json()).then(d=>{if(d.error)throw new Error(d.error.message||d.error.type);return parse(d.content?.map(i=>i.text||"").join("")||"");});
  }
}

function AICard({song,gId,onResult,banksAnn,banksPlug,aiProvider,aiKeys,onCacheResult,guitars}) {
  const [res,setRes]=useState(null);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState(null);
  useEffect(()=>{
    // Cache valide pour cette guitare → pas d'appel API
    if(song.aiCache&&song.aiCache.gId===gId){
      setRes(song.aiCache.result);onResult(song.aiCache.result);return;
    }
    setRes(null);setErr(null);setLoading(true);
    fetchAI(song,gId,banksAnn,banksPlug,aiProvider,aiKeys,guitars)
      .then(r=>{setRes(r);onResult(r);if(onCacheResult)onCacheResult(gId,r);})
      .catch(e=>setErr(e.message||"Erreur IA"))
      .finally(()=>setLoading(false));
  },[song.id,gId,aiProvider,aiKeys.anthropic,aiKeys.gemini]);
  if(loading) return <div style={{fontSize:12,color:"var(--text-muted)",padding:"8px 0"}}>✨ Analyse IA…</div>;
  if(err) return <div style={{fontSize:12,color:"var(--red)"}}>{err}</div>;
  if(!res) return null;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:9}}>
      <Row icon="🎯"><div><div style={{fontSize:12,color:"var(--purple)",fontWeight:700,marginBottom:2}}>IA : {res.ideal_guitar}</div><div style={{fontSize:11,color:"var(--text-sec)"}}>{res.guitar_reason}</div></div></Row>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        <PBlock device="Pédale" emoji="📦" presetName={res.preset_ann?.label} gType={gId?(guitars||GUITARS).find(x=>x.id===gId)?.type||"HB":null} banks={banksAnn}/>
        <PBlock device="ToneX Plug" emoji="🔌" presetName={res.preset_plug?.label} gType={gId?(guitars||GUITARS).find(x=>x.id===gId)?.type||"HB":null} banks={banksPlug} bg2="rgba(99,102,241,0.06)"/>
      </div>
      <Row icon="🎛️"><div style={{display:"flex",flexDirection:"column",gap:4}}>
        {res.settings_preset&&<div style={{fontSize:11,background:"rgba(251,191,36,0.07)",border:"1px solid var(--yellow-border)",borderRadius:7,padding:"6px 10px",color:"var(--yellow)"}}><b style={{color:"var(--yellow)"}}>Preset · </b>{res.settings_preset}</div>}
        {res.settings_guitar&&<div style={{fontSize:11,background:"rgba(34,197,94,0.07)",border:"1px solid rgba(34,197,94,0.15)",borderRadius:7,padding:"6px 10px",color:"var(--green)"}}><b style={{color:"var(--green)"}}>Guitare · </b>{res.settings_guitar}</div>}
      </div></Row>
      {res.ref_guitarist&&<Row icon="📖"><div style={{background:"var(--a3)",border:"1px solid var(--a7)",borderRadius:9,padding:"9px 12px",flex:1}}>
        <div style={{fontSize:10,color:"var(--text-muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Référence originale — {res.ref_guitarist}</div>
        <div style={{display:"flex",flexDirection:"column",gap:3}}>
          <div style={{display:"flex",gap:5,alignItems:"baseline",flexWrap:"wrap"}}><span style={{fontSize:10,color:"var(--text-muted)",flexShrink:0}}>🎸 Guitare</span><span style={{fontSize:11,color:"var(--text-bright)",fontWeight:500}}>{res.ref_guitar}</span></div>
          <div style={{display:"flex",gap:5,alignItems:"baseline",flexWrap:"wrap"}}><span style={{fontSize:10,color:"var(--text-muted)",flexShrink:0}}>🔊 Ampli</span><span style={{fontSize:11,color:"var(--text-bright)",fontWeight:500}}>{res.ref_amp}</span></div>
          {res.ref_effects&&<div style={{display:"flex",gap:5,alignItems:"baseline",flexWrap:"wrap"}}><span style={{fontSize:10,color:"var(--text-muted)",flexShrink:0}}>🎚 Effets</span><span style={{fontSize:11,color:"var(--text-sec)"}}>{res.ref_effects}</span></div>}
        </div>
      </div></Row>}
    </div>
  );
}

// ─── Export/Import Screen ─────────────────────────────────────────────────────
function ExportImportScreen({banksAnn,onBanksAnn,banksPlug,onBanksPlug,onBack,onNavigate,fullState,onImportState}) {
  const [exported,setExported]=useState(null);
  const [importData,setImportData]=useState(null);
  const [importErr,setImportErr]=useState(null);
  const [importMode,setImportMode]=useState("merge");
  const [toast,setToast]=useState(null);
  const csvRef=useRef(null);
  const jsonRef=useRef(null);
  const flash=msg=>{setToast(msg);setTimeout(()=>setToast(null),2500);};

  const doExportCSV=(banks,name,key)=>{try{downloadFile(generateCSV(banks,name),`ToneX_${key}.csv`);setExported(key);setTimeout(()=>setExported(null),2000);}catch(e){}};
  const doExportAll=()=>{try{const c1=generateCSV(banksAnn,"ToneX Anniversary");const c2=generateCSV(banksPlug,"ToneX Plug").split("\n").slice(1).join("\n");downloadFile(c1+"\n"+c2,"ToneX_Tous_Presets.csv");setExported("all");setTimeout(()=>setExported(null),2000);}catch(e){}};
  const doExportJSON=()=>{exportJSON(fullState);flash("Sauvegarde JSON exportée ✅");};

  const handleCSVFile=e=>{
    const file=e.target.files[0];if(!file)return;setImportErr(null);
    const reader=new FileReader();
    reader.onload=ev=>{try{const p=parseCSV(ev.target.result);if(!p){setImportErr("Format non reconnu.");return;}setImportData(p);}catch(err){setImportErr("Erreur : "+err.message);}};
    reader.readAsText(file,"UTF-8");e.target.value="";
  };
  const handleJSONFile=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        onImportState(data);
        flash("Import JSON réussi ✅");
      }catch(err){setImportErr("Fichier JSON invalide.");}
    };
    reader.readAsText(file,"UTF-8");e.target.value="";
  };
  const confirmCSV=()=>{
    if(!importData)return;
    if(importMode==="replace"){if(Object.keys(importData.ann).length>0)onBanksAnn(importData.ann);if(Object.keys(importData.plug).length>0)onBanksPlug(importData.plug);}
    else{if(Object.keys(importData.ann).length>0)onBanksAnn(p=>({...p,...importData.ann}));if(Object.keys(importData.plug).length>0)onBanksPlug(p=>({...p,...importData.plug}));}
    setImportData(null);flash("Import CSV réussi ✅");
  };

  const xBtn=(onClick,key,label,color)=>(
    <button onClick={onClick} style={{background:exported===key?"rgba(74,222,128,0.2)":color,border:"none",color:"var(--text)",borderRadius:9,padding:"10px 16px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
      {exported===key?"✅ OK":label}
    </button>
  );
  const th={padding:"7px 10px",textAlign:"left",fontSize:11,fontWeight:700,textTransform:"uppercase",borderBottom:"2px solid var(--a10)",color:"var(--text-sec)"};
  const td={padding:"6px 10px",fontSize:11,borderBottom:"1px solid var(--a5)",verticalAlign:"middle"};

  return (
    <div>
      {toast&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:"#16a34a",color:"var(--text)",borderRadius:10,padding:"10px 22px",fontSize:13,fontWeight:700,zIndex:999}}>✅ {toast}</div>}
      <Breadcrumb crumbs={[{label:"Accueil",screen:"list"},{label:"Paramètres",screen:"settings"},{label:"Import / Export"}]} onNavigate={onNavigate}/>
      <div style={{fontSize:20,fontWeight:800,color:"var(--text)",marginBottom:20}}>📋 Export / Import</div>

      {/* Sauvegarde JSON */}
      <div style={{background:"rgba(74,222,128,0.06)",border:"1px solid rgba(74,222,128,0.2)",borderRadius:12,padding:16,marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:700,color:"var(--green)",marginBottom:10,textTransform:"uppercase",letterSpacing:0.5}}>💾 Sauvegarde complète (JSON)</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button onClick={doExportJSON} style={{background:"#16a34a",border:"none",color:"var(--text)",borderRadius:9,padding:"10px 16px",fontSize:13,fontWeight:700,cursor:"pointer"}}>⬇ Exporter JSON</button>
          <button onClick={()=>jsonRef.current?.click()} style={{background:"rgba(74,222,128,0.15)",border:"1px solid rgba(74,222,128,0.35)",color:"var(--green)",borderRadius:9,padding:"10px 16px",fontSize:13,fontWeight:700,cursor:"pointer"}}>📂 Importer JSON</button>
          <input ref={jsonRef} type="file" accept=".json" onChange={handleJSONFile} style={{display:"none"}}/>
        </div>
        <div style={{fontSize:11,color:"var(--text-muted)",marginTop:8}}>Sauvegarde complète : setlists, morceaux, presets, banks. Parfait pour sauvegarder ou transférer entre appareils.</div>
      </div>

      {/* Export CSV */}
      <div style={{background:"var(--a3)",border:"1px solid var(--a7)",borderRadius:12,padding:16,marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:700,color:"var(--text-sec)",marginBottom:12,textTransform:"uppercase",letterSpacing:0.5}}>Export CSV (Banks)</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {xBtn(()=>doExportCSV(banksAnn,"ToneX Anniversary","Anniversary"),"Anniversary","⬇ Anniversary","#3b82f6")}
          {xBtn(()=>doExportCSV(banksPlug,"ToneX Plug","Plug"),"Plug","⬇ Plug","var(--accent)")}
          {xBtn(doExportAll,"all","⬇ Les deux","#0f766e")}
        </div>
      </div>

      {/* Import CSV */}
      <div style={{background:"var(--a3)",border:"1px solid var(--a7)",borderRadius:12,padding:16,marginBottom:16}}>
        <div style={{fontSize:12,fontWeight:700,color:"var(--text-sec)",marginBottom:12,textTransform:"uppercase",letterSpacing:0.5}}>Import CSV (Banks)</div>
        <button onClick={()=>csvRef.current?.click()} style={{background:"var(--yellow-bg)",border:"1px solid rgba(251,191,36,0.35)",color:"var(--yellow)",borderRadius:9,padding:"10px 16px",fontSize:13,fontWeight:700,cursor:"pointer",marginBottom:8}}>📂 Charger CSV</button>
        <input ref={csvRef} type="file" accept=".csv,.txt" onChange={handleCSVFile} style={{display:"none"}}/>
        {importErr&&<div style={{marginTop:8,fontSize:12,color:"var(--red)",background:"rgba(239,68,68,0.1)",borderRadius:8,padding:"8px 12px"}}>{importErr}</div>}
        {importData&&<div style={{marginTop:14,background:"rgba(99,102,241,0.1)",border:"1px solid var(--accent-border)",borderRadius:10,padding:14}}>
          <div style={{fontSize:13,fontWeight:700,color:"var(--accent)",marginBottom:10}}>Aperçu</div>
          <div style={{display:"flex",gap:10,marginBottom:12,flexWrap:"wrap"}}>
            {Object.keys(importData.ann).length>0&&<div style={{background:"rgba(59,130,246,0.1)",border:"1px solid rgba(59,130,246,0.3)",borderRadius:7,padding:"6px 12px"}}><div style={{fontSize:12,color:"var(--blue)",fontWeight:700}}>📦 Pédale</div><div style={{fontSize:11,color:"var(--text-muted)"}}>{Object.keys(importData.ann).length} banks</div></div>}
            {Object.keys(importData.plug).length>0&&<div style={{background:"rgba(99,102,241,0.1)",border:"1px solid var(--accent-border)",borderRadius:7,padding:"6px 12px"}}><div style={{fontSize:12,color:"var(--accent)",fontWeight:700}}>🔌 Plug</div><div style={{fontSize:11,color:"var(--text-muted)"}}>{Object.keys(importData.plug).length} banks</div></div>}
          </div>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            {[{v:"replace",l:"🔄 Remplacer"},{v:"merge",l:"🔀 Fusionner"}].map(({v,l})=>(
              <button key={v} onClick={()=>setImportMode(v)} style={{flex:1,background:importMode===v?"var(--accent-bg)":"var(--a5)",border:importMode===v?"1px solid rgba(99,102,241,0.6)":"1px solid var(--a10)",color:importMode===v?"var(--accent)":"var(--text-sec)",borderRadius:8,padding:"8px",fontSize:12,fontWeight:600,cursor:"pointer"}}>{l}</button>
            ))}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setImportData(null)} style={{flex:1,background:"var(--a7)",border:"1px solid var(--a10)",color:"var(--text-sec)",borderRadius:8,padding:"9px",fontSize:12,fontWeight:600,cursor:"pointer"}}>Annuler</button>
            <button onClick={confirmCSV} style={{flex:2,background:"#4f46e5",border:"none",color:"var(--text)",borderRadius:8,padding:"9px",fontSize:13,fontWeight:700,cursor:"pointer"}}>✅ Importer</button>
          </div>
        </div>}
      </div>

      {/* Tableaux banks */}
      {[{banks:banksAnn,label:"ToneX Anniversary",color:"#3b82f6"},{banks:banksPlug,label:"ToneX Plug",color:"var(--accent)"}].map(({banks,label,color})=>(
        <div key={label} style={{marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}><div style={{width:4,height:18,background:color,borderRadius:2}}/><div style={{fontSize:13,fontWeight:700,color:"var(--text)"}}>{label}</div><div style={{fontSize:11,color:"var(--text-muted)"}}>{Object.keys(banks).length} banks</div></div>
          <div style={{overflowX:"auto",borderRadius:10,border:"1px solid var(--a8)"}}>
            <table>
              <thead><tr style={{background:"var(--a4)"}}><th style={{...th,width:45}}>Bank</th><th style={th}>Catégorie</th>{["A","B","C"].map(c=><th key={c} style={{...th,color:CC[c]}}>{c} — {CL[c]}</th>)}</tr></thead>
              <tbody>
                {Object.entries(banks).sort((a,b)=>Number(a[0])-Number(b[0])).map(([k,v],i)=>(

                    {["A","B","C"].map(c=><td key={c} style={td}><span style={{color:"var(--text-bright)"}}>{v[c]}</span></td>)}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      ))}
    </div>
  );
}

function PresetSearchModal({onSelect,onClose}){

    const cat={...PRESET_CATALOG,...PRESET_CATALOG_FULL,...ANNIVERSARY_CATALOG,...FACTORY_CATALOG,...PLUG_FACTORY_CATALOG};
    return Object.entries(cat).sort((a,b)=>a[0].localeCompare(b[0]));
  },[]);
  const results=useMemo(()=>{
    if(!q.trim()) return allPresets.slice(0,30);
    const lq=q.toLowerCase();
    return allPresets.filter(([n,info])=>n.toLowerCase().includes(lq)||info.amp.toLowerCase().includes(lq)).slice(0,30);
  },[q]);
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>

          {results.map(([name,info])=>(
            <button key={name} onClick={()=>onSelect(name)} style={{display:"block",width:"100%",textAlign:"left",background:"var(--a3)",border:"1px solid var(--a6)",borderRadius:7,padding:"8px 10px",marginBottom:3,cursor:"pointer"}}>
              <div style={{fontSize:12,fontWeight:600,color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name}</div>
              <div style={{fontSize:10,color:"var(--text-muted)"}}>{info.amp} · {SOURCE_LABELS[info.src]||info.src}</div>
            </button>

          {results.length===0&&<div style={{fontSize:12,color:"var(--text-dim)",textAlign:"center",padding:16}}>Aucun preset trouvé</div>}
        </div>

    </div>
  );
}

function BankEditor({banks,onBanks,color,maxBanks,startBank,factoryBanks}) {
  const start=startBank||0;
  const max=maxBanks||50;
  const [confirmReset,setConfirmReset]=useState(false);
  const [selectedPreset,setSelectedPreset]=useState(null); // {bank,slot,name}
  const [editingPreset,setEditingPreset]=useState(null); // {bank,slot} — search mode

          <div style={{display:"flex",gap:8}}>

          </div>

              </div>

                <button onClick={()=>{setCustomInput({bank:k,slot:selectedPreset.slot});setSelectedPreset(null);}} style={{background:"var(--a7)",border:"none",color:"var(--text-sec)",borderRadius:6,padding:"5px 10px",fontSize:11,cursor:"pointer"}}>Saisie manuelle</button>
                <button onClick={()=>setSelectedPreset(null)} style={{background:"var(--a7)",border:"none",color:"var(--text-sec)",borderRadius:6,padding:"5px 10px",fontSize:11,cursor:"pointer"}}>Fermer</button>
              </div>
            </div>}
          </div>}
          {/* Custom input for manual entry */}
          {customInput&&customInput.bank===k&&<div style={{marginTop:6,display:"flex",gap:6,alignItems:"center"}}>
            <span style={{fontSize:10,fontWeight:700,color:CC[customInput.slot]}}>{customInput.slot}</span>
            <input autoFocus value={v[customInput.slot]||""} onChange={e=>edit(k,customInput.slot,e.target.value)} style={{...inp,flex:1}} placeholder="Nom du preset custom"/>
            <button onClick={()=>setCustomInput(null)} style={{background:"var(--accent)",border:"none",color:"#fff",borderRadius:5,padding:"4px 10px",fontSize:10,fontWeight:700,cursor:"pointer"}}>OK</button>
          </div>}
        </div>;
      })}
    </div>
  );
}

// ─── Profile Selector ─────────────────────────────────────────────────────────
function ProfileSelector({profiles,activeProfileId,onSwitch,onSettings}){
  const [open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    if(!open)return;
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("click",h,true);
    return ()=>document.removeEventListener("click",h,true);
  },[open]);
  const active=profiles[activeProfileId];
  const color=profileColor(activeProfileId);
  return(
    <div ref={ref} style={{position:"relative"}}>
      <button onClick={()=>setOpen(!open)} style={{background:color,border:"none",color:"#fff",borderRadius:"50%",width:34,height:34,fontSize:15,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
        {(active?.name||"?")[0].toUpperCase()}
      </button>
      {open&&<div style={{position:"absolute",top:40,left:0,background:"var(--bg-card)",border:"1px solid var(--a12)",borderRadius:12,padding:8,zIndex:50,minWidth:180,boxShadow:"0 8px 24px rgba(0,0,0,0.3)"}}>
        {Object.values(profiles).map(p=>{
          const isActive=p.id===activeProfileId;
          const c=profileColor(p.id);
          return <button key={p.id} onClick={()=>{onSwitch(p.id);setOpen(false);}} style={{display:"flex",alignItems:"center",gap:10,width:"100%",background:isActive?"var(--a7)":"transparent",border:"none",borderRadius:8,padding:"8px 10px",cursor:"pointer",marginBottom:2}}>
            <div style={{background:c,color:"#fff",borderRadius:"50%",width:26,height:26,fontSize:12,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{p.name[0].toUpperCase()}</div>
            <span style={{fontSize:13,color:isActive?"var(--text)":"var(--text-sec)",fontWeight:isActive?700:400}}>{p.name}</span>
            {isActive&&<span style={{marginLeft:"auto",fontSize:11,color:"var(--green)"}}>✓</span>}
          </button>;
        })}
        <div style={{borderTop:"1px solid var(--a8)",marginTop:4,paddingTop:4}}>
          <button onClick={()=>{onSettings();setOpen(false);}} style={{display:"flex",alignItems:"center",gap:8,width:"100%",background:"transparent",border:"none",borderRadius:8,padding:"8px 10px",cursor:"pointer",color:"var(--accent)",fontSize:12,fontWeight:600}}>
            + Gérer les profils
          </button>
        </div>
      </div>}
    </div>
  );
}

// ─── Profile Tab ──────────────────────────────────────────────────────────────
const PROFILE_COLORS=["var(--accent)","#f59e0b","#10b981","#ef4444","#8b5cf6","#ec4899"];
function profileColor(id){
  let h=0;for(let i=0;i<id.length;i++)h=id.charCodeAt(i)+((h<<5)-h);
  return PROFILE_COLORS[Math.abs(h)%PROFILE_COLORS.length];
}

const SOURCE_LABELS={TSR:"64 Studio Rats",ML:"ML Sound Lab Essentials",Anniversary:"ToneX Anniversary Factory",Factory:"ToneX Factory",PlugFactory:"ToneX Plug Factory"};

function ProfileTab({profile,profiles,onProfiles,activeProfileId,inp,section}){
  const [editName,setEditName]=useState(profile.name);
  const [newProfileName,setNewProfileName]=useState("");
  const [newGuitarName,setNewGuitarName]=useState("");
  const [newGuitarShort,setNewGuitarShort]=useState("");
  const [newGuitarType,setNewGuitarType]=useState("HB");
  const [confirmDelete,setConfirmDelete]=useState(false);
  const [editingGuitarId,setEditingGuitarId]=useState(null);
  const [editGName,setEditGName]=useState("");
  const [editGShort,setEditGShort]=useState("");
  const [editGType,setEditGType]=useState("HB");

  const updateProfile=(field,value)=>onProfiles(p=>({...p,[activeProfileId]:{...p[activeProfileId],[field]:typeof value==="function"?value(p[activeProfileId][field]):value}}));

  const toggleGuitar=id=>{
    updateProfile("myGuitars",prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);
  };
  const toggleSource=key=>{
    updateProfile("availableSources",prev=>({...prev,[key]:!prev[key]}));
  };
  const addCustomGuitar=()=>{
    if(!newGuitarName.trim()||!newGuitarShort.trim())return;
    const cg={id:`cg_${Date.now()}`,name:newGuitarName.trim(),short:newGuitarShort.trim(),type:newGuitarType};
    updateProfile("customGuitars",prev=>[...(prev||[]),cg]);
    setNewGuitarName("");setNewGuitarShort("");setNewGuitarType("HB");
  };
  const removeCustomGuitar=id=>{
    updateProfile("customGuitars",prev=>(prev||[]).filter(g=>g.id!==id));
  };
  const startEditGuitar=(g,isCustom)=>{
    const edits=profile.editedGuitars||{};
    const orig=isCustom?g:({...GUITARS.find(x=>x.id===g.id),...(edits[g.id]||{})});
    setEditingGuitarId(g.id);setEditGName(orig.name);setEditGShort(orig.short);setEditGType(orig.type);
  };
  const saveEditGuitar=()=>{
    if(!editGName.trim()||!editGShort.trim()){setEditingGuitarId(null);return;}
    const isCustom=editingGuitarId?.startsWith("cg_");
    if(isCustom){
      updateProfile("customGuitars",prev=>(prev||[]).map(g=>g.id===editingGuitarId?{...g,name:editGName.trim(),short:editGShort.trim(),type:editGType}:g));
    } else {
      updateProfile("editedGuitars",prev=>({...(prev||{}), [editingGuitarId]:{name:editGName.trim(),short:editGShort.trim(),type:editGType}}));
    }
    setEditingGuitarId(null);
  };
  const resetGuitar=id=>{
    updateProfile("editedGuitars",prev=>{const n={...(prev||{})};delete n[id];return n;});
    setEditingGuitarId(null);
  };
  const [adminPin,setAdminPin]=useState("");
  const [adminPinErr,setAdminPinErr]=useState(false);
  const createProfile=()=>{
    if(!newProfileName.trim())return;
    if(adminPin!==ADMIN_PIN){setAdminPinErr(true);return;}
    setAdminPinErr(false);
    const id=newProfileName.trim().toLowerCase().replace(/[^a-z0-9]/g,"_")+`_${Date.now()}`;
    onProfiles(p=>({...p,[id]:makeDefaultProfile(id,newProfileName.trim())}));
    setNewProfileName("");setAdminPin("");
  };
  const deleteProfile=()=>{
    if(Object.keys(profiles).length<=1)return;
    const remaining={...profiles};delete remaining[activeProfileId];
    onProfiles(remaining);
    setConfirmDelete(false);
  };
  const saveName=()=>{
    if(!editName.trim())return;
    updateProfile("name",editName.trim());
  };

  const s=section||"guitars";
  return (
    <div>
      {/* Nom du profil */}
      {s==="guitars"&&<div style={{background:"var(--a4)",border:"1px solid var(--a8)",borderRadius:12,padding:16,marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:700,color:"var(--text)",marginBottom:10}}>Nom du profil</div>
        <div style={{display:"flex",gap:8}}>
          <input value={editName} onChange={e=>setEditName(e.target.value)} onBlur={saveName} onKeyDown={e=>e.key==="Enter"&&saveName()} style={{...inp,flex:1}}/>
          <button onClick={saveName} style={{background:"#4f46e5",border:"none",color:"#fff",borderRadius:7,padding:"6px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>OK</button>
        </div>
        {Object.keys(profiles).length>1&&<div style={{marginTop:12}}>
          {!confirmDelete?<button onClick={()=>setConfirmDelete(true)} style={{background:"rgba(239,68,68,0.1)",border:"1px solid var(--red-border)",color:"var(--red)",borderRadius:8,padding:"6px 14px",fontSize:12,cursor:"pointer"}}>Supprimer ce profil</button>
          :<div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:12,color:"var(--red)"}}>Confirmer ?</span><button onClick={deleteProfile} style={{background:"#ef4444",border:"none",color:"#fff",borderRadius:6,padding:"5px 12px",fontSize:11,fontWeight:700,cursor:"pointer"}}>Oui, supprimer</button><button onClick={()=>setConfirmDelete(false)} style={{background:"var(--a7)",border:"none",color:"var(--text-sec)",borderRadius:6,padding:"5px 10px",fontSize:11,cursor:"pointer"}}>Annuler</button></div>}
        </div>}
      </div>}

      {/* Mes guitares */}
      {s==="guitars"&&<div style={{background:"var(--a4)",border:"1px solid var(--a8)",borderRadius:12,padding:16,marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:700,color:"var(--text)",marginBottom:4}}>Mes guitares</div>
        <div style={{fontSize:11,color:"var(--text-muted)",marginBottom:12}}>Coche les guitares que tu possèdes.</div>
        <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:12}}>
          {GUITAR_BRANDS.map(brand=><div key={brand}>
            <div style={{fontSize:11,fontWeight:700,color:"var(--text-sec)",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6,paddingLeft:2}}>{brand}</div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {GUITARS.filter(g=>g.brand===brand).map(g=>{
              const sel=profile.myGuitars.includes(g.id);
              const edits=profile.editedGuitars||{};
              const display={...g,...(edits[g.id]||{})};
              const isEdited=!!edits[g.id];
              const isEditing=editingGuitarId===g.id;
              return <div key={g.id}>
                <div style={{display:"flex",alignItems:"center",gap:8,background:sel?"rgba(99,102,241,0.1)":"var(--a3)",border:sel?"1px solid var(--accent-border)":"1px solid var(--a6)",borderRadius:8,padding:"8px 12px",cursor:"pointer"}} onClick={()=>toggleGuitar(g.id)}>
                  <div style={{width:18,height:18,borderRadius:5,border:sel?"2px solid #6366f1":"2px solid var(--text-muted)",background:sel?"var(--accent)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{sel&&<span style={{color:"#fff",fontSize:10,fontWeight:900}}>✓</span>}</div>
                  <div style={{flex:1}}><span style={{fontSize:12,fontWeight:600,color:sel?"var(--text)":"var(--text-muted)"}}>{display.short}</span><span style={{fontSize:10,color:"var(--text-dim)",marginLeft:6}}>{display.name}</span>{isEdited&&<span style={{fontSize:9,color:"#f59e0b",marginLeft:4}}>modifié</span>}</div>
                  <span style={{fontSize:10,color:"var(--text-dim)",marginRight:4}}>{display.type}</span>
                  {sel&&<button onClick={e=>{e.stopPropagation();startEditGuitar(display,false);}} style={{background:"var(--a7)",border:"none",color:"var(--text-sec)",borderRadius:5,padding:"3px 7px",fontSize:10,cursor:"pointer"}}>✏️</button>}
                </div>
                {isEditing&&<div style={{background:"var(--a5)",borderRadius:"0 0 8px 8px",padding:"10px 12px",marginTop:-1,border:"1px solid var(--a8)",borderTop:"none"}} onClick={e=>e.stopPropagation()}>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6}}>
                    <input placeholder="Nom" value={editGName} onChange={e=>setEditGName(e.target.value)} style={{...inp,flex:"1 1 140px",fontSize:11,padding:"5px 8px"}}/>
                    <input placeholder="Abrégé" value={editGShort} onChange={e=>setEditGShort(e.target.value)} style={{...inp,flex:"0 1 80px",fontSize:11,padding:"5px 8px"}}/>
                    <select value={editGType} onChange={e=>setEditGType(e.target.value)} style={{...inp,flex:"0 0 55px",fontSize:11,padding:"5px 4px"}}><option value="HB">HB</option><option value="SC">SC</option><option value="P90">P90</option></select>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={saveEditGuitar} style={{background:"#4f46e5",border:"none",color:"#fff",borderRadius:6,padding:"5px 12px",fontSize:11,fontWeight:700,cursor:"pointer"}}>Sauver</button>
                    {isEdited&&<button onClick={()=>resetGuitar(g.id)} style={{background:"var(--yellow-bg)",border:"1px solid var(--yellow-border)",color:"var(--yellow)",borderRadius:6,padding:"5px 10px",fontSize:11,cursor:"pointer"}}>Réinitialiser</button>}
                    <button onClick={()=>setEditingGuitarId(null)} style={{background:"var(--a7)",border:"none",color:"var(--text-sec)",borderRadius:6,padding:"5px 10px",fontSize:11,cursor:"pointer"}}>Annuler</button>
                  </div>
                </div>}
              </div>;
            })}
            </div>
          </div>)}
        </div>
        {(profile.customGuitars||[]).length>0&&<div style={{marginBottom:12}}>
          <div style={{fontSize:11,color:"var(--text-muted)",fontWeight:600,marginBottom:6}}>Guitares custom</div>
          {profile.customGuitars.map(g=>{
            const isEditing=editingGuitarId===g.id;
            return <div key={g.id}>
              <div style={{display:"flex",alignItems:"center",gap:8,background:"var(--a3)",borderRadius:isEditing?"7px 7px 0 0":7,padding:"5px 10px",marginBottom:isEditing?0:4}}>

          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>

            <input placeholder="Abrégé" value={newGuitarShort} onChange={e=>setNewGuitarShort(e.target.value)} style={{...inp,flex:"0 1 80px",fontSize:11,padding:"5px 8px"}}/>

        <div style={{display:"flex",flexDirection:"column",gap:6}}>

    </div>

// ─── Packs Tab ────────────────────────────────────────────────────────────────
function PacksTab({profile,onProfiles,activeProfileId,aiProvider,aiKeys}){
  const [packName,setPackName]=useState("");
  const [file,setFile]=useState(null);
  const [filePreview,setFilePreview]=useState(null);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState(null);
  const fileRef=useRef(null);

  const updateProfile=(field,value)=>onProfiles(p=>({...p,[activeProfileId]:{...p[activeProfileId],[field]:typeof value==="function"?value(p[activeProfileId][field]):value}}));

  const handleFile=e=>{
    const f=e.target.files?.[0];
    if(!f)return;
    setFile(f);setErr(null);
    const reader=new FileReader();
    reader.onload=ev=>{setFilePreview(ev.target.result);};
    reader.readAsDataURL(f);
  };

  const extractPresets=()=>{
    if(!packName.trim()||!filePreview)return;
    const key=aiKeys?.gemini||aiKeys?.anthropic;
    const provider=aiKeys?.gemini?"gemini":"anthropic";
    if(!key){setErr("Clé API manquante — configure-la dans ⚙️ Paramètres.");return;}
    setLoading(true);setErr(null);
    const prompt=`Analyse cette image/document d'un pack de presets pour guitare ToneX appelé "${packName.trim()}".
Extrais TOUS les noms de presets visibles et pour chacun déduis :
- amp : le modèle d'ampli simulé (nom générique, ex: "Marshall JCM800", "Fender Twin Reverb")
- gain : "low", "mid" ou "high"
- style : "blues", "rock", "hard_rock", "jazz", "pop" ou "metal"
- scores : compatibilité par type de micro {HB: 50-97, SC: 50-97, P90: 50-97}

Pour chaque ampli UNIQUE trouvé, génère aussi une fiche descriptive :
- emoji : un emoji représentatif
- refs : artistes et morceaux associés [{a:"Artiste",t:["Morceau 1","Morceau 2"]}]
- desc : description courte en français de l'ampli (2-3 phrases)

Réponds UNIQUEMENT en JSON (sans markdown) :
{"presets":[{"name":"...","amp":"...","gain":"...","style":"...","scores":{"HB":85,"SC":70,"P90":78}},...],
"ampContext":{"Nom Ampli":{"emoji":"🎸","refs":[{"a":"Artiste","t":["Morceau"]}],"desc":"Description..."},...}}`;
    const base64=filePreview.split(",")[1];
    const mimeType=filePreview.split(";")[0].split(":")[1];
    if(provider==="gemini"){
      fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({contents:[{parts:[{inlineData:{mimeType,data:base64}},{text:prompt}]}]})
      }).then(r=>r.json()).then(d=>{
        if(d.error)throw new Error(d.error.message);
        const txt=d.candidates?.[0]?.content?.parts?.[0]?.text||"";
        const parsed=JSON.parse(txt.replace(/```json|```/g,"").trim());
        savePack(parsed.presets||[],parsed.ampContext||{});
      }).catch(e=>setErr(e.message)).finally(()=>setLoading(false));
    } else {
      fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:4096,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:mimeType,data:base64}},{type:"text",text:prompt}]}]})
      }).then(r=>r.json()).then(d=>{
        if(d.error)throw new Error(d.error.message);
        const txt=d.content?.map(i=>i.text||"").join("")||"";
        const parsed=JSON.parse(txt.replace(/```json|```/g,"").trim());
        savePack(parsed.presets||[],parsed.ampContext||{});
      }).catch(e=>setErr(e.message)).finally(()=>setLoading(false));
    }
  };

  const savePack=(presets,ampContext)=>{
    const pack={id:`pack_${Date.now()}`,name:packName.trim(),presetCount:presets.length,presets:presets.map(p=>({...p,src:packName.trim()})),ampContext:ampContext||{}};
    updateProfile("customPacks",prev=>[...(prev||[]),pack]);
    setPackName("");setFile(null);setFilePreview(null);
    if(fileRef.current)fileRef.current.value="";
  };

  const deletePack=id=>{
    updateProfile("customPacks",prev=>(prev||[]).filter(p=>p.id!==id));
  };

  const packs=profile.customPacks||[];
  const inp={background:"var(--bg-card)",color:"var(--text)",border:"1px solid var(--a15)",borderRadius:7,padding:"6px 10px",fontSize:12,boxSizing:"border-box"};

  return(
    <div>
      <div style={{fontSize:13,color:"var(--text-sec)",marginBottom:16}}>Ajoute des packs de presets en joignant une photo ou un document. L'IA en extraira les presets.</div>

      {/* Packs existants */}
      {packs.length>0&&<div style={{marginBottom:16}}>
        {packs.map(p=>(
          <div key={p.id} style={{background:"var(--a4)",border:"1px solid var(--a8)",borderRadius:10,padding:12,marginBottom:8}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <div style={{flex:1,fontSize:13,fontWeight:700,color:"var(--text)"}}>{p.name}</div>
              <span style={{fontSize:11,color:"var(--text-muted)"}}>{p.presetCount||p.presets?.length||0} presets</span>
              <button onClick={()=>deletePack(p.id)} style={{background:"rgba(239,68,68,0.15)",border:"1px solid var(--red-border)",color:"var(--red)",borderRadius:6,padding:"3px 8px",fontSize:11,cursor:"pointer"}}>Supprimer</button>
            </div>
            {p.presets?.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {p.presets.slice(0,8).map((pr,i)=><span key={i} style={{fontSize:10,background:"var(--a5)",border:"1px solid var(--a8)",borderRadius:4,padding:"2px 6px",color:"var(--text-sec)"}}>{pr.name}</span>)}
              {p.presets.length>8&&<span style={{fontSize:10,color:"var(--text-muted)"}}>+{p.presets.length-8} autres</span>}
            </div>}
          </div>
        ))}
      </div>}

      {/* Ajouter un pack */}
      <div style={{background:"var(--accent-bg)",border:"1px solid rgba(99,102,241,0.2)",borderRadius:12,padding:16}}>
        <div style={{fontSize:13,fontWeight:700,color:"var(--accent)",marginBottom:12}}>+ Nouveau pack</div>
        <input placeholder="Nom du pack (ex: TSR Blues Pack)" value={packName} onChange={e=>setPackName(e.target.value)} style={{...inp,width:"100%",marginBottom:10}}/>
        <div style={{marginBottom:10}}>
          <input ref={fileRef} type="file" accept="image/*,.pdf" onChange={handleFile} style={{fontSize:12,color:"var(--text-sec)"}}/>
        </div>
        {filePreview&&filePreview.startsWith("data:image")&&<div style={{marginBottom:10,borderRadius:8,overflow:"hidden",border:"1px solid var(--a8)"}}>
          <img src={filePreview} style={{width:"100%",maxHeight:200,objectFit:"contain",background:"var(--a3)"}}/>
        </div>}
        {filePreview&&!filePreview.startsWith("data:image")&&<div style={{fontSize:11,color:"var(--text-muted)",marginBottom:10}}>Document joint ({file?.name})</div>}
        {err&&<div style={{fontSize:12,color:"var(--red)",marginBottom:10}}>{err}</div>}
        <button onClick={extractPresets} disabled={!packName.trim()||!filePreview||loading}
          style={{width:"100%",background:packName.trim()&&filePreview&&!loading?"linear-gradient(135deg,#7c3aed,#4f46e5)":"var(--bg-disabled)",border:"none",color:"#fff",borderRadius:10,padding:"12px",fontSize:13,fontWeight:700,cursor:packName.trim()&&filePreview&&!loading?"pointer":"not-allowed"}}>
          {loading?"Extraction IA en cours...":"Extraire les presets avec l'IA"}
        </button>
      </div>
    </div>
  );
}

// ─── Settings ─────────────────────────────────────────────────────────────────
// ─── Mon Profil Screen ────────────────────────────────────────────────────────
function MonProfilScreen({songDb,onSongDb,setlists,allSetlists,onSetlists,banksAnn,onBanksAnn,banksPlug,onBanksPlug,onBack,onNavigate,aiProvider,aiKeys,theme,onTheme,profile,profiles,onProfiles,activeProfileId,allGuitars,initTab}) {
  const [tab,setTab]=useState(initTab||"profile");
  const [newSlName,setNewSlName]=useState("");

  const [editSlName,setEditSlName]=useState("");
  const [newSongTitle,setNewSongTitle]=useState("");

  const [expandedSongId,setExpandedSongId]=useState(null);
  const toggleSongInSetlist=(songId,slId)=>onSetlists(p=>p.map(sl=>sl.id!==slId?sl:{...sl,songIds:sl.songIds.includes(songId)?sl.songIds.filter(x=>x!==songId):[...sl.songIds,songId]}));
  const inp={background:"var(--bg-card)",color:"var(--text)",border:"1px solid var(--a15)",borderRadius:7,padding:"6px 10px",fontSize:12,boxSizing:"border-box"};
  const tabBtn=(id,label)=>(
    <button onClick={()=>setTab(id)} style={{background:tab===id?"var(--accent-bg)":"var(--a5)",border:tab===id?"1px solid rgba(99,102,241,0.5)":"1px solid var(--a8)",color:tab===id?"var(--accent)":"var(--text-sec)",borderRadius:8,padding:"7px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>{label}</button>
  );
  const createSetlist=()=>{if(!newSlName.trim())return;onSetlists(p=>[...p,{id:`sl_${Date.now()}`,name:newSlName.trim(),songIds:[]}]);setNewSlName("");};
  const deleteSetlist=id=>onSetlists(p=>p.filter(s=>s.id!==id));
  const renameSetlist=(id,name)=>onSetlists(p=>p.map(s=>s.id===id?{...s,name}:s));
  const removeSongFromSetlist=(slId,songId)=>onSetlists(p=>p.map(sl=>sl.id===slId?{...sl,songIds:sl.songIds.filter(x=>x!==songId)}:sl));
  const addSongToDb=()=>{
    if(!newSongTitle.trim())return;
    const ns={id:`c_${Date.now()}`,title:newSongTitle.trim(),artist:newSongArtist.trim()||"Artiste inconnu",isCustom:true,ig:[],aiCache:null};
    onSongDb(p=>[...p,ns]);
    if(newSongSlIds.length>0)onSetlists(p=>p.map(sl=>newSongSlIds.includes(sl.id)?{...sl,songIds:[...sl.songIds,ns.id]}:sl));
    fetchAI(ns,"",banksAnn,banksPlug,aiProvider,aiKeys,allGuitars)
      .then(r=>onSongDb(p=>p.map(x=>x.id===ns.id?{...x,aiCache:{gId:"",result:r}}:x)))
      .catch(()=>{});
    setNewSongTitle("");setNewSongArtist("");setNewSongSlIds([]);
  };
  const deleteSongFromDb=id=>{onSongDb(p=>p.filter(s=>s.id!==id));onSetlists(p=>p.map(sl=>({...sl,songIds:sl.songIds.filter(x=>x!==id)})));};
  return (
    <div>
      <Breadcrumb crumbs={[{label:"Accueil",screen:"list"},{label:"Mon profil"}]} onNavigate={onNavigate}/>
      <div style={{fontSize:20,fontWeight:800,color:"var(--text)",marginBottom:16}}>👤 Mon profil</div>
      <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
        {tabBtn("profile","🎸 Guitares")}
        {tabBtn("devices","📱 Matériel")}
        {tabBtn("sources","📦 Sources")}
        {tabBtn("setlists","🎵 Setlists")}
        {tabBtn("songs","🎶 Morceaux")}
        {profile.devices?.pedale&&tabBtn("pedale","🎛 Pédale ToneX")}
        {profile.devices?.anniversary&&tabBtn("ann","🎛 ToneX Ann.")}
        {profile.devices?.plug&&tabBtn("plug","🔌 ToneX Plug")}
        {tabBtn("display","🎨 Affichage")}
      </div>
      {tab==="profile"&&<ProfileTab profile={profile} profiles={profiles} onProfiles={onProfiles} activeProfileId={activeProfileId} inp={inp} section="guitars"/>}
      {tab==="devices"&&<ProfileTab profile={profile} profiles={profiles} onProfiles={onProfiles} activeProfileId={activeProfileId} inp={inp} section="devices"/>}
      {tab==="sources"&&<ProfileTab profile={profile} profiles={profiles} onProfiles={onProfiles} activeProfileId={activeProfileId} inp={inp} section="sources"/>}
      {tab==="setlists"&&<div>
        <div style={{fontSize:13,color:"var(--text-sec)",marginBottom:12}}>{setlists.length} setlist{setlists.length>1?"s":""}</div>

          <div key={sl.id} style={{background:"var(--a4)",border:"1px solid var(--a8)",borderRadius:12,padding:14,marginBottom:12}}>
            {editSlId===sl.id?(
              <div style={{display:"flex",gap:8,marginBottom:10}}>
                <input value={editSlName} onChange={e=>setEditSlName(e.target.value)} style={{...inp,flex:1}} onKeyDown={e=>e.key==="Enter"&&(renameSetlist(sl.id,editSlName),setEditSlId(null))}/>
                <button onClick={()=>{renameSetlist(sl.id,editSlName);setEditSlId(null);}} style={{background:"#4f46e5",border:"none",color:"var(--text)",borderRadius:7,padding:"6px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>OK</button>
                <button onClick={()=>setEditSlId(null)} style={{background:"var(--a7)",border:"none",color:"var(--text-sec)",borderRadius:7,padding:"6px 10px",fontSize:12,cursor:"pointer"}}>✕</button>
              </div>
            ):(
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{flex:1,fontSize:14,fontWeight:700,color:"var(--text)"}}>{sl.name}</div>
                <span style={{fontSize:11,color:"var(--text-muted)"}}>{sl.songIds.length} morceaux</span>

            <input placeholder="Nom de la setlist" value={newSlName} onChange={e=>setNewSlName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&createSetlist()} style={{...inp,flex:1}}/>

function ProfilesAdmin({profiles,onProfiles}){

  const [mode,setMode]=useState("existing");

  const filtered=songDb.filter(s=>(!existingIds.has(s.id))&&(s.title.toLowerCase().includes(search.toLowerCase())||s.artist.toLowerCase().includes(search.toLowerCase())));
  const toggleSong=id=>setSelectedSongs(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const toggleSl=id=>setTargetSlIds(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);

      fetchAI(ns,"",banksAnn,banksPlug,aiProvider,aiKeys,guitars)
        .then(r=>onSongDb(p=>p.map(x=>x.id===ns.id?{...x,aiCache:{gId:"",result:r}}:x)))

    <div style={{position:"fixed",inset:0,background:"var(--overlay)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:100}} onClick={e=>e.target===e.currentTarget&&onClose()}>

            <button key={v} onClick={()=>setMode(v)} style={{flex:1,background:mode===v?"var(--accent-bg)":"var(--a5)",border:mode===v?"1px solid rgba(99,102,241,0.6)":"1px solid var(--a10)",color:mode===v?"var(--accent)":"var(--text-sec)",borderRadius:8,padding:"8px",fontSize:12,fontWeight:600,cursor:"pointer"}}>{l}</button>
          ))}
        </div>
        {mode==="existing"&&<>
          <input placeholder="Rechercher..." value={search} onChange={e=>setSearch(e.target.value)} style={{width:"100%",background:"var(--bg-body)",color:"var(--text)",border:"1px solid var(--a15)",borderRadius:8,padding:"9px 12px",fontSize:13,marginBottom:10,boxSizing:"border-box"}}/>
