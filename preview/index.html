<style>
  /* ── Bridge: old var names → new design tokens (from tokens.css) ── */
  :root, [data-theme="dark"] {
    --bg-body: var(--bg);
    --bg-card: var(--surface-card);
    --bg-disabled: var(--bg-elev-3);
    --text: var(--text-primary);
    --text-bright: var(--text-primary);
    --text-sec: var(--text-secondary);
    --text-muted: var(--text-tertiary);
    --text-dim: var(--text-tertiary);
    /* Opacity layers → elevation + border tokens */
    --a3: var(--bg-elev-1);
    --a4: var(--bg-elev-1);
    --a5: var(--bg-elev-2);
    --a6: var(--bg-elev-2);
    --a7: var(--bg-elev-3);
    --a8: var(--border-subtle);
    --a10: var(--border-subtle);
    --a12: var(--border-strong);
    --a15: var(--border-strong);
    /* Accent bridge */
    --accent-bg: var(--accent-soft);
    --accent-border: var(--border-accent);
    /* Semantic colors */
    --green: var(--success);
    --green-bg: rgba(120,180,90,0.12);
    --green-border: rgba(120,180,90,0.3);
    --yellow: var(--copper-400);
    --yellow-bg: rgba(184,115,51,0.12);
    --yellow-border: rgba(184,115,51,0.3);
    --red: var(--danger);
    --red-bg: rgba(217,82,61,0.12);
    --red-border: rgba(217,82,61,0.3);
    --blue: var(--brass-300);
    --blue-bg: rgba(194,158,92,0.12);
    --blue-border: rgba(194,158,92,0.25);
    --purple: var(--wine-400);
    --purple-bg: rgba(155,58,44,0.12);
    --purple-border: rgba(155,58,44,0.25);
    --overlay: rgba(10,8,6,0.75);
    --gradient-bottom: linear-gradient(transparent, var(--bg) 8px);
    color-scheme: dark;
  }
  [data-theme="light"] {
    --bg-body: var(--bg);
    --bg-card: var(--surface-card);
    --bg-disabled: var(--bg-elev-3);
    --text: var(--text-primary);
    --text-bright: var(--text-primary);
    --text-sec: var(--text-secondary);
    --text-muted: var(--text-tertiary);
    --text-dim: var(--text-tertiary);
    --a3: var(--bg-elev-1);
    --a4: var(--bg-elev-1);
    --a5: var(--bg-elev-2);
    --a6: var(--bg-elev-2);
    --a7: var(--bg-elev-3);
    --a8: var(--border-subtle);
    --a10: var(--border-subtle);
    --a12: var(--border-strong);
    --a15: var(--border-strong);
    --accent-bg: var(--accent-soft);
    --accent-border: var(--border-accent);
    --green: var(--success);
    --green-bg: rgba(63,107,37,0.1);
    --green-border: rgba(63,107,37,0.3);
    --yellow: var(--copper-400);
    --yellow-bg: rgba(184,115,51,0.1);
    --yellow-border: rgba(184,115,51,0.3);
    --red: var(--danger);
    --red-bg: rgba(165,48,31,0.1);
    --red-border: rgba(165,48,31,0.3);
    --blue: var(--brass-500);
    --blue-bg: rgba(143,104,38,0.1);
    --blue-border: rgba(143,104,38,0.25);
    --purple: var(--wine-500);
    --purple-bg: rgba(122,31,23,0.1);
    --purple-border: rgba(122,31,23,0.25);
    --overlay: rgba(0,0,0,0.5);
    --gradient-bottom: linear-gradient(transparent, var(--bg) 8px);
    color-scheme: light;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%;overflow-x:hidden}
  /* tokens.css handles body base styles; we add safe-area + responsive overrides */
  body{padding-bottom:env(safe-area-inset-bottom);padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right);overflow-x:hidden}
  /* iOS : empêche le zoom auto sur les inputs (seuil = 16px) */
  input,select,textarea{font-size:16px!important;-webkit-appearance:none;appearance:none;border-radius:var(--r-md);font-family:var(--font-ui);background:var(--bg-elev-1);color:var(--text-primary);border:1px solid var(--border-strong)}
  select option{background:var(--surface-card);color:var(--text-primary)}
  input::placeholder{color:var(--text-tertiary)}
  button{-webkit-tap-highlight-color:transparent;touch-action:manipulation;font-family:var(--font-ui)}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:var(--r-xs)}
  table{border-collapse:collapse;width:100%}

  /* ── Eyebrow pattern ── */
  .eyebrow{font-family:var(--font-mono);font-size:var(--fs-xs);text-transform:uppercase;letter-spacing:var(--tracking-wider);color:var(--accent)}

  /* ── Buttons ── */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:var(--s-2);font-family:var(--font-ui);font-weight:600;border:none;cursor:pointer;transition:all var(--dur-fast) var(--ease-out);padding:var(--s-3) var(--s-5);font-size:var(--fs-sm);border-radius:var(--r-md)}
  .btn-primary{background:linear-gradient(180deg,var(--brass-200),var(--brass-400));color:var(--tolex-900);box-shadow:var(--shadow-sm)}
  .btn-primary:hover{background:linear-gradient(180deg,var(--brass-100),var(--brass-300));box-shadow:var(--shadow-md)}
  .btn-secondary{background:transparent;border:1px solid var(--border-strong);color:var(--text-secondary)}
  .btn-secondary:hover{background:var(--surface-hover);border-color:var(--accent)}
  .btn-ghost{background:transparent;border:none;color:var(--text-secondary)}
  .btn-ghost:hover{color:var(--text-primary);background:var(--accent-soft)}
  .btn-danger{background:transparent;border:1px solid var(--wine-400);color:var(--danger)}
  .btn-danger:hover{background:rgba(155,58,44,0.15)}
  .btn-icon{width:40px;height:40px;padding:0;border-radius:var(--r-md);background:var(--bg-elev-2);border:1px solid var(--border-subtle);color:var(--text-secondary)}
  .btn-icon:hover{background:var(--surface-hover);color:var(--text-primary)}
  .btn-sm{padding:var(--s-2) var(--s-3);font-size:var(--fs-xs)}
  .btn-lg{padding:var(--s-4) var(--s-6);font-size:var(--fs-md)}

  /* ── Badges ── */
  .badge{display:inline-flex;align-items:center;font-family:var(--font-mono);font-size:var(--fs-xs);text-transform:uppercase;letter-spacing:var(--tracking-wider);padding:2px 8px;border-radius:var(--r-sm);border:1px solid;font-weight:500}
  .badge-brass{background:rgba(194,158,92,0.12);border-color:rgba(194,158,92,0.3);color:var(--brass-200)}
  .badge-wine{background:rgba(155,58,44,0.12);border-color:rgba(155,58,44,0.3);color:var(--wine-400)}
  .badge-tube{background:rgba(255,123,28,0.15);border-color:rgba(255,123,28,0.35);color:var(--tube-glow)}
  .badge-cream{background:rgba(243,232,204,0.08);border-color:rgba(243,232,204,0.18);color:var(--cream-200)}
  .badge-solid{background:var(--accent);border-color:var(--accent);color:var(--text-inverse)}

  /* ── Responsive ── */
  .page-root{padding:var(--s-3);max-width:700px;margin:0 auto;overflow-x:hidden;word-break:break-word}
  @media(min-width:400px){.page-root{padding:var(--s-4)}}
  @media(min-width:640px){.page-root{padding:var(--s-5)}}

  /* ── Tab bar (mobile bottom / desktop) ── */
  .tab-bar{display:grid;gap:var(--s-2)}
  .tab-bar.tabs-3{grid-template-columns:repeat(3,1fr)}
  .tab-bar.tabs-4{grid-template-columns:repeat(4,1fr)}
  @media(max-width:360px){.tab-bar.tabs-4{grid-template-columns:repeat(2,1fr)}}
  .tab-btn{background:var(--bg-elev-1);border:1px solid var(--border-subtle);color:var(--text-tertiary);border-radius:var(--r-md);padding:var(--s-3) var(--s-1);font-family:var(--font-ui);font-size:var(--fs-xs);font-weight:600;cursor:pointer;text-align:center;line-height:var(--lh-snug);transition:all var(--dur-fast) var(--ease-out);-webkit-tap-highlight-color:transparent}
  .tab-btn.active{color:var(--text-primary);background:var(--accent-soft);border-color:var(--border-accent)}
  .tab-icon{font-size:16px;display:block;margin-bottom:2px}

  /* ── Guitar card grid ── */
  .guitar-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--s-2)}
  @media(min-width:480px){.guitar-grid{grid-template-columns:repeat(3,1fr)}}
  .guitar-card{background:var(--bg-elev-1);border:1px solid var(--border-subtle);border-radius:var(--r-lg);padding:var(--s-4) var(--s-2);cursor:pointer;text-align:center;transition:all var(--dur-fast) var(--ease-out);-webkit-tap-highlight-color:transparent}
  .guitar-card:active{transform:scale(0.97)}
  .guitar-card.selected{background:var(--accent-soft);border-color:var(--border-accent)}
  .style-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--s-2)}
  @media(min-width:400px){.style-grid{grid-template-columns:repeat(3,1fr)}}

  /* ── Modal ── */
  .modal-overlay{position:fixed;inset:0;background:var(--overlay);z-index:100;overflow-y:auto;padding:var(--s-3);-webkit-overflow-scrolling:touch}
  .modal-box{background:var(--surface-card);border:1px solid var(--border-strong);border-radius:var(--r-xl);padding:var(--s-4);max-width:660px;margin:0 auto;box-shadow:var(--shadow-lg)}
  @media(min-width:640px){.modal-box{padding:var(--s-5)}}
  .song-row-detail{animation:slideDown var(--dur-med) var(--ease-out)}
  @keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

  /* ── Preset card (central element) ── */
  .preset-card{background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--r-lg);padding:var(--s-3) var(--s-4);transition:all var(--dur-fast) var(--ease-out);box-shadow:var(--shadow-xs)}
  .preset-card:hover{background:var(--surface-hover);border-color:var(--border-strong)}
  .preset-card.active{border-color:var(--accent);box-shadow:var(--shadow-glow)}
  .preset-card .preset-eyebrow{font-family:var(--font-mono);font-size:var(--fs-xs);text-transform:uppercase;letter-spacing:var(--tracking-wider);color:var(--accent)}
  .preset-card .preset-title{font-family:var(--font-display);font-size:var(--fs-xl);line-height:var(--lh-tight);color:var(--text-primary);margin:var(--s-1) 0}
  .preset-card .preset-subtitle{font-style:italic;color:var(--text-secondary);font-size:var(--fs-sm)}
  .preset-card .tube-indicator{display:inline-block;width:8px;height:8px;border-radius:var(--r-pill);background:var(--tube-glow);box-shadow:0 0 6px var(--tube-glow)}

  /* ── Gain bar ── */
  .gain-bar{display:flex;gap:2px;align-items:center}
  .gain-bar span{width:6px;height:14px;border-radius:var(--r-xs);background:var(--border-subtle)}
  .gain-bar span.filled{background:var(--accent)}
  .gain-bar span.hot{background:var(--tube-glow)}

  /* ── Toggle ── */
  .toggle{position:relative;width:42px;height:24px;border-radius:var(--r-pill);background:var(--bg-elev-2);border:1px solid var(--border-subtle);cursor:pointer;transition:all var(--dur-fast) var(--ease-out)}
  .toggle.on{background:linear-gradient(180deg,var(--brass-300),var(--brass-500));border-color:var(--brass-400)}
  .toggle .toggle-thumb{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:var(--r-pill);background:var(--cream-50);box-shadow:var(--shadow-xs);transition:transform var(--dur-fast) var(--ease-out)}
  .toggle.on .toggle-thumb{transform:translateX(18px)}

  /* ── Slider ── */
  input[type="range"]{-webkit-appearance:none;appearance:none;height:6px;border-radius:var(--r-pill);background:linear-gradient(90deg,var(--accent),var(--bg-elev-2));border:none;outline:none}
  input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:var(--r-pill);background:radial-gradient(circle at 40% 35%,var(--brass-100),var(--brass-400));box-shadow:var(--shadow-sm);cursor:pointer;border:1px solid var(--brass-500)}

  /* ── Mobile ── */
  @media(max-width:639px){
    body{font-size:var(--fs-base)}
    .page-root{font-size:var(--fs-base);padding-bottom:70px}
    .tab-btn{font-size:var(--fs-sm);padding:var(--s-3) var(--s-1)}
    .tab-icon{font-size:18px}
    .nav-mobile{display:flex!important}
    .nav-desktop{display:none!important}
    .breadcrumb-nav{display:none!important}
    .app-header-bar{position:fixed!important;top:0;left:0;right:0;z-index:40;padding-top:env(safe-area-inset-top)!important}
    .page-root{padding-top:calc(52px + env(safe-area-inset-top))!important}
  }
  /* ── Tablet ── */
  @media(min-width:640px){
    .page-root{max-width:92%;padding:var(--s-6);font-size:var(--fs-base)}
    .nav-mobile{display:none!important}
    .nav-desktop{display:flex!important}
    .tab-btn{font-size:var(--fs-sm);padding:var(--s-4) var(--s-2)}
    .tab-icon{font-size:20px}
    .guitar-grid{grid-template-columns:repeat(4,1fr);gap:var(--s-3)}
    .guitar-card{padding:var(--s-4) var(--s-3)}
    .modal-box{padding:var(--s-6);max-width:90%}
    .song-row-detail{padding:var(--s-4) var(--s-5)}
  }
  /* ── Desktop ── */
  @media(min-width:1024px){
    .page-root{max-width:90%;padding:var(--s-8);font-size:var(--fs-md)}
    .tab-btn{font-size:var(--fs-base);padding:var(--s-4) var(--s-3)}
    .tab-icon{font-size:22px}
    .guitar-grid{grid-template-columns:repeat(5,1fr);gap:var(--s-3)}
    .modal-box{padding:var(--s-8);max-width:85%}
  }
  @media(min-width:1440px){
    .page-root{max-width:1300px;font-size:var(--fs-md)}
  }
  .overflow-x-auto{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .preset-result-card{background:var(--bg-elev-1);border:1px solid var(--border-subtle);border-radius:var(--r-lg);padding:var(--s-3) var(--s-4);margin-bottom:var(--s-2);transition:all var(--dur-fast) var(--ease-out)}
  .preset-result-card:hover{background:var(--surface-hover);border-color:var(--border-strong)}
  /* ── Badges et tags : toujours wrappables ── */
  .badge-wrap{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
  /* ── Safe area bottom pour les boutons fixes ── */
  .bottom-action{position:sticky;bottom:0;padding-bottom:max(12px,env(safe-area-inset-bottom));background:var(--gradient-bottom);z-index:10}

  /* ── Form controls ── */
  .form-input{background:var(--bg-elev-1);border:1px solid var(--border-strong);border-radius:var(--r-md);padding:var(--s-2) var(--s-3);color:var(--text-primary);font-family:var(--font-ui);font-size:var(--fs-sm);transition:border-color var(--dur-fast) var(--ease-out)}
  .form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);outline:none}
  .form-select{background:var(--bg-elev-1);border:1px solid var(--border-strong);border-radius:var(--r-md);padding:var(--s-2) var(--s-3);color:var(--text-primary);font-family:var(--font-ui)}
</style>

ues et la country."},"Fender Champ":{emoji:"🎵",refs:[{a:"Hound Dog Taylor",t:["Taylor's Rock"]},{a:"Robert Johnson Jr.",t:["Various blues recordings"]},{a:"Eddie Cochran",t:["Summertime Blues"]}],desc:"Le petit Fender Champ : son intime, breakup très expressif à faible volume. Les enregistrements de blues Chicago des années 50 doivent beaucoup à cet ampli."},"Fender 5051 Tweed":{emoji:"🎶",refs:[{a:"Carl Perkins",t:["Blue Suede Shoes"]},{a:"Sun Records artists",t:["Mystery Train"]},{a:"Elvis Presley (Scott Moore)",t:["That's All Right"]}],desc:"Le Fender Tweed des années 50 : le son originel du rock'n'roll. Breakup naturel et musical, midrange chaleureux. Les sessions Sun Records de Memphis ont défini ce son."},"Friedman Buxom Betty":{emoji:"💥",refs:[{a:"The Dead Daisies",t:["Highway Star (cover)"]},{a:"Zakk Wylde",t:["Bark at the Moon"]},{a:"Jerry Cantrell",t:["Would?"]}],desc:"La Friedman Buxom Betty est une tête au son chaud et puissant, moins agressif que la BE-100. Crunch british, sustain impressionnant, très polyvalente pour le hard rock."},"Cornford HellCat":{emoji:"😈",refs:[{a:"Radiohead",t:["Karma Police"]},{a:"Muse",t:["Hysteria"]},{a:"Mark Knopfler",t:["Walk of Life"]}],desc:"L'ampli britannique boutique par excellence. Cleans soyeux, crunch naturel, réponse dynamique remarquable. Particulièrement apprécié pour sa polyvalence des jeux rythmiques aux solos."},"Cornford Harle":{emoji:"😈",refs:[{a:"Thom Yorke",t:["The Bends era"]},{a:"Tom Morello (alt.)",t:["Rage setup"]},{a:"Nile Rodgers",t:["Le Freak"]}],desc:"Le Cornford Harle est la version clean/crunch de la gamme Cornford. Son aéré, réponse en cloche, idéal pour les jeux dynamiques et les textures sonores recherchées."},"Chandler 19T":{emoji:"🧪",refs:[{a:"The Beatles",t:["Please Please Me"]},{a:"Gerry & The Pacemakers",t:["You'll Never Walk Alone"]},{a:"The Shadows",t:["Apache"]}],desc:"Le Chandler 19T est une réplique du Vox AC15 des années 60 avec préampli modificable. Le son de la British Invasion or racteristique du rock américain des années 70-80."},Ironlung:{emoji:"🤖",refs:[{a:"Josh Homme",t:["No One Knows"]},{a:"Nick Oliveri",t:["Millionaire"]},{a:"Omar Rodríguez-López",t:["Roulette Dares"]}],desc:"Ampli boutique au son épais et psych. Apprécié du stoner rock et du rock psychédélique pour son grain unique, son sustain naturel et son caractère sonore distinctif."},ZWREK:{emoji:"⚡",refs:[{a:"Various rock artists",t:["Rock moderne"]},{a:"Boutique users",t:["Hard rock contemporain"]}],desc:"Ampli boutique ZWREK au son moderne et puissant. Polyvalent, du clean transparent au gain élevé, avec une réponse articulée très appréciée des guitaristes modernes."},"Dumble ODS":{emoji:"💎",refs:[{a:"Robben Ford",t:["Inside Story"]},{a:"Larry Carlton",t:["Room 335"]},{a:"BB King",t:["Every Day I Have the Blues"]},{a:"Eric Clapton",t:["Every Day I Have the Blues"]}],desc:"Le Dumble ODS (Overdrive Special) est l'ampli le plus exclusif au monde. Son transparent et dynamique, overdrive naturel et musical. Prisé par les meilleurs guitaristes blues-rock au monde."},"Mesa Boogie Rectifier":{emoji:"🔴",refs:[{a:"Metallica",t:["The Unforgiven"]},{a:"Tool",t:["Schism"]},{a:"System of a Down",t:["B.Y.O.B."]},{a:"Deftones",t:["Change"]}],desc:"Le Rectifier de Mesa/Boogie a redéfini le son du metal moderne. Gain massif, basses profondes, mur de son impressionnant. Essentiel pour le metal des années 90-2000."},"GK MB150":{emoji:"🎸",refs:[{a:"Stanley Clarke",t:["School Days"]},{a:"Jaco Pastorius",t:["Portrait of Tracy"]},{a:"Marcus Miller",t:["Run for Cover"]}],desc:"Le GK MB150 est une référence pour la basse électrique. Son articulé et percutant, parfait pour le jazz, la fusion et le funk. Marcus Miller et Stanley Clarke l'utilisaient régulièrement."},"Ampeg SVT Pro 4":{emoji:"🎸",refs:[{a:"Geddy Lee",t:["YYZ"]},{a:"John Paul Jones",t:["Whole Lotta Love"]},{a:"Mike Dirnt",t:["Basket Case"]}],desc:"L'Ampeg SVT Pro 4 est une légende de la basse. Son massif et chaud, caractéristique du rock classique. Geddy Lee (Rush) et John Paul Jones (Led Zeppelin) lui ont rendu hommage."},"Ampeg Bass":{emoji:"🎸",refs:[{a:"Paul McCartney",t:["Come Together"]},{a:"Dee Dee Ramone",t:["Blitzkrieg Bop"]},{a:"Geezer Butler",t:["Iron Man"]}],desc:"Les amplis Ampeg pour basse sont des références absolues dans le rock. Son ample, punchy, avec cette chaleur lampiste caractéristique qui a défini le son du rock classique."},"Aguilar DB750":{emoji:"🎸",refs:[{a:"Marcus Miller",t:[]},{a:"Victor Wooten",t:[]}],desc:"L'Aguilar DB750 est une tête basse à lampes au son chaud et massif. Référence absolue pour le funk, le jazz et le R&B. Son gros et rond avec une dynamique remarquable."},"Ampeg SVT":{emoji:"🎸",refs:[{a:"Lemmy Kilmister",t:["Ace of Spades"]},{a:"Chris Squire",t:["Roundabout"]},{a:"Flea",t:["Give It Away"]}],desc:"L'Ampeg SVT est LA référence basse depuis 1969. Son massif, puissant, avec une chaleur incomparable. Utilisé sur d'innombrables enregistrements rock et funk."},Amplifonics:{emoji:"🎸",refs:[{a:"Session guitarists",t:[]}],desc:"Ampli boutique Amplifonics au son polyvalent. Cleans transparents, gain progressif et musical. Apprécié des guitaristes de session pour sa réponse dynamique et sa palette sonore étendue."},"Bad Cat Cub":{emoji:"🐱",refs:[{a:"Joe Walsh",t:["Life's Been Good"]},{a:"Warren Haynes",t:["Soulshine"]}],desc:"Le Bad Cat Cub est un petit combo américain inspiré des circuits Fender Tweed. Son chaleureux, breakup naturel à faible volume. Parfait pour le blues et le rock roots en studio."},"Benson Chimera":{emoji:"🌟",refs:[{a:"Julian Lage",t:[]},{a:"Cory Wong",t:[]}],desc:"Le Benson Chimera est un ampli boutique de Portland au son vintage moderne. Cleans soyeux, breakup expressif. Très prisé des guitaristes de jazz moderne et de funk."},"Carr Sportsman":{emoji:"☀️",refs:[{a:"Bill Frisell",t:[]},{a:"Blake Mills",t:[]}],desc:"Le Carr Sportsman est un ampli boutique américain au son Fender-like raffiné. Cleans cristallins, réverb intégrée, breakup musical. Idéal pour le jazz, le country et le blues propre."},"Cornfield Harle":{emoji:"😈",refs:[{a:"Thom Yorke",t:[]},{a:"Nile Rodgers",t:["Le Freak"]}],desc:"Le Cornford Harlequin est la version clean/crunch de Cornford. Son aéré, réponse en cloche, idéal pour les textures sonores et les jeux dynamiques."},"Custom 30":{emoji:"🫖",refs:[{a:"Brian May",t:["Bohemian Rhapsody"]},{a:"Tom Petty",t:["Free Fallin'"]}],desc:"Ampli de type Vox AC30 custom. Son british classique avec ses harmoniques chimey caractéristiques. Chime et crunch naturel pour le rock britannique."},Diezel:{emoji:"⚙️",refs:[{a:"Adam Jones",t:["Schism"]},{a:"Bumblefoot",t:[]},{a:"Rivera (Metallica tech)",t:[]}],desc:"Les amplis Diezel allemands sont des machines de guerre du high gain. Son serré, articulé même dans les graves. Référence du metal et du hard rock moderne."},"Divided by 13":{emoji:"🔷",refs:[{a:"John Mayer",t:["Gravity","Waiting on the World to Change"]},{a:"Blake Mills",t:[]},{a:"Matt Schofield",t:[]}],desc:"Divided by 13 fabrique des amplis boutique californiens réputés pour leur dynamique exceptionnelle et leur réponse au toucher. Son clean lumineux qui crunche naturellement en poussant le volume. Favori de John Mayer en studio."},"Sons Amp":{emoji:"🔊",refs:[{a:"Session musicians",t:[]}],desc:"Sons Amplification est un fabricant d'amplis boutique britannique. Connus pour leur polyvalence, du clean cristallin au crunch rock classique. Amplis à lampes construits à la main avec un caractère british prononcé."},Amplifonics:{emoji:"🔊",refs:[],desc:"Amplifonics est une marque d'amplis boutique orientée gain et polyvalence. Ces presets capturent différentes configurations de gain, du clean au lead, pour explorer la palette complète de l'ampli."},"Dr. Z":{emoji:"🩺",refs:[{a:"Brad Paisley",t:["Mud on the Tires"]},{a:"Joe Bonamassa",t:["Sloe Gin"]}],desc:"Les amplis Dr. Z sont des boutiques américains au son vintage inspiré du Vox et du Fender. Chaleur, réponse dynamique et musicalité exceptionnelles."},"Dr. Z Wreck":{emoji:"🩺",refs:[{a:"Joe Bonamassa",t:["Sloe Gin"]},{a:"Brad Paisley",t:[]}],desc:"Le Dr. Z Wreck est un ampli boutique inspiré du Trainwreck. Son clair brillant, crunch musical et expressif. Très réactif au volume de la guitare."},"Drive Pedals":{emoji:"🎛️",refs:[],desc:"Pédales de drive capturées via ToneX. Ces presets modélisent des pédales d'overdrive, fuzz et distortion populaires. A utiliser en standalone ou devant un ampli clean pour ajouter du gain et de la couleur."},"Pédales de drive":{emoji:"🎛️",refs:[],desc:"Captures de pédales de drive seules (sans ampli). A brancher devant un ampli clean dans votre chaîne de signal pour obtenir le caractère de la pédale tout en gardant le son de votre ampli."},"Pédales de drive + Boss BD-2 Blues Driver":{emoji:"🎛️",refs:[{a:"John Mayer",t:["Gravity"]},{a:"Kirk Hammett",t:[]}],desc:"Le Boss BD-2 Blues Driver est un overdrive transparent et dynamique. Très populaire pour le blues et le rock, il ajoute du crunch sans masquer le son de la guitare. Capture pédale seule."},"Pédales de drive + Dallas Arbiter Fuzz Face":{emoji:"🎛️",refs:[{a:"Jimi Hendrix",t:["Purple Haze","Foxy Lady"]},{a:"Eric Johnson",t:["Cliffs of Dover"]},{a:"David Gilmour",t:["Money"]}],desc:"Le Fuzz Face est LA pédale de Jimi Hendrix. Son fuzz organique, chaud et musical réagit au volume de la guitare. Capture pédale seule."},"Pédales de drive + EHX Big Muff":{emoji:"🎛️",refs:[{a:"David Gilmour",t:["Comfortably Numb"]},{a:"The Smashing Pumpkins",t:["Cherub Rock"]},{a:"Dinosaur Jr.",t:["Feel the Pain"]}],desc:"L'Electro-Harmonix Big Muff Pi est une légende du fuzz/distortion. Son massif, sustain infini, le mur de son de Gilmour et Corgan. Capture pédale seule."},"Pédales de drive + Electro-Harmonix Big Muff Pi":{emoji:"🎛️",refs:[{a:"David Gilmour",t:["Comfortably Numb"]},{a:"The Smashing Pumpkins",t:["Cherub Rock"]}],desc:"L'EHX Big Muff Pi : fuzz/distortion massif au sustain infini. Le son de Gilmour sur The Wall et de Corgan sur Siamese Dream. Capture pédale seule."},"Pédales de drive + Ibanez TS808 Tube Screamer":{emoji:"🎛️",refs:[{a:"Stevie Ray Vaughan",t:["Pride and Joy","Texas Flood"]},{a:"John Mayer",t:["Belief"]},{a:"The Edge",t:[]}],desc:"Le Tube Screamer TS808 est l'overdrive le plus célèbre au monde. Boost de médiums caractéristique, utilisé par SRV pour son son Texas Blues légendaire. Capture pédale seule."},"Pédales de drive + Klon Centaur":{emoji:"🎛️",refs:[{a:"Jeff Beck",t:[]},{a:"John Mayer",t:["Gravity"]},{a:"Matt Schofield",t:[]}],desc:"Le Klon Centaur est le Saint Graal des overdrives. Transparent, dynamique, il pousse l'ampli sans colorer le son. Original introuvable et très recherché. Capture pédale seule."},"Pédales de drive + REVV G4":{emoji:"🎛️",refs:[{a:"Rabea Massaad",t:[]},{a:"Pete Thorn",t:[]}],desc:"La REVV G4 est une pédale de distortion high gain moderne. Son serré et défini, parfaite pour le metal et le hard rock contemporain. Capture pédale seule."},"Pédales de drive + TC Electronic Vintage OD":{emoji:"🎛️",refs:[],desc:"Le TC Electronic Vintage Overdrive est un clone du Tube Screamer avec plus de headroom. Overdrive chaud et musical, bon pour le blues et le rock. Capture pédale seule."},"Pédales de drive + Maxon OD-9":{emoji:"🎛️",refs:[{a:"Stevie Ray Vaughan",t:[]},{a:"Mike Landau",t:[]}],desc:"Le Maxon OD-9 est le grand frère japonais du Tube Screamer (Ibanez est un rebrand de Maxon). Son légèrement plus ouvert et dynamique que le TS808. Capture pédale seule."},"Pédales de drive + Eagle Claw OD":{emoji:"🎛️",refs:[],desc:"L'Eagle Claw OD est un overdrive boutique à faible gain, transparent et dynamique. Idéal comme boost ou pour ajouter juste une touche de crunch. Capture pédale seule."},"Pédales de drive + DIY Candyman":{emoji:"🎛️",refs:[],desc:"Le DIY Candyman est un overdrive artisanal de type Klon. Son transparent avec un léger boost de médiums, réactif au toucher. Capture pédale seule."},"Pédales de drive + Soldano SLO-style OD":{emoji:"🎛️",refs:[{a:"Eric Clapton (80s)",t:[]},{a:"Warren DeMartini",t:[]}],desc:"Overdrive inspiré du canal lead du Soldano SLO-100. High gain articulé avec des médiums chantants, le son rock/metal des années 80-90. Capture pédale seule."},"Pédales de drive + Marshall Guv'nor Plus":{emoji:"🎛️",refs:[{a:"Gary Moore",t:["Still Got the Blues"]}],desc:"Le Marshall Guv'nor est la distortion Marshall en format pédale. Son british classique, médiums prononcés, crunch rock typique. Capture pédale seule."},"Pédales de drive + Marshall Jackhammer":{emoji:"🎛️",refs:[],desc:"Le Marshall Jackhammer est une pédale overdrive/distortion polyvalente. Du léger crunch au high gain, avec un EQ flexible. Capture pédale seule."},"Pédales de drive + Marshall-style Breaker OD":{emoji:"🎛️",refs:[{a:"Eric Clapton",t:["Beano album"]},{a:"John Mayer",t:[]}],desc:"Overdrive inspiré du Marshall Bluesbreaker, la pédale de légende de Clapton. Son crunch bluesy, dynamique et musical. Capture pédale seule."},ENGL:{emoji:"🦅",refs:[{a:"Ritchie Blackmore",t:["Highway Star"]},{a:"Steve Morse",t:[]},{a:"Marty Friedman",t:[]}],desc:"Les amplis ENGL allemands offrent un son tight et agressif. Gain massif et articulé, idéal pour le metal européen et le hard rock moderne."},"EVH 5150":{emoji:"⚡",refs:[{a:"Eddie Van Halen",t:["Eruption","Panama"]},{a:"Wolfgang Van Halen",t:[]}],desc:"L'EVH 5150 est la version moderne du légendaire Peavey 5150. Conçu par Eddie Van Halen, c'est l'ampli metal/hard rock ultime. Gain massif, son percutant et articulé."},Fender:{emoji:"🌅",refs:[{a:"Various Fender artists",t:[]}],desc:"Ampli Fender générique. Le son américain par excellence : cleans brillants, réponse cristalline, le socle de la musique populaire depuis les années 50."},"Fender 5E3 Tweed Deluxe":{emoji:"🎶",refs:[{a:"Neil Young",t:["Cinnamon Girl"]},{a:"Billy Gibbons",t:["La Grange"]},{a:"Larry Carlton",t:[]}],desc:"Le Fender 5E3 Tweed Deluxe est l'un des amplis les plus enregistrés de l'histoire. Breakup naturel et musical dès les premiers volumes. Son chaud, compressé, magique pour le blues et le rock."},"Fender 5E7 Bandmaster":{emoji:"🎶",refs:[{a:"Buddy Holly",t:["That'll Be the Day"]},{a:"Roy Buchanan",t:["Sweet Dreams"]}],desc:"Le Fender 5E7 Bandmaster Tweed de 1958 est un ampli 3x10 au son puissant et chaud. Version plus grande du Tweed Deluxe, il offre plus de headroom tout en gardant ce breakup naturel légendaire."},"Fender Bassman":{emoji:"🎷",refs:[{a:"Buddy Guy",t:["Stone Crazy"]},{a:"Jim Campilongo",t:[]}],desc:"Le Fender Bassman est l'ampli qui a inspiré les premiers Marshall. Son rond, chaud, crunch musical. Le son du blues et du rock'n'roll originel."},"Fender Blues Deluxe II":{emoji:"🌅",refs:[{a:"John Mayer",t:[]},{a:"Jonny Lang",t:[]}],desc:"Le Fender Blues Deluxe Reissue II est un combo 40W au son Tweed moderne. Réverb à ressort, gain naturel, le compagnon idéal du blues et du rock roots."},"Fender Cambridge":{emoji:"🌅",refs:[{a:"Syd Barrett",t:["Interstellar Overdrive"]}],desc:"Le Fender Cambridge Reverb est un combo à transistors vintage des années 60-70. Son propre et net, avec un charme lo-fi particulier. Utilisé par Syd Barrett aux débuts de Pink Floyd."},"Fender Hot Rod Twin":{emoji:"🌟",refs:[{a:"Session guitarists",t:[]}],desc:"Le Fender Hot Rod Twin est un ampli à fort headroom dérivé du Twin Reverb. Cleans immenses, canal drive ajouté. Polyvalent pour le live et le studio."},"Fender Princeton":{emoji:"🌅",refs:[{a:"Eric Clapton",t:["Unplugged"]},{a:"Mike Campbell",t:["Free Fallin'"]}],desc:"Le Fender Princeton Reverb est le petit ampli studio par excellence. Réverb à ressort légendaire, breakup naturel à volume modéré. Le son intime des grands enregistrements."},"Fender Pro Amp":{emoji:"🌅",refs:[{a:"Muddy Waters",t:["Hoochie Coochie Man"]},{a:"Stevie Ray Vaughan",t:[]}],desc:"Le Fender Pro Amp est un combo 1x15 au son plein et rond. Plus de basses que le Deluxe, idéal pour le blues de Chicago et les sonorités vintage."},"Fender Super Reverb":{emoji:"🌅",refs:[{a:"Stevie Ray Vaughan",t:["Texas Flood"]},{a:"Mike Campbell",t:[]}],desc:"Le Fender Super Reverb 4x10 est l'ampli de SRV sur ses premiers enregistrements. Son plein, projection puissante, breakup naturel. Le son du Texas Blues."},"Fender Texas Star":{emoji:"⭐",refs:[{a:"Eric Johnson",t:["Cliffs of Dover"]}],desc:"Le Fender Texas Star est un ampli prototype/boutique au son clair et articulé. Headroom important, dynamique exceptionnelle. Associé au son cristallin d'Eric Johnson."},"Fender Twin":{emoji:"🌟",refs:[{a:"Keith Richards",t:["Brown Sugar"]},{a:"Albert King",t:["Born Under a Bad Sign"]}],desc:"Le Fender Twin est la référence des cleans américains. Headroom immense, son brillant et défini. L'ampli des grands studios depuis les années 60."},"Fender Twin Reverb":{emoji:"🌟",refs:[{a:"Jerry Garcia",t:["Truckin'"]},{a:"B.B. King",t:["The Thrill Is Gone"]},{a:"Jazz Fusion artists",t:[]}],desc:"Le Fender Twin Reverb est la version avec réverb intégrée du Twin. Son propre légendaire, 85W de headroom pur. L'ampli jazz et clean par excellence."},Fuzzy:{emoji:"🎛️",refs:[{a:"Jimi Hendrix",t:["Purple Haze"]}],desc:"Preset basé sur un circuit fuzz. Son saturé, compressé et sustain infini. Le son de Jimi Hendrix et du psychédélisme des années 60."},"Gallien-Krueger 800RB":{emoji:"🎸",refs:[{a:"Flea",t:["Give It Away"]},{a:"Robert Trujillo",t:[]}],desc:"Le GK 800RB est un ampli basse à transistors au son punchy et articulé. Le choix de Flea (Red Hot Chili Peppers) pour son attaque et sa clarté."},"Gibson Skylark":{emoji:"🎵",refs:[{a:"Chuck Berry",t:["Johnny B. Goode"]},{a:"Bo Diddley",t:["Who Do You Love"]}],desc:"Le petit ampli Gibson Skylark GA5 incarne le son roots des années 50. Breakup naturel à faible volume, chaleur vintage. Idéal pour le rockabilly et le blues."},Hiwatt:{emoji:"🇬🇧",refs:[{a:"Pete Townshend",t:["Won't Get Fooled Again"]},{a:"David Gilmour",t:["Comfortably Numb"]}],desc:"Les amplis Hiwatt sont réputés pour leur headroom et leur clarté. Son british cristallin et puissant, le choix de Townshend et Gilmour."},Marshall:{emoji:"🤘",refs:[{a:"Various rock artists",t:[]}],desc:"Ampli Marshall générique. Le son du rock par excellence depuis 1962. Grain british, crunch naturel, le mur de son qui a défini le genre."},"Marshall 18W":{emoji:"🎩",refs:[{a:"Eric Clapton",t:["Beano album"]},{a:"Jimmy Page",t:[]}],desc:"Le Marshall 18W est un petit ampli vintage très recherché. Son crunch naturel à faible volume, le son du Beano album de Clapton. Breakup musical et harmoniques riches."},"Marshall 1974X":{emoji:"🏺",refs:[{a:"Jimi Hendrix",t:["Purple Haze"]},{a:"Eric Clapton",t:[]}],desc:"Le Marshall 1974X est la réédition du combo 18W des années 60. Son crunch vintage authentique, breakup naturel. Le son des petits clubs de blues-rock des sixties."},"Marshall JTM45 / Super Lead":{emoji:"🎩",refs:[{a:"Eric Clapton",t:["Crossroads"]},{a:"Pete Townshend",t:["My Generation"]}],desc:"Le Marshall JTM45 / Super Lead combine les caractéristiques des deux circuits. Crunch bluesy, sustain naturel. Le fondement du son rock britannique."},"Marshall Major 200W (modifié)":{emoji:"🔊",refs:[{a:"Ritchie Blackmore",t:["Highway Star"]},{a:"John Entwistle",t:[]}],desc:"Le Marshall Major 200W modifié est un monstre de puissance. Volume et headroom extrêmes. Ritchie Blackmore (Deep Purple) l'utilisait pour ses solos perçants."},"Marshall Silver Jubilee":{emoji:"⚡",refs:[{a:"Slash",t:["November Rain"]},{a:"Alex Lifeson",t:["Tom Sawyer"]}],desc:"Le Marshall Silver Jubilee (2555) est un ampli mythique de 1987. Son crunch signature entre le Plexi et le JCM800. Le son de Slash sur Appetite for Destruction."},"Marshall Super 100":{emoji:"⚡",refs:[{a:"Jimi Hendrix",t:["All Along the Watchtower"]},{a:"Eric Clapton",t:[]},{a:"Jimmy Page",t:["Whole Lotta Love"]}],desc:"Le Marshall Super 100 (Plexi 100W) est l'ampli qui a défini le rock. Volume massif, crunch naturel, le son des années 60-70 dans les stades."},"Marshall Super Lead 100W":{emoji:"⚡",refs:[{a:"Angus Young",t:["Back in Black"]},{a:"Jimmy Page",t:["Stairway to Heaven"]},{a:"Jimi Hendrix",t:["Voodoo Child"]}],desc:"Le Marshall Super Lead 100W est le Plexi originel. Son brut et puissant, le mur de son qui a construit le hard rock. L'ampli le plus iconique de l'histoire du rock."},"Marshall Super Lead · Hiwatt Custom 100":{emoji:"🇬🇧",refs:[{a:"Pete Townshend",t:["Won't Get Fooled Again"]},{a:"David Gilmour",t:[]}],desc:"Combinaison Marshall Super Lead et Hiwatt Custom 100. Le meilleur des deux mondes britanniques : puissance Marshall et clarté Hiwatt."},"Matchless Brave":{emoji:"🎼",refs:[{a:"Tom Bukovac",t:[]},{a:"Session guitarists",t:[]}],desc:"Le Matchless Brave est un combo EL84 au son brillant et expressif. Crunch musical, dynamique remarquable. Apprécié des guitaristes de Nashville et des sessionmen."},"Matchless C30":{emoji:"🎼",refs:[{a:"Tom Petty",t:["American Girl"]},{a:"Mark Knopfler",t:[]}],desc:"Le Matchless C30 est l'héritier du Vox AC30. Son chimey et brillant, crunch musical. Plus articulé et moderne que l'original, idéal pour le rock et le pop-rock."},"Matchless Canyon":{emoji:"🎼",refs:[{a:"Session guitarists",t:[]}],desc:"Le Matchless Canyon est un ampli classe A au son ouvert et dynamique. Cleans cristallins, overdrive musical et réactif au toucher."},"Matchless Chieftain":{emoji:"🎼",refs:[{a:"Mark Knopfler",t:["Brothers in Arms"]},{a:"Tom Petty",t:[]}],desc:"Le Matchless Chieftain est le flagship de Matchless. 2 canaux, 40W, polyvalence exceptionnelle. Clean impeccable et overdrive chaud, le préféré de Mark Knopfler."},"Mesa Boogie":{emoji:"🔴",refs:[{a:"Carlos Santana",t:["Oye Como Va"]},{a:"Various artists",t:[]}],desc:"Les amplis Mesa Boogie sont synonymes de polyvalence et de gain articulé. Du clean cristallin au lead saturé, le son de la Californie depuis 1969."},"Mesa Boogie Mark II":{emoji:"🔴",refs:[{a:"Carlos Santana",t:["Oye Como Va"]},{a:"Keith Richards",t:[]}],desc:"Le Mesa Boogie Mark II est l'ampli qui a lancé le son Mesa. Gain articulé, EQ graphique, le son lead singing de Carlos Santana."},"Mesa Mark":{emoji:"🔴",refs:[{a:"John Petrucci",t:["Pull Me Under"]},{a:"Carlos Santana",t:["Smooth"]}],desc:"La série Mesa Mark définit le son lead moderne. Articulé, gain progressif, EQ ultra-flexible. Le choix de Petrucci et Santana."},"Mezzabarba MZero":{emoji:"🇮🇹",refs:[{a:"Matteo Mancuso",t:[]},{a:"Italian rock guitarists",t:[]}],desc:"Le Mezzabarba MZero est un ampli boutique italien au son moderne et raffiné. Clean transparent, overdrive organique. La nouvelle école du haut de gamme européen."},"Mezzabarba Trinity":{emoji:"🇮🇹",refs:[{a:"Matteo Mancuso",t:[]},{a:"Modern fusion players",t:[]}],desc:"Le Mezzabarba Trinity est un ampli 3 canaux italien haut de gamme. Du clean jazz au high gain moderne, avec une clarté et une dynamique exceptionnelles."},"Music Man HD130":{emoji:"🎸",refs:[{a:"Eric Clapton (70s)",t:[]},{a:"Mark Knopfler (early)",t:[]}],desc:"Le Music Man HD130 est un ampli à transistors/hybride conçu par Leo Fender. Son clean massif, headroom immense. Utilisé par Clapton et Knopfler dans les années 70."},Orange:{emoji:"🍊",refs:[{a:"Jimmy Page",t:[]},{a:"Noel Gallagher",t:["Don't Look Back in Anger"]}],desc:"Les amplis Orange incarnent le son rock britannique chaud et saturé. Grain épais, midrange prononcé, le son de la scène rock UK depuis 1968."},"Orange OR120":{emoji:"🍊",refs:[{a:"Randy Rhoads",t:["Crazy Train"]},{a:"Geddy Lee",t:[]}],desc:"L'Orange OR120 est l'ampli classique de la marque. Son chaud et puissant, crunch british naturel. Utilisé par Randy Rhoads au début de sa carrière avec Ozzy."},"PRS Archon":{emoji:"🎸",refs:[{a:"Mark Tremonti",t:[]},{a:"Dustie Waring",t:[]}],desc:"Le PRS Archon est un ampli high gain moderne au son serré et articulé. Conçu par Paul Reed Smith, il offre des cleans transparents et un gain massif."},"Rockman Sustainor":{emoji:"🎧",refs:[{a:"Tom Scholz",t:["More Than a Feeling"]},{a:"Boston",t:["Peace of Mind"]}],desc:"Le Rockman Sustainor de Tom Scholz (Boston) est un préampli rack qui a défini le son AOR des années 80. Son compressé, sustain infini, chorus intégré."},"Stomp - Distortion":{emoji:"🎛️",refs:[{a:"Various artists",t:[]}],desc:"Captures de pédales de distortion via ToneX. Du crunch classique au high gain moderne, ces presets reproduisent le son de pédales de distortion emblématiques."},"Stomp - Fuzz":{emoji:"🎛️",refs:[{a:"Jimi Hendrix",t:["Purple Haze"]},{a:"David Gilmour",t:["Comfortably Numb"]}],desc:"Captures de pédales fuzz via ToneX. Le son saturé et compressé des années 60-70. Big Muff, Fuzz Face et autres légendes."},"Stomp - Overdrive":{emoji:"🎛️",refs:[{a:"Stevie Ray Vaughan",t:["Pride and Joy"]},{a:"John Mayer",t:[]}],desc:"Captures de pédales d'overdrive via ToneX. Tube Screamer, Klon, Blues Driver et autres classiques qui ont façonné le son du blues et du rock."},"Suhr SL67":{emoji:"🎸",refs:[{a:"Scott Henderson",t:[]},{a:"Doug Aldrich",t:[]}],desc:"Le Suhr SL67 est un ampli boutique inspiré du Marshall Plexi. Son crunch britannique raffiné, dynamique exceptionnelle. Le Plexi rêvé pour le guitariste moderne."},"Tone King Imperial":{emoji:"👑",refs:[{a:"Session guitarists",t:[]},{a:"Nashville players",t:[]}],desc:"Le Tone King Imperial est un ampli boutique américain au son Fender vintage premium. Atténuateur intégré, réverb exceptionnelle. Le son clean et breakup de Nashville."},"Trainwreck OD100":{emoji:"💥",refs:[{a:"Ken Fischer (builder)",t:[]},{a:"Brad Paisley",t:[]}],desc:"Le Trainwreck OD100 est l'un des amplis les plus rares et recherchés au monde. Construit par Ken Fischer, son gain organique et sa réponse au toucher sont légendaires."},"Two Rock":{emoji:"🌊",refs:[{a:"John Mayer",t:["Gravity"]},{a:"Matt Schofield",t:[]}],desc:"Les amplis Two Rock sont des boutiques californiens au son Dumble-like. Cleans aériens, overdrive musical et transparent. Le son du blues moderne haut de gamme."},Unknown:{emoji:"❓",refs:[],desc:"Ampli non identifié. Preset capturé sans référence d'ampli spécifique."},"Laney Supergroup":{emoji:"🔥",refs:[{a:"Tony Iommi (Black Sabbath)",t:["Paranoid","Iron Man","War Pigs","Black Sabbath"]},{a:"Ritchie Blackmore",t:["Smoke on the Water (early)"]},{a:"Paul Gilbert",t:[]}],desc:"Le Laney Supergroup est l'ampli emblématique de Tony Iommi. Son mid-range agressif et son sustain épais ont défini le son du heavy metal originel. Un ampli britannique brut, sans compromis."},Laney:{emoji:"🔥",refs:[{a:"Tony Iommi (Black Sabbath)",t:["Paranoid","Iron Man","War Pigs"]},{a:"Paul Gilbert",t:[]},{a:"Opeth",t:[]}],desc:"Laney est un fabricant britannique d'amplificateurs. Du Supergroup de Tony Iommi aux modernes IRT et GH, Laney couvre le spectre du blues au metal avec un caractère mid-range distinctif."},"Laney AOR":{emoji:"🔥",refs:[{a:"80s rock players",t:[]}],desc:"Le Laney AOR (Advanced Overdrive Response) est un ampli high-gain britannique des années 80. Son caractère agressif et ses médiums proéminents en font un classique du hard rock et du metal."},"Laney Lionheart":{emoji:"🦁",refs:[{a:"Blues-rock players",t:[]}],desc:"Le Laney Lionheart est un ampli Class A au son chaud et dynamique. Inspiré des amplis britanniques vintage, il excelle en clean et crunch avec un breakup musical et harmonique."}},nr={"Fender Twin Silverface":{brand:"fender",family:"blackface",school:"fender_clean"},"Fender Twin":{brand:"fender",family:"blackface",school:"fender_clean"},"Fender Twin Reverb":{brand:"fender",family:"blackface",school:"fender_clean"},"Fender Blackface Twin":{brand:"fender",family:"blackface",school:"fender_clean"},"Fender Super Reverb":{brand:"fender",family:"blackface",school:"fender_clean"},"Fender Super":{brand:"fender",family:"blackface",school:"fender_clean"},"Fender Deluxe Reverb":{brand:"fender",family:"blackface",school:"fender_clean"},"Fender Deluxe":{brand:"fender",family:"blackface",school:"fender_clean"},"Fender BF Deluxe":{brand:"fender",family:"blackface",school:"fender_clean"},"Fender Blues Deluxe II":{brand:"fender",family:"blackface",school:"fender_clean"}, INSTRUCTIONS : Tu dois suivre un raisonnement structuré en 4 étapes AVANT de donner ta recommandation. Ce raisonnement DOIT apparaître dans le JSON de sortie.

ÉTAPE 1 – PROFIL TONAL DU MORCEAU
Analyse en détail : artiste, guitare originale utilisée sur l'enregistrement, ampli original, type de gain (clean/crunch/overdrive/high gain), texture sonore (chaud, brillant, mid-heavy, scooped…), style de jeu typique.

ÉTAPE 2 – SCORING GUITARE (sur la collection ci-dessus)
Pour chaque guitare de la collection, évalue la compatibilité avec le profil tonal :
- Type de micro (humbucker / single coil / P90) et adéquation
- Corps et caractéristiques (attaque, sustain, chaleur)
- Référence historique (le guitariste original jouait-il ce type de guitare ?)
Garde uniquement les 2-3 meilleures avec un score sur 100 et une justification courte.

ÉTAPE 3 – PROFIL AMPLI IDÉAL
Identifie le type d'ampli idéal pour reproduire le son de ce morceau :
- Type/famille d'ampli (Marshall Plexi, Fender Blackface, Vox AC30, Mesa Boogie, etc.)
- Niveau de gain approprié
- Caractère tonal (mid-forward, bright, dark, scooped…)

ÉTAPE 4 – SCORE FINAL DU COUPLE GUITARE + AMPLI
Pour la guitare recommandée, calcule un score global de 0 à 100 basé sur ces critères pondérés :
- Adéquation du micro (25%)
- Corps/bois de la guitare (15%)
- Référence historique (30%)
- Adéquation ampli/gain (30%)
Justifie chaque sous-score.
